function DetalleLote({ lot, lots, onBack, backLabel = 'Volver', onUpdate, onDelete, onSaveChild }) {
  const [editing, setEditing] = useState(false);
  const [showAvanzar, setShowAvanzar] = useState(false);
  const [showCosecha, setShowCosecha] = useState(false);
  const [showTransplante, setShowTransplante] = useState(false);
  const [showRaleoParcial, setShowRaleoParcial] = useState(false);
  const [showZebra, setShowZebra] = useState(false);
  // Normalize locations — supports both old single location and new array
  const getLotLocs = (l) => {
    if (l.locations && l.locations.length > 0) return l.locations;
    if (l.location?.invernadero) return [{ invernadero: l.location.invernadero, tipo: l.location.tipo||'piscina', identificador: l.location.identificador||'P01', cantidad: l.currentQuantity ?? toPlants(l.quantity) }];
    return [];
  };
  const [locs, setLocs] = useState(() => getLotLocs(lot));
  const [addingLoc, setAddingLoc] = useState(false);
  const [newLoc, setNewLoc] = useState({ inv:'C', tipo:'piscina', id:'P01', cantidad:'', fecha:todayISO() });
  const saveLocs = (updated) => {
    setLocs(updated);
    onUpdate({ ...lot, locations: updated, location: updated[0] ? { invernadero: updated[0].invernadero, tipo: updated[0].tipo, identificador: updated[0].identificador } : lot.location });
  };
  const [editCosechaIdx, setEditCosechaIdx] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [editingMortalidad, setEditingMortalidad] = useState(false);
  const [mortalidadInput, setMortalidadInput] = useState(String(lot.mortalidadAcumulada || 0));

  const handleRaleoParcial = ({ cantidad, invDestino, ubicTipo, ubicId, densidad, fecha }) => {
    const childId = getNextChildId(lot.id, lot.childrenIds || []);
    const childNum = (lot.childrenIds || []).length + 1;
    const childName = lot.name + ' · Raleo ' + childNum;

    // Crear lote hijo
    const childLot = {
      id: childId,
      name: childName,
      variety: lot.variety,
      varietyCode: lot.varietyCode || VARIETY_CODES[lot.variety] || 'OTR',
      date: lot.date,
      quantity: cantidad,
      currentQuantity: cantidad,
      stage: 'raleo',
      sede: 'NA',
      parentId: lot.id,
      childrenIds: [],
      isRootLot: false,
      mortalidadAcumulada: 0,
      densidadSiembra: densidad,
      location: { invernadero: invDestino, tipo: ubicTipo, identificador: ubicId },
      setpoints: lot.setpoints || { ecTarget:1.8, ecTolerance:0.3, phMin:5.5, phMax:6.5, tempMaxAgua:24 },
      stageHistory: [
        { stage: 'almacigo', date: lot.date, quantity: lot.quantity },
        { stage: 'raleo', date: fecha, quantity: cantidad, location: { invernadero: invDestino, tipo: ubicTipo, identificador: ubicId } }
      ],
      parentName: lot.name,
      parentDate: lot.date,
      fechaRaleo: fecha,
      cosechas: [],
      notes: '',
    };

    // Actualizar lote padre
    const newQty = (lot.currentQuantity || 0) - cantidad;
    const updatedParent = {
      ...lot,
      currentQuantity: newQty,
      childrenIds: [...(lot.childrenIds || []), childId],
      raleos: [...(lot.raleos || []), { fecha, cantidadRaleada: cantidad, lotHijoId: childId, destino: { invernadero: invDestino, tipo: ubicTipo, identificador: ubicId } }],
      stage: newQty <= 0 ? 'cosecha' : lot.stage,
    };

    onUpdate(updatedParent);
    if (onSaveChild) onSaveChild(childLot);
    setShowRaleoParcial(false);
  };

  const saveMortalidad = () => {
    const val = parseInt(mortalidadInput);
    if (!isNaN(val) && val >= 0) onUpdate({ ...lot, mortalidadAcumulada: val });
    setEditingMortalidad(false);
  };

  const handleAvanzar = ({ nextStage, date, quantity, notes: moveNotes }) => {
    const isCosecha = nextStage === 'cosecha';
    const cosechaFinal = isCosecha ? {
      date,
      cosechadas: quantity,
      descartadas: 0,
      notes: moveNotes || 'Cosecha final'
    } : null;

    const updated = {
      ...lot,
      stage: nextStage,
      currentQuantity: isCosecha ? 0 : quantity,
      cosechas: isCosecha
        ? [...(lot.cosechas || []), cosechaFinal]
        : lot.cosechas,
      stageHistory: [
        ...lot.stageHistory,
        { stage: nextStage, date, quantity, notes: moveNotes }
      ]
    };
    onUpdate(updated);
    setShowAvanzar(false);
  };

  const handleEditCosecha = (idx, { date, cosechadas, descartadas, notes: cosNotes }) => {
    const newCosechas = lot.cosechas.map((c, i) =>
      i === idx ? { date, cosechadas, descartadas, notes: cosNotes } : c
    );
    // Recalcular currentQuantity desde cero
    const totalOut = newCosechas.reduce((a, c) => a + (c.cosechadas || 0) + (c.descartadas || 0), 0);
    const newQty = Math.max(0, toPlants(lot.quantity) - totalOut);
    const updated = {
      ...lot,
      cosechas: newCosechas,
      currentQuantity: newQty,
      stage: newQty <= 0 ? 'cosecha' : lot.stage,
    };
    onUpdate(updated);
    setEditCosechaIdx(null);
  };

  const handleTransplante = ({ date, transplantadas, desechadas, notas, esTotal }) => {
    const registro = { date, transplantadas, desechadas, notas };
    const newTransplantes = [...(lot.transplantes || []), registro];
    const totalTransplantadas = newTransplantes.reduce((a, t) => a + (t.transplantadas || 0), 0);
    const totalDesechadas = newTransplantes.reduce((a, t) => a + (t.desechadas || 0), 0);
    const plantasOriginales = lot.currentQuantity ?? toPlants(lot.quantity);
    const newQty = Math.max(0, plantasOriginales - totalDesechadas);
    const agotado = esTotal || totalTransplantadas >= newQty;
    const updated = {
      ...lot,
      transplantes: newTransplantes,
      currentQuantity: newQty,
      stage: agotado ? 'raleo' : lot.stage,
      stageHistory: agotado
        ? [...lot.stageHistory, { stage:'raleo', date, quantity: newQty, notes: notas || 'Transplante completado' }]
        : lot.stageHistory,
    };
    onUpdate(updated);
    setShowTransplante(false);
  };

  const handleCosecha = ({ date, cosechadas, descartadas, notes: cosNotes }) => {
    const currentQty = lot.currentQuantity ?? toPlants(lot.quantity);
    const totalOut = cosechadas + descartadas;
    const newQty = currentQty - totalOut;
    const cosechaRecord = { date, cosechadas, descartadas, notes: cosNotes };
    const updated = {
      ...lot,
      currentQuantity: newQty,
      cosechas: [...(lot.cosechas || []), cosechaRecord],
      stage: newQty <= 0 ? 'cosecha' : lot.stage,
      stageHistory: newQty <= 0
        ? [...lot.stageHistory, { stage: 'cosecha', date, quantity: 0, notes: 'Lote agotado' }]
        : lot.stageHistory,
    };
    onUpdate(updated);
    setShowCosecha(false);
  };
  const [form, setForm] = useState({
    name: lot.name,
    variety: VARIETIES.includes(lot.variety) ? lot.variety : 'Otra',
    customVariety: VARIETIES.includes(lot.variety) ? '' : lot.variety,
    date: lot.date, quantity: String(lot.quantity), notes: lot.notes || '',
    locInv:  lot.location?.invernadero || 'C',
    locTipo: lot.location?.tipo        || 'piscina',
    locId:   lot.location?.identificador || 'P01',
  });
  const [errors, setErrors] = useState({});
  const [saved, setSaved] = useState(false);
  const [confirmSave, setConfirmSave] = useState(false);

  const set = (key, val) => setForm(f => ({...f, [key]: val}));

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Ingresá un nombre';
    if (!form.quantity || isNaN(form.quantity) || parseInt(form.quantity) <= 0)
      e.quantity = 'Cantidad inválida';
    return e;
  };

  const handleUpdate = () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    const updated = {
      ...lot,
      name: form.name.trim(),
      variety: form.variety === 'Otra' ? (form.customVariety?.trim() || 'Otra') : form.variety,
      varietyCode: VARIETY_CODES[form.variety] || lot.varietyCode || 'OTR',
      date: form.date,
      quantity: parseInt(form.quantity),
      notes: form.notes.trim(),
      location: { invernadero: form.locInv, tipo: form.locTipo, identificador: form.locId },
      date: form.date,
      quantity: parseInt(form.quantity),
      notes: form.notes.trim(),
    };
    onUpdate(updated);
    setSaved(true);
    setTimeout(() => { setSaved(false); setEditing(false); }, 1000);
  };

  const dm = useDarkMode();
  const dmCard = 'var(--bg-card)';
  const dmBorder = 'var(--border)';
  const dmBorder2 = 'var(--sep)';
  const dmText = 'var(--text-1)';
  const dmText2 = 'var(--text-2)';
  const dmBg2 = 'var(--bg-card-h)';

  if (editing) {
    return (
      <div style={{flex:1, overflowY:'auto', padding:'16px 18px', background:'var(--bg-1)'}}>
        <button onClick={() => setEditing(false)} style={{display:'flex', alignItems:'center', gap:6, background:'none', border:'none', color:'var(--green)', fontSize:14, fontWeight:500, cursor:'pointer', marginBottom:20, padding:0}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Cancelar
        </button>
        <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color: 'var(--text-2)', textTransform:'uppercase', marginBottom:20}}>Editar lote</p>

        <Field label="Nombre del lote" error={errors.name}>
          <input id="edit-nombre" name="edit-nombre" type="text" value={form.name}
            onChange={e => { set('name', e.target.value); setErrors(er => ({...er, name:undefined})); }}
            style={inputStyle(errors.name)} />
        </Field>
        <Field label="Fecha de siembra">
          <input id="edit-fecha" name="edit-fecha" type="date" value={form.date}
            onChange={e => set('date', e.target.value)}
            style={inputStyle()} />
        </Field>
        <Field label="Cantidad de almácigos sembrados" error={errors.quantity}>
          <input id="edit-cantidad" name="edit-cantidad" type="number" inputMode="numeric" value={form.quantity}
            onChange={e => { set('quantity', e.target.value); setErrors(er => ({...er, quantity:undefined})); }}
            style={inputStyle(errors.quantity)} />
        </Field>
        <Field label="Variedad">
          <div style={{display:'flex', flexWrap:'wrap', gap:7, marginBottom: form.variety === 'Otra' ? 8 : 0}}>
            {VARIETIES.map(function(v) {
              const sel = form.variety === v;
              return (
                <button key={v} onClick={() => { set('variety', v); if (v !== 'Otra') set('customVariety', ''); }} style={{
                  padding:'9px 13px', borderRadius:10, border:'0.5px solid',
                  borderColor: sel ? 'var(--green)' : 'var(--border)',
                  background: sel ? 'var(--bg-card-h)' : 'var(--bg-card)',
                  color: sel ? 'var(--green)' : 'var(--text-2)',
                  fontSize:13, fontWeight: sel ? 700 : 400, cursor:'pointer', whiteSpace:'nowrap'
                }}>{v}</button>
              );
            })}
          </div>
          {form.variety === 'Otra' && (
            <input id="edit-variedad" name="edit-variedad" type="text" placeholder="Nombre de la variedad..."
              value={form.customVariety || ''}
              onChange={e => set('customVariety', e.target.value)}
              style={inputStyle()} autoFocus />
          )}
        </Field>
        <Field label="Notas (opcional)">
          <textarea id="edit-notas" name="edit-notas" value={form.notes} onChange={e => set('notes', e.target.value)}
            rows={3} style={{...inputStyle(), resize:'none', lineHeight:1.7}} />
        </Field>

        <Field label="Ubicación actual">
          <div style={{display:'flex', gap:8}}>
            <select value={form.locInv} onChange={e => set('locInv', e.target.value)}
              style={{...inputStyle(), flex:1}}>
              <option value="A">Inv A (Float)</option>
              <option value="B">Inv B (NFT)</option>
              <option value="C">Inv C</option>
              <option value="D">Inv D (Castro)</option>
            </select>
            <select value={form.locTipo} onChange={e => { set('locTipo', e.target.value); set('locId', e.target.value==='bancada'?'B01':'P01'); }}
              style={{...inputStyle(), flex:1}}>
              <option value="piscina">Piscina</option>
              <option value="bancada">Bancada</option>
              <option value="bandeja">Bandeja</option>
            </select>
            <select value={form.locId} onChange={e => set('locId', e.target.value)}
              style={{...inputStyle(), flex:1}}>
              {(form.locTipo === 'bancada'
                ? ['B01','B02','B03','B04','B05','B06','B07','B08']
                : ['P01','P02','P03','P04','P05','P06','P07','P08']
              ).map(id => <option key={id} value={id}>{id}</option>)}
            </select>
          </div>
        </Field>

        {confirmSave ? (
          <ConfirmBar
            message="Los datos del lote se van a actualizar con los valores ingresados."
            onConfirm={() => { setConfirmSave(false); handleUpdate(); }}
            onCancel={() => setConfirmSave(false)}
          />
        ) : (
          <button onClick={() => {
            const e = validate();
            if (Object.keys(e).length) { setErrors(e); return; }
            setConfirmSave(true);
          }} style={{
            width:'100%', padding:'15px 0', borderRadius:12, border:'none',
            background: saved ? 'var(--green)' : 'var(--text-1)',
            color:'#fff', fontSize:15, fontWeight:600, cursor:'pointer',
            transition:'background 0.3s', marginTop:8, marginBottom:24
          }}>
            {saved ? '✓ Guardado' : 'Guardar cambios'}
          </button>
        )}
      </div>
    );
  }

  return (
    <>
    {showAvanzar && <AvanzarModal lot={lot} onClose={() => setShowAvanzar(false)} onConfirm={handleAvanzar} />}
    {showRaleoParcial && <RaleoParcialModal lot={lot} onClose={() => setShowRaleoParcial(false)} onConfirm={handleRaleoParcial} />}
    {showZebra && <ZebraModal lot={lot} onClose={() => setShowZebra(false)} />}
    {showCosecha && <CosechaModal lot={lot} onClose={() => setShowCosecha(false)} onConfirm={handleCosecha} />}
    {showTransplante && <TransplanteModal lot={lot} onClose={() => setShowTransplante(false)} onConfirm={handleTransplante} esTotal={showTransplante === 'total'} />}
    {editCosechaIdx !== null && lot.cosechas?.[editCosechaIdx] && (
      <CosechaModal
        lot={lot}
        editData={lot.cosechas[editCosechaIdx]}
        onClose={() => setEditCosechaIdx(null)}
        onConfirm={(data) => handleEditCosecha(editCosechaIdx, data)}
        editMode
      />
    )}
    <div style={{flex:1, overflowY:'auto', padding:16, background:'var(--bg-1)'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}}>
        <button onClick={onBack} style={{display:'flex', alignItems:'center', gap:6, background:'none', border:'none', color:'var(--green)', fontSize:13, fontWeight:500, cursor:'pointer', padding:0}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          {backLabel}
        </button>
        <button onClick={() => setEditing(true)} style={{
          display:'flex', alignItems:'center', gap:5,
          background: 'var(--bg-card-h)',
          border:'0.5px solid var(--border)',
          borderRadius:20, padding:'6px 14px',
          fontSize:12, fontWeight:500, color:'var(--text-3)', cursor:'pointer'
        }}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Editar
        </button>
      </div>

      <p style={{fontSize:18, fontWeight:600, color:dmText, marginBottom:4}}>{lot.name}</p>
      <p style={{fontSize:13, color:dmText2, marginBottom:16}}>Sembrado el {formatDate(lot.date)}</p>

      <StageBadge stage={lot.stage} days={daysSince(lot.stageHistory?.[lot.stageHistory.length-1]?.date || lot.date)} maxDays={getMaxDays(lot.stage, lot.stageHistory?.[lot.stageHistory.length-1]?.date || lot.date)} />

      <div style={{background: dmCard, border:`0.5px solid ${dmBorder}`, borderRadius:14, padding:'14px 16px', marginTop:16}}>
        <Row label="Variedad" value={lot.variety} />
        <Row label="Almácigos sembrados" value={''+lot.quantity+' (× '+getPlantsPer()+' plantas)'} />
        <Row label="Plantas al sembrar" value={toPlants(lot.quantity).toLocaleString()} />
        <Row label="Plantas en producción" value={(lot.currentQuantity ?? toPlants(lot.quantity)).toLocaleString()} />
        {/* Ubicaciones múltiples — Opción C */}
        <div style={{paddingTop:8, borderTop:'0.5px solid var(--sep)'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: locs.length > 0 ? 8 : 0}}>
            <span style={{fontSize:13, color:'var(--text-3)'}}>
              {'Ubicaciones' + (locs.length > 0 ? ' · ' + locs.length : '')}
            </span>
            {locs.length > 0 && (
              <span style={{fontSize:11, color:'var(--stage-t)', fontWeight:600, fontFamily:'DM Mono, monospace'}}>
                {locs.reduce((a,l)=>a+(parseInt(l.cantidad)||0),0).toLocaleString()} plantas totales
              </span>
            )}
          </div>
          {locs.length > 0 && (
            <div style={{background:'var(--bg-card-h)', borderRadius:10, overflow:'hidden', marginBottom:6}}>
              {/* Cabecera tabla */}
              <div style={{display:'grid', gridTemplateColumns:'1fr 70px 42px 28px', gap:4, padding:'5px 10px', borderBottom:'0.5px solid var(--sep)'}}>
                <span style={{fontSize:9, fontWeight:700, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'.04em'}}>Lugar</span>
                <span style={{fontSize:9, fontWeight:700, color:'var(--text-3)', textTransform:'uppercase', textAlign:'right'}}>Plantas</span>
                <span style={{fontSize:9, fontWeight:700, color:'var(--text-3)', textTransform:'uppercase', textAlign:'right'}}>%</span>
                <span/>
              </div>
              {locs.map((loc, i) => {
                const total = locs.reduce((a,l)=>a+(parseInt(l.cantidad)||0),0);
                const pct = total > 0 ? Math.round(((parseInt(loc.cantidad)||0)/total)*100) : 0;
                const isNFT = loc.invernadero === 'B';
                const color = isNFT ? 'var(--stage-t)' : 'var(--text-2)';
                return (
                  <div key={i} style={{display:'grid', gridTemplateColumns:'1fr 70px 42px 28px', gap:4, padding:'7px 10px', borderBottom: i < locs.length-1 ? '0.5px solid var(--sep)' : 'none', alignItems:'center'}}>
                    <div>
                      <div style={{display:'flex', alignItems:'center', gap:5}}>
                        <span style={{fontSize:11, color}}>{loc.invernadero + ' · ' + (loc.tipo||'').charAt(0).toUpperCase() + (loc.tipo||'').slice(1) + ' ' + (loc.identificador||'')}</span>
                        {isNFT && <span style={{fontSize:8, fontWeight:700, color:'var(--stage-c)', background:'var(--stage-c)' + '18', padding:'1px 5px', borderRadius:3}}>NFT</span>}
                      </div>
                      {loc.fecha && <span style={{fontSize:9, color:'var(--text-3)'}}>{formatDate(loc.fecha)}</span>}
                    </div>
                    <span style={{fontSize:12, fontWeight:700, color:'var(--text-1)', textAlign:'right', fontFamily:'DM Mono, monospace'}}>{(parseInt(loc.cantidad)||0).toLocaleString()}</span>
                    <span style={{fontSize:11, color:'var(--text-3)', textAlign:'right'}}>{pct}%</span>
                    <button onClick={() => saveLocs(locs.filter((_,j)=>j!==i))}
                      style={{background:'none', border:'none', color:'var(--text-3)', fontSize:13, cursor:'pointer', padding:'0 2px', textAlign:'center'}}>✕</button>
                  </div>
                );
              })}
            </div>
          )}
          {/* Agregar nueva ubicación */}
          {addingLoc ? (
            <div style={{background:'var(--bg-card-h)', borderRadius:10, padding:'10px', marginBottom:4}}>
              <div style={{display:'flex', gap:5, flexWrap:'wrap', marginBottom:8}}>
                <select value={newLoc.inv} onChange={e => setNewLoc(f=>({...f, inv:e.target.value}))}
                  style={{padding:'4px 6px', borderRadius:6, border:'0.5px solid var(--stage-t)', background:'var(--bg-card)', color:'var(--text-1)', fontSize:11, outline:'none', flex:1}}>
                  {['A','B','C','D'].map(v => <option key={v} value={v}>Inv {v}</option>)}
                </select>
                <select value={newLoc.tipo} onChange={e => setNewLoc(f=>({...f, tipo:e.target.value, id:e.target.value==='bancada'?'B01':'P01'}))}
                  style={{padding:'4px 6px', borderRadius:6, border:'0.5px solid var(--stage-t)', background:'var(--bg-card)', color:'var(--text-1)', fontSize:11, outline:'none', flex:1}}>
                  <option value="piscina">Piscina</option>
                  <option value="bancada">Bancada</option>
                  <option value="bandeja">Bandeja</option>
                </select>
                <select value={newLoc.id} onChange={e => setNewLoc(f=>({...f, id:e.target.value}))}
                  style={{padding:'4px 6px', borderRadius:6, border:'0.5px solid var(--stage-t)', background:'var(--bg-card)', color:'var(--text-1)', fontSize:11, outline:'none', flex:1}}>
                  {(newLoc.tipo==='bancada'?['B01','B02','B03','B04','B05','B06','B07','B08']:['P01','P02','P03','P04','P05','P06','P07','P08']).map(id=><option key={id} value={id}>{id}</option>)}
                </select>
              </div>
              <div style={{display:'flex', gap:6, marginBottom:6}}>
                <input type="date" value={newLoc.fecha} onChange={e => setNewLoc(f=>({...f, fecha:e.target.value}))}
                  style={{flex:1, padding:'6px 10px', borderRadius:8, border:'0.5px solid var(--stage-t)', background:'var(--bg-card)', color:'var(--text-1)', fontSize:12, outline:'none'}} />
              </div>
              <div style={{display:'flex', gap:6, alignItems:'center'}}>
                <input type="number" inputMode="numeric" placeholder="Plantas en este lugar"
                  value={newLoc.cantidad} onChange={e => setNewLoc(f=>({...f, cantidad:e.target.value}))}
                  style={{flex:1, padding:'6px 10px', borderRadius:8, border:'0.5px solid var(--stage-t)', background:'var(--bg-card)', color:'var(--text-1)', fontSize:13, outline:'none'}} />
                <button onClick={() => {
                  if (!newLoc.cantidad || isNaN(newLoc.cantidad)) return;
                  const updated = [...locs, { invernadero:newLoc.inv, tipo:newLoc.tipo, identificador:newLoc.id, cantidad:parseInt(newLoc.cantidad), fecha:newLoc.fecha }];
                  saveLocs(updated);
                  setAddingLoc(false);
                  setNewLoc({ inv:'C', tipo:'piscina', id:'P01', cantidad:'', fecha:todayISO() });
                }} style={{padding:'6px 14px', borderRadius:8, border:'none', background:'var(--stage-t)', color:'#fff', fontSize:12, fontWeight:700, cursor:'pointer'}}>Agregar</button>
                <button onClick={() => setAddingLoc(false)} style={{padding:'6px 10px', borderRadius:8, border:'none', background:'none', color:'var(--text-3)', fontSize:12, cursor:'pointer'}}>✕</button>
              </div>
            </div>
          ) : (
            <button onClick={() => setAddingLoc(true)} style={{
              display:'flex', alignItems:'center', gap:6, padding:'6px 10px',
              background:'none', border:'0.5px dashed var(--border)', borderRadius:8,
              color:'var(--text-3)', fontSize:12, cursor:'pointer', width:'100%', justifyContent:'center'
            }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Agregar ubicación
            </button>
          )}
        </div>
        {lot.notes && <Row label="Notas" value={lot.notes} />}
      </div>

      <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:dmText2, textTransform:'uppercase', margin:'20px 0 10px'}}>Historial de etapas</p>
      <div style={{background: dmCard, border:`0.5px solid ${dmBorder}`, borderRadius:14, overflow:'hidden', marginBottom:24}}>
        {lot.stageHistory.map((h, i) => (
          <div key={i} style={{
            display:'flex', justifyContent:'space-between', alignItems:'center',
            padding:'14px 16px',
            borderBottom: i < lot.stageHistory.length-1 ? `0.5px solid ${dmBorder2}` : 'none'
          }}>
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <div style={{width:9, height:9, borderRadius:5, background: STAGES[h.stage].color, flexShrink:0}} />
              <div>
                <span style={{fontSize:14, fontWeight:500, display:'block', color:dmText}}>{STAGES[h.stage].label}</span>
                {h.notes && <span style={{fontSize:12, color:dmText2, marginTop:2, display:'block'}}>{h.notes}</span>}
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <p style={{fontSize:13, color:dmText, fontFamily:'DM Mono, monospace'}}>{formatDate(h.date)}</p>
              <p style={{fontSize:12, color:dmText2, marginTop:2}}>{h.quantity.toLocaleString()} plantas</p>
              {i > 0 && (() => {
                const prev = lot.stageHistory[i-1].quantity;
                const diff = prev - h.quantity;
                const pct = Math.round((diff / prev) * 100);
                return diff > 0
                  ? <p style={{fontSize:11, color: pct > 20 ? '#C0392B' : '#E07B2A', marginTop:2}}>↓ {diff.toLocaleString()} ({pct}%)</p>
                  : null;
              })()}
            </div>
          </div>
        ))}
      </div>

      {lot.cosechas && lot.cosechas.length > 0 && (
        <>
          <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:dmText2, textTransform:'uppercase', margin:'20px 0 10px'}}>
            Cosechas registradas · {lot.cosechas.length}
          </p>
          <div style={{background: dmCard, border:`0.5px solid ${dmBorder}`, borderRadius:14, overflow:'hidden', marginBottom:24}}>
            {lot.cosechas.map((c, i) => {
              const totalCosecha = (c.cosechadas || 0) + (c.descartadas || 0);
              return (
                <div key={i} style={{
                  display:'flex', justifyContent:'space-between', alignItems:'center',
                  padding:'14px 16px',
                  borderBottom: i < lot.cosechas.length-1 ? `0.5px solid ${dmBorder2}` : 'none'
                }}>
                  <div style={{display:'flex', alignItems:'center', gap:10, flex:1, minWidth:0}}>
                    <div style={{width:9, height:9, borderRadius:5, background:'var(--green)', flexShrink:0}} />
                    <div style={{flex:1, minWidth:0}}>
                      <span style={{fontSize:14, fontWeight:500, color:dmText, display:'block'}}>
                        {c.cosechadas.toLocaleString()} cosechadas
                      </span>
                      {c.descartadas > 0 && (
                        <span style={{fontSize:12, color:'var(--amber)', display:'block', marginTop:2}}>
                          {c.descartadas.toLocaleString()} descartadas
                        </span>
                      )}
                      {c.notes && <span style={{fontSize:12, color:dmText2, display:'block', marginTop:2}}>{c.notes}</span>}
                    </div>
                  </div>
                  <div style={{display:'flex', alignItems:'center', gap:10, flexShrink:0}}>
                    <div style={{textAlign:'right'}}>
                      <p style={{fontSize:13, color:dmText, fontFamily:'DM Mono, monospace'}}>{formatDate(c.date)}</p>
                      <p style={{fontSize:12, color:dmText2, marginTop:2}}>{totalCosecha.toLocaleString()} total</p>
                    </div>
                    <button onClick={() => setEditCosechaIdx(i)} style={{
                      background: 'var(--bg-card-h)', border:`0.5px solid ${dmBorder}`,
                      borderRadius:8, padding:'5px 10px',
                      fontSize:12, fontWeight:500, color:dmText2, cursor:'pointer',
                      flexShrink:0
                    }}>
                      Editar
                    </button>
                  </div>
                </div>
              );
            })}
            <div style={{
              padding:'12px 16px', background: dmBg2,
              display:'flex', justifyContent:'space-between', alignItems:'center',
              borderTop: '0.5px solid ' + dmBorder2
            }}>
              <span style={{fontSize:13, color:dmText2, fontWeight:500}}>Total cosechado</span>
              <span style={{fontSize:14, fontWeight:600, color:'var(--green)', fontFamily:'DM Mono, monospace'}}>
                {(lot.cosechas.reduce((a, c) => a + (c.cosechadas || 0), 0)).toLocaleString()} lechugas
              </span>
            </div>
            {(function() {
              const totalC = lot.cosechas.reduce((a, c) => a + (c.cosechadas || 0), 0);
              const totalD = lot.cosechas.reduce((a, c) => a + (c.descartadas || 0), 0);
              const totalT = totalC + totalD;
              if (totalT === 0 || totalD === 0) return null;
              const pct = Math.round((totalD / totalT) * 100);
              const mermaClr = pct > 20 ? 'var(--red)' : pct > 10 ? 'var(--amber)' : 'var(--green)';
              return (
                <div style={{
                  padding:'10px 16px', background: dmBg2,
                  display:'flex', justifyContent:'space-between', alignItems:'center',
                  borderTop: '0.5px solid ' + dmBorder2
                }}>
                  <span style={{fontSize:13, color:dmText2, fontWeight:500}}>Tasa de merma</span>
                  <div style={{display:'flex', alignItems:'center', gap:8}}>
                    <div style={{width:80, height:5, background:'var(--border)', borderRadius:3, overflow:'hidden'}}>
                      <div style={{height:'100%', width: Math.min(100,pct) + '%', background: mermaClr, borderRadius:3, transition:'width 0.4s'}} />
                    </div>
                    <span style={{fontSize:14, fontWeight:600, color: mermaClr, fontFamily:'DM Mono, monospace', minWidth:38, textAlign:'right'}}>
                      {pct}%
                    </span>
                  </div>
                </div>
              );
            })()}
          </div>
        </>
      )}

      {lot.transplantes && lot.transplantes.length > 0 && (
        <>
          <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:dmText2, textTransform:'uppercase', margin:'20px 0 10px'}}>
            Transplantes registrados · {lot.transplantes.length}
          </p>
          <div style={{background: dmCard, border:`0.5px solid ${dmBorder}`, borderRadius:14, overflow:'hidden', marginBottom:24}}>
            {lot.transplantes.map((t, i) => (
              <div key={i} style={{
                display:'flex', justifyContent:'space-between', alignItems:'center',
                padding:'14px 16px',
                borderBottom: i < lot.transplantes.length-1 ? `0.5px solid ${dmBorder2}` : 'none'
              }}>
                <div style={{display:'flex', alignItems:'center', gap:10, flex:1}}>
                  <div style={{width:9, height:9, borderRadius:5, background: STAGES.transplante.color, flexShrink:0}} />
                  <div>
                    <span style={{fontSize:14, fontWeight:500, color:dmText, display:'block'}}>{(t.transplantadas||0).toLocaleString()} transplantadas</span>
                    {t.desechadas > 0 && <span style={{fontSize:12, color:'var(--amber)', display:'block', marginTop:2}}>{t.desechadas.toLocaleString()} desechadas</span>}
                    {t.notas && <span style={{fontSize:12, color:dmText2, display:'block', marginTop:2}}>{t.notas}</span>}
                  </div>
                </div>
                <p style={{fontSize:13, color:dmText, fontFamily:'DM Mono, monospace'}}>{formatDate(t.date)}</p>
              </div>
            ))}
            <div style={{padding:'12px 16px', background:dmBg2, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <span style={{fontSize:13, color:dmText2, fontWeight:500}}>Total transplantado</span>
              <span style={{fontSize:14, fontWeight:600, color: STAGES.transplante.color, fontFamily:'DM Mono, monospace'}}>
                {(lot.transplantes.reduce((a,t) => a+(t.transplantadas||0), 0)).toLocaleString()} plantas
              </span>
            </div>
          </div>
        </>
      )}

      {lot.stage === 'raleo' && (
        <button onClick={() => setShowCosecha(true)} style={{
          width:'100%', padding:'14px 0', borderRadius:12, border:'none',
          background:'var(--green)', color:'#fff', fontSize:15, fontWeight:600,
          cursor:'pointer', display:'flex', alignItems:'center',
          justifyContent:'center', gap:8, marginBottom:12
        }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 2a9 9 0 0 1 9 9c0 4.97-9 13-9 13S3 15.97 3 11a9 9 0 0 1 9-9z"/><circle cx="12" cy="11" r="2.5"/></svg>
          Registrar cosecha parcial
        </button>
      )}

      {lot.stage === 'transplante' && (
        <>
          <button onClick={() => setShowTransplante(true)} style={{
            width:'100%', padding:'14px 0', borderRadius:12, border:'none',
            background: STAGES.transplante.color, color:'#fff', fontSize:15, fontWeight:600,
            cursor:'pointer', display:'flex', alignItems:'center',
            justifyContent:'center', gap:8, marginBottom:10
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
            Registrar transplante parcial
          </button>
          <button onClick={() => setShowTransplante('total')} style={{
            width:'100%', padding:'14px 0', borderRadius:12,
            border:`0.5px solid ${STAGES.transplante.color}`,
            background:'none', color: STAGES.transplante.color, fontSize:15, fontWeight:600,
            cursor:'pointer', display:'flex', alignItems:'center',
            justifyContent:'center', gap:8, marginBottom:12
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            Transplante total — pasar a Raleo
          </button>
        </>
      )}

      {/* Raleo Parcial — disponible en etapa transplante */}
      {lot.stage === 'transplante' && (lot.currentQuantity || 0) > 0 && (
        <button onClick={() => setShowRaleoParcial(true)} style={{
          width:'100%', padding:'13px 0', borderRadius:12, border:'0.5px solid var(--stage-r)',
          background:'none', color:'var(--stage-r)', fontSize:14, fontWeight:600, cursor:'pointer',
          display:'flex', alignItems:'center', justifyContent:'center', gap:8, marginBottom:10
        }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
          Ralear parcialmente
        </button>
      )}

      {/* Lotes hijos si los tiene */}
      {lot.childrenIds && lot.childrenIds.length > 0 && (
        <div style={{background:'var(--bg-card)', border:'0.5px solid var(--border)', borderRadius:12, padding:'12px 14px', marginBottom:12}}>
          <p style={{fontSize:11, fontWeight:600, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'.05em', marginBottom:8}}>Lotes hijos · {lot.childrenIds.length}</p>
          {lot.childrenIds.map((cid, cidx) => {
            const childLot = lots.find(l => l.id === cid);
            const raleo = (lot.raleos || []).find(r => r.lotHijoId === cid);
            return (
              <div key={cid} style={{padding:'8px 0', borderTop:'0.5px solid var(--sep)'}}>
                <div style={{display:'flex', alignItems:'flex-start', gap:8}}>
                  <div style={{width:6, height:6, borderRadius:'50%', background:'var(--stage-r)', flexShrink:0, marginTop:5}} />
                  <div style={{flex:1, minWidth:0}}>
                    {/* Nombre editable */}
                    <ChildNameEditor
                      childLot={childLot}
                      cid={cid}
                      cidx={cidx}
                      onRename={(newName) => {
                        if (childLot) onUpdate({...childLot, name: newName});
                      }}
                    />
                    {/* Info del raleo */}
                    <div style={{display:'flex', gap:10, flexWrap:'wrap', marginTop:3}}>
                      {raleo?.fecha && (
                        <span style={{fontSize:10, color:'var(--text-3)'}}>
                          {'Raleo ' + formatDate(raleo.fecha)}
                        </span>
                      )}
                      {raleo?.cantidadRaleada && (
                        <span style={{fontSize:10, color:'var(--text-2)', fontWeight:600}}>
                          {raleo.cantidadRaleada.toLocaleString() + ' plantas'}
                        </span>
                      )}
                      {raleo?.destino && (
                        <span style={{fontSize:10, color:'var(--stage-t)'}}>
                          {'INV-' + raleo.destino.invernadero + ' · ' + (raleo.destino.tipo||'').toUpperCase() + ' ' + (raleo.destino.identificador||'')}
                        </span>
                      )}
                      {childLot?.stage && (
                        <span style={{fontSize:10, fontWeight:600, color: STAGES[childLot.stage]?.color || 'var(--text-3)'}}>
                          {STAGES[childLot.stage]?.label || childLot.stage}
                        </span>
                      )}
                    </div>
                    <p style={{fontSize:9, color:'var(--text-3)', fontFamily:'DM Mono, monospace', marginTop:2}}>{cid}</p>
                  </div>
                </div>
              </div>
            );
          })}
          {lot.parentId && (
            <div style={{marginTop:8, paddingTop:8, borderTop:'0.5px solid var(--sep)'}}>
              <p style={{fontSize:11, fontWeight:600, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'.04em', marginBottom:5}}>Lote origen</p>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <div>
                  <p style={{fontSize:13, fontWeight:600, color:'var(--text-1)'}}>{lot.parentName || lot.parentId}</p>
                  <p style={{fontSize:11, color:'var(--text-3)', fontFamily:'DM Mono, monospace'}}>{lot.parentId}</p>
                </div>
                {lot.fechaRaleo && (
                  <div style={{textAlign:'right'}}>
                    <p style={{fontSize:10, color:'var(--text-3)'}}>Fecha raleo</p>
                    <p style={{fontSize:12, fontWeight:600, color:'var(--text-2)'}}>{formatDate(lot.fechaRaleo)}</p>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Mortalidad acumulada — editable */}
      <div style={{background:'var(--bg-card)', border:'0.5px solid var(--border)', borderRadius:12, padding:'12px 14px', marginBottom:12, display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <div>
          <p style={{fontSize:12, color:'var(--text-3)', marginBottom:2}}>Mortalidad acumulada</p>
          {editingMortalidad ? (
            <div style={{display:'flex', gap:8, alignItems:'center', marginTop:4}}>
              <input type="number" inputMode="numeric" value={mortalidadInput}
                onChange={e => setMortalidadInput(e.target.value)}
                style={{width:80, padding:'5px 10px', borderRadius:8, border:'0.5px solid var(--border)', background:'var(--bg-card-h)', color:'var(--text-1)', fontSize:14, outline:'none', fontFamily:'DM Mono, monospace'}}
                autoFocus onKeyDown={e => e.key==='Enter' && saveMortalidad()} />
              <button onClick={saveMortalidad} style={{background:'var(--green)', border:'none', borderRadius:6, padding:'5px 12px', color:'#fff', fontSize:12, fontWeight:700, cursor:'pointer'}}>OK</button>
              <button onClick={() => setEditingMortalidad(false)} style={{background:'none', border:'none', color:'var(--text-3)', fontSize:12, cursor:'pointer'}}>✕</button>
            </div>
          ) : (
            <p style={{fontSize:20, fontWeight:700, color:'var(--red)', fontFamily:'DM Mono, monospace'}}>{(lot.mortalidadAcumulada || 0)} plantas</p>
          )}
        </div>
        {!editingMortalidad && (
          <button onClick={() => { setMortalidadInput(String(lot.mortalidadAcumulada||0)); setEditingMortalidad(true); }}
            style={{background:'var(--bg-card-h)', border:'0.5px solid var(--border)', borderRadius:8, padding:'5px 12px', color:'var(--text-2)', fontSize:12, cursor:'pointer'}}>
            editar
          </button>
        )}
      </div>

      {lot.stage !== 'transplante' && NEXT_STAGE[lot.stage] && (
        <button onClick={() => setShowAvanzar(true)} style={{
          width:'100%', padding:'14px 0', borderRadius:12, border:'none',
          background: STAGES[NEXT_STAGE[lot.stage]].color,
          color:'#fff', fontSize:15, fontWeight:600, cursor:'pointer',
          display:'flex', alignItems:'center', justifyContent:'center', gap:8,
          marginBottom:12
        }}>
          Avanzar a {STAGES[NEXT_STAGE[lot.stage]].label}
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      )}

      <LotSensorHistory lot={lot} />

      <LotNotesSection lotId={lot.id} lotName={lot.name} />

      {!confirmDelete ? (
        <button onClick={() => setConfirmDelete(true)} style={{
          width:'100%', padding:'13px 0', borderRadius:12,
          border:'0.5px solid var(--border)',
          background:'none', color:'var(--red)', fontSize:14, fontWeight:500,
          cursor:'pointer', marginBottom:24
        }}>
          Eliminar lote
        </button>
      ) : (
        <div style={{
          background:'var(--bg-card-h)',
          border:'0.5px solid var(--border)',
          borderRadius:12, padding:'16px 18px', marginBottom:24
        }}>
          <p style={{fontSize:15, fontWeight:600, color: 'var(--text-1)', marginBottom:6}}>¿Eliminar este lote?</p>
          <p style={{fontSize:13, color: 'var(--text-3)', marginBottom:16}}>Esta acción no se puede deshacer.</p>
          <div style={{display:'flex', gap:8}}>
            <button onClick={() => setConfirmDelete(false)} style={{
              flex:1, padding:'12px 0', borderRadius:10,
              border:`0.5px solid ${dmBorder}`, background: dmCard,
              color:dmText2, fontSize:14, fontWeight:500, cursor:'pointer'
            }}>Cancelar</button>
            <button onClick={() => onDelete(lot.id)} style={{
              flex:1, padding:'12px 0', borderRadius:10,
              border:'none', background:'#C0392B',
              color:'#fff', fontSize:14, fontWeight:600, cursor:'pointer'
            }}>Sí, eliminar</button>
          </div>
        </div>
      )}
    </div>
    </>
  );
}

function Row({ label, value }) {
  return (
    <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', padding:'8px 0', borderBottom:'0.5px solid var(--sep)'}}>
      <span style={{fontSize:13, color: 'var(--text-3)'}}>{label}</span>
      <span style={{fontSize:14, fontWeight:500, color: 'var(--text-1)', fontFamily:'DM Mono, monospace', textAlign:'right', maxWidth:'60%'}}>{value}</span>
    </div>
  );
}

// ── ALERTAS SCREEN ────────────────────────────────────
function AlertasScreen({ lots, onSelect }) {
  const active = lots.filter(l => l.stage !== 'cosecha');
  const withAlerts = active
    .map(l => ({ lot: l, alert: getLotAlert(l) }))
    .filter(({ alert }) => alert && alert.status !== 'ok')
    .sort((a, b) => a.alert.remaining - b.alert.remaining);

  const okLots = active
    .map(l => ({ lot: l, alert: getLotAlert(l) }))
    .filter(({ alert }) => alert && alert.status === 'ok')
    .sort((a, b) => a.alert.remaining - b.alert.remaining);

  const handleSelect = useCallback((lot) => onSelect(lot), [onSelect]);

  if (active.length === 0) {
    return (
      <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32, textAlign:'center', background:'var(--bg-1)'}}>
        <div style={{width:60, height:60, borderRadius:16, background:'var(--bg-card-h)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:16}}>
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#276F50" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <p className="dm-text" style={{fontSize:15, fontWeight:500, color:'var(--text-1)', marginBottom:6}}>Sin lotes activos</p>
        <p className="dm-text2" style={{fontSize:13, color:'var(--text-2)'}}>Registrá un lote para ver alertas.</p>
      </div>
    );
  }

  if (withAlerts.length === 0) {
    return (
      <div style={{flex:1, overflowY:'auto', padding:16, background:'var(--bg-1)', WebkitOverflowScrolling:'touch', overscrollBehavior:'contain'}}>
        <div className="dm-alert-ok" style={{
          background:'var(--bg-card-h)', borderRadius:14, padding:'16px 18px', marginBottom:20,
          display:'flex', alignItems:'center', gap:12
        }}>
          <div style={{width:36, height:36, borderRadius:10, background:'var(--border)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#276F50" strokeWidth="2.2" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div>
            <p className="dm-text" style={{fontSize:14, fontWeight:600, color:'var(--text-1)', marginBottom:2}}>Todo en orden</p>
            <p className="dm-text2" style={{fontSize:12, color:'var(--text-2)'}}>Ningún lote requiere atención inmediata.</p>
          </div>
        </div>
        <p className="dm-section-label" style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--text-2)', textTransform:'uppercase', marginBottom:12}}>Próximos vencimientos</p>
        {okLots.map(({ lot, alert }) => <AlertCard key={lot.id} lot={lot} alert={alert} onSelect={handleSelect} />)}
      </div>
    );
  }

  return (
    <div style={{flex:1, overflowY:'auto', padding:16, background:'var(--bg-1)', WebkitOverflowScrolling:'touch', overscrollBehavior:'contain'}}>
      {withAlerts.length > 0 && (
        <>
          <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--red)', textTransform:'uppercase', marginBottom:12}}>
            Requieren atención · {withAlerts.length}
          </p>
          {withAlerts.map(({ lot, alert }) => <AlertCard key={lot.id} lot={lot} alert={alert} onSelect={handleSelect} />)}
        </>
      )}
      {okLots.length > 0 && (
        <>
          <p className="dm-section-label" style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--text-2)', textTransform:'uppercase', margin:'20px 0 12px'}}>
            En plazo · {okLots.length}
          </p>
          {okLots.map(({ lot, alert }) => <AlertCard key={lot.id} lot={lot} alert={alert} onSelect={handleSelect} />)}
        </>
      )}
    </div>
  );
}

const AlertCard = React.memo(function AlertCard({ lot, alert, onSelect }) {
  const isOverdue = alert.status === 'overdue';
  const isWarning = alert.status === 'warning';
  const handleClick = React.useCallback(() => onSelect(lot), [lot, onSelect]);
  const accentColor = isOverdue ? 'var(--red)' : isWarning ? 'var(--amber)' : 'var(--green)';
  const accentHex   = isOverdue ? '#F87171'    : isWarning ? '#FBBF24'      : '#4ADE80';
  const accentBg = isOverdue
    ? 'var(--bg-card-h)'
    : isWarning
    ? 'var(--bg-card-h)'
    : 'var(--bg-card)';
  const progressPct = Math.min(100, Math.round((alert.days / alert.maxDays) * 100));
  const totalCycleDays = daysSince(lot.date);
  const borderColor = isOverdue||isWarning ? accentHex+'55' : 'var(--border)';
  const sepColor = isOverdue||isWarning ? accentHex+'22' : 'var(--sep)';
  const textColor = 'var(--text-1)';
  const text2Color = 'var(--text-2)';
  const locs = lot.locations && lot.locations.length > 0
    ? lot.locations
    : lot.location?.invernadero
      ? [{ invernadero: lot.location.invernadero, tipo: lot.location.tipo||'piscina', identificador: lot.location.identificador||'' }]
      : [];

  return (
    <div onClick={handleClick} style={{
      background: accentBg,
      border: `0.5px solid ${borderColor}`,
      borderRadius:14, overflow:'hidden', marginBottom:10, cursor:'pointer',
      WebkitUserSelect:'none', transition:'transform 0.1s',
      display:'flex',
    }}
      onTouchStart={e => e.currentTarget.style.transform='scale(0.985)'}
      onTouchEnd={e => e.currentTarget.style.transform='scale(1)'}
    >
      {(isOverdue || isWarning) && (
        <div style={{width:4, background: accentColor, flexShrink:0}} />
      )}
      <div style={{flex:1, padding:'16px 18px 80px'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10}}>
          <div style={{flex:1, minWidth:0, marginRight:8}}>
            <p style={{fontSize:12, fontWeight:600, color: STAGES[lot.stage].color, letterSpacing:'0.03em', textTransform:'uppercase', marginBottom:4}}>
              {STAGE_LABELS[lot.stage]}
            </p>
            <p style={{fontSize:16, fontWeight:600, color:textColor, marginBottom:3}}>{lot.name}</p>
            {/* Ubicaciones — chips compactos en header */}
            <div style={{display:'flex', alignItems:'center', gap:5, flexWrap:'wrap', marginBottom:3}}>
              {locs.length > 0 ? locs.map((loc, i) => (
                <span key={i} style={{fontSize:10, fontWeight:600, color: loc.invernadero==='B' ? 'var(--stage-t)' : 'var(--text-2)', background:'var(--bg-card-h)', padding:'2px 7px', borderRadius:5, border:'0.5px solid var(--border)'}}>
                  {'INV-' + loc.invernadero + ' · ' + (loc.tipo||'').toUpperCase().slice(0,3) + ' ' + (loc.identificador||'')}
                </span>
              )) : (
                <span style={{fontSize:10, color:'var(--text-3)', fontStyle:'italic'}}>Sin ubicación</span>
              )}
              <span style={{fontSize:10, color:'var(--text-3)', fontFamily:'DM Mono, monospace'}}>{lot.id}</span>
            </div>
            <p style={{fontSize:13, color:text2Color}}>{SEASON_LABEL[alert.season]} · ciclo {totalCycleDays}d</p>
          </div>
          <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:5, flexShrink:0}}>
            <StageBadge stage={lot.stage} days={alert.days} maxDays={alert.maxDays} />
            <div style={{
              background: isOverdue ? 'var(--bg-card-h)' : isWarning ? 'var(--bg-card-h)' : 'var(--bg-card)',
              color: isOverdue ? '#C0392B' : isWarning ? '#A85A00' : '#276F50',
              fontSize:11, fontWeight:700, padding:'4px 10px', borderRadius:20
            }}>
              {isOverdue
                ? `${Math.abs(alert.remaining)}d atrasado`
                : isWarning
                ? `Vence en ${alert.remaining}d`
                : `${alert.remaining}d restantes`}
            </div>
            {/* Botón Zebra — discreto en el header */}
            <button onClick={() => setShowZebra(true)} style={{
              display:'flex', alignItems:'center', gap:4,
              background:'none', border:'0.5px solid var(--border)',
              borderRadius:7, padding:'3px 9px', cursor:'pointer',
            }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" strokeWidth="2" strokeLinecap="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              <span style={{fontSize:10, color:'var(--text-3)', fontWeight:500}}>Imprimir</span>
            </button>
          </div>
        </div>

        <div style={{marginBottom:8}}>
          <div style={{height:5, background: isOverdue||isWarning ? accentHex+'22' : 'var(--sep)', borderRadius:3, overflow:'hidden'}}>
            <div style={{height:'100%', borderRadius:3, width:`${progressPct}%`, background: accentHex, transition:'width 0.3s'}} />
          </div>
        </div>

        <div style={{display:'flex', justifyContent:'space-between', paddingTop:8, borderTop:`0.5px solid ${sepColor}`}}>
          <span style={{fontSize:13, color:text2Color, fontFamily:'DM Mono, monospace'}}>Etapa: día {alert.days} de {alert.maxDays}</span>
          <span style={{fontSize:13, color:text2Color, fontFamily:'DM Mono, monospace'}}>{(lot.currentQuantity ?? toPlants(lot.quantity)).toLocaleString()} plantas</span>
        </div>
      </div>
    </div>
  );
});

function exportData(lots, format) {
  const fecha = new Date().toLocaleDateString('es-CL').replace(/\//g,'-');

  // ── Helpers ──
  function fLoc(lot) {
    if (!lot.location) return '';
    return (lot.location.invernadero||'') + ' / ' + (lot.location.tipo||'') + ' ' + (lot.location.identificador||'');
  }
  function fTasaMerma(lot) {
    const total = (lot.cosechas||[]).reduce((a,c) => a+(c.cosechadas||0)+(c.descartadas||0), 0);
    const desc  = (lot.cosechas||[]).reduce((a,c) => a+(c.descartadas||0), 0);
    return total > 0 ? Math.round((desc/total)*100) : 0;
  }
  function fISL(lot) {
    const qty = lot.quantity || 1;
    const mort = lot.mortalidadAcumulada || 0;
    const pMort = Math.max(0, 1-(mort/qty));
    const entry = (lot.stageHistory||[]).find(h=>h.stage===lot.stage);
    const dias = daysSince(entry?.date || lot.date);
    const maxDias = STAGE_DAYS[lot.stage]?.[getSeason(entry?.date)] || 30;
    const pTiempo = Math.max(0, 1-(dias/maxDias));
    return Math.round((pMort*50)+(pTiempo*50));
  }
  function fLastSensor(lot, key) {
    return lot.sensorReadings?.[key] ?? '';
  }

  // ── Hoja 1: Lotes v2.0 ──
  const lotesRows = lots.map(lot => ({
    'ID_Lote':               lot.id || '',
    'ID_Padre':              lot.parentId || '',
    'Nombre':                lot.name || '',
    'Variedad':              lot.variety || '',
    'Codigo_Variedad':       lot.varietyCode || '',
    'Etapa_Actual':          STAGES[lot.stage]?.label || lot.stage,
    'Fecha_Siembra':         lot.date || '',
    'Invernadero':           lot.location?.invernadero || '',
    'Tipo_Ubicacion':        lot.location?.tipo || '',
    'Identificador_Ubicacion': lot.location?.identificador || '',
    'Densidad_Siembra_pl_m': lot.densidadSiembra || '',
    'Almacigos':             lot.quantity || 0,
    'Plantas_Inicial':       toPlants(lot.quantity),
    'Plantas_Actual':        lot.currentQuantity ?? toPlants(lot.quantity),
    'Mortalidad_Acumulada':  lot.mortalidadAcumulada || 0,
    'Tasa_Merma_Pct':        fTasaMerma(lot),
    'ISL_Pct':               fISL(lot),
    'Dias_Etapa_Actual':     daysSince(lot.stageHistory?.[lot.stageHistory.length-1]?.date || lot.date),
    'Dias_Ciclo_Total':      daysSince(lot.date),
    'pH_Ultimo':             fLastSensor(lot,'ph'),
    'EC_Ultimo_uS':          fLastSensor(lot,'ec'),
    'Temp_Agua_Ultimo':      fLastSensor(lot,'tempAgua'),
    'Sensor_LastUpdate':     lot.sensorReadings?.lastUpdate || '',
    'Lotes_Hijos':           (lot.childrenIds||[]).join(';'),
    'Notas':                 lot.notes || '',
  }));

  // ── Hoja 2: Historial de etapas ──
  const etapasRows = [];
  lots.forEach(lot => {
    (lot.stageHistory || []).forEach((h, i) => {
      const prev = lot.stageHistory[i-1];
      etapasRows.push({
        'ID_Lote':       lot.id || '',
        'Nombre':        lot.name,
        'Variedad':      lot.variety,
        'Etapa':         STAGES[h.stage]?.label || h.stage,
        'Fecha_Entrada': h.date,
        'Plantas_Entrada': h.quantity || 0,
        'Invernadero':   h.location?.invernadero || lot.location?.invernadero || '',
        'Ubicacion':     h.location ? (h.location.tipo+' '+(h.location.identificador||'')) : fLoc(lot),
        'Merma_Plantas': prev ? Math.max(0,(prev.quantity||0)-(h.quantity||0)) : 0,
        'Merma_Pct':     prev && prev.quantity > 0 ? Math.round((Math.max(0,(prev.quantity||0)-(h.quantity||0))/prev.quantity)*100) : 0,
        'Observaciones': h.notes || '',
      });
    });
  });

  // ── Hoja 3: Raleos (nuevo en v2.0) ──
  const raleosRows = [];
  lots.forEach(lot => {
    (lot.raleos || []).forEach(r => {
      raleosRows.push({
        'ID_Lote_Padre':   lot.id || '',
        'Nombre_Padre':    lot.name,
        'Variedad':        lot.variety,
        'Fecha_Raleo':     r.fecha || '',
        'Plantas_Raleadas': r.cantidadRaleada || 0,
        'ID_Lote_Hijo':    r.lotHijoId || '',
        'Inv_Destino':     r.destino?.invernadero || '',
        'Tipo_Destino':    r.destino?.tipo || '',
        'Ident_Destino':   r.destino?.identificador || '',
      });
    });
  });

  // ── Hoja 4: Cosechas ──
  const cosechasRows = [];
  lots.forEach(lot => {
    (lot.cosechas || []).forEach((c, i) => {
      cosechasRows.push({
        'ID_Lote':      lot.id || '',
        'Nombre':       lot.name,
        'Variedad':     lot.variety,
        'Ubicacion':    fLoc(lot),
        'N_Cosecha':    i + 1,
        'Fecha':        c.date || '',
        'Cosechadas':   c.cosechadas || 0,
        'Descartadas':  c.descartadas || 0,
        'Total':        (c.cosechadas||0) + (c.descartadas||0),
        'Merma_Pct':    (c.cosechadas||0)+(c.descartadas||0) > 0 ? Math.round(((c.descartadas||0)/((c.cosechadas||0)+(c.descartadas||0)))*100) : 0,
        'Notas':        c.notes || '',
      });
    });
  });

  if (format === 'csv') {
    const headers = Object.keys(lotesRows[0] || {});
    const csvContent = [
      headers.join(','),
      ...lotesRows.map(row => headers.map(h => '"' + String(row[h]).replace(/"/g,'""') + '"').join(','))
    ].join('\n');
    const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'Nalhuitad_v2_' + fecha + '.csv';
    a.click(); URL.revokeObjectURL(url);
    return;
  }

  // Excel con 4 hojas
  // ── Hoja 5: Proyección 30 días ──
  const hoy30 = new Date();
  const fin30 = new Date(hoy30); fin30.setDate(fin30.getDate() + 30);
  const proyRows = [];
  lots.filter(l => l.stage === 'raleo').forEach(lot => {
    projectHarvests(lot).forEach(h => {
      if (h.date >= hoy30 && h.date <= fin30) {
        proyRows.push({
          'Semana':       'S' + (Math.floor((h.date - hoy30) / 604800000) + 1),
          'Fecha':        h.date.toLocaleDateString('es-CL'),
          'Lote':         h.lotName || '',
          'ID_Lote':      h.lotId || '',
          'Variedad':     h.variety || '',
          'Cantidad':     h.plants || 0,
          'Tipo':         'Proyectado',
        });
      }
    });
  });

  const wb = XLSX.utils.book_new();
  const wsLotes    = XLSX.utils.json_to_sheet(lotesRows.length    ? lotesRows    : [{}]);
  const wsEtapas   = XLSX.utils.json_to_sheet(etapasRows.length   ? etapasRows   : [{}]);
  const wsRaleos   = XLSX.utils.json_to_sheet(raleosRows.length   ? raleosRows   : [{}]);
  const wsCosechas = XLSX.utils.json_to_sheet(cosechasRows.length ? cosechasRows : [{}]);
  const wsProyec   = XLSX.utils.json_to_sheet(proyRows.length     ? proyRows     : [{}]);

  [wsLotes, wsEtapas, wsRaleos, wsCosechas, wsProyec].forEach(ws => {
    ws['!cols'] = Array(25).fill({ wch: 20 });
  });

  XLSX.utils.book_append_sheet(wb, wsLotes,    'Lotes v2.0');
  XLSX.utils.book_append_sheet(wb, wsEtapas,   'Historial etapas');
  XLSX.utils.book_append_sheet(wb, wsRaleos,   'Raleos padre-hijo');
  XLSX.utils.book_append_sheet(wb, wsCosechas, 'Cosechas');
  XLSX.utils.book_append_sheet(wb, wsProyec,   'Proyección 30 días');
  XLSX.writeFile(wb, 'Nalhuitad_v2_' + fecha + '.xlsx');
}

// ── PRODUCCIÓN PRÓXIMOS 30 DÍAS ──────────────────────────
function ProduccionScreen({ lots, onBack }) {
  const hoy = new Date();
  const fin  = new Date(hoy); fin.setDate(fin.getDate() + 30);

  // Proyectar todas las cosechas de lotes en raleo en los próximos 30 días
  const eventos = [];
  lots.filter(l => l.stage === 'raleo').forEach(lot => {
    projectHarvests(lot).forEach(h => {
      if (h.date >= hoy && h.date <= fin) eventos.push(h);
    });
  });
  // También incluir lotes en transplante que podrían entrar a raleo
  lots.filter(l => l.stage === 'transplante').forEach(lot => {
    const th = (lot.stageHistory||[]).find(h => h.stage==='transplante');
    if (!th) return;
    const season = getSeason();
    const diasTransplante = STAGE_DAYS.transplante?.[season] || 15;
    const fTransplante = new Date(th.date + 'T12:00:00');
    fTransplante.setDate(fTransplante.getDate() + diasTransplante);
    if (fTransplante <= fin) {
      // Va a entrar a raleo dentro de los 30 días
      const diasRaleo = STAGE_DAYS.raleo?.[season] || 35;
      const fCosecha = new Date(fTransplante);
      fCosecha.setDate(fCosecha.getDate() + diasRaleo);
      if (fCosecha <= new Date(fin.getTime() + 30*86400000)) {
        const qty = lot.currentQuantity ?? toPlants(lot.quantity);
        if (qty > 0) {
          eventos.push({ date: fCosecha, plants: Math.min(qty, CAPACITY_PER_TRIP), lotName: lot.name, variety: lot.variety, lotId: lot.id, proyectado: true, pendienteRaleo: true });
        }

  eventos.sort((a,b) => a.date - b.date);

          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Dashboard
        </button>
        <div style={{flex:1}}>
          <p style={{fontSize:18, fontWeight:700, color:'var(--text-1)'}}>Próximos 30 días</p>
          <p style={{fontSize:12, color:'var(--text-3)'}}>Proyección de cosechas · {fmtFecha(hoy)} – {fmtFecha(fin)}</p>
        </div>
      </div>

      {/* KPI total */}
      <div style={{background:'var(--stage-c)18', border:'0.5px solid var(--stage-c)50', borderRadius:14, padding:'14px 16px', marginBottom:16, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <div>
          <p style={{fontSize:11, color:'var(--stage-c)', fontWeight:700, textTransform:'uppercase', letterSpacing:'.05em', marginBottom:3}}>Total proyectado</p>
          <p style={{fontSize:32, fontWeight:700, color:'var(--text-1)', fontFamily:'DM Mono, monospace', lineHeight:1}}>{totalTotal.toLocaleString()}</p>
          <p style={{fontSize:12, color:'var(--text-3)', marginTop:3}}>lechugas en 30 días</p>
        </div>
        <div style={{textAlign:'right'}}>

function HistorialScreen({ lots }) {
  // Incluye lotes cosechados completos Y lotes con cosechas parciales registradas
  const conCosechas = lots.filter(l => l.cosechas?.length > 0);
  const cosechados = lots.filter(l => l.stage === 'cosecha' && l.cosechas?.length > 0);
  const todos = lots;

  // ── KPIs globales — usa todos los lotes con cosechas ──
  const totalCosechadas = conCosechas.reduce((a, l) =>
    a + (l.cosechas || []).reduce((b, c) => b + (c.cosechadas || 0), 0), 0);
  const totalDescartadas = conCosechas.reduce((a, l) =>
    a + (l.cosechas || []).reduce((b, c) => b + (c.descartadas || 0), 0), 0);
  const totalSembradas = conCosechas.reduce((a, l) => a + toPlants(l.quantity), 0);
  const rendimientoGlobal = totalSembradas > 0 ? Math.round((totalCosechadas / totalSembradas) * 100) : 0;
  const totalSalida = totalCosechadas + totalDescartadas;
  const tasaMermaGlobal = totalSalida > 0 ? Math.round((totalDescartadas / totalSalida) * 100) : null;

  // ── Duración promedio real por etapa ──
  const stageDurations = { almacigo: [], transplante: [], raleo: [] };
  todos.forEach(lot => {
    lot.stageHistory.forEach((h, i) => {
      if (i === 0) return;
      const prev = lot.stageHistory[i - 1];
      const dur = daysSince(prev.date) - daysSince(h.date);
      if (dur > 0 && stageDurations[prev.stage]) {
        stageDurations[prev.stage].push(dur);
      }
    });
    if (lot.stage === 'cosecha' && lot.cosechas?.length > 0) {
      const lastStage = lot.stageHistory[lot.stageHistory.length - 1];
      if (lastStage.stage === 'raleo') {
        const dur = daysSince(lastStage.date) - daysSince(lot.cosechas[lot.cosechas.length-1]?.date || lastStage.date);
        if (dur > 0) stageDurations.raleo.push(dur);
      }
    }
  });

  const avg = arr => arr.length > 0 ? Math.round(arr.reduce((a,b) => a+b, 0) / arr.length) : null;
  const STAGE_EST = { almacigo: 30, transplante: 15, raleo: 35 };

  // ── Merma por etapa ──
  const stageTransitions = { almacigo: [], transplante: [], raleo: [] };
  todos.forEach(lot => {
    lot.stageHistory.forEach((h, i) => {
      if (i === 0) return;
      const prev = lot.stageHistory[i - 1];
      if (prev.quantity > 0 && stageTransitions[prev.stage]) {
        const merma = prev.quantity - h.quantity;
        const pct = Math.round((merma / prev.quantity) * 100);
        if (pct >= 0) stageTransitions[prev.stage].push(pct);
      }
    });
  });

  // ── Rendimiento por lote — incluye parciales en curso ──
  const lotRendimientos = conCosechas.map(lot => {
    const cosechadas = (lot.cosechas || []).reduce((a, c) => a + (c.cosechadas || 0), 0);
    const sembradas = toPlants(lot.quantity);
    const ultimaCosecha = (lot.cosechas?.[lot.cosechas.length-1]?.date) || lot.date;
    const duracion = daysSince(lot.date) - daysSince(ultimaCosecha);
    const enCurso = lot.stage !== 'cosecha';
    return {
      name: lot.name,
      cosechadas, sembradas,
      pct: sembradas > 0 ? Math.round((cosechadas/sembradas)*100) : 0,
      duracion: Math.max(0, duracion),
      enCurso

  const sinDatos = cosechados.length === 0 && todos.every(l => l.stageHistory.length <= 1);

      <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32, textAlign:'center'}}>

      {conCosechas.length > 0 && (
        <>
          {/* Gráfico cosechas por mes */}
          {(() => {
            const byMonth = {};
            conCosechas.forEach(lot => {
              (lot.cosechas||[]).forEach(c => {
                if (!c.date) return;
                const key = c.date.slice(0,7);
                if (!byMonth[key]) byMonth[key] = { cosechadas:0, descartadas:0 };
                byMonth[key].cosechadas += c.cosechadas || 0;
                byMonth[key].descartadas += c.descartadas || 0;
              });
            });
            const months = Object.keys(byMonth).sort().slice(-6);
            if (months.length < 2) return null;
            const maxVal = Math.max(...months.map(m => byMonth[m].cosechadas));
            const W = 300; const H = 80;
            const spacing = (W - 20) / months.length;
            const BAR_W = Math.min(32, spacing - 6);
            const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
            return (
              <div style={{background:'var(--bg-card)', border:'0.5px solid var(--border)', borderRadius:14, padding:'12px 14px', marginBottom:16}}>
                <p style={{fontSize:11, fontWeight:700, color:'var(--text-2)', textTransform:'uppercase', letterSpacing:'.05em', marginBottom:10}}>Cosechas por mes</p>
                <svg width="100%" viewBox={'0 0 ' + W + ' ' + (H+20)} style={{display:'block'}}>
                  {months.map((m, i) => {
                    const val = byMonth[m].cosechadas;
                    const desc = byMonth[m].descartadas;
                    const barH = maxVal > 0 ? Math.max(4, (val/maxVal)*H) : 4;
                    const descH = maxVal > 0 && desc > 0 ? Math.max(0, (desc/maxVal)*H*0.3) : 0;
                    const x = 10 + i*spacing + spacing/2 - BAR_W/2;
                    const mes = MESES[parseInt(m.slice(5,7))-1];
                    return (
                      <g key={m}>
                        {descH > 0 && <rect x={x} y={H - barH - descH} width={BAR_W} height={descH} rx="2" fill="var(--red)" opacity="0.5"/>}
                        <rect x={x} y={H - barH} width={BAR_W} height={barH} rx="2" fill="var(--stage-c)" opacity="0.85"/>

                        <text x={x+BAR_W/2} y={H+14} textAnchor="middle" fontSize="8" fill="var(--text-3)">{mes}</text>
                      </g>
                    );

            />
          </div>
        </>
      )}

      {Object.values(stageDurations).some(a => a.length > 0) && (
        <>
          <p className="dm-section-label" style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--text-2)', textTransform:'uppercase', marginBottom:12}}>

              const color = STAGES[key].color;
              return (

      {Object.values(stageTransitions).some(a => a.length > 0) && (

      {todos.length > 0 && conCosechas.length === 0 && (

          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" strokeWidth="2" strokeLinecap="round" style={{flexShrink:0, marginTop:1}}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>

          </p>

      )}

      {todos.length > 0 && (
        <>
          <p className="dm-section-label" style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--text-2)', textTransform:'uppercase', margin:'24px 0 12px'}}>
            Exportar datos

            <button onClick={() => exportData(todos, 'csv')} style={{
              flex:1, padding:'13px 0', borderRadius:12, border:'0.5px solid #276F50',

              cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8
            }}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
              CSV
            </button>
          </div>
          <p className="dm-text3" style={{fontSize:11, color:'var(--text-2)', marginTop:8, textAlign:'center'}}>
            Excel incluye lotes, historial de etapas y cosechas en hojas separadas
          </p>
        </>
      )}
    </div>
  );
}

const SEASON_MONTHS = { verano:'Dic · Ene · Feb', otono:'Mar · Abr · May', invierno:'Jun · Jul · Ago', primavera:'Sep · Oct · Nov' };
const SEASON_KEYS = ['verano','otono','invierno','primavera'];
const SEASON_NAMES = { verano:'Verano', otono:'Otoño', invierno:'Invierno', primavera:'Primavera' };
const CONFIG_KEY = 'hidro_config_v1';

function loadConfig() {
  try {
    const c = JSON.parse(localStorage.getItem(CONFIG_KEY) || 'null');
    return c || {
      plantsPer: 135,
      darkMode: false,
      nombre: '',
      stageDays: {
        almacigo:    { verano:28, otono:32, invierno:35, primavera:30 },
        transplante: { verano:15, otono:15, invierno:15, primavera:15 },
        raleo:       { verano:22, otono:35, invierno:50, primavera:28 },
      }
    };
  } catch { return { plantsPer:135, darkMode:false, nombre:'', stageDays:{ almacigo:{verano:28,otono:32,invierno:35,primavera:30}, transplante:{verano:15,otono:15,invierno:15,primavera:15}, raleo:{verano:22,otono:35,invierno:50,primavera:28} } }; }
}

function saveConfig(cfg) {
  try { localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg)); } catch {}
}

// Sube plantsPer y stageDays a Firebase (compartido entre dispositivos)
async function saveConfigRemote(cfg) {
  try {
    await fsDb.set('config', 'operacion', {
      id: 'operacion',
      plantsPer: cfg.plantsPer,
      stageDays: cfg.stageDays,
    });
  } catch {}
}

// Baja config operacional de Firebase y la fusiona con la local
async function loadConfigRemote() {
  try {
    const docs = await fsDb.list('config');
    const remote = docs.find(d => d.id === 'operacion');
    if (!remote) return null;
    return { plantsPer: remote.plantsPer, stageDays: remote.stageDays };
  } catch { return null; }
}

function PWAInstallButton() {
  const [prompt, setPrompt] = useState(null);
  const [installed, setInstalled] = useState(false);

  useEffect(() => {
    const handler = (e) => { e.preventDefault(); setPrompt(e); };
    window.addEventListener('beforeinstallprompt', handler);
    window.addEventListener('appinstalled', () => setInstalled(true));
    // Check if already installed
    if (window.matchMedia('(display-mode: standalone)').matches) setInstalled(true);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  if (installed) return (
    <span style={{fontSize:12, fontWeight:600, color:'var(--green)', padding:'5px 12px', borderRadius:8, background:'var(--bg-card-h)'}}>✓ Instalada</span>
  );
  if (!prompt) return (
    <span style={{fontSize:11, color:'var(--text-3)'}}>Abrí desde Chrome</span>
  );
  return (
    <button onClick={async () => {
      prompt.prompt();
      const { outcome } = await prompt.userChoice;
      if (outcome === 'accepted') setInstalled(true);
      setPrompt(null);
    }} style={{padding:'7px 14px', borderRadius:8, border:'0.5px solid var(--stage-t)', background:'none', color:'var(--stage-t)', fontSize:13, fontWeight:600, cursor:'pointer'}}>
      Instalar
    </button>
  );
}

      {/* Cuenta */}

      {/* Guardar */}

        width:'100%', padding:'15px 0', borderRadius:12, border:'none',
