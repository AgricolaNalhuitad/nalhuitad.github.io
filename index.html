}

// ── DASHBOARD ──────────────────────────────────────────
function DashboardScreen({ lots, onNavigate }) {
  const dm = useDarkMode();
  const CLR = dm ? COLORS : COLORS_LIGHT;
  const season = getSeason();

  const almacigos    = lots.filter(function(l) { return l.stage === 'almacigo'; });
  const transplantes = lots.filter(function(l) { return l.stage === 'transplante'; });
  const raleos       = lots.filter(function(l) { return l.stage === 'raleo'; });

  const ptasAlmacigo    = almacigos.reduce(function(a,l)    { return a + (l.currentQuantity ?? toPlantCount(l.quantity)); }, 0);
  const ptasTransplante = transplantes.reduce(function(a,l) { return a + (l.currentQuantity ?? toPlantCount(l.quantity)); }, 0);
  const ptasRaleo       = raleos.reduce(function(a,l)       { return a + (l.currentQuantity ?? toPlantCount(l.quantity)); }, 0);

  const lotsConCosecha  = lots.filter(function(l) { return (l.cosechas || []).length > 0; });
  const cosechadasTotal = lotsConCosecha.reduce(function(a,l) { return a + (l.cosechas||[]).reduce(function(b,h) { return b+(h.cosechadas||0); },0); }, 0);
  const sembTotal       = lotsConCosecha.reduce(function(a,l) { return a + toPlantCount(l.quantity); }, 0);
  const rendimiento     = sembTotal > 0 ? Math.round((cosechadasTotal / sembTotal) * 100) : null;

  const diasMaxRaleo  = STAGE_DAYS.raleo[season] || 35;
  const proximasRaleo = raleos.map(function(lot) {
    const rh  = (lot.stageHistory||[]).find(function(h) { return h.stage==='raleo'; });
    const diasTranscurridos = rh ? Math.max(0, daysSince(rh.date)) : 0;
    const diasRestantes     = Math.max(0, diasMaxRaleo - diasTranscurridos);
    return { lot, diasRestantes };
  }).sort(function(a,b) { return a.diasRestantes - b.diasRestantes; });

  // ── Proyección Opus ──────────────────────────────────
  const hoy = new Date();
  const nombresMes = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const nombreMes  = nombresMes[hoy.getMonth()];
  const allEvents  = getMonthProjection(lots, hoy.getFullYear(), hoy.getMonth());
  const todasBarras = allEvents.slice(0, 9);
  const maxBarVal   = todasBarras.length > 0 ? Math.max(...todasBarras.map(function(b) { return b.plants; })) : 210;
  const totalMes    = todasBarras.reduce(function(a,b) { return a+b.plants; }, 0);

  function badgeProps(dias) {
    if (dias === 0) return { label:'Lista',    bg:'var(--bg-card-h)', clr:CLR.green };
    if (dias <= 5)  return { label:'Pronto',   bg:'var(--bg-card-h)', clr:CLR.stageT };
    return              { label:'Pendiente', bg:CLR.bgCardH, clr:CLR.text3 };
  }

  const { weather } = useWeather();
  const weatherAlert = weather ? getWeatherAlert(weather) : null;

  // Saludo según hora
  const hora = new Date().getHours();
  const saludoBase = hora < 12 ? 'Buenos días' : hora < 20 ? 'Buenas tardes' : 'Buenas noches';
  const cfg = loadConfig();
  const nombre = cfg.nombre ? cfg.nombre.trim() : '';
  const totalActivas = ptasAlmacigo + ptasTransplante + ptasRaleo;

  return (
    <div style={{flex:1, overflowY:'auto', padding:'14px 16px 80px', background:'var(--bg-1)', WebkitOverflowScrolling:'touch', overscrollBehavior:'contain'}}>

      {/* Saludo + alertas contextuales Opción C */}
      <div style={{
        background: dm ? 'linear-gradient(135deg,#071A10 0%,#0A1D30 100%)' : 'linear-gradient(135deg,#C8EDD8 0%,#C4E0F2 100%)',
        border: '0.5px solid ' + (dm ? '#1E3D28' : '#96CAB0'),
        borderRadius:16, padding:'18px 16px', marginBottom:14,
        position:'relative', overflow:'hidden',
      }}>
        {/* Decoración: hojas grandes fondo */}
        <svg width="180" height="140" viewBox="0 0 180 140" fill="none" style={{position:'absolute', right:-20, top:-16, opacity: dm ? 0.10 : 0.15, pointerEvents:'none'}} aria-hidden="true">
          <ellipse cx="90" cy="30" rx="28" ry="42" stroke={dm ? '#4ADE80' : '#157A40'} strokeWidth="2" fill={dm ? '#4ADE8008' : '#157A4010'}/>
          <line x1="90" y1="30" x2="90" y2="90" stroke={dm ? '#4ADE80' : '#157A40'} strokeWidth="2" strokeLinecap="round"/>
          <ellipse cx="140" cy="55" rx="20" ry="32" stroke={dm ? '#3B8DD4' : '#1E6DB5'} strokeWidth="2" fill={dm ? '#3B8DD408' : '#1E6DB510'} transform="rotate(35 140 55)"/>
          <ellipse cx="45" cy="75" rx="18" ry="28" stroke={dm ? '#4ADE80' : '#276F50'} strokeWidth="1.5" fill={dm ? '#4ADE8006' : '#276F5010'} transform="rotate(-25 45 75)"/>
          <line x1="45" y1="75" x2="52" y2="110" stroke={dm ? '#4ADE80' : '#276F50'} strokeWidth="1.5" strokeLinecap="round"/>
          <ellipse cx="130" cy="100" rx="14" ry="22" stroke={dm ? '#A0D890' : '#4A9A60'} strokeWidth="1.5" fill="none" transform="rotate(15 130 100)"/>
        </svg>
        {/* Punto de color decorativo superior izquierdo */}
        <div style={{position:'absolute', top:-30, left:-30, width:90, height:90, borderRadius:'50%', background: dm ? 'radial-gradient(circle,#276F5025 0%,transparent 70%)' : 'radial-gradient(circle,#276F5015 0%,transparent 70%)', pointerEvents:'none'}} />

        <div style={{marginBottom: weatherAlert ? 12 : 0, position:'relative'}}>
          <p style={{fontSize:11, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', color: dm ? '#4ADE80' : '#1A6040', marginBottom:4, opacity:0.85}}>{saludoBase}</p>
          <p style={{fontSize:26, fontWeight:700, color: dm ? '#F0F2F5' : '#0F2418', marginBottom:6, letterSpacing:'-0.5px', lineHeight:1.1}}>
            {nombre || 'Nalhuitad'} 🌿
          </p>
          <div style={{display:'flex', alignItems:'center', gap:6}}>
            <div style={{width:6, height:6, borderRadius:'50%', background: dm ? '#4ADE80' : '#276F50', flexShrink:0}} />
            <p style={{fontSize:13, color: dm ? '#7AB89A' : '#2A5A40', fontWeight:500}}>
              {totalActivas.toLocaleString()} plantas · {lots.filter(l => l.stage !== 'cosecha').length} lotes activos
            </p>
          </div>
        </div>
        {weatherAlert && (
          <div style={{
            borderTop:'0.5px solid var(--sep)', paddingTop:10,
            display:'flex', flexDirection:'column', gap:6,
          }}>
            <div style={{
              background: weatherAlert.nivel === 'rojo' ? 'var(--bg-card-h)' : 'var(--bg-card-h)',
              border: '0.5px solid ' + (weatherAlert.nivel === 'rojo' ? 'var(--red)' : weatherAlert.nivel === 'ambar' ? 'var(--amber)' : 'var(--stage-t)') + '50',
              borderRadius:8, padding:'7px 10px',
              borderLeft: '3px solid ' + (weatherAlert.nivel === 'rojo' ? 'var(--red)' : weatherAlert.nivel === 'ambar' ? 'var(--amber)' : 'var(--stage-t)'),
            }}>
              <p style={{fontSize:12, fontWeight:600, color: weatherAlert.nivel === 'rojo' ? 'var(--red)' : weatherAlert.nivel === 'ambar' ? 'var(--amber)' : 'var(--stage-t)', marginBottom:3}}>
                {weatherAlert.nivel === 'rojo' ? '🌧 ' : weatherAlert.nivel === 'ambar' ? '⚠ ' : 'ℹ '}{weatherAlert.msg}
              </p>
              <p style={{fontSize:11, color:'var(--text-2)', lineHeight:1.5}}>{weatherAlert.accion}</p>
            </div>
            {proximasRaleo.length > 0 && proximasRaleo[0].diasRestantes <= 3 && (
              <div style={{
                background:'var(--bg-card-h)', border:'0.5px solid var(--green)50',
                borderRadius:8, padding:'7px 10px',
                borderLeft:'3px solid var(--green)',
              }}>
                <p style={{fontSize:12, fontWeight:600, color:'var(--green)'}}>
                  {'✓ ' + proximasRaleo[0].lot.name + (proximasRaleo[0].diasRestantes === 0 ? ' lista hoy' : ' lista en ' + proximasRaleo[0].diasRestantes + ' día' + (proximasRaleo[0].diasRestantes !== 1 ? 's' : ''))}
                </p>
              </div>
            )}
          </div>
        )}
        {!weatherAlert && proximasRaleo.length > 0 && proximasRaleo[0].diasRestantes <= 3 && (
          <div style={{borderTop:'0.5px solid var(--sep)', paddingTop:10}}>
            <div style={{background:'var(--bg-card-h)', border:'0.5px solid var(--green)50', borderRadius:8, padding:'7px 10px', borderLeft:'3px solid var(--green)'}}>
              <p style={{fontSize:12, fontWeight:600, color:'var(--green)'}}>
                {'✓ ' + proximasRaleo[0].lot.name + (proximasRaleo[0].diasRestantes === 0 ? ' lista para cosechar hoy' : ' lista en ' + proximasRaleo[0].diasRestantes + ' día' + (proximasRaleo[0].diasRestantes !== 1 ? 's' : ''))}
              </p>
            </div>
          </div>
        )}
      </div>

      <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', color:CLR.text3, marginBottom:10}}>Clima · Nalhuitad, Chiloé</p>
      <WeatherCard />

      <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', color:CLR.text3, marginBottom:10, marginTop:16}}>Pipeline de producción</p>
      <div className="dm-card" style={{background:CLR.bgCard, border:'0.5px solid ' + CLR.border, borderRadius:14, overflow:'hidden', marginBottom:14}}>
        <div style={{display:'flex', alignItems:'stretch', padding:'16px 12px 12px', gap:6}}>
          {[
            { label:'Inv D',   sub:'Almácigo',    sub2:'Castro',              pts:ptasAlmacigo,    clr:CLR.stageA, bg:'var(--bg-card-h)' },
            { label:'Inv C',   sub:'Transplante', sub2:'4 pisc. · 3.072 cap.',   pts:ptasTransplante, clr:CLR.stageT, bg:'var(--bg-card-h)' },
            { label:'Inv A+B', sub:'Raleo',       sub2:'A: 8p · B: 6b',          pts:ptasRaleo,       clr:CLR.stageR, bg:'var(--bg-card-h)' },
          ].map(function(inv, idx) {
            return (
              <React.Fragment key={inv.label}>
                {idx > 0 && (
                  <div style={{display:'flex', alignItems:'center', paddingBottom:28}}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={CLR.text2} strokeWidth="2.5" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
                  </div>
                )}
                <div style={{flex:1, textAlign:'center'}}>
                  <div style={{background:inv.bg, border:'0.5px solid ' + inv.clr + '40', borderRadius:12, padding:'14px 6px 12px', marginBottom:6}}>
                    <p style={{fontSize:13, fontWeight:700, color:inv.clr, marginBottom:6, letterSpacing:'0.02em'}}>{inv.label}</p>
                    <p style={{fontSize:28, fontWeight:700, fontFamily:'DM Mono, monospace', color:inv.clr, lineHeight:1, marginBottom:5}}>{inv.pts.toLocaleString()}</p>
                    <p style={{fontSize:11, color:inv.clr, opacity:.9, fontWeight:500}}>{inv.sub}</p>
                  </div>
                  <p style={{fontSize:10, color:CLR.text2, lineHeight:1.5, fontWeight:500, marginTop:2}}>{inv.sub2}</p>
                </div>
              </React.Fragment>
            );
          })}
        </div>
        <div style={{display:'flex', borderTop:'0.5px solid ' + CLR.sep, padding:'10px 14px'}}>
          <div style={{flex:1, textAlign:'center'}}>
            <p style={{fontSize:11, color:CLR.text2, marginBottom:3, fontWeight:500}}>Inv A · 8 pisc.</p>
            <p style={{fontSize:15, fontWeight:600, fontFamily:'DM Mono, monospace', color:CLR.stageR}}>{INV_A.capacidadTotal.toLocaleString()}</p>
            <p style={{fontSize:11, color:CLR.text2, fontWeight:500}}>cap. máx</p>
          </div>
          <div style={{width:'0.5px', background:CLR.sep}} />
          <div style={{flex:1, textAlign:'center'}}>
            <p style={{fontSize:11, color:CLR.text2, marginBottom:3, fontWeight:500}}>Inv B · 6 banc.</p>
            <p style={{fontSize:15, fontWeight:600, fontFamily:'DM Mono, monospace', color:CLR.stageR}}>{INV_B.capacidadTotal.toLocaleString()}</p>
            <p style={{fontSize:11, color:CLR.text2, fontWeight:500}}>cap. máx</p>
          </div>
          <div style={{width:'0.5px', background:CLR.sep}} />
          <div style={{flex:1, textAlign:'center'}}>
            <p style={{fontSize:11, color:CLR.text2, marginBottom:3, fontWeight:500}}>Inv C · 4 pisc.</p>
            <p style={{fontSize:15, fontWeight:600, fontFamily:'DM Mono, monospace', color:CLR.stageT}}>{INV_C.capacidadTotal.toLocaleString()}</p>
            <p style={{fontSize:11, color:CLR.text2, fontWeight:500}}>transplante</p>
          </div>
        </div>
      </div>

      <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', color:CLR.text3, marginBottom:10}}>Próximas cosechas</p>
      <div className="dm-card" style={{background:CLR.bgCard, border:'0.5px solid ' + CLR.border, borderRadius:14, overflow:'hidden', marginBottom:14}}>
        {proximasRaleo.length === 0 && (
          <div style={{padding:'24px 16px', textAlign:'center'}}>
            <p style={{fontSize:14, color:CLR.text3}}>Sin lotes en raleo</p>
          </div>
        )}
        {proximasRaleo.slice(0, 4).map(function(item, i) {
          const bp = badgeProps(item.diasRestantes);
          const dLabel = item.diasRestantes === 0 ? 'hoy' : 'en ' + item.diasRestantes + ' día' + (item.diasRestantes !== 1 ? 's' : '');
          return (
            <div key={item.lot.id} style={{display:'flex', alignItems:'center', gap:12, padding:'14px 16px', borderBottom: i < Math.min(proximasRaleo.length,4)-1 ? '0.5px solid ' + CLR.sep : 'none'}}>
              <div style={{flex:1, minWidth:0}}>
                <p style={{fontSize:15, color:CLR.text1, fontWeight:600}}>{item.lot.name}</p>
                <p style={{fontSize:12, color:CLR.text2, marginTop:3}}>{item.lot.variety} · {(item.lot.currentQuantity ?? toPlantCount(item.lot.quantity)).toLocaleString()} plantas</p>
              </div>
              <div style={{textAlign:'right', flexShrink:0}}>
                <span style={{fontSize:13, color:CLR.text2, display:'block', marginBottom:4}}>{dLabel}</span>
                <span style={{fontSize:12, fontWeight:700, padding:'4px 10px', borderRadius:7, background:bp.bg, color:bp.clr}}>{bp.label}</span>
              </div>
            </div>
          );
        })}
        {raleos.length > 4 && (
          <div style={{padding:'10px 16px', borderTop:'0.5px solid ' + CLR.sep, textAlign:'center'}}>
            <p style={{fontSize:13, color:CLR.text2}}>{raleos.length - 4} lotes más en raleo</p>
          </div>

const CLINICA_SYSTEM_PROMPT = `Eres el sistema de diagnóstico fitopatológico de Nalhuitad, una operación hidropónica comercial en Chonchi, Chiloé, Chile (42.6°S, HR 80-90%, clima templado oceánico lluvioso). CULTIVO: Lactuca sativa var. Milena. SISTEMAS: NFT (Inv B) y DWC (Inv A).

BASE CIENTÍFICA: Resh 2013, INIA Chile Fichas Técnicas La Platina (Sepúlveda 2016 - Bremia lactucae), UC Davis IPM, Cornell University CEA (Mattson), FAO MIP Hortalizas, Plant Health Progress Diagnostic Guide Pythium 2024.

PATÓGENOS CATALOGADOS PARA CHILOÉ:
1. BREMIA LACTUCAE - Mildiu velloso [ALTA FRECUENCIA]. HR>85%, T°15-20°C. Síntomas haz: manchas cloróticas angulares limitadas por nervaduras. Síntomas envés: esporulación blanquecina-grisácea. Diferencial: micelio SOLO en envés, manchas limitadas por venas.
2. PYTHIUM SPP. - Pudrición radicular [ALTA FRECUENCIA NFT/DWC]. T°agua>18°C, O2<6mg/L. Síntomas raíz: café-marrón, aspecto cola de rata, mucilaginoso. Síntomas foliares (avanzado): clorosis+marchitez. ACCIÓN INMEDIATA: aislar lote.
3. DEFICIENCIA HIERRO - Clorosis intervenal hojas JÓVENES [MEDIA]. pH>6.5 inactiva quelatos. Nervaduras verdes, tejido intervenal amarillo, solo en hojas nuevas arriba.
4. DEFICIENCIA CALCIO - Tip burn [MEDIA]. Necrosis bordes hojas INTERNAS del cogollo. No infeccioso.
5. DEFICIENCIA MAGNESIO - Clorosis intervenal hojas VIEJAS [MEDIA]. Igual que Fe pero en hojas externas/inferiores.
6. TOXICIDAD CE - Bordes café hojas EXTERNAS [VARIABLE]. Si EC>2.2 mS/cm.
7. SCLEROTINIA - Pudrición blanca [BAJA]. Micelio blanco algodonoso + esclerocios negros.

PROTOCOLO DE ANÁLISIS:
1. Localizar área afectada (hoja joven/vieja, haz/envés, raíz)
2. Describir síntomas exactos observados en la imagen
3. Generar hipótesis con porcentaje de confianza
4. Generar 2-3 preguntas de verificación visual
5. Calcular dosis SOLO si operario confirma. Inv A DWC: 2000L. Inv B NFT: 2600L (2×1300L).

REGLAS INNEGOCIABLES:
- Si la planta se ve SANA (color verde uniforme, sin manchas, sin clorosis, raíces blancas): responder con alertaNivel "verde", diagnosticoPrincipal.nombre "Sin patología detectada", confianza según claridad de imagen. NO fabricar diagnósticos en plantas sanas.
- NUNCA recomendar dosis sin confirmación del operario
- Si Pythium → indicar AISLAMIENTO INMEDIATO antes del diagnóstico
- Si confianza <60% → pedir nueva foto con instrucciones específicas
- Todos los fungicidas deben estar registrados en SAG Chile para consumo fresco

Responder SIEMPRE en JSON exacto:

Si imagen insuficiente: {"diagnosticoPrincipal":null,"solicitudImagen":{"motivo":"...","instrucciones":"..."}}`;

// ── Clínica IA — Rate limiting ───────────────────────────────
const CLINICA_DAILY_LIMIT = 10;
const CLINICA_USAGE_KEY   = 'hidro_clinica_usage_v1';

function useClinicaUsage() {
  const getLocal = () => {
    try { return JSON.parse(localStorage.getItem(CLINICA_USAGE_KEY) || 'null'); } catch { return null; }
  };
  const [usage, setUsage] = React.useState(() => {
    const u = getLocal();
    if (u?.date === todayISO()) return u;
    return { date: todayISO(), count: 0 };
  });

  const remaining = Math.max(0, CLINICA_DAILY_LIMIT - (usage.count || 0));
  const exhausted  = remaining === 0;

  const increment = async () => {
    const next = { date: todayISO(), count: (usage.count || 0) + 1 };
    setUsage(next);
    try { localStorage.setItem(CLINICA_USAGE_KEY, JSON.stringify(next)); } catch {}
    try {
      const deviceId = localStorage.getItem('hidro_device_id') || 'unknown';
      await fsDb.set('config', 'clinica_usage_' + deviceId, {
        date: next.date, count: next.count, deviceId,
        updatedAt: new Date().toISOString(),
      });
    } catch {}
  };

  const resetIfNewDay = () => {
    const u = getLocal();
    if (!u || u.date !== todayISO()) {
      const fresh = { date: todayISO(), count: 0 };
      setUsage(fresh);
      try { localStorage.setItem(CLINICA_USAGE_KEY, JSON.stringify(fresh)); } catch {}
    }
  };

  return { usage, remaining, exhausted, increment, resetIfNewDay };
}

    const now = new Date();
    const fecha = now.toLocaleDateString('es-CL', { day:'2-digit', month:'short', year:'numeric' });
    const hora  = now.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });
    const dx = resultado.diagnosticoPrincipal;
    const prot = resultado.protocolo;
    let txt = '🔬 Clínica IA · ' + fecha + ' ' + hora + '\n';
    txt += dx.nombre + ' (' + dx.confianza + '% confianza)\n';
    if (prot?.tratamiento?.producto) {
      txt += 'Tratamiento: ' + prot.tratamiento.producto;
      if (prot.tratamiento.dosis_invB) txt += ' · ' + prot.tratamiento.dosis_invB;
      txt += '\n';
    }
    if (conTratamiento) txt += '✅ Tratamiento aplicado';
    else txt += '⏳ Tratamiento pendiente';
    return txt;

  const guardar = async (conTratamiento) => {
    if (estado !== 'idle') return;
    setEstado('guardando');

      date: todayISO(),
      timestamp: new Date().toISOString(),

      lotName: lotName,
      tipo: 'clinica',

      const existing = JSON.parse(localStorage.getItem(NOTES_CACHE_KEY) || '[]');

    } catch {}
    try { await fsDb.set('notas', note.id, note); } catch {}
    setEstado(conTratamiento ? 'tratado' : 'guardado');

  if (estado === 'guardado') return (
    <div style={{marginBottom:10}}>

function ClinicaScreen({ lots, onNav, preselectedLotId }) {
  const [fase, setFase] = React.useState('inicio');
  const [lotSelId, setLotSelId] = React.useState(preselectedLotId || '');
  const [imgs, setImgs] = React.useState([]);
  const [resultado, setResultado] = React.useState(null);
  const [confirmaciones, setConfirmaciones] = React.useState({});
  const [error, setError] = React.useState('');
  const { remaining, exhausted, increment, resetIfNewDay } = useClinicaUsage();

  React.useEffect(() => { resetIfNewDay(); }, []);

  const activeLots = lots.filter(l => l.stage !== 'cosecha');
  const lotSel = activeLots.find(l => l.id === lotSelId);
  const invLabel = lotSel?.location?.invernadero === 'B' ? 'NFT' : lotSel?.location?.invernadero === 'A' ? 'DWC' : '';

  const handleAddFotos = (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    const remaining = 3 - imgs.length;
    const toProcess = files.slice(0, remaining);
    let loaded = 0;
    toProcess.forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const full = ev.target.result;
        const mediaType = full.startsWith('data:image/png') ? 'image/png' : full.startsWith('data:image/webp') ? 'image/webp' : 'image/jpeg';
        setImgs(prev => prev.length < 3 ? [...prev, { base64: full.split(',')[1], preview: full, mediaType }] : prev);
        loaded++;
        if (loaded === toProcess.length) setFase('preAnalisis');
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  };

  const analizar = async () => {
    if (!imgs.length) return;
    if (exhausted) {
      setError('Límite diario alcanzado (' + CLINICA_DAILY_LIMIT + ' análisis/día). Se resetea a medianoche.');
      return;
    }
    setFase('analizando');
    setError('');
    const ctx = lotSel
      ? ('Lote ' + lotSel.id + ' (' + (lotSel.variety||'Milena') + ') en Invernadero ' + (lotSel.location?.invernadero||'?') + ' ' + invLabel + '. Etapa: ' + (lotSel.stage||'?') + '.')
      : 'Lote no especificado. Analizar solo por síntomas visuales.';
    try {
      // Obtener Firebase ID token para autenticar con el proxy
      const s = fsAuth.load();
      const idToken = await fsDb.getFreshToken();
      if (!idToken) throw new Error('Sesión expirada — volvé a iniciar sesión.');

      const imgPayload = imgs.map(img => ({ base64: img.base64, mediaType: img.mediaType || 'image/jpeg' }));

      const res = await fetch('https://us-central1-nalhuitad-d6758.cloudfunctions.net/analizarClinica', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + idToken,
        },
        body: JSON.stringify({
          imgs: imgPayload,
          ctx: ctx,
          systemPrompt: CLINICA_SYSTEM_PROMPT,
        })
      });
      if (!res.ok) {
        const errBody = await res.json().catch(() => ({}));
        throw new Error(errBody?.error || ('Error ' + res.status));
      }
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'Error en el análisis');
      const parsed = data.resultado;
      await increment();
      setResultado(parsed);
      setFase(parsed.diagnosticoPrincipal ? 'resultado' : 'inicio');
      if (parsed.solicitudImagen) { setError(parsed.solicitudImagen.instrucciones); setFase('inicio'); }
    } catch(e) {
      setError('Error al analizar: ' + (e.message || 'Verificá tu conexión e intentá de nuevo.'));
      setFase('preAnalisis');
    }
  };

  const confirmarVerificacion = (idx, resp) => setConfirmaciones(prev => ({...prev, [idx]: resp}));
  const todasConfirmadas = resultado?.verificaciones?.length > 0 &&
    resultado.verificaciones.every((_, i) => confirmaciones[i] !== undefined);
  const alertColor = resultado?.alertaNivel === 'rojo' ? 'var(--red)' :
    resultado?.alertaNivel === 'amarillo' ? 'var(--amber)' : 'var(--green)';

  const resetear = () => {
    setFase('inicio'); setImgs([]);
    setResultado(null); setConfirmaciones({}); setError('');
  };

  return (
    <div style={{flex:1, overflowY:'auto', background:'var(--bg-1)', WebkitOverflowScrolling:'touch', overscrollBehavior:'contain'}}>

      {/* FASE: INICIO */}
      {(fase === 'inicio' || fase === 'preAnalisis') && (
        <div style={{padding:'16px 16px 80px'}}>
          {/* Header */}
          <div style={{marginBottom:18}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
              <p style={{fontSize:20,fontWeight:700,color:'var(--text-1)'}}>Clínica de la lechuga</p>
              <span style={{fontSize:12,fontWeight:700,color:'var(--amber)',background:'rgba(251,191,36,0.15)',padding:'2px 8px',borderRadius:4}}>BETA</span>
            </div>
            <p style={{fontSize:14,color:'var(--text-3)'}}>Diagnóstico fitopatológico asistido · Chiloé</p>
          </div>

          {/* Selector de lote */}

          {resultado.protocolo.mip?.length > 0 && (
            <div style={{background:'var(--bg-card)',border:'0.5px solid var(--border)',borderRadius:12,padding:'12px 14px',marginBottom:10}}>
              <p style={{fontSize:13,fontWeight:700,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8}}>Manejo integrado (MIP)</p>
              {resultado.protocolo.mip.map((m, i) => (
                <div key={i} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:6}}>
                  <div style={{width:18,height:18,borderRadius:'50%',background:'var(--bg-card-h)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <span style={{fontSize:12,fontWeight:700,color:'var(--text-3)'}}>{i+1}</span>
                  </div>
                  <p style={{fontSize:13,color:'var(--text-2)',lineHeight:1.4}}>{m}</p>

              {resultado.protocolo.fuentes && (
                <p style={{fontSize:12,color:'var(--stage-t)',marginTop:8,paddingTop:8,borderTop:'0.5px solid var(--sep)'}}>
                  {resultado.protocolo.fuentes.join(' · ')}

          <div style={{background:'rgba(251,191,36,0.08)',border:'0.5px solid rgba(251,191,36,0.3)',borderRadius:10,padding:'8px 12px',marginBottom:14}}>
            <p style={{fontSize:13,color:'var(--amber)',lineHeight:1.5}}>Verificar que los productos estén registrados SAG Chile para cultivos de consumo fresco antes de aplicar.</p>
          </div>

          {/* Guardar diagnóstico como nota en el lote */}
          {lotSel && (
            <NotaClinicaButton resultado={resultado} lotId={lotSel.id} lotName={lotSel.name} />
          )}

          <button onClick={resetear} style={{width:'100%',padding:'13px 0',borderRadius:12,border:'none',background:'var(--bg-card-h)',color:'var(--text-2)',fontSize:15,fontWeight:600,cursor:'pointer',marginTop:8}}>
            Nuevo análisis
          </button>
        </div>
      )}
    </div>
  );
}

function SensoresScreen({ lots }) {
  const dm = useDarkMode();

  // ── Calcular O2 estimado (Benson-Krause) ──────────────────
  function estimateO2(t) {
    if (t === null || t === undefined || isNaN(t)) return null;
    return parseFloat((14.62 * Math.exp(-0.0393 * t)).toFixed(2));
  }

  // ── Estado del nodo según antigüedad ──────────────────────
  function nodeStatus(lastUpdate) {
    if (!lastUpdate) return 'offline';
    const age = Date.now() - new Date(lastUpdate).getTime();
    if (age < 3 * 60 * 1000)  return 'online';
    if (age < 30 * 60 * 1000) return 'stale';
    return 'offline';
  }
  function nodeAge(lastUpdate) {
    if (!lastUpdate) return 'Sin señal';
    const min = Math.floor((Date.now() - new Date(lastUpdate).getTime()) / 60000);
    if (min < 1)   return 'Ahora mismo';
    if (min < 60)  return 'hace ' + min + ' min';
    const h = Math.floor(min / 60);
    return 'hace ' + h + 'h ' + (min % 60) + 'min';
  }

  // ── Agrupar lotes con sensor por invernadero ───────────────
  const invData = ['A', 'B'].map(inv => {
    const invLots = lots.filter(l =>
      l.location?.invernadero === inv &&
      l.sensorReadings?.lastUpdate
    );
    // Tomar la lectura más reciente del invernadero
    invLots.sort((a, b) =>
      (b.sensorReadings.lastUpdate || '').localeCompare(a.sensorReadings.lastUpdate || '')
    );
    const sr  = invLots[0]?.sensorReadings || null;
    const sp  = invLots[0]?.setpoints || { phMin:5.5, phMax:6.5, ecTarget:1800, ecTolerance:300, tempMaxAgua:24 };
    const o2  = sr ? estimateO2(sr.tempAgua) : null;
    const status = nodeStatus(sr?.lastUpdate);
    return { inv, sr, sp, o2, status, lots: invLots };
  });

  const hasSensores = invData.some(d => d.sr !== null);

  // ── Barra de rango ─────────────────────────────────────────
  function RangeBar({ value, min, max, warn, crit, unit, label }) {
    if (value === null || value === undefined) return null;
    const pct = Math.min(100, Math.max(0, ((value - min) / (max - min)) * 100));
    const inRange = value >= (warn || min) && value <= (crit || max);
    const color = inRange ? 'var(--green)' : value > (crit || max) ? 'var(--red)' : 'var(--amber)';
    return (
      <div style={{ marginTop:6 }}>
        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:3 }}>
          <span style={{ fontSize:10, color:'var(--text-3)' }}>{min}{unit}</span>
          <span style={{ fontSize:10, color:'var(--text-3)' }}>{max}{unit}</span>
        </div>
        <div style={{ height:5, background:'var(--sep)', borderRadius:3, overflow:'hidden' }}>
          <div style={{ height:'100%', width: pct + '%', background:color, borderRadius:3, transition:'width .5s' }} />
        </div>
      </div>
    );
  }

  // ── Tarjeta de métrica ─────────────────────────────────────
  function MetricCard({ label, value, unit, color, rangeProps, alert }) {
    const hasVal = value !== null && value !== undefined;
    return (
      <div style={{
        background:'var(--bg-card)', border:'0.5px solid var(--border)',
        borderRadius:12, padding:'12px 14px', flex:1, minWidth:0,
      }}>
        <p style={{ fontSize:11, color:'var(--text-3)', marginBottom:4, fontWeight:600, textTransform:'uppercase', letterSpacing:'.04em' }}>{label}</p>
        <div style={{ display:'flex', alignItems:'baseline', gap:4 }}>
          <span style={{ fontSize:26, fontWeight:700, fontFamily:'DM Mono, monospace', color: hasVal ? color : 'var(--text-3)', lineHeight:1 }}>
            {hasVal ? value : '—'}
          </span>
          <span style={{ fontSize:12, color:'var(--text-3)' }}>{unit}</span>
        </div>
        {rangeProps && hasVal && <RangeBar value={parseFloat(value)} {...rangeProps} />}
        {alert && (
          <p style={{ fontSize:10, color:'var(--red)', marginTop:5, fontWeight:600 }}>{alert}</p>
        )}
      </div>
    );
  }

  // ── Sin sensores — estado vacío ────────────────────────────
  if (!hasSensores) {
    return (
      <div style={{ flex:1, overflowY:'auto', padding:'16px 16px 80px', background:'var(--bg-1)', WebkitOverflowScrolling:'touch', overscrollBehavior:'contain' }}>
        {/* Header */}
        <div style={{ marginBottom:20 }}>
          <p style={{ fontSize:20, fontWeight:700, color:'var(--text-1)', marginBottom:4 }}>Sensores</p>
          <p style={{ fontSize:13, color:'var(--text-3)' }}>Monitoreo en tiempo real · LilyGO RS485</p>
        </div>

        {/* Nodos pendientes */}
        {['A','B'].map(inv => (
          <div key={inv} style={{
            background:'var(--bg-card)', border:'0.5px solid var(--border)',
            borderRadius:14, padding:'14px 16px', marginBottom:12,
            display:'flex', alignItems:'center', gap:12,
          }}>
            <div style={{
              width:36, height:36, borderRadius:10, flexShrink:0,
              background:'var(--bg-card-h)', border:'0.5px solid var(--border)',
              display:'flex', alignItems:'center', justifyContent:'center',
            }}>
              <span style={{ fontSize:14, fontWeight:700, color:'var(--text-3)' }}>{inv}</span>
            </div>
            <div style={{ flex:1 }}>
              <p style={{ fontSize:14, fontWeight:600, color:'var(--text-1)', marginBottom:2 }}>Invernadero {inv}</p>
              <p style={{ fontSize:12, color:'var(--text-3)' }}>{inv==='A'?'Raíz flotante · 8 piscinas':'NFT · 6 bancadas × 10 tubos'}</p>
            </div>
            <span style={{
              fontSize:10, fontWeight:700, color:'var(--amber)',
              background:'#E07B2A1E', border:'1px solid #E07B2A45',
              borderRadius:6, padding:'3px 8px',
            }}>SIN SEÑAL</span>
          </div>
        ))}

        {/* Sensores planificados */}
        <div style={{ background:'var(--bg-card)', border:'0.5px solid var(--border)', borderRadius:14, padding:'14px 16px', marginBottom:12 }}>
          <p style={{ fontSize:12, fontWeight:700, color:'var(--text-2)', textTransform:'uppercase', letterSpacing:'.05em', marginBottom:12 }}>Sensores planificados por nodo</p>
          {[
            { icon:'🌡', label:'Temperatura agua', model:'DS18B20', inv:'A y B' },
            { icon:'⚗️', label:'pH', model:'RS485 pH+EC', inv:'A y B' },
            { icon:'⚡', label:'Conductividad EC', model:'RS485 pH+EC', inv:'A y B' },
            { icon:'💧', label:'O2 disuelto (est.)', model:'Calculado de T°agua', inv:'A y B' },
            { icon:'📡', label:'Conectividad 4G', model:'LilyGO T-SIM7670G-S3', inv:'A y B' },
          ].map((s, i, arr) => (
            <div key={s.label} style={{
              display:'flex', alignItems:'center', gap:10, paddingBottom:10,
              marginBottom: i < arr.length-1 ? 10 : 0,
              borderBottom: i < arr.length-1 ? '0.5px solid var(--sep)' : 'none',
            }}>
              <span style={{ fontSize:18 }}>{s.icon}</span>
              <div style={{ flex:1 }}>
                <p style={{ fontSize:13, fontWeight:500, color:'var(--text-1)' }}>{s.label}</p>
                <p style={{ fontSize:11, color:'var(--text-3)' }}>{s.model}</p>
              </div>
              <span style={{ fontSize:11, color:'var(--text-3)' }}>{s.inv}</span>
            </div>
          ))}
        </div>

        <div style={{ background:'var(--bg-card-h)', border:'0.5px solid var(--border)', borderRadius:12, padding:'12px 14px', display:'flex', gap:8 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" strokeWidth="2" strokeLinecap="round" style={{flexShrink:0, marginTop:1}}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <p style={{ fontSize:12, color:'var(--text-3)', lineHeight:1.7 }}>
            Cuando los nodos LilyGO estén instalados y enviando datos a Firebase, esta pantalla mostrará los valores en tiempo real con barras de rango, alertas visuales y estimación de O2 disuelto.
          </p>
        </div>
      </div>
    );
  }

  // ── CON SENSORES — vista en tiempo real ────────────────────
  return (
    <div style={{ flex:1, overflowY:'auto', padding:'16px 16px 80px', background:'var(--bg-1)', WebkitOverflowScrolling:'touch', overscrollBehavior:'contain' }}>

      <div style={{ marginBottom:20 }}>
        <p style={{ fontSize:20, fontWeight:700, color:'var(--text-1)', marginBottom:4 }}>Sensores</p>
        <p style={{ fontSize:13, color:'var(--text-3)' }}>Actualización automática · LilyGO RS485</p>
      </div>

      {invData.map(({ inv, sr, sp, o2, status, lots: invLots }) => {
        if (!sr) return null;

        const statusColor = status==='online'?'var(--green)':status==='stale'?'var(--amber)':'var(--red)';
        const statusLabel = status==='online'?'En línea':status==='stale'?'Datos viejos':'Sin señal';

        // Alertas activas
        const alerts = [];
        if (sr.ph !== null && (sr.ph < sp.phMin || sr.ph > sp.phMax))
          alerts.push({ color:'var(--red)', msg: 'pH ' + (sr.ph < sp.phMin ? 'bajo' : 'alto') + ' — ajustar solución' });
        if (sr.ec !== null && Math.abs(sr.ec - sp.ecTarget) > sp.ecTolerance)
          alerts.push({ color:'var(--red)', msg: 'EC desviada del setpoint — revisar concentración' });
        if (sr.tempAgua !== null && sr.tempAgua >= 24)
          alerts.push({ color:'var(--red)', msg: '⚠ Riesgo hipoxia — T°agua ' + sr.tempAgua.toFixed(1) + '°C' });
        if (o2 !== null && o2 < 8)
          alerts.push({ color:'var(--red)', msg: '⚠ O2 bajo — activar motores (' + o2 + ' mg/L)' });
        if (o2 !== null && o2 >= 8 && o2 < 9)
          alerts.push({ color:'var(--amber)', msg: 'O2 en límite — monitorear (' + o2 + ' mg/L)' });

        const ph = sr.ph ?? null; const ec = sr.ec ?? null; const tw = sr.tempAgua ?? null;
        const phColor = ph === null ? 'var(--text-3)' : ph < sp.phMin || ph > sp.phMax ? 'var(--red)' : 'var(--green)';
        const ecColor = ec === null ? 'var(--text-3)' : Math.abs(ec - sp.ecTarget) > sp.ecTolerance ? 'var(--red)' : 'var(--green)';
        const tColor  = tw === null ? 'var(--text-3)' : tw >= 24 ? 'var(--red)' : tw >= 22 ? 'var(--amber)' : 'var(--green)';
        const o2Color = o2 === null ? 'var(--text-3)' : o2 < 7 ? 'var(--red)' : o2 < 8 ? 'var(--amber)' : o2 < 9 ? 'var(--green)' : 'var(--stage-t)';

        return (
          <div key={inv} style={{ marginBottom:20 }}>
            {/* Header nodo */}
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
              <div style={{
                width:36, height:36, borderRadius:10, flexShrink:0,
                background:statusColor + '18', border:'0.5px solid ' + statusColor + '50',
                display:'flex', alignItems:'center', justifyContent:'center',
              }}>
                <span style={{ fontSize:14, fontWeight:700, color:statusColor }}>{inv}</span>
              </div>
              <div style={{ flex:1 }}>
                <p style={{ fontSize:15, fontWeight:700, color:'var(--text-1)', marginBottom:1 }}>Invernadero {inv}</p>
                <p style={{ fontSize:11, color:'var(--text-3)' }}>{nodeAge(sr.lastUpdate)}</p>
              </div>
              <span style={{
                fontSize:10, fontWeight:700, color:statusColor,
                background:statusColor + '18', border:'0.5px solid ' + statusColor + '45',
                borderRadius:6, padding:'3px 9px',
              }}>{statusLabel}</span>
            </div>

            {/* Alertas activas */}
            {alerts.map((a, i) => (
              <div key={i} style={{
                display:'flex', alignItems:'center', gap:8, padding:'8px 12px',
                background:a.color + '12', border:'0.5px solid ' + a.color + '40',
                borderRadius:10, marginBottom:8,
              }}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={a.color} strokeWidth="2.5" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <p style={{ fontSize:12, fontWeight:600, color:a.color }}>{a.msg}</p>
              </div>
            ))}

            {/* Grid 2×2 métricas */}
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:8 }}>
              <MetricCard
                label="pH"
                value={ph !== null ? ph.toFixed(2) : null}
                unit=""
                color={phColor}
                rangeProps={{ min:4.5, max:8.0, warn:sp.phMin, crit:sp.phMax, unit:'' }}
              />
              <MetricCard
                label="EC"
                value={ec !== null ? Math.round(ec) : null}
                unit="µS/cm"
                color={ecColor}
                rangeProps={{ min:sp.ecTarget-sp.ecTolerance*2, max:sp.ecTarget+sp.ecTolerance*2, warn:sp.ecTarget-sp.ecTolerance, crit:sp.ecTarget+sp.ecTolerance, unit:'' }}
              />
              <MetricCard
                label="T° Agua"
                value={tw !== null ? tw.toFixed(1) : null}
                unit="°C"
                color={tColor}
                rangeProps={{ min:12, max:28, warn:18, crit:24, unit:'°C' }}
              />
              <MetricCard
                label="O₂ Estimado"
                value={o2}
                unit="mg/L"
                color={o2Color}
                rangeProps={{ min:5, max:14, warn:8, crit:7, unit:'' }}
                alert={o2 !== null && o2 < 8 ? 'Activar motores' : null}
              />
            </div>

            {/* Setpoint EC */}
            <div style={{
              background:'var(--bg-card)', border:'0.5px solid var(--border)',
              borderRadius:10, padding:'8px 12px', display:'flex', justifyContent:'space-between', alignItems:'center',
            }}>
              <p style={{ fontSize:12, color:'var(--text-3)' }}>Setpoint EC</p>
              <p style={{ fontSize:13, fontWeight:600, color:'var(--text-2)', fontFamily:'DM Mono, monospace' }}>
                {sp.ecTarget} ± {sp.ecTolerance} µS/cm
              </p>
            </div>

            {/* Lotes monitoreados */}
            {invLots.length > 0 && (
              <div style={{ marginTop:8 }}>
                <p style={{ fontSize:11, color:'var(--text-3)', marginBottom:6, fontWeight:600, textTransform:'uppercase', letterSpacing:'.04em' }}>
                  Lotes en este invernadero
                </p>
                {invLots.map(lot => (
                  <div key={lot.id} style={{
                    display:'flex', alignItems:'center', gap:8, padding:'6px 0',
                    borderBottom:'0.5px solid var(--sep)',
                  }}>
                    <div style={{ width:6, height:6, borderRadius:'50%', background:STAGES[lot.stage]?.color || 'var(--text-3)', flexShrink:0 }} />
                    <p style={{ fontSize:12, color:'var(--text-1)', flex:1 }}>{lot.name}</p>
                    <p style={{ fontSize:11, color:'var(--text-3)', fontFamily:'DM Mono, monospace' }}>
                      {lot.location?.tipo} {lot.location?.identificador}
                    </p>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function SensoresIcon({ active }) {
  return <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={active?2.2:1.8} strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="15" x2="23" y2="15"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="15" x2="4" y2="15"/></svg>;
}


// ── NOTAS SCREEN ─────────────────────────────────────────
function NotasScreen({ lots }) {
  const NOTES_CACHE_KEY = 'hidro_notes_cache_v1';
  const [notes, setNotes] = useState(() => {
    try { return JSON.parse(localStorage.getItem(NOTES_CACHE_KEY) || '[]'); }
    catch { return []; }
  });
  const [loading, setLoading] = useState(true);
  const [showModal, setShowModal] = useState(false);

  useEffect(() => {
    fsDb.list('notas').then(data => {
      const sorted = data.sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
      setNotes(sorted);
      try { localStorage.setItem(NOTES_CACHE_KEY, JSON.stringify(sorted)); } catch {}
    }).catch(() => {}).finally(() => setLoading(false));
  }, []);

  const handleSaved = (note) => { setNotes(prev => [note, ...prev]); };

  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const formatNoteDate = (ts) => {
    try {
      const d = new Date(ts); const now = new Date();
      const diff = Math.floor((now - d) / 60000);
      if (diff < 1) return 'ahora';
      if (diff < 60) return 'hace ' + diff + ' min';
      if (diff < 1440) return 'hace ' + Math.floor(diff/60) + 'h';
      return d.getDate() + ' ' + months[d.getMonth()] + (d.getFullYear() !== now.getFullYear() ? ' ' + d.getFullYear() : '');
    } catch { return ''; }
  };

  return (
    <div style={{flex:1, overflowY:'auto', padding:'16px 16px 100px', position:'relative', background:'var(--bg-1)', WebkitOverflowScrolling:'touch', overscrollBehavior:'contain'}}>
      {loading && notes.length === 0 && (
        <div style={{display:'flex', flexDirection:'column', gap:10}}>
          {[1,2,3].map(i => <div key={i} className="skeleton" style={{height:72, borderRadius:12}} />)}
        </div>
      )}
      {!loading && notes.length === 0 && (
        <div style={{textAlign:'center', padding:'60px 20px'}}>
          <div style={{width:56, height:56, borderRadius:16, background:'var(--bg-card-h)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px'}}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </div>
          <p style={{fontSize:16, fontWeight:600, color:'var(--text-1)', marginBottom:6}}>Sin notas aún</p>
          <p style={{fontSize:13, color:'var(--text-2)', lineHeight:1.6}}>Usá el botón verde para registrar observaciones del invernadero.</p>
        </div>
      )}
      {notes.map((note, i) => {
        const lot = note.lotId ? lots.find(l => l.id === note.lotId) : null;
        const stageColor = lot ? STAGES[lot.stage]?.color : null;
        return (
          <div key={note.id || i} style={{
            background:'var(--bg-card)', border:'0.5px solid var(--border)',
            borderRadius:12, padding:'12px 14px', marginBottom:10,
            borderLeft: stageColor ? '3px solid ' + stageColor : '3px solid var(--border)',
          }}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>
              <span style={{fontSize:11, fontWeight:600, padding:'2px 8px', borderRadius:5, background: stageColor ? stageColor + '20' : 'var(--bg-card-h)', color: stageColor || 'var(--text-3)'}}>
                {note.lotName || 'General'}
              </span>
              <span style={{fontSize:11, color:'var(--text-3)', fontFamily:'DM Mono, monospace'}}>
                {formatNoteDate(note.timestamp || note.date)}
              </span>
            </div>
            <p style={{fontSize:14, color:'var(--text-1)', lineHeight:1.6, margin:0}}>{note.text}</p>
          </div>
        );
      })}
      <button onClick={() => setShowModal(true)} style={{
        position:'fixed', bottom:80, right:16, zIndex:50,
        width:48, height:48, borderRadius:24,
        background:'var(--green)', border:'none',
        display:'flex', alignItems:'center', justifyContent:'center',
        cursor:'pointer', boxShadow:'0 4px 16px rgba(0,0,0,0.25)',
      }}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0F1219" strokeWidth="2.8" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      {showModal && <QuickNoteModal lots={lots} onClose={() => setShowModal(false)} onSaved={handleSaved} />}
    </div>
  );
}

function NavBar({ active, onChange, alertCount }) {
  return (
    <div style={{
      display:'flex', background:'#21252A',
      paddingBottom:'max(10px, env(safe-area-inset-bottom))',
      borderTop:'0.5px solid var(--border)',
    }}>
      {NAV.map(({ id, label, icon: Icon }) => {
        const isActive = active === id;
        return (
          <button
            key={id}
            data-nav={id}
            onClick={() => onChange(id)}
            style={{
              flex:1, display:'flex', flexDirection:'column', alignItems:'center',
              justifyContent:'center', padding:'10px 0 8px',
              background:'none', border:'none', cursor:'pointer',
              color: isActive ? '#95DD47' : '#9FDCFF',
              transition:'color 0.15s, transform 0.1s', position:'relative',
              WebkitUserSelect:'none',
            }}
            onTouchStart={e => e.currentTarget.style.transform='scale(0.9)'}
            onTouchEnd={e => e.currentTarget.style.transform='scale(1)'}
          >
            {id === 'notas' && alertCount > 0 && (
              <span style={{
                position:'absolute', top:6, right:'calc(50% - 16px)',
                background:'var(--red)', color:'#fff',
                fontSize:9, fontWeight:700, minWidth:16, height:16,
                borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center',
                padding:'0 4px', lineHeight:1,
              }}>{alertCount > 9 ? '9+' : alertCount}</span>
            )}
            <Icon active={isActive} />
            <span style={{ fontSize:10, marginTop:4, fontWeight: isActive ? 700 : 400 }}>{label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ── TOAST ──────────────────────────────────────────────
function Toast({ msg, type, onDone }) {
  const DURATION = 2800;
  const [progress, setProgress] = useState(100);

  useEffect(() => {
    const t = setTimeout(onDone, DURATION);
    const start = Date.now();
    const interval = setInterval(() => {
      const elapsed = Date.now() - start;
      const pct = Math.max(0, 100 - (elapsed / DURATION) * 100);
      setProgress(pct);
      if (pct === 0) clearInterval(interval);
    }, 30);
    return () => { clearTimeout(t); clearInterval(interval); };
  }, [onDone]);

  const isError = type === 'error';
  const isWarn  = type === 'warn';
  const bg      = isError ? '#2A1A1A' : isWarn ? '#2A1E14' : '#21252A';
  const accent  = isError ? '#E05C3A' : isWarn ? '#E07B2A' : '#95DD47';
  const border  = isError ? 'rgba(224,92,58,0.4)' : isWarn ? 'rgba(224,123,42,0.4)' : 'rgba(149,221,71,0.3)';

  const icon = isError
    ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={accent} strokeWidth="2.2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    : isWarn
    ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={accent} strokeWidth="2.2" strokeLinecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    : <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={accent} strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>;

  return (
    <div
      onClick={onDone}
      style={{
        position:'fixed', bottom:90, left:'50%', transform:'translateX(-50%)',
        zIndex:300, maxWidth:340, width:'calc(100% - 32px)',
        background: bg, borderRadius:14, overflow:'hidden',
        border:'0.5px solid var(--border)',
        animation:'toastIn 0.3s cubic-bezier(0.34,1.2,0.64,1) forwards',
        cursor:'pointer',
      }}
    >
      <div style={{display:'flex', alignItems:'center', gap:10, padding:'14px 16px'}}>
        <span style={{flexShrink:0}}>{icon}</span>
        <span style={{flex:1, fontSize:14, fontWeight:500, color:'var(--text-1)', lineHeight:1.4}}>{msg}</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" strokeWidth="2.2" strokeLinecap="round" style={{flexShrink:0}}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
      <div style={{height:3, background:'rgba(255,255,255,0.08)'}}>
        <div style={{
          height:'100%', background: accent,
          width:`${progress}%`, transition:'width 0.03s linear'
        }} />
      </div>
    </div>
  );
}

// ══ SMOKE TEST ══════════════════════════════════════════════════
function SmokeTestScreen({ onClose, lots, session }) {
  const [results, setResults] = React.useState({});
  const [running, setRunning] = React.useState(false);

  const TESTS = [
    { id:'auth_session', label:'Sesión activa', group:'Auth', run: async () => {
      const s = fsAuth.load();
      if (!s?.idToken) throw new Error('Sin sesión en localStorage');
      if (!s?.email) throw new Error('Sin email en sesión');
      return 'OK · ' + s.email;
    }},
    { id:'auth_token_fresh', label:'Token refresh', group:'Auth', run: async () => {
      const token = await fsDb.getFreshToken();
      if (!token) throw new Error('getFreshToken() devolvió null');
      if (token.length < 100) throw new Error('Token sospechosamente corto');
      return 'OK · ' + token.slice(0,16) + '...';
    }},
    { id:'firestore_read', label:'Lectura Firestore', group:'Firebase', run: async () => {
      const token = await fsDb.getFreshToken();
      const url = 'https://firestore.googleapis.com/v1/projects/' + FS_PROJECT + '/databases/(default)/documents/lots?pageSize=1';
      const res = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const count = data.documents?.length || 0;
      return 'OK · ' + count + ' doc(s)';
    }},
    { id:'cache_lots', label:'Caché local (lotes)', group:'Firebase', run: async () => {
      const raw = localStorage.getItem(LOTS_CACHE_KEY);
      if (!raw) throw new Error('Caché vacío — sin sync previo');
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) throw new Error('Caché malformado');
      return 'OK · ' + parsed.length + ' lote(s)';
    }},
    { id:'firestore_write', label:'Escritura Firestore', group:'Firebase', run: async () => {
      const testId = 'smoke_' + Date.now();
      await fsDb.set('smoke_tests', testId, { smokeTest: true, ts: new Date().toISOString() });
      const read = await fsDb.get('smoke_tests', testId);
      if (!read?.smokeTest) throw new Error('Escrito pero no leído');
      const token = await fsDb.getFreshToken();
      await fetch('https://firestore.googleapis.com/v1/projects/' + FS_PROJECT + '/databases/(default)/documents/smoke_tests/' + testId, { method:'DELETE', headers:{ Authorization:'Bearer '+token } });
      return 'OK · write/read/delete';
    }},
    { id:'config_sync', label:'Config localStorage', group:'Config', run: async () => {
      const cfg = loadConfig();
      if (!cfg) throw new Error('loadConfig() null');
      if (typeof cfg.plantsPer !== 'number') throw new Error('plantsPer inválido: ' + cfg.plantsPer);
      if (!cfg.stageDays?.almacigo) throw new Error('stageDays.almacigo ausente');
      return 'OK · plantsPer=' + cfg.plantsPer + ' darkMode=' + cfg.darkMode;
    }},
    { id:'lot_alert', label:'Motor alertas', group:'Lógica', run: async () => {
      const d = new Date(); d.setDate(d.getDate() - 60);
      const fakeLot = { id:'smoke', stage:'raleo', stageHistory:[{ stage:'raleo', date:d.toISOString().slice(0,10) }] };
      const alert = getLotAlert(fakeLot);
      if (!alert) throw new Error('getLotAlert devolvió null');
      if (alert.status !== 'overdue') throw new Error('Esperado overdue, recibido: ' + alert.status);
      return 'OK · ' + alert.remaining + ' días (overdue)';
    }},
    { id:'harvest_projection', label:'Proyección cosecha', group:'Lógica', run: async () => {
      const today = todayISO();
      const season = getSeason(today);
      const daysLeft = (STAGE_DAYS.transplante[season]||15) + (STAGE_DAYS.raleo[season]||35);
      if (!daysLeft || daysLeft < 1) throw new Error('daysLeft inválido: ' + daysLeft);
      const d = new Date(); d.setDate(d.getDate() + daysLeft);
      return 'OK · ' + daysLeft + ' días → ' + d.toLocaleDateString('es-CL');
    }},
    { id:'notes_cache', label:'Notas (caché)', group:'Notas', run: async () => {
      const key = 'smoke_note_' + Date.now();
      const existing = JSON.parse(localStorage.getItem(NOTES_CACHE_KEY) || '[]');
      const testNote = { id:key, text:'smoke test', date:todayISO(), timestamp:new Date().toISOString(), lotId:null };
      localStorage.setItem(NOTES_CACHE_KEY, JSON.stringify([testNote, ...existing].slice(0,50)));
      const check = JSON.parse(localStorage.getItem(NOTES_CACHE_KEY) || '[]');
      if (!check.find(n => n.id === key)) throw new Error('Nota no hallada tras escribir');
      localStorage.setItem(NOTES_CACHE_KEY, JSON.stringify(existing));
      return 'OK · ' + existing.length + ' nota(s) existentes';
    }},
    { id:'clinica_api', label:'Proxy Clínica (endpoint)', group:'Clínica', run: async () => {
      // Verifica que el proxy existe y rechaza requests sin auth
      const res = await fetch('https://us-central1-nalhuitad-d6758.cloudfunctions.net/analizarClinica', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}'
      });
      if (res.status !== 401) throw new Error('Esperado 401, recibido ' + res.status + ' — proxy NO protegido');
      return 'OK · proxy activo y protegido (401 sin token)';
    }},
    { id:'telegram_bot', label:'Bot Telegram', group:'Alertas', run: async () => {
      const res = await fetch('https://api.telegram.org/bot8644204912:AAEHYBZulW85ojhm6B1O-N8OKrXbIH_os8M/getMe');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (!data.ok) throw new Error(JSON.stringify(data));
      return 'OK · @' + data.result.username;
    }},
    { id:'testalerta_auth', label:'testAlerta — auth requerida', group:'Alertas', run: async () => {
      const res = await fetch('https://us-central1-nalhuitad-d6758.cloudfunctions.net/testAlerta', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}'
      });
      if (res.status !== 401) throw new Error('Esperado 401, recibido ' + res.status + ' — endpoint NO protegido');
      return 'OK · endpoint protegido (401 sin token)';
    }},
    { id:'weather_api', label:'API Clima Open-Meteo', group:'Alertas', run: async () => {
      const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-42.524511&longitude=-73.801944&current_weather=true&forecast_days=1');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (!data.current_weather) throw new Error('Sin current_weather en respuesta');
      const t = data.current_weather.temperature;
      const w = data.current_weather.windspeed;
      return 'OK · ' + t + '°C · viento ' + w + ' km/h';
    }},
  ];

  const runTest = async (test) => {
    setResults(prev => ({ ...prev, [test.id]: { status:'running' } }));
    const t0 = Date.now();
    try {
      const msg = await test.run();
      setResults(prev => ({ ...prev, [test.id]: { status: msg?.startsWith('SKIP') ? 'skip' : 'ok', msg: msg||'OK', ms: Date.now()-t0 } }));
    } catch(e) {
      setResults(prev => ({ ...prev, [test.id]: { status:'fail', msg: e.message, ms: Date.now()-t0 } }));
    }
  };

  const runAll = async () => {
    setRunning(true); setResults({});
    for (const t of TESTS) await runTest(t);
    setRunning(false);
  };

  const groups = [...new Set(TESTS.map(t => t.group))];
  const done = Object.keys(results).length;
  const passed = Object.values(results).filter(r => r.status==='ok'||r.status==='skip').length;
  const failed = Object.values(results).filter(r => r.status==='fail').length;

  return (
    <div style={{height:'100%', display:'flex', flexDirection:'column', background:'var(--bg-1)', maxWidth:480, margin:'0 auto'}}>
      <div style={{padding:'16px 16px 12px', borderBottom:'0.5px solid var(--border)', background:'var(--bg-card)', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0}}>
        <div>
          <p style={{fontSize:16, fontWeight:700, color:'var(--text-1)', marginBottom:2}}>🧪 Smoke Test</p>
          <p style={{fontSize:12, color:'var(--text-3)', fontFamily:'monospace'}}>{TESTS.length} checks · pre-deploy</p>
        </div>
        <button onClick={onClose} style={{background:'none', border:'none', cursor:'pointer', color:'var(--text-3)', padding:4}}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      {done > 0 && (
        <div style={{padding:'10px 16px', background: failed > 0 ? 'rgba(248,113,113,0.08)' : 'rgba(74,222,128,0.08)', borderBottom:'0.5px solid var(--border)', display:'flex', gap:16, flexShrink:0}}>
          <span style={{fontSize:13, color:'var(--green)', fontWeight:600}}>✓ {passed} OK</span>
          {failed > 0 && <span style={{fontSize:13, color:'var(--red)', fontWeight:600}}>✗ {failed} FAIL</span>}
          <span style={{fontSize:13, color:'var(--text-3)'}}>{done}/{TESTS.length} completados</span>
        </div>
      )}

      <div style={{flex:1, overflowY:'auto', padding:'12px 16px'}}>
        {groups.map(group => (
          <div key={group} style={{marginBottom:16}}>
            <p style={{fontSize:11, fontWeight:700, letterSpacing:'0.08em', color:'var(--text-3)', textTransform:'uppercase', marginBottom:8}}>{group}</p>
            <div style={{background:'var(--bg-card)', border:'0.5px solid var(--border)', borderRadius:12, overflow:'hidden'}}>
              {TESTS.filter(t => t.group === group).map((test, i, arr) => {
                const r = results[test.id];
                const isLast = i === arr.length - 1;
                const col = !r ? 'var(--text-3)' : r.status==='ok' ? 'var(--green)' : r.status==='skip' ? 'var(--amber)' : r.status==='fail' ? 'var(--red)' : 'var(--text-3)';
                const icon = !r ? '○' : r.status==='ok' ? '✓' : r.status==='skip' ? '⚡' : r.status==='fail' ? '✗' : '⏳';
                return (
                  <div key={test.id} style={{padding:'10px 14px', borderBottom: isLast ? 'none' : '0.5px solid var(--sep)'}}>
                    <div style={{display:'flex', alignItems:'center', gap:10, marginBottom: r?.msg ? 4 : 0}}>
                      <span style={{fontSize:14, fontWeight:700, color:col, width:16, textAlign:'center', flexShrink:0}}>{icon}</span>
                      <span style={{fontSize:13, color:'var(--text-1)', flex:1}}>{test.label}</span>
                      {r?.ms !== undefined && <span style={{fontSize:11, color:'var(--text-3)', fontFamily:'monospace'}}>{r.ms}ms</span>}
                      <button onClick={() => runTest(test)} disabled={running}
                        style={{padding:'3px 8px', borderRadius:6, border:'0.5px solid var(--border)', background:'var(--bg-card-h)', color:'var(--text-2)', fontSize:11, cursor:'pointer', flexShrink:0}}>▶</button>
                    </div>
                    {r?.msg && <p style={{fontSize:11, color:col, fontFamily:'monospace', marginLeft:26, lineHeight:1.4}}>{r.msg}</p>}
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      <div style={{padding:'12px 16px 28px', borderTop:'0.5px solid var(--border)', background:'var(--bg-card)', flexShrink:0}}>
        <button onClick={runAll} disabled={running}
          style={{width:'100%', padding:'13px 0', borderRadius:12, border:'none',
            background: running ? 'var(--border)' : 'var(--text-1)',
            color: running ? 'var(--text-3)' : 'var(--bg-1)',
            fontSize:15, fontWeight:700, cursor: running ? 'default' : 'pointer'}}>
          {running ? 'Ejecutando...' : 'Ejecutar todos los tests'}
        </button>
      </div>
    </div>
  );
}

function LoginScreen({ onLogin, onSmokeTest }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [showPass, setShowPass] = useState(false);
  const tapCount = React.useRef(0);
  const tapTimer = React.useRef(null);

  const handleLogoTap = () => {
    tapCount.current += 1;
    clearTimeout(tapTimer.current);
    if (tapCount.current >= 7) {
      tapCount.current = 0;
      onSmokeTest();
      return;
    }
    tapTimer.current = setTimeout(() => { tapCount.current = 0; }, 3000);
  };

  const locked = fsAuth.isLocked();
  const attempts = fsAuth.getAttempts();
  const remaining = MAX_ATTEMPTS - attempts.count;

  const handleLogin = async () => {
    if (fsAuth.isLocked()) return;
    if (!email.trim() || !password) { setError('Completá todos los campos'); return; }
    setLoading(true);
    setError('');
    try {
      const session = await fsAuth.signIn(email.trim(), password);
      fsAuth.save(session);
      fsAuth.clearAttempts();
      onLogin(session);
    } catch(e) {
      const attempt = fsAuth.addAttempt();
      const rem = MAX_ATTEMPTS - attempt.count;
      if (attempt.count >= MAX_ATTEMPTS) {
        setError(`Cuenta bloqueada por ${fsAuth.lockRemaining()} minuto${fsAuth.lockRemaining()!==1?'s':''}. Intentá más tarde.`);
      } else if (e.message.includes('EMAIL_NOT_FOUND') || e.message.includes('INVALID_PASSWORD') || e.message.includes('INVALID_LOGIN_CREDENTIALS')) {
        setError('Email o contraseña incorrectos.' + (rem > 0 ? ' ' + rem + ' intento' + (rem!==1?'s':'') + ' restante' + (rem!==1?'s':'') + '.' : ''));
      } else if (e.message.includes('TOO_MANY_ATTEMPTS')) {
        setError('Demasiados intentos. Esperá unos minutos.');
      } else {
        setError('Error de conexión. Revisá tu internet.');
      }
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{
      height:'100%', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      background:'var(--bg-1)', padding:32, maxWidth:480, margin:'0 auto'

          <line x1="50" y1="59" x2="58" y2="65" stroke="#3B8DD4" strokeWidth="2" strokeLinecap="round" opacity="0.6"/>
        </svg>
      </div>
      <p style={{fontSize:22, fontWeight:600, color:'var(--text-1)', marginBottom:4}}>Nalhuitad</p>
      <p style={{fontSize:14, color:'var(--text-2)', marginBottom:36}}>Hidroponía Chiloé</p>

            <p style={{fontSize:13, color:'#FF8A7A', lineHeight:1.5}}>

          style={{
            width:'100%', padding:'15px 0', borderRadius:12, border:'none',
            background: locked ? '#3A4A3A' : '#95DD47',
            color: locked ? '#888' : '#1F2918',
            fontSize:15, fontWeight:700,
            cursor: locked ? 'not-allowed' : 'pointer',
            display:'flex', alignItems:'center', justifyContent:'center', gap:8
          }}
        >
          {loading
            ? <div style={{width:18, height:18, border:'2.5px solid rgba(31,41,24,0.3)', borderTopColor:'#1F2918', borderRadius:'50%', animation:'spin 0.8s linear infinite'}} />
            : 'Ingresar'
          }
        </button>

        {!locked && attempts.count > 0 && remaining > 0 && (
          <p style={{fontSize:12, color:'var(--text-1)', textAlign:'center', marginTop:12, opacity:0.7}}>
            {remaining} intento{remaining!==1?'s':''} restante{remaining!==1?'s':''}
          </p>
        )}
      </div>
    </div>
  );
}

const NOTIF_CHECK_INTERVAL = 2 * 60 * 1000; // 2 minutos



// Escribir notificación en Firestore
async function writeNotification({ title, body, nivel, lotId, tipo }) {
  const notif = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,5),
    title, body, nivel: nivel || 'info',
    lotId: lotId || null,
    tipo: tipo || 'alerta',
    createdAt: new Date().toISOString(),
    unread: true,
  };
  try { await fsDb.set('notifications', notif.id, notif); } catch {}
  return notif;
}



// Detectar alertas en lotes y disparar notificaciones
async function checkLotAlerts(lots) {
  for (const lot of lots) {
    if (lot.stage === 'cosecha') continue;
    const alert = getLotAlert(lot);
    if (!alert) continue;
    if (alert.status === 'overdue' && Math.abs(alert.remaining) === 1) {
      const key = 'notified_overdue_' + lot.id;
      if (!localStorage.getItem(key)) {
        await writeNotification({
          title: lot.name + ' — Lote atrasado',
          body: 'El lote ' + lot.name + ' lleva ' + Math.abs(alert.remaining) + ' día de atraso en etapa ' + (lot.stage||''),
          nivel: 'rojo', lotId: lot.id, tipo: 'atraso'
        });
        localStorage.setItem(key, '1');
      }
    }
  }
}

function App() {
  const [session, setSession] = useState(() => fsAuth.load());
  const [showSmoke, setShowSmoke] = useState(false);
  // Leer ?lot=ID de la URL al abrir desde QR
  const urlLotId = (() => {
    try {
      const id = new URLSearchParams(window.location.search).get('lot');
      if (id) { try { sessionStorage.setItem('pendingLotId', id); } catch {} }
      return id || sessionStorage.getItem('pendingLotId');
    } catch { return null; }
  })();
  const [screen, setScreen] = useState('lotes');
  const [prevScreen, setPrevScreen] = useState(null);
  const [lots, setLots] = useState(() => {
    try { return JSON.parse(localStorage.getItem(LOTS_CACHE_KEY) || '[]'); } catch { return []; }
  });
  const [loading, setLoading] = useState(() => {
    try { return !localStorage.getItem(LOTS_CACHE_KEY); } catch { return true; }
  });
  const [error, setError] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [isFromCache, setIsFromCache] = useState(() => !!localStorage.getItem(LOTS_CACHE_KEY));
  const [lastSync, setLastSync] = useState(() => {
    try {
      const ts = localStorage.getItem(LAST_SYNC_KEY);
      return ts ? new Date(ts) : null;
    } catch { return null; }
  });
  const [toast, setToast] = useState(null);
  const [selectedLot, setSelectedLot] = useState(null);
  const [darkMode, setDarkMode] = useState(() => loadConfig().darkMode);
  const [online, setOnline] = useState(() => navigator.onLine);

  useEffect(() => {
    const goOnline  = () => { setOnline(true);  fetchLots(true); };
    const goOffline = () => setOnline(false);
    window.addEventListener('online',  goOnline);
    window.addEventListener('offline', goOffline);
    return () => {
      window.removeEventListener('online',  goOnline);
      window.removeEventListener('offline', goOffline);
    };
  }, [fetchLots]);

  useEffect(() => {
    document.body.classList.toggle('dark', darkMode);
    // Solo actualizamos darkMode — no tocamos plantsPer ni stageDays
    const cfg = loadConfig();
    if (cfg.darkMode !== darkMode) {
      cfg.darkMode = darkMode;
      saveConfig(cfg);
    }
    // Aplicar días estimados guardados al inicio
    Object.assign(STAGE_DAYS, cfg.stageDays);
  }, [darkMode]);

  const showToast = useCallback((msg, type = 'ok') => {
    setToast({ msg, type, key: Date.now() });
  }, []);

  const fetchLots = useCallback(async (silent = false) => {
    if (!silent) setSyncing(true);
    try {
      const data = await fsDb.list('lotes');
      data.sort((a, b) => {
        const stageA = STAGE_ORDER.indexOf(a.stage);
        const stageB = STAGE_ORDER.indexOf(b.stage);
        if (stageA !== stageB) return stageA - stageB;
        return (a.date || '').localeCompare(b.date || '');
      });
      setLots(data);
      try { localStorage.setItem(LOTS_CACHE_KEY, JSON.stringify(data)); } catch {}
      setError(false);
      const now = new Date();
      setLastSync(now);
      setIsFromCache(false);
      try { localStorage.setItem(LAST_SYNC_KEY, now.toISOString()); } catch {}
      // Abrir lote directo si viene de QR (?lot=ID)
      if (urlLotId && data.find(l => l.id === urlLotId)) {
        setSelectedLot(urlLotId);
        setScreen('lotes');
      }
    } catch(e) {
      if (e.message === AUTH_EXPIRED_ERROR) { setSession(null); return; }
      if (!silent) setError(true);
    } finally {
      setLoading(false);
      setSyncing(false);
    }
  }, []);

  useEffect(() => {
    fetchLots();
    const interval = setInterval(() => fetchLots(true), 15000);
    // Cargar config operacional compartida desde Firebase
    loadConfigRemote().then(remote => {
      if (!remote) return;
      const local = loadConfig();
      const merged = { ...local, plantsPer: remote.plantsPer, stageDays: remote.stageDays };
      saveConfig(merged);
      Object.assign(STAGE_DAYS, remote.stageDays);
    });
    return () => clearInterval(interval);
  }, [fetchLots]);



  // Verificar alertas de lotes cuando cambian

    if (lots.length > 0) checkLotAlerts(lots);
  }, [lots]);

  const saveLot = useCallback(async (lot) => {
    setLots(ls => [lot, ...ls.filter(l => l.id !== lot.id)]);

      showToast('Lote guardado ✓');
    } catch(e) {
      if (e.message === AUTH_EXPIRED_ERROR) { setSession(null); return; }
      showToast('Error al guardar. Revisá la conexión.', 'error');
    }
  }, [showToast]);

                    <div style={{width:7, height:7, borderRadius:'50%', background:'var(--green)'}} />
                  )}
                  <span style={{fontSize:11, color: isFromCache && !syncing ? 'var(--amber)' : 'var(--text-2)', fontWeight:500}}>
                    {syncing ? 'Sincronizando...' : isFromCache ? 'Datos del cache' : 'Sincronizado'}
                  </span>
                </div>
              </div>
              )}
            </div>
          </div>
        </div>
      )}

      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0, background:'var(--bg-1)'}}>
        <div key={screen + (selectedLot||'')} style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0, background:'var(--bg-1)'}}>
          {renderMain()}
        </div>
      </div>

      <NavBar active={screen} onChange={handleNav} alertCount={alertCount} />
      {/* FAB Notas */}
      {screen !== 'notas' && screen !== 'nuevo' && (
        <button onClick={() => handleNav('notas')} style={{
          position:'fixed', bottom:80, right:16, zIndex:90,
          width:48, height:48, borderRadius:'50%',
          background:'var(--bg-card)', border:'0.5px solid var(--border)',
          display:'flex', alignItems:'center', justifyContent:'center',
          cursor:'pointer', boxShadow:'0 2px 8px rgba(0,0,0,0.3)'
        }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-2)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
        </button>
      )}
    </div>
    </DarkContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
