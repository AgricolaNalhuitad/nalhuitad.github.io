// ── TOAST ──────────────────────────────────────────────
function Toast({ msg, type, onDone }) {
  const DURATION = 2800;
  const [progress, setProgress] = useState(100);

  useEffect(() => {
    const t = setTimeout(onDone, DURATION);
    const start = Date.now();
    const interval = setInterval(() => {
      const elapsed = Date.now() - start;
      const pct = Math.max(0, 100 - (elapsed / DURATION) * 100);
      setProgress(pct);
      if (pct === 0) clearInterval(interval);
    }, 30);
    return () => { clearTimeout(t); clearInterval(interval); };
  }, [onDone]);

  const isError = type === 'error';
  const isWarn  = type === 'warn';
  const bg      = isError ? '#2A1A1A' : isWarn ? '#2A1E14' : '#21252A';
  const accent  = isError ? '#E05C3A' : isWarn ? '#E07B2A' : '#95DD47';
  const border  = isError ? 'rgba(224,92,58,0.4)' : isWarn ? 'rgba(224,123,42,0.4)' : 'rgba(149,221,71,0.3)';

  const icon = isError
    ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={accent} strokeWidth="2.2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    : isWarn
    ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={accent} strokeWidth="2.2" strokeLinecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    : <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={accent} strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>;

  return (
    <div
      onClick={onDone}
      style={{
        position:'fixed', bottom:90, left:'50%', transform:'translateX(-50%)',
        zIndex:300, maxWidth:340, width:'calc(100% - 32px)',
        background: bg, borderRadius:14, overflow:'hidden',
        border:'0.5px solid var(--border)',
        animation:'toastIn 0.3s cubic-bezier(0.34,1.2,0.64,1) forwards',
        cursor:'pointer',
      }}
    >
      <div style={{display:'flex', alignItems:'center', gap:10, padding:'14px 16px'}}>
        <span style={{flexShrink:0}}>{icon}</span>
        <span style={{flex:1, fontSize:14, fontWeight:500, color:'var(--text-1)', lineHeight:1.4}}>{msg}</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" strokeWidth="2.2" strokeLinecap="round" style={{flexShrink:0}}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
      <div style={{height:3, background:'rgba(255,255,255,0.08)'}}>
        <div style={{
          height:'100%', background: accent,
          width:`${progress}%`, transition:'width 0.03s linear'
        }} />
      </div>
    </div>
  );
}

// ── LOGIN SCREEN ──────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [showPass, setShowPass] = useState(false);

  const locked = fsAuth.isLocked();
  const attempts = fsAuth.getAttempts();
  const remaining = MAX_ATTEMPTS - attempts.count;

  const handleLogin = async () => {
    if (fsAuth.isLocked()) return;
    if (!email.trim() || !password) { setError('Completá todos los campos'); return; }
    setLoading(true);
    setError('');
    try {
      const session = await fsAuth.signIn(email.trim(), password);
      fsAuth.save(session);
      fsAuth.clearAttempts();
      onLogin(session);
    } catch(e) {
      const attempt = fsAuth.addAttempt();
      const rem = MAX_ATTEMPTS - attempt.count;
      if (attempt.count >= MAX_ATTEMPTS) {
        setError(`Cuenta bloqueada por ${fsAuth.lockRemaining()} minuto${fsAuth.lockRemaining()!==1?'s':''}. Intentá más tarde.`);
      } else if (e.message.includes('EMAIL_NOT_FOUND') || e.message.includes('INVALID_PASSWORD') || e.message.includes('INVALID_LOGIN_CREDENTIALS')) {
        setError('Email o contraseña incorrectos.' + (rem > 0 ? ' ' + rem + ' intento' + (rem!==1?'s':'') + ' restante' + (rem!==1?'s':'') + '.' : ''));
      } else if (e.message.includes('TOO_MANY_ATTEMPTS')) {
        setError('Demasiados intentos. Esperá unos minutos.');
      } else {
        setError('Error de conexión. Revisá tu internet.');
      }
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{
      height:'100%', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      background:'var(--bg-1)', padding:32, maxWidth:480, margin:'0 auto'
    }}>
      <div style={{width:76, height:76, borderRadius:22, background:'var(--bg-card)', border:'0.5px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:16}}>
        <svg width="44" height="44" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 18 C50 18 30 36 30 52 C30 63.6 39.0 73 50 73 C61.0 73 70 63.6 70 52 C70 36 50 18 50 18Z" fill="none" stroke="#3B8DD4" strokeWidth="3.5"/>
          <path d="M50 38 C50 38 40 35 37 29 C42 24 50 28 50 38Z" fill="#4ADE80"/>
          <path d="M50 38 C50 38 60 33 63 27 C58 22 50 28 50 38Z" fill="#4ADE80" opacity="0.75"/>
          <line x1="50" y1="38" x2="50" y2="65" stroke="#3B8DD4" strokeWidth="3" strokeLinecap="round"/>
          <line x1="50" y1="52" x2="43" y2="59" stroke="#3B8DD4" strokeWidth="2" strokeLinecap="round" opacity="0.6"/>
          <line x1="50" y1="59" x2="58" y2="65" stroke="#3B8DD4" strokeWidth="2" strokeLinecap="round" opacity="0.6"/>
        </svg>
      </div>
      <p style={{fontSize:22, fontWeight:600, color:'var(--text-1)', marginBottom:4}}>Nalhuitad</p>
      <p style={{fontSize:14, color:'var(--text-2)', marginBottom:36}}>Hidroponía Chiloé</p>

      <div style={{width:'100%', maxWidth:360}}>
        <div style={{marginBottom:16}}>
          <p style={{fontSize:13, fontWeight:500, color:'var(--text-2)', marginBottom:7}}>Email</p>
          <input
            id="login-email"
            name="email"
            type="email" inputMode="email" autoCapitalize="none"
            autoComplete="email"
            placeholder="tu@email.com"
            value={email}
            onChange={e => { setEmail(e.target.value); setError(''); }}
            onKeyDown={e => e.key === 'Enter' && handleLogin()}
            disabled={locked || loading}
            style={{

    </div>
  );
}

// ── SISTEMA DE NOTIFICACIONES ─────────────────────────
const NOTIF_CHECK_INTERVAL = 2 * 60 * 1000; // 2 minutos

async function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  try {
    const reg = await navigator.serviceWorker.register('/nalhuitad.github.io/sw.js', { scope: '/nalhuitad.github.io/' });
    // Registrar periodic sync si disponible
    if ('periodicSync' in reg) {
      try {
        await reg.periodicSync.register('nalhuitad-notif', { minInterval: 2 * 60 * 1000 });
      } catch {}
    }
    return reg;
  } catch(e) { console.warn('[SW] No se pudo registrar:', e); }
}

async function requestNotifPermission() {
  if (!('Notification' in window)) return 'unsupported';
  if (Notification.permission === 'granted') return 'granted';
  if (Notification.permission === 'denied') return 'denied';
  const result = await Notification.requestPermission();
  return result;
}

// Guardar token en IndexedDB para que el SW pueda leerlo
async function saveTokenForSW(idToken) {
  return new Promise(resolve => {
    const req = indexedDB.open('nalhuitad_idb', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('kv')) db.createObjectStore('kv');
    };
    req.onsuccess = e => {
      const db = e.target.result;
      const tx = db.transaction('kv', 'readwrite');
      tx.objectStore('kv').put(idToken, 'auth_token');
      tx.oncomplete = resolve;
      tx.onerror = resolve;
    };
    req.onerror = resolve;
  });
}

// Escribir notificación en Firestore
async function writeNotification({ title, body, nivel, lotId, tipo }) {
  const notif = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,5),
    title, body, nivel: nivel || 'info',
    lotId: lotId || null,
    tipo: tipo || 'alerta',
    createdAt: new Date().toISOString(),
    unread: true,
  };
  try { await fsDb.set('notifications', notif.id, notif); } catch {}
  return notif;
}

// Disparar check en el SW
function triggerSWCheck() {
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.ready.then(reg => {
    reg.active?.postMessage({ type: 'CHECK_NOTIFICATIONS' });
  });
}

// Detectar alertas en lotes y disparar notificaciones
async function checkLotAlerts(lots) {
  if (Notification.permission !== 'granted') return;
  for (const lot of lots) {
    if (lot.stage === 'cosecha') continue;
    const alert = getLotAlert(lot);
    if (!alert) continue;
    if (alert.status === 'overdue' && Math.abs(alert.remaining) === 1) {
      // Solo notifica en el primer día de atraso (para no spamear)
      const key = 'notified_overdue_' + lot.id;
      if (!localStorage.getItem(key)) {
        await writeNotification({
          title: lot.name + ' — Lote atrasado',
          body: 'El lote ' + lot.name + ' lleva ' + Math.abs(alert.remaining) + ' día de atraso en etapa ' + (lot.stage||''),
          nivel: 'rojo', lotId: lot.id, tipo: 'atraso'
        });
        localStorage.setItem(key, '1');
        triggerSWCheck();
      }
    }
  }
}

  });

    try { return !localStorage.getItem(LOTS_CACHE_KEY); } catch { return true; }
  });
  const [error, setError] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [isFromCache, setIsFromCache] = useState(() => !!localStorage.getItem(LOTS_CACHE_KEY));
  const [lastSync, setLastSync] = useState(() => {
    try {
      const ts = localStorage.getItem(LAST_SYNC_KEY);
      return ts ? new Date(ts) : null;
    } catch { return null; }
  });
  const [toast, setToast] = useState(null);
  const [selectedLot, setSelectedLot] = useState(null);
  const [darkMode, setDarkMode] = useState(() => loadConfig().darkMode);
  const [online, setOnline] = useState(() => navigator.onLine);

  useEffect(() => {
    const goOnline  = () => { setOnline(true);  fetchLots(true); };
    const goOffline = () => setOnline(false);
    window.addEventListener('online',  goOnline);
    window.addEventListener('offline', goOffline);
    return () => {
      window.removeEventListener('online',  goOnline);
      window.removeEventListener('offline', goOffline);
    };
  }, [fetchLots]);

  useEffect(() => {

        const stageA = STAGE_ORDER.indexOf(a.stage);
        const stageB = STAGE_ORDER.indexOf(b.stage);
        if (stageA !== stageB) return stageA - stageB;
        return (a.date || '').localeCompare(b.date || '');
      });
      setLots(data);
      try { localStorage.setItem(LOTS_CACHE_KEY, JSON.stringify(data)); } catch {}
      setError(false);
      const now = new Date();
      setLastSync(now);
      setIsFromCache(false);
      try { localStorage.setItem(LAST_SYNC_KEY, now.toISOString()); } catch {}

      if (e.message === AUTH_EXPIRED_ERROR) { setSession(null); return; }
      if (!silent) setError(true);
    } finally {
      setLoading(false);
      setSyncing(false);
    }
  }, []);

    // Cargar config operacional compartida desde Firebase

    <DarkContext.Provider value={darkMode}>
    <div style={{height:'100%', display:'flex', flexDirection:'column', background:appBg, maxWidth:480, margin:'0 auto', position:'relative'}}>

      {toast && <Toast key={toast.key} msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}

      {!online && (
        <div style={{
          background:'var(--amber)', color:'#0F1219',
          padding:'9px 16px', textAlign:'center',
          fontSize:13, fontWeight:500,
          display:'flex', alignItems:'center', justifyContent:'center', gap:8,
          zIndex:150, flexShrink:0,
        }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" style={{flexShrink:0}}>
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
            <line x1="12" y1="20" x2="12.01" y2="20"/>
          </svg>
          <span>
            {'Sin conexión · ' + (lastSync
              ? 'Última sync ' + lastSync.toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'})
              : 'Sin sincronizar')}
          </span>
        </div>
      )}

      {!selectedLot && (
        <div style={{
          padding:'max(48px, calc(env(safe-area-inset-top) + 16px)) 20px 16px',
          background:headerBg, borderBottom:`0.5px solid ${headerBorder}`
        }}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
            <div>
              <p style={{fontSize: screen === 'lotes' ? 26 : 22, fontWeight:600, color:titleColor, lineHeight:1.2}}>
                {screenTitle[screen]}
              </p>
              {screen === 'lotes' && lots.filter(l => l.stage !== 'cosecha').length > 0 && (
                <p style={{fontSize:13, color:subtitleColor, marginTop:4}}>
                  {lots.filter(l => l.stage !== 'cosecha').length} lote{lots.filter(l=>l.stage!=='cosecha').length!==1?'s':''} activo{lots.filter(l=>l.stage!=='cosecha').length!==1?'s':''}
                </p>
              )}
            </div>
            <div style={{display:'flex', alignItems:'center', gap:10, marginTop:4}}>
              {/* Campana de Alertas */}
              <button
                onClick={() => handleNav('alertas')}
                style={{position:'relative', background:'none', border:'none', cursor:'pointer', padding:6, borderRadius:10}}
              >
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={alertCount > 0 ? 'var(--red)' : 'var(--text-3)'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                  <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                {alertCount > 0 && (
                  <div style={{
                    position:'absolute', top:2, right:2,
                    width:16, height:16, borderRadius:8,
                    background:'var(--red)',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize:9, fontWeight:700, color:'#fff'
                  }}>{alertCount}</div>
                )}
              </button>
              {screen === 'lotes' && (
              <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:3}}>
                {lastSync && (
                  <span style={{fontSize:12, fontWeight:600, color: isFromCache ? 'var(--amber)' : titleColor, fontFamily:'DM Mono, monospace'}}>
                    {lastSync.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'})}
                  </span>
                )}
                {lastSync && (
                  <span style={{fontSize:11, color:subtitleColor}}>
                    {lastSync.toLocaleDateString('es-AR', {day:'2-digit', month:'short', year:'numeric'})}
                  </span>
                )}
                <div style={{display:'flex', alignItems:'center', gap:4, marginTop:2}}>
                  {syncing ? (
                    <div style={{width:7, height:7, border:'1.5px solid var(--border)', borderTopColor:'var(--green)', borderRadius:'50%', animation:'spin 0.8s linear infinite'}} />
                  ) : isFromCache ? (
                    <div style={{width:7, height:7, borderRadius:'50%', background:'var(--amber)'}} />
                  ) : (
                    <div style={{width:7, height:7, borderRadius:'50%', background:'var(--green)'}} />
                  )}
                  <span style={{fontSize:11, color: isFromCache && !syncing ? 'var(--amber)' : 'var(--text-2)', fontWeight:500}}>
                    {syncing ? 'Sincronizando...' : isFromCache ? 'Datos del cache' : 'Sincronizado'}
                  </span>
                </div>
              </div>
              )}
            </div>
          </div>
        </div>
      )}

      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0}}>
        <div key={screen + (selectedLot||'')} className="fade-in" style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0}}>
          {renderMain()}
        </div>
      </div>

      <NavBar active={screen} onChange={handleNav} alertCount={alertCount} />
    </div>
    </DarkContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
