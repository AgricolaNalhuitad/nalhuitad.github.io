// ── FIRESTORE REST API ────────────────────────────────
const FS_PROJECT = 'nalhuitad-d6758';
const FS_KEY     = 'AIzaSyCHlsJDU0o7JsOvY4mgr5lVhiDOEok3C5w';
const FS_BASE    = `https://firestore.googleapis.com/v1/projects/${FS_PROJECT}/databases/(default)/documents`;

function toFSValue(v) {
  if (v === null || v === undefined) return { nullValue: null };
  if (typeof v === 'boolean') return { booleanValue: v };
  if (typeof v === 'number') return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
  if (typeof v === 'string') return { stringValue: v };
  if (Array.isArray(v)) return { arrayValue: { values: v.map(toFSValue) } };
  if (typeof v === 'object') return { mapValue: { fields: toFSFields(v) } };
}
function toFSFields(obj) {
  const f = {};
  for (const [k, v] of Object.entries(obj)) f[k] = toFSValue(v);
  return f;
}
function fromFSValue(v) {
  if (!v) return null;
  if ('stringValue'  in v) return v.stringValue;
  if ('integerValue' in v) return parseInt(v.integerValue);
  if ('doubleValue'  in v) return v.doubleValue;
  if ('booleanValue' in v) return v.booleanValue;
  if ('nullValue'    in v) return null;
  if ('arrayValue'   in v) return (v.arrayValue.values || []).map(fromFSValue);
  if ('mapValue'     in v) return fromFSDoc({ fields: v.mapValue.fields || {} });
  return null;
}
function fromFSDoc(doc) {
  const obj = {};
  for (const [k, v] of Object.entries(doc.fields || {})) obj[k] = fromFSValue(v);
  if (doc.name) obj.id = doc.name.split('/').pop();
  return obj;
}

const AUTH_EXPIRED_ERROR = 'AUTH_EXPIRED';

const fsDb = {
  getToken() {
    try {
      const s = JSON.parse(localStorage.getItem('hidro_auth_v1') || 'null');
      return s?.idToken || null;
    } catch { return null; }
  },
  headers() {
    const token = this.getToken();
    const h = { 'Content-Type': 'application/json' };
    if (token) h['Authorization'] = 'Bearer ' + token;
    return h;
  },
  async ensureFreshToken(r) {
    if (r.status !== 401 && r.status !== 403) return true;
    const newToken = await fsAuth.refreshToken();
    if (!newToken) { fsAuth.clear(); throw new Error(AUTH_EXPIRED_ERROR); }
    return false; // necesita retry con nuevo token
  },
  async list(col) {
    let r = await fetch(FS_BASE + '/' + col + '?key=' + FS_KEY, { headers: this.headers() });
    const ok = await this.ensureFreshToken(r);
    if (!ok) r = await fetch(FS_BASE + '/' + col + '?key=' + FS_KEY, { headers: this.headers() });
    const j = await r.json();
    return (j.documents || []).map(fromFSDoc);
  },
  async set(col, id, data) {
    const { id: _id, ...rest } = data;
    const body = JSON.stringify({ fields: toFSFields(rest) });
    let r = await fetch(FS_BASE + '/' + col + '/' + id + '?key=' + FS_KEY, {
      method: 'PATCH', headers: this.headers(), body
    });
    const ok = await this.ensureFreshToken(r);
    if (!ok) r = await fetch(FS_BASE + '/' + col + '/' + id + '?key=' + FS_KEY, {
      method: 'PATCH', headers: this.headers(), body
    });
  },
  async del(col, id) {
    let r = await fetch(FS_BASE + '/' + col + '/' + id + '?key=' + FS_KEY, {
      method: 'DELETE', headers: this.headers()
    });
    const ok = await this.ensureFreshToken(r);
    if (!ok) await fetch(FS_BASE + '/' + col + '/' + id + '?key=' + FS_KEY, {
      method: 'DELETE', headers: this.headers()
    });
  }
};

// ── FIREBASE AUTH REST API ────────────────────────────
const AUTH_KEY = 'AIzaSyC246p0MSQkLZwXXDj8ibJox940k6HHG5o';
const AUTH_URL     = `https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${AUTH_KEY}`;
const REFRESH_URL  = `https://securetoken.googleapis.com/v1/token?key=${AUTH_KEY}`;
const AUTH_STORE_KEY = 'hidro_auth_v1';
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 15 * 60 * 1000;

const fsAuth = {
  async signIn(email, password) {
    const r = await fetch(AUTH_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, returnSecureToken: true })
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j?.error?.message || 'ERROR');
    return {
      idToken: j.idToken,
      refreshToken: j.refreshToken,
      email: j.email,
      expiresAt: Date.now() + (parseInt(j.expiresIn) * 1000),
    };
  },
  async refreshToken() {
    try {
      const s = this.load();
      if (!s?.refreshToken) return null;
      const r = await fetch(REFRESH_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `grant_type=refresh_token&refresh_token=${s.refreshToken}`
      });
      const j = await r.json();
      if (!r.ok) return null;
      const updated = {
        ...s,
        idToken: j.id_token,
        refreshToken: j.refresh_token,
        expiresAt: Date.now() + (parseInt(j.expires_in) * 1000),
      };
      this.save(updated);
      return updated.idToken;
    } catch { return null; }
  },
  save(session) {
    try { localStorage.setItem(AUTH_STORE_KEY, JSON.stringify({ ...session, ts: Date.now() })); } catch {}
  },
  load() {
    try {
      const s = JSON.parse(localStorage.getItem(AUTH_STORE_KEY) || 'null');
      if (!s) return null;
      if (Date.now() - s.ts > 30 * 24 * 60 * 60 * 1000) { this.clear(); return null; }
      return s;
    } catch { return null; }
  },
  clear() { try { localStorage.removeItem(AUTH_STORE_KEY); } catch {} },
  getAttempts() {
    try { return JSON.parse(localStorage.getItem('hidro_attempts') || '{"count":0,"ts":0}'); } catch { return {count:0,ts:0}; }
  },
  addAttempt() {
    const a = this.getAttempts();
    const newA = { count: a.count + 1, ts: Date.now() };
    try { localStorage.setItem('hidro_attempts', JSON.stringify(newA)); } catch {}
    return newA;
  },
  clearAttempts() { try { localStorage.removeItem('hidro_attempts'); } catch {} },
  isLocked() {
    const a = this.getAttempts();
    if (a.count < MAX_ATTEMPTS) return false;
    if (Date.now() - a.ts < LOCKOUT_MS) return true;
    this.clearAttempts();
    return false;
  },
  lockRemaining() {
    const a = this.getAttempts();
    return Math.ceil((LOCKOUT_MS - (Date.now() - a.ts)) / 60000);
  }
};


const { useState, useEffect, useCallback, useContext, createContext, useMemo } = React;

// ── DARK MODE CONTEXT ─────────────────────────────────

// ── COLORS (Opus palette) ─────────────────────────────
const COLORS = {
  bg1:'#0F1219', bg2:'#1A1F2E', bgCard:'#1E2538', bgCardH:'#242D44', bgInput:'#1A2030',
  text1:'#F0F2F5', text2:'#8A9BBF', text3:'#556180',

  stageA:'#C4873B', stageT:'#3B8DD4', stageR:'#B83D7A', stageC:'#7C4DDB',

// ── HARVEST PROJECTION (Opus algorithm) ──────────────
const CAPACITY_PER_TRIP = 210;
const DAYS_BETWEEN_TRIPS = 2;

const INV_A = {
  nombre: 'Invernadero A',
  tipo: 'Raíz flotante',

    { id:1, nombre:'Piscina 1', m2:12, capacidad:288 },

};
const CAPACIDAD_DEFINITIVOS = INV_A.capacidadTotal + INV_B.capacidadTotal; // 3756

function projectHarvests(lot) {
  const raleoEntry = (lot.stageHistory || []).find(function(h) { return h.stage === 'raleo'; });
  if (!raleoEntry) return [];
  const raleoDate = new Date(raleoEntry.date + 'T12:00:00');
  const season = getSeason();
  const daysToHarvest = STAGE_DAYS.raleo[season] || 35;
  const harvestStart = new Date(raleoDate);
  harvestStart.setDate(harvestStart.getDate() + daysToHarvest);
  const totalPlants = lot.currentQuantity ?? toPlantCount(lot.quantity);
  if (totalPlants <= 0) return [];
  const tripsNeeded = Math.ceil(totalPlants / CAPACITY_PER_TRIP);
  const events = [];
  let remaining = totalPlants;
  for (let i = 0; i < tripsNeeded; i++) {
    const eventDate = new Date(harvestStart);
    eventDate.setDate(eventDate.getDate() + (i * DAYS_BETWEEN_TRIPS));
    const batch = Math.min(remaining, CAPACITY_PER_TRIP);
    remaining -= batch;
    events.push({ date: eventDate, plants: batch, tripNumber: i + 1, totalTrips: tripsNeeded, lotName: lot.name, variety: lot.variety, lotId: lot.id, proyectado: true });
  }
  return events;
}

function getMonthProjection(lots, year, month) {
  const monthStart = new Date(year, month, 1);
  const monthEnd   = new Date(year, month + 1, 0, 23, 59, 59);
  const allEvents  = [];
  lots.filter(function(l) { return l.stage === 'raleo'; }).forEach(function(lot) {
    projectHarvests(lot).forEach(function(h) {
      if (h.date >= monthStart && h.date <= monthEnd) allEvents.push(h);
    });
  });
  // Add real cosechas as confirmed events
  lots.forEach(function(lot) {
    (lot.cosechas || []).forEach(function(c) {
      const d = new Date(c.date + 'T12:00:00');
      if (d >= monthStart && d <= monthEnd) {
        allEvents.push({ date: d, plants: c.cosechadas || 0, lotName: lot.name, variety: lot.variety, lotId: lot.id, proyectado: false });
      }
    });
  });
  allEvents.sort(function(a, b) { return a.date - b.date; });
  return allEvents;
}

function toPlantCount(q) {
  try { return parseInt(q) || 0; } catch { return 0; }
}
const getPlantsPer = () => {
  try {
    const cfg = JSON.parse(localStorage.getItem('hidro_config_v1') || 'null');
    return (cfg?.plantsPer && cfg.plantsPer > 0) ? cfg.plantsPer : PLANTS_PER_TRAY_DEFAULT;
  } catch { return PLANTS_PER_TRAY_DEFAULT; }
};
const PLANTS_PER_TRAY = PLANTS_PER_TRAY_DEFAULT;
const toPlants = (trays) => (trays ?? 0) * getPlantsPer();

function daysSince(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.floor((today - date) / 86400000);
}

function formatDate(dateStr) {
  const [y, m, d] = dateStr.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

// Estaciones hemisferio sur
function getSeason(dateStr) {
  const m = new Date(dateStr).getMonth() + 1;
  if ([12,1,2].includes(m)) return 'verano';
  if ([3,4,5].includes(m)) return 'otono';
  if ([6,7,8].includes(m)) return 'invierno';
  return 'primavera';
}

const STAGE_DAYS = {
  almacigo:    { verano:28, otono:32, invierno:35, primavera:30 },
  transplante: { verano:15, otono:15, invierno:15, primavera:15 },
  raleo:       { verano:22, otono:35, invierno:50, primavera:28 },
};

function getLotAlert(lot) {
  if (lot.stage === 'cosecha') return null;
  const expected = STAGE_DAYS[lot.stage];
  if (!expected) return null;
  const stageEntry = lot.stageHistory[lot.stageHistory.length - 1];
  const season = getSeason(stageEntry.date);
  const maxDays = expected[season];
  const days = daysSince(stageEntry.date);
  const remaining = maxDays - days;
  if (remaining < 0)  return { status:'overdue',  remaining, maxDays, days, season };
  if (remaining <= 3) return { status:'warning',  remaining, maxDays, days, season };
  return { status:'ok', remaining, maxDays, days, season };
}

};

const DIAS_SEMANA_CORTO = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

function useWeather() {
  const [weather, setWeather] = useState(null);
  const [wError, setWError] = useState(false);
  useEffect(() => {
    const fetch7 = async () => {
      try {
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=-42.60&longitude=-73.77' +
          '&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,wind_direction_10m,weathercode,precipitation' +
          '&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,weathercode' +
          '&timezone=America%2FSantiago&forecast_days=7';
        const r = await fetch(url);
        const j = await r.json();
        setWeather(j);
      } catch { setWError(true); }
    };
    fetch7();
    const interval = setInterval(fetch7, 30 * 60 * 1000);
    return () => clearInterval(interval);
  }, []);
  return { weather, wError };
}

function getWeatherAlert(weather) {
  if (!weather) return null;
  const d = weather.daily;
  const c = weather.current;
  const precHoy = d.precipitation_sum ? d.precipitation_sum[0] : 0;
  const precManana = d.precipitation_sum ? d.precipitation_sum[1] : 0;
  const probHoy = d.precipitation_probability_max ? d.precipitation_probability_max[0] : 0;
  const viento = c.wind_speed_10m || 0;

  if (precHoy >= 5 || probHoy >= 70) {
    return {
      tipo: 'lluvia_fuerte',
      nivel: 'rojo',
      msg: 'Lluvia intensa prevista · ' + precHoy.toFixed(1) + 'mm hoy',
      accion: 'Evitar transporte a Castro. Reprogramar cosechas para mañana si hay ventana seca.',
    };
  }
  if (precHoy >= 2 || probHoy >= 50) {
    return {
      tipo: 'lluvia_leve',
      nivel: 'ambar',
      msg: 'Lluvia leve prevista · ' + precHoy.toFixed(1) + 'mm hoy',
      accion: 'Cosechar en ventana de la mañana si no llueve. Verificar antes de salir a Castro.',
    };
  }
  if (viento >= 40) {
    return {
      tipo: 'viento',
      nivel: 'ambar',
      msg: 'Viento fuerte · ' + Math.round(viento) + ' km/h',
      accion: 'Revisar estructura de invernaderos. Asegurar cubiertas.',
    };
  }
  if (precManana >= 5) {
    return {
      tipo: 'lluvia_manana',
      nivel: 'info',
      msg: 'Lluvia mañana · ' + precManana.toFixed(1) + 'mm previstos',
      accion: 'Buen día para cosechar hoy si hay lotes listos.',
    };
  }
  return null;
}

function getMaxDays(stage, stageDate) {
  const expected = STAGE_DAYS[stage];
  if (!expected) return null;
  return expected[getSeason(stageDate)];
}

// Calcula la fecha estimada de cosecha sumando días restantes de cada etapa
function getEstimatedHarvestDate(lot) {
  if (lot.stage === 'cosecha') return null;
  const stageOrder = ['almacigo', 'transplante', 'raleo'];
  const currentIdx = stageOrder.indexOf(lot.stage);
  if (currentIdx === -1) return null;

  const stageEntry = lot.stageHistory[lot.stageHistory.length - 1];
  const daysInCurrent = daysSince(stageEntry.date);
  const maxCurrent = STAGE_DAYS[lot.stage][getSeason(stageEntry.date)] || 30;
  let daysLeft = Math.max(0, maxCurrent - daysInCurrent);

  // Sumar días de etapas siguientes (usando temporada de hoy)
  const today = todayISO();
  for (let i = currentIdx + 1; i < stageOrder.length; i++) {
    const s = stageOrder[i];
    daysLeft += STAGE_DAYS[s][getSeason(today)] || 30;
  }

  const result = new Date();
  result.setDate(result.getDate() + daysLeft);
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return { date: result, label: result.getDate() + ' ' + months[result.getMonth()], daysLeft };
}

            value={qty}
            onChange={e => { setQty(e.target.value); setError(''); }}
            style={inputStyle(error)}
            placeholder={`Máx. ${currentQty}`}
          />
        </Field>

        {qty && !isNaN(qty) && parseInt(qty) > 0 && parseInt(qty) <= currentQty && (
          <div style={{
            background:'var(--bg-card-h)', border:'0.5px solid var(--border)',
            borderRadius:12, padding:'12px 16px', marginBottom:16,
            display:'flex', gap:0

            <MermaItem label="Llegan" value={arrived} color={nextInfo.color} />
            <MermaItem
              label="Merma"
              value={`${merma} (${mermaPercent}%)`}
              color={mermaPercent > 20 ? '#C0392B' : mermaPercent > 10 ? '#E07B2A' : '#276F50'}
            />

        )}

        <Field label="Observaciones del movimiento (opcional)">

        {confirming ? (
          <ConfirmBar
            message={`Avanzar ${arrived.toLocaleString()} plantas a ${nextInfo.label}. Esta acción no se puede deshacer.`}

          <button onClick={handleConfirm} style={{

          width:'100%', padding:'12px 0', borderRadius:12, border:'none',

        </button>
      </div>
    </div>
  );
}

function MermaItem({ label, value, color }) {
  return (
    <div style={{flex:1, textAlign:'center'}}>
      <p style={{fontSize:12, color:'var(--text-2)', marginBottom:4}}>{label}</p>
      <p style={{fontSize:14, fontWeight:600, color, fontFamily:'DM Mono, monospace'}}>{value}</p>
    </div>
  );
}


// ── MODAL TRANSPLANTE PARCIAL ─────────────────────────
function TransplanteModal({ lot, onClose, onConfirm, esTotal: esTotalProp }) {
  const currentQty = lot.currentQuantity ?? toPlants(lot.quantity);
  const yaTransplantadas = (lot.transplantes || []).reduce((a,t) => a+(t.transplantadas||0), 0);
  const esTotal = esTotalProp === true;
  const [date, setDate] = useState(todayISO());
  const [transplantadas, setTransplantadas] = useState(esTotal ? String(Math.max(0, currentQty - yaTransplantadas)) : '');
  const [desechadas, setDesechadas] = useState('');
  const [notas, setNotas] = useState('');
  const [errors, setErrors] = useState({});
  const [confirming, setConfirming] = useState(false);
  const dm = useDarkMode();
  const totalT = parseInt(transplantadas) || 0;
  const totalD = parseInt(desechadas) || 0;
  const disponibles = currentQty - yaTransplantadas;
  const quedan = disponibles - totalT - totalD;
  const completaTotal = esTotal || (totalT + totalD >= disponibles);

  const validate = () => {
    const e = {};
    if (!transplantadas || isNaN(transplantadas) || totalT <= 0) e.transplantadas = 'Ingresá una cantidad válida';
    if (totalT + totalD > disponibles) e.transplantadas = `No puede superar las ${disponibles.toLocaleString()} disponibles`;
    return e;
  };

  const handleConfirm = () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    setConfirming(true);
  };

  return (
    <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:100}}
      onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal-in" style={{background:'var(--bg-card)', borderRadius:'20px 20px 0 0', width:'100%', maxWidth:480, padding:'20px 20px 36px', maxHeight:'90vh', overflowY:'auto'}}>
        <div style={{width:36, height:4, background: 'var(--border)', borderRadius:2, margin:'0 auto 20px'}} />
        <p style={{fontSize:17, fontWeight:600, color: 'var(--text-1)', marginBottom:4}}>
          {esTotal ? 'Transplante total — pasar a Raleo' : 'Registrar transplante parcial'}
        </p>
        <p style={{fontSize:13, color:'var(--text-2)', marginBottom:20}}>
          Disponibles: <strong style={{color: 'var(--text-1)'}}>{disponibles.toLocaleString()} plantas</strong>
          {yaTransplantadas > 0 && <span style={{color:'var(--text-2)'}}> · {yaTransplantadas.toLocaleString()} ya transplantadas</span>}
        </p>
        <Field label="Fecha del transplante">
          <input id="tp-fecha" name="tp-fecha" type="date" value={date} onChange={e => setDate(e.target.value)} style={inputStyle()} />
        </Field>
        <Field label="Plantas transplantadas" error={errors.transplantadas}>
          <input id="tp-plantas" name="tp-plantas" type="number" inputMode="numeric" value={transplantadas}
            onChange={e => { setTransplantadas(e.target.value); setErrors({}); }}
            placeholder={`Máx. ${disponibles.toLocaleString()}`} style={inputStyle(errors.transplantadas)} />
        </Field>
        <Field label="Plantas desechadas (merma)">
          <input id="tp-desechadas" name="tp-desechadas" type="number" inputMode="numeric" value={desechadas}
            onChange={e => setDesechadas(e.target.value)} placeholder="0" style={inputStyle()} />
        </Field>
        {totalT > 0 && (
          <div style={{background:'var(--bg-card-h)', border:'0.5px solid var(--border)', borderRadius:12, padding:'12px 16px', marginBottom:16, display:'flex', gap:0}}>
            <MermaItem label="Transplantadas" value={totalT.toLocaleString()} color={STAGES.transplante.color} />
            {totalD > 0 && <MermaItem label="Desechadas" value={totalD.toLocaleString()} color="#E07B2A" />}
            <MermaItem label="Quedan" value={Math.max(0, quedan).toLocaleString()} color={quedan <= 0 ? 'var(--stage-c)' : 'var(--text-1)'} />
          </div>
        )}
        {completaTotal && totalT > 0 && (
          <div style={{background:'var(--bg-card-h)', borderRadius:8, padding:'8px 12px', marginBottom:16, display:'flex', alignItems:'center', gap:8}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6B3FA0" strokeWidth="2" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span style={{fontSize:13, color:'var(--stage-c)', fontWeight:500}}>Transplante completo → el lote pasa a Raleo</span>
          </div>
        )}
        <Field label="Notas (opcional)">
          <textarea id="tp-notas" name="tp-notas" value={notas} onChange={e => setNotas(e.target.value)}
            rows={2} placeholder="Ej: piscina norte, tubos 1 al 5..." style={{...inputStyle(), resize:'none', lineHeight:1.6}} />
        </Field>
        {confirming ? (
          <ConfirmBar
            message={'Registrar ' + totalT.toLocaleString() + ' plantas transplantadas' + (totalD > 0 ? ' y ' + totalD.toLocaleString() + ' desechadas' : '') + '.' + (completaTotal ? ' El lote avanzará a Raleo.' : '')}
            confirmLabel={completaTotal ? 'Sí, completar transplante' : 'Sí, registrar'}
            onConfirm={() => onConfirm({ date, transplantadas: totalT, desechadas: totalD, notas: notas.trim(), esTotal: completaTotal })}
            onCancel={() => setConfirming(false)}
          />
        ) : (
          <button onClick={handleConfirm} style={{width:'100%', padding:'14px 0', borderRadius:12, border:'none', background: STAGES.transplante.color, color:'#fff', fontSize:15, fontWeight:600, cursor:'pointer', marginTop:4}}>
            {esTotal ? 'Confirmar transplante total' : 'Registrar transplante'}

        )}

// ── MODAL COSECHA PARCIAL ─────────────────────────────
function CosechaModal({ lot, onClose, onConfirm, editData, editMode }) {
  const currentQty = lot.currentQuantity ?? toPlants(lot.quantity);
  const [date, setDate] = useState(editData?.date || todayISO());
  const [cosechadas, setCosechadas] = useState(editData ? String(editData.cosechadas) : '');
  const [descartadas, setDescartadas] = useState(editData ? String(editData.descartadas || '') : '');
  const [notes, setNotes] = useState(editData?.notes || '');
  const [errors, setErrors] = useState({});

  // En modo edición, el máximo disponible incluye lo que tenía esta cosecha
  const prevOut = editData ? (editData.cosechadas || 0) + (editData.descartadas || 0) : 0;
  const maxQty = currentQty + prevOut;

  const totalSale = parseInt(cosechadas) || 0;
  const totalDiscard = parseInt(descartadas) || 0;
  const totalOut = totalSale + totalDiscard;
  const remaining = maxQty - totalOut;

  const [confirmEdit, setConfirmEdit] = useState(false);
  const [confirmNew, setConfirmNew] = useState(false);

  const validate = () => {
    const e = {};
    if (!cosechadas || isNaN(cosechadas) || totalSale <= 0) e.cosechadas = 'Ingresá una cantidad válida';
    if (totalOut > maxQty) e.cosechadas = `No puede superar las ${maxQty.toLocaleString()} plantas disponibles`;
    return e;
  };

  const handleConfirm = () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    if (editMode) { setConfirmEdit(true); return; }
    setConfirmNew(true);
  };

  const dm = useDarkMode();
  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.55)',
      display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:100
    }} onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal-in" style={{
        background:'var(--bg-card)', borderRadius:'20px 20px 0 0',
        width:'100%', maxWidth:480, padding:'20px 20px 36px',
        maxHeight:'90vh', overflowY:'auto'
      }}>
        <div style={{width:36, height:4, background: 'var(--border)', borderRadius:2, margin:'0 auto 20px'}} />
        <p style={{fontSize:17, fontWeight:600, color: 'var(--text-1)', marginBottom:4}}>
          {editMode ? 'Editar cosecha' : 'Registrar cosecha parcial'}
        </p>
        <p style={{fontSize:13, color: 'var(--text-3)', marginBottom:20}}>
          Disponibles: <strong style={{color: 'var(--text-1)'}}>{maxQty.toLocaleString()} plantas</strong>
        </p>

        <Field label="Fecha de cosecha">
          <input id="mov-fecha" name="mov-fecha" type="date" value={date} onChange={e => setDate(e.target.value)} style={inputStyle()} />
        </Field>

        <Field label="Lechugas cosechadas (para venta)" error={errors.cosechadas}>
          <input type="number" inputMode="numeric" id="cosecha-cosechadas" name="cosecha-cosechadas" placeholder="Ej: 210"
            value={cosechadas}
            onChange={e => { setCosechadas(e.target.value); setErrors({}); }}
            style={inputStyle(errors.cosechadas)} />
        </Field>

        <Field label="Lechugas descartadas (opcional)">
          <input type="number" inputMode="numeric" id="cosecha-descartadas" name="cosecha-descartadas" placeholder="Ej: 5"
            value={descartadas}
            onChange={e => setDescartadas(e.target.value)}
            style={inputStyle()} />
        </Field>

        {totalOut > 0 && totalOut <= currentQty && (
          <div style={{
            background:'var(--bg-card-h)', border:'0.5px solid var(--border)',
            borderRadius:12, padding:'14px 16px', marginBottom:16,
          }}>
            <div style={{display:'flex', gap:0, marginBottom: remaining > 0 ? 12 : 0}}>
              <MermaItem label="Cosechadas" value={totalSale.toLocaleString()} color="#276F50" />
              {totalDiscard > 0 && <MermaItem label="Descartadas" value={totalDiscard.toLocaleString()} color="#E07B2A" />}
              <MermaItem label="Quedan" value={remaining.toLocaleString()} color={remaining === 0 ? 'var(--stage-c)' : 'var(--text-1)'} />
            </div>
            {remaining === 0 && (
              <div style={{
                background:'var(--bg-card-h)', borderRadius:8, padding:'8px 12px',
                display:'flex', alignItems:'center', gap:8
              }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6B3FA0" strokeWidth="2" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                <span style={{fontSize:13, color:'var(--stage-c)', fontWeight:500}}>
                  Con esta cosecha el lote queda agotado
                </span>
              </div>
            )}
          </div>
        )}

        <Field label="Notas (opcional)">
          <textarea id="cosecha-notas" name="cosecha-notas" value={notes} onChange={e => setNotes(e.target.value)}
            rows={2} placeholder="Ej: tubos 1 al 10, piscina norte..."
            style={{...inputStyle(), resize:'none', lineHeight:1.6}} />
        </Field>

        {confirmEdit ? (
          <ConfirmBar
            message="Esto va a actualizar el registro de cosecha y recalcular los totales del lote."
            onConfirm={() => onConfirm({ date, cosechadas: totalSale, descartadas: totalDiscard, notes: notes.trim() })}
            onCancel={() => setConfirmEdit(false)}
          />
        ) : confirmNew ? (
          <ConfirmBar
            message={'Registrar ' + totalSale.toLocaleString() + ' lechugas cosechadas' + (totalDiscard > 0 ? ' y ' + totalDiscard.toLocaleString() + ' descartadas' : '') + '.'}
            confirmLabel="Sí, registrar"
            onConfirm={() => onConfirm({ date, cosechadas: totalSale, descartadas: totalDiscard, notes: notes.trim() })}
            onCancel={() => setConfirmNew(false)}
          />
        ) : (
          <button onClick={handleConfirm} style={{
            width:'100%', padding:'14px 0', borderRadius:12, border:'none',
            background:'var(--green)', color:'#fff', fontSize:15, fontWeight:600,
