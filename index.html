// ── FIRESTORE REST API ────────────────────────────────
const FS_PROJECT = 'nalhuitad-d6758';
const FS_KEY     = 'AIzaSyCHlsJDU0o7JsOvY4mgr5lVhiDOEok3C5w';
const FS_BASE    = `https://firestore.googleapis.com/v1/projects/${FS_PROJECT}/databases/(default)/documents`;

function toFSValue(v) {
  if (v === null || v === undefined) return { nullValue: null };
  if (typeof v === 'boolean') return { booleanValue: v };
  if (typeof v === 'number') return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
  if (typeof v === 'string') return { stringValue: v };
  if (Array.isArray(v)) return { arrayValue: { values: v.map(toFSValue) } };
  if (typeof v === 'object') return { mapValue: { fields: toFSFields(v) } };
}
function toFSFields(obj) {
  const f = {};
  for (const [k, v] of Object.entries(obj)) f[k] = toFSValue(v);
  return f;
}
function fromFSValue(v) {
  if (!v) return null;
  if ('stringValue'  in v) return v.stringValue;
  if ('integerValue' in v) return parseInt(v.integerValue);
  if ('doubleValue'  in v) return v.doubleValue;
  if ('booleanValue' in v) return v.booleanValue;
  if ('nullValue'    in v) return null;
  if ('arrayValue'   in v) return (v.arrayValue.values || []).map(fromFSValue);
  if ('mapValue'     in v) return fromFSDoc({ fields: v.mapValue.fields || {} });
  return null;
}
function fromFSDoc(doc) {
  const obj = {};
  for (const [k, v] of Object.entries(doc.fields || {})) obj[k] = fromFSValue(v);
  if (doc.name) obj.id = doc.name.split('/').pop();
  return obj;
}

const AUTH_EXPIRED_ERROR = 'AUTH_EXPIRED';

const fsDb = {
  getToken() {
    try {
      const s = JSON.parse(localStorage.getItem('hidro_auth_v1') || 'null');
      return s?.idToken || null;
    } catch { return null; }
  },
  headers() {
    const token = this.getToken();
    const h = { 'Content-Type': 'application/json' };
    if (token) h['Authorization'] = `Bearer ${token}`;
    return h;
  },
  checkAuth(r) {
    if (r.status === 401 || r.status === 403) {
      fsAuth.clear();
      throw new Error(AUTH_EXPIRED_ERROR);
    }
  },
  async list(col) {
    const r = await fetch(`${FS_BASE}/${col}?key=${FS_KEY}`, { headers: this.headers() });
    this.checkAuth(r);
    const j = await r.json();
    return (j.documents || []).map(fromFSDoc);
  },
  async set(col, id, data) {
    const { id: _id, ...rest } = data;
    const body = JSON.stringify({ fields: toFSFields(rest) });
    const r = await fetch(`${FS_BASE}/${col}/${id}?key=${FS_KEY}`, {
      method: 'PATCH', headers: this.headers(), body
    });
    this.checkAuth(r);
  },
  async del(col, id) {
    const r = await fetch(`${FS_BASE}/${col}/${id}?key=${FS_KEY}`, {
      method: 'DELETE', headers: this.headers()
    });
    this.checkAuth(r);
  }
};

// ── FIREBASE AUTH REST API ────────────────────────────
const AUTH_KEY = 'AIzaSyC246p0MSQkLZwXXDj8ibJox940k6HHG5o';
const AUTH_URL = `https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${AUTH_KEY}`;
const AUTH_STORE_KEY = 'hidro_auth_v1';
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 15 * 60 * 1000;

const fsAuth = {
  async signIn(email, password) {
    const r = await fetch(AUTH_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, returnSecureToken: true })
    });
    const j = await r.json();
    if (!r.ok) {
      const msg = j?.error?.message || 'ERROR';
      throw new Error(msg);
    }
    return { idToken: j.idToken, email: j.email, displayName: j.displayName || email.split('@')[0] };
  },
  save(session) {
    try { localStorage.setItem(AUTH_STORE_KEY, JSON.stringify({ ...session, ts: Date.now() })); } catch {}
  },
  load() {
    try {
      const s = JSON.parse(localStorage.getItem(AUTH_STORE_KEY) || 'null');
      if (!s) return null;
      // Sesión válida por 7 días
      if (Date.now() - s.ts > 7 * 24 * 60 * 60 * 1000) { this.clear(); return null; }
      return s;
    } catch { return null; }
  },
  clear() { try { localStorage.removeItem(AUTH_STORE_KEY); } catch {} },
  // Control de intentos fallidos
  getAttempts() {
    try { return JSON.parse(localStorage.getItem('hidro_attempts') || '{"count":0,"ts":0}'); } catch { return {count:0,ts:0}; }
  },
  addAttempt() {
    const a = this.getAttempts();
    const newA = { count: a.count + 1, ts: Date.now() };
    try { localStorage.setItem('hidro_attempts', JSON.stringify(newA)); } catch {}
    return newA;
  },
  clearAttempts() { try { localStorage.removeItem('hidro_attempts'); } catch {} },
  isLocked() {
    const a = this.getAttempts();
    if (a.count < MAX_ATTEMPTS) return false;
    if (Date.now() - a.ts < LOCKOUT_MS) return true;
    this.clearAttempts();
    return false;
  },
  lockRemaining() {
    const a = this.getAttempts();
    return Math.ceil((LOCKOUT_MS - (Date.now() - a.ts)) / 60000);
  }
};
</script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// Helper para leer dark mode en cualquier componente
const useDark = () => document.body.classList.contains('dark');
const DM = {
  bg:      () => useDark() ? '#1E1E1C' : '#F7F7F4',
  card:    () => useDark() ? '#1E1E1C' : '#fff',
  card2:   () => useDark() ? '#2A2A28' : '#F7F7F4',
  border:  () => useDark() ? '#333330' : '#E0E0DA',
  border2: () => useDark() ? '#444440' : '#F0F0EA',
  text:    () => useDark() ? '#E8E8E4' : '#1A1A18',
  text2:   () => useDark() ? '#888884' : '#555550',
  text3:   () => useDark() ? '#666662' : '#888884',
  input:   () => useDark() ? '#111210' : '#fff',
};

const STAGES = {
  almacigo:    { label: 'Almácigo',   color: '#A67C52', bg: '#F5EFE6', order: 0 },
  transplante: { label: 'Transplante', color: '#2171B5', bg: '#E3F0FB', order: 1 },
  raleo:       { label: 'Raleo',       color: '#A0286A', bg: '#F7E0EE', order: 2 },
  cosecha:     { label: 'Cosecha',     color: '#6B3FA0', bg: '#EEE8F7', order: 3 },
};

const VARIETIES = ['Milena', 'Otra'];
const PLANTS_PER_TRAY_DEFAULT = 135;
const getPlantsPer = () => {
  try {
    const cfg = JSON.parse(localStorage.getItem('hidro_config_v1') || 'null');
    return (cfg?.plantsPer && cfg.plantsPer > 0) ? cfg.plantsPer : PLANTS_PER_TRAY_DEFAULT;
  } catch { return PLANTS_PER_TRAY_DEFAULT; }
};
const PLANTS_PER_TRAY = PLANTS_PER_TRAY_DEFAULT;
const toPlants = (trays) => (trays ?? 0) * getPlantsPer();

function daysSince(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.floor((today - date) / 86400000);
}

function formatDate(dateStr) {
  const [y, m, d] = dateStr.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

// ── SISTEMA DE ALERTAS ────────────────────────────────
// Estaciones hemisferio sur
function getSeason(dateStr) {
  const m = new Date(dateStr).getMonth() + 1;
  if ([12,1,2].includes(m)) return 'verano';
  if ([3,4,5].includes(m)) return 'otono';
  if ([6,7,8].includes(m)) return 'invierno';
  return 'primavera';
}

const STAGE_DAYS = {
  almacigo:    { verano:28, otono:32, invierno:35, primavera:30 },
  transplante: { verano:15, otono:15, invierno:15, primavera:15 },
  raleo:       { verano:22, otono:35, invierno:50, primavera:28 },
};

function getLotAlert(lot) {
  if (lot.stage === 'cosecha') return null;
  const expected = STAGE_DAYS[lot.stage];
  if (!expected) return null;
  const stageEntry = lot.stageHistory[lot.stageHistory.length - 1];
  const season = getSeason(stageEntry.date);
  const maxDays = expected[season];
  const days = daysSince(stageEntry.date);
  const remaining = maxDays - days;
  if (remaining < 0)  return { status:'overdue',  remaining, maxDays, days, season };
  if (remaining <= 3) return { status:'warning',  remaining, maxDays, days, season };
  return { status:'ok', remaining, maxDays, days, season };
}

const SEASON_LABEL = { verano:'Verano', otono:'Otoño', invierno:'Invierno', primavera:'Primavera' };

// ── BADGE ──────────────────────────────────────────────
function StageBadge({ stage, days, maxDays }) {
  const s = STAGES[stage];
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:6,
      background: s.bg, color: s.color,
      fontSize:13, fontWeight:500,
      padding:'5px 12px', borderRadius:20,
      letterSpacing:'0.01em'
    }}>
      {s.label}
      {days !== undefined && (
        <span style={{opacity:0.75, fontFamily:'DM Mono, monospace', fontSize:11}}>
          · {days}{maxDays ? `/${maxDays}` : ''}d
        </span>
      )}
    </span>
  );
}

function SkeletonCard() {
  return (
    <div style={{background:'#fff', borderRadius:14, padding:'16px 18px', marginBottom:10, border:'0.5px solid #E0E0DA'}}>
      <div style={{display:'flex', justifyContent:'space-between', marginBottom:12}}>

          <div className="skeleton" style={{width:120, height:12, marginBottom:8}} />
          <div className="skeleton" style={{width:160, height:16, marginBottom:6}} />
          <div className="skeleton" style={{width:100, height:12}} />
        </div>

      </div>
      <div style={{display:'flex', gap:20, paddingTop:10, borderTop:'0.5px solid #F0F0EA'}}>
        {[60,80,70].map((w,i) => <div key={i}><div className="skeleton" style={{width:w, height:10, marginBottom:6}} /><div className="skeleton" style={{width:w-10, height:14}} /></div>)}
      </div>

}

// ── WEATHER CARD ─────────────────────────────────────
const WEATHER_CODES = {
  0:'Despejado', 1:'Mayormente despejado', 2:'Parcialmente nublado', 3:'Nublado',
  45:'Niebla', 48:'Niebla con escarcha',
  51:'Llovizna leve', 53:'Llovizna moderada', 55:'Llovizna intensa',
  61:'Lluvia leve', 63:'Lluvia moderada', 65:'Lluvia intensa',
  71:'Nevada leve', 73:'Nevada moderada', 75:'Nevada intensa',
  80:'Chubascos leves', 81:'Chubascos moderados', 82:'Chubascos intensos',
  85:'Nieve leve', 86:'Nieve intensa',
  95:'Tormenta', 96:'Tormenta con granizo', 99:'Tormenta intensa',
};

const WEATHER_ICONS = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌧️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'🌨️', 73:'🌨️', 75:'🌨️',
  80:'🌦️', 81:'🌧️', 82:'⛈️',
  85:'🌨️', 86:'🌨️',
  95:'⛈️', 96:'⛈️', 99:'⛈️',
};

function WeatherCard() {
  const [weather, setWeather] = useState(null);
  const [wError, setWError] = useState(false);

  useEffect(() => {
    const fetchWeather = async () => {
      try {
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=-42.60&longitude=-73.77' +
          '&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,wind_direction_10m,weathercode,precipitation' +
          '&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode' +
          '&timezone=America%2FSantiago&forecast_days=1';
        const r = await fetch(url);
        const j = await r.json();
        setWeather(j);
      } catch { setWError(true); }
    };
    fetchWeather();
    const interval = setInterval(fetchWeather, 30 * 60 * 1000); // actualiza cada 30 min
    return () => clearInterval(interval);
  }, []);

  if (wError) return null;
  if (!weather) return (
    <div className="dm-card" style={{background:'#fff', border:'0.5px solid #E0E0DA', borderRadius:14, padding:'14px 18px', marginBottom:8}}>
      <div style={{display:'flex', alignItems:'center', gap:8}}>
        <div className="skeleton" style={{width:36, height:36, borderRadius:10}} />
        <div><div className="skeleton" style={{width:100, height:12, marginBottom:6}} /><div className="skeleton" style={{width:60, height:20}} /></div>
      </div>
    </div>
  );

  const c = weather.current;
  const d = weather.daily;
  const code = c.weathercode;
  const icon = WEATHER_ICONS[code] || '🌡️';
  const desc = WEATHER_CODES[code] || 'Variable';
  const windDir = ['N','NE','E','SE','S','SO','O','NO'][Math.round(c.wind_direction_10m / 45) % 8];

  return (
    <div className="dm-weather" style={{
      background:'linear-gradient(135deg, #E8F3EC 0%, #EBF4F7 100%)',
      border:'0.5px solid #C8DDD4',
      borderRadius:14, padding:'16px 18px', marginBottom:8
    }}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14}}>
        <div style={{display:'flex', alignItems:'center', gap:12}}>
          <div style={{
            width:52, height:52, borderRadius:14,
            background:'rgba(255,255,255,0.7)',
            display:'flex', alignItems:'center',
            justifyContent:'center', fontSize:28, flexShrink:0
          }}>{icon}</div>
          <div>
            <p className="dm-text" style={{fontSize:14, fontWeight:600, color:'#1A1A18', marginBottom:3}}>{desc}</p>
            <p style={{fontSize:12, color:'#4A7A60'}}>Nalhuitad, Chiloé</p>
          </div>
        </div>
        <div style={{textAlign:'right'}}>
          <p className="dm-text" style={{fontSize:34, fontWeight:600, color:'#1A1A18', fontFamily:'DM Mono, monospace', lineHeight:1}}>
            {Math.round(c.temperature_2m)}°
          </p>
          <p style={{fontSize:12, color:'#4A7A60', marginTop:3}}>
            Sensación {Math.round(c.apparent_temperature)}°
          </p>
        </div>
      </div>

      <div style={{display:'flex', gap:0, paddingTop:12, borderTop:'0.5px solid rgba(255,255,255,0.6)'}}>
        <WeatherStat icon="💧" label="Humedad" value={`${c.relative_humidity_2m}%`} />
        <WeatherStat icon="💨" label={`Viento ${windDir}`} value={`${Math.round(c.wind_speed_10m)} km/h`} />
        <WeatherStat icon="🌡️" label="Máx/Mín" value={`${Math.round(d.temperature_2m_max[0])}°/${Math.round(d.temperature_2m_min[0])}°`} />
        <WeatherStat icon="🌧️" label="Precip." value={`${d.precipitation_sum[0].toFixed(1)} mm`} />
      </div>
    </div>
  );
}

function WeatherStat({ icon, label, value }) {
  return (
    <div style={{flex:1, textAlign:'center'}}>
      <p style={{fontSize:20, marginBottom:4}}>{icon}</p>
      <p style={{fontSize:11, color:'#4A7A60', marginBottom:3}}>{label}</p>
      <p className="dm-text" style={{fontSize:13, fontWeight:600, color:'#1A1A18', fontFamily:'DM Mono, monospace'}}>{value}</p>
    </div>
  );
}

// ── LOTES SCREEN ───────────────────────────────────────
function LotesScreen({ lots, onSelect, goToNuevo }) {
  const active = lots.filter(l => l.stage !== 'cosecha');
  const cosechados = lots.filter(l => l.stage === 'cosecha');
  const [editingCap, setEditingCap] = useState(false);
  const [capacidad, setCapacidad] = useState(() => {
    try { return parseInt(localStorage.getItem('hidro_capacidad') || '3740'); }
    catch { return 3740; }
  });
  const [capInput, setCapInput] = useState(String(capacidad));

  const saveCapacidad = () => {
    const val = parseInt(capInput);
    if (!isNaN(val) && val > 0) {
      setCapacidad(val);
      localStorage.setItem('hidro_capacidad', String(val));
    }
    setEditingCap(false);
  };

  if (lots.length === 0) {
    return (
      <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32, textAlign:'center'}}>
        <div style={{width:72, height:72, borderRadius:20, background:'#E8F2EB', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:20}}>
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#276F50" strokeWidth="1.6" strokeLinecap="round">
            <path d="M12 2a9 9 0 0 1 9 9c0 4.97-9 13-9 13S3 15.97 3 11a9 9 0 0 1 9-9z"/>
            <circle cx="12" cy="11" r="2.5"/>
          </svg>
        </div>
        <p className="dm-text" style={{fontSize:17, fontWeight:600, color:'#1A1A18', marginBottom:8}}>Sin lotes registrados</p>
        <p style={{fontSize:14, color:'#888884', lineHeight:1.6, marginBottom:24}}>Registrá tu primer lote para<br/>empezar el seguimiento.</p>
        <button onClick={goToNuevo} style={{
          padding:'12px 28px', borderRadius:12, border:'none',
          background:'#276F50', color:'#fff',
          fontSize:14, fontWeight:600, cursor:'pointer'
        }}>+ Registrar primer lote</button>
      </div>
    );
  }

  const countByStage = (stage) =>
    lots.filter(l => l.stage === stage).reduce((acc, l) => acc + (l.currentQuantity ?? toPlants(l.quantity)), 0);

  const stageCounters = [
    { key:'almacigo',    label:'Almácigo' },
    { key:'transplante', label:'Transplante' },
    { key:'raleo',       label:'Raleo' },
    { key:'cosecha',     label:'Cosecha' },
  ].filter(s => countByStage(s.key) > 0);

  return (
    <div style={{flex:1, overflowY:'auto', padding:'16px 16px 8px'}}>
      <WeatherCard />
      {stageCounters.length > 0 && (
        <>
        <div style={{
          background:'#1A1A18', borderRadius:14, padding:'16px 18px',
          marginBottom:8,
        }}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14}}>
            <div>
              <p style={{fontSize:12, fontWeight:600, color:'#AAAAAA', letterSpacing:'0.05em', textTransform:'uppercase', marginBottom:6}}>Total en producción</p>
              <p style={{fontSize:30, fontWeight:600, color:'#FFFFFF', fontFamily:'DM Mono, monospace', lineHeight:1}}>
                {lots.filter(l => l.stage !== 'cosecha').reduce((acc, l) => acc + (l.currentQuantity ?? toPlants(l.quantity)), 0).toLocaleString()}
              </p>
              <p style={{fontSize:13, color:'#888884', marginTop:5}}>plantas · {lots.filter(l=>l.stage!=='cosecha').length} lotes activos</p>
            </div>
            <div style={{textAlign:'right'}}>
              <p style={{fontSize:12, color:'#AAAAAA', marginBottom:6}}>Capacidad instalada</p>
              {editingCap ? (
                <div style={{display:'flex', gap:6, alignItems:'center'}}>
                  <input
                    id="cap-input" name="cap-input" type="number" inputMode="numeric"
                    value={capInput}
                    onChange={e => setCapInput(e.target.value)}
                    style={{width:80, padding:'4px 8px', borderRadius:8, border:'0.5px solid #444', background:'#2A2A28', color:'#fff', fontSize:14, fontFamily:'DM Mono, monospace', outline:'none', textAlign:'right'}}
                    autoFocus
                    onKeyDown={e => e.key === 'Enter' && saveCapacidad()}
                  />
                  <button onClick={saveCapacidad} style={{background:'#276F50', border:'none', borderRadius:6, padding:'4px 10px', color:'#fff', fontSize:12, fontWeight:600, cursor:'pointer'}}>OK</button>
                </div>
              ) : (
                <div style={{display:'flex', alignItems:'center', gap:8, justifyContent:'flex-end'}}>
                  <p style={{fontSize:17, fontWeight:500, color:'#FFFFFF', fontFamily:'DM Mono, monospace'}}>{capacidad.toLocaleString()}</p>
                  <button onClick={() => { setCapInput(String(capacidad)); setEditingCap(true); }} style={{background:'#2A2A28', border:'0.5px solid #444', borderRadius:6, padding:'3px 8px', color:'#AAAAAA', fontSize:11, cursor:'pointer'}}>editar</button>
                </div>
              )}
              <p style={{fontSize:11, color:'#AAAAAA', marginTop:4}}>plantas máximas</p>
            </div>
          </div>
          <div style={{height:6, background:'#333330', borderRadius:3, overflow:'hidden'}}>
            <div style={{
              height:'100%', borderRadius:3, background:'#276F50',
              width:`${capacidad > 0 ? Math.min(100, Math.round((lots.filter(l=>l.stage!=='cosecha').reduce((acc,l)=>acc+(l.currentQuantity??toPlants(l.quantity)),0)/capacidad)*100)) : 0}%`,
              transition:'width 0.4s'
            }}/>
          </div>
          <p style={{fontSize:11, color:'#AAAAAA', marginTop:5, textAlign:'right'}}>
            {capacidad > 0 ? Math.min(100, Math.round((lots.filter(l=>l.stage!=='cosecha').reduce((acc,l)=>acc+(l.currentQuantity??toPlants(l.quantity)),0)/capacidad)*100)) : 0}% de capacidad utilizada
          </p>
        </div>
        <div style={{
          display:'grid',
          gridTemplateColumns: `repeat(${Math.min(stageCounters.length, 2)}, 1fr)`,
          gap:8, marginBottom:20
        }}>
          {stageCounters.map(({ key, label }) => {
            const s = STAGES[key];
            const count = countByStage(key);
            const lotCount = lots.filter(l => l.stage === key).length;
            return (
              <div key={key} className="dm-stage-counter" style={{
                background:'#fff', border:`0.5px solid ${s.bg}`,
                borderRadius:14, padding:'16px 18px',
              }}>
                <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:8}}>
                  <div style={{width:8, height:8, borderRadius:4, background: s.color, flexShrink:0}} />
                  <span style={{fontSize:12, fontWeight:600, color: s.color, letterSpacing:'0.02em'}}>
                    {STAGE_LABELS[key]}
                  </span>
                </div>
                <p className="dm-text" style={{fontSize:28, fontWeight:600, color:'#1A1A18', fontFamily:'DM Mono, monospace', lineHeight:1}}>
                  {count.toLocaleString()}
                </p>
                <p className="dm-text2" style={{fontSize:12, color:'#555550', marginTop:5}}>
                  plantas · {lotCount} lote{lotCount !== 1 ? 's' : ''}
                </p>
                {key === 'almacigo' && (
                  <p className="dm-text3" style={{fontSize:11, color:'#888884', marginTop:2}}>
                    {lots.filter(l=>l.stage==='almacigo').reduce((a,l)=>a+l.quantity,0)} almácigos × {PLANTS_PER_TRAY}
                  </p>
                )}
              </div>
            );
          })}
        </div>
        </>
      )}

      {active.length > 0 && (
        <>
          <p className="dm-section-label" style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'#555550', textTransform:'uppercase', marginBottom:12}}>
            En curso · {active.length} lote{active.length !== 1 ? 's' : ''}
          </p>
          {active.map(lot => (
            <LotCard key={lot.id} lot={lot} onSelect={onSelect} />
          ))}
        </>
      )}
      {cosechados.length > 0 && (
        <>
          <p className="dm-section-label" style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'#555550', textTransform:'uppercase', margin:'20px 0 12px'}}>
            Cosechados · {cosechados.length}
          </p>
          {cosechados.map(lot => (
            <CosechadoCard key={lot.id} lot={lot} onSelect={onSelect} />
          ))}
        </>
      )}
    </div>
  );
}

function getMaxDays(stage, stageDate) {
  const expected = STAGE_DAYS[stage];
  if (!expected) return null;
  return expected[getSeason(stageDate)];
}

function LotCard({ lot, onSelect, muted }) {
  const currentStageEntry = lot.stageHistory[lot.stageHistory.length - 1];
  const days = daysSince(currentStageEntry.date);
  const maxDays = getMaxDays(lot.stage, currentStageEntry.date);
  const totalCycleDays = daysSince(lot.date);
  const alert = getLotAlert(lot);

  const isOverdue = alert?.status === 'overdue';
  const isWarning = alert?.status === 'warning';
  const accentColor = isOverdue ? '#E05C3A' : isWarning ? '#E07B2A' : null;
  const accentBg    = isOverdue ? '#FEF6F4' : isWarning ? '#FEF8F2' : '#fff';

  return (
    <div
      className="lot-card"
      onClick={() => onSelect(lot)}
      style={{
        background: accentBg,
        border: `0.5px solid ${accentColor ? accentColor+'55' : '#E0E0DA'}`,
        borderRadius:14, overflow:'hidden',
        marginBottom:10, cursor:'pointer',
        opacity: muted ? 0.55 : 1,
        WebkitUserSelect:'none',
        display:'flex',
      }}
    >
      {accentColor && (
        <div style={{width:4, background: accentColor, flexShrink:0}} />
      )}
      <div style={{flex:1, padding:'16px 18px'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10}}>
          <div style={{flex:1, minWidth:0, marginRight:8}}>
            <p style={{fontSize:12, fontWeight:600, color: STAGES[lot.stage].color, letterSpacing:'0.03em', textTransform:'uppercase', marginBottom:4}}>
              {STAGE_LABELS[lot.stage]}
            </p>
            <p className="dm-text" style={{fontSize:16, fontWeight:600, color:'#1A1A18', marginBottom:3}}>{lot.name}</p>
            <p className="dm-text2" style={{fontSize:13, color:'#555550'}}>Sembrado {formatDate(lot.date)}</p>
          </div>
          <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:5, flexShrink:0}}>
            <StageBadge stage={lot.stage} days={days} maxDays={maxDays} />
            {alert && alert.status !== 'ok' && (
              <span style={{
                fontSize:11, fontWeight:700, padding:'4px 10px', borderRadius:20,
                background: isOverdue ? '#FDDDD6' : '#FDE8CC',
                color: isOverdue ? '#C0392B' : '#A85A00',
              }}>
                {isOverdue
                  ? `${Math.abs(alert.remaining)} día${Math.abs(alert.remaining)!==1?'s':''} atrasado`
                  : `Vence en ${alert.remaining} día${alert.remaining!==1?'s':''}`}
              </span>
            )}
          </div>
        </div>
        <div style={{display:'flex', gap:20, marginTop:8, paddingTop:10, borderTop:`0.5px solid ${accentColor ? accentColor+'22' : '#F0F0EA'}`}}>
          <Stat label="Ciclo total" value={`${totalCycleDays}d`} />
          <Stat label="Plantas al sembrar" value={toPlants(lot.quantity).toLocaleString()} />
          <Stat label="En producción" value={(lot.currentQuantity ?? toPlants(lot.quantity)).toLocaleString()} />
        </div>
      </div>
    </div>
  );
}

function Stat({ label, value }) {
  return (
    <div>
      <p className="dm-text3" style={{fontSize:11, color:'#888884', marginBottom:3, letterSpacing:'0.02em'}}>{label}</p>
      <p className="dm-text" style={{fontSize:14, fontWeight:600, color:'#1A1A18', fontFamily:'DM Mono, monospace'}}>{value}</p>
    </div>
  );
}

function CosechadoCard({ lot, onSelect }) {
  const totalCosechadas = (lot.cosechas || []).reduce((a, c) => a + (c.cosechadas || 0), 0);
  const totalDescartadas = (lot.cosechas || []).reduce((a, c) => a + (c.descartadas || 0), 0);
  const plantasIniciales = toPlants(lot.quantity);
  const rendimiento = plantasIniciales > 0 ? Math.round((totalCosechadas / plantasIniciales) * 100) : 0;
  const fechaInicio = lot.date;
  const fechaFin = lot.cosechas?.length > 0 ? lot.cosechas[lot.cosechas.length-1].date : null;
  const duracion = fechaFin ? daysSince(fechaInicio) - daysSince(fechaFin) : daysSince(fechaInicio);

  return (
    <div className="lot-card dm-card" onClick={() => onSelect(lot)} style={{
      background:'#fff', border:'0.5px solid #E0E0DA',
      borderRadius:14, padding:'16px 18px', marginBottom:10,
      cursor:'pointer', opacity:0.75, WebkitUserSelect:'none',
    }}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10}}>
        <div style={{flex:1, minWidth:0, marginRight:8}}>
          <p style={{fontSize:12, fontWeight:600, color: STAGES.cosecha.color, letterSpacing:'0.03em', textTransform:'uppercase', marginBottom:4}}>
            {STAGE_LABELS.cosecha}
          </p>
          <p className="dm-text" style={{fontSize:16, fontWeight:600, color:'#1A1A18', marginBottom:3}}>{lot.name}</p>
          <p className="dm-text2" style={{fontSize:13, color:'#555550'}}>Sembrado {formatDate(fechaInicio)}</p>
        </div>
        <div style={{
          background:'#EEE8F7', color:'#6B3FA0',
          fontSize:13, fontWeight:600, padding:'5px 12px',
          borderRadius:20, flexShrink:0, textAlign:'center'
        }}>
          {rendimiento}% rendimiento
        </div>
      </div>
      <div className="dm-sep" style={{display:'flex', gap:20, paddingTop:10, borderTop:'0.5px solid #F0F0EA'}}>
        <Stat label="Cosechadas" value={totalCosechadas.toLocaleString()} />
        <Stat label="Descartadas" value={totalDescartadas.toLocaleString()} />
        <Stat label="Ciclo" value={`${duracion}d`} />
      </div>
    </div>
  );
}

// ── NUEVO SCREEN ───────────────────────────────────────
function NuevoScreen({ onSave, goToLotes }) {
  const [form, setForm] = useState({
    name: '', variety: 'Milena', customVariety: '', date: todayISO(), quantity: '', notes: ''
  });
  const [saved, setSaved] = useState(false);
  const [errors, setErrors] = useState({});
  const [confirmSave, setConfirmSave] = useState(false);

  const set = (key, val) => setForm(f => ({ ...f, [key]: val }));

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Ingresá un nombre para el lote';
    if (!form.quantity || isNaN(form.quantity) || parseInt(form.quantity) <= 0)
      e.quantity = 'Ingresá una cantidad válida';
    if (form.variety === 'Otra' && !form.customVariety?.trim())
      e.customVariety = 'Ingresá el nombre de la variedad';
    return e;
  };

  const handleSave = () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }

    const lot = {
      id: genId(),
      name: form.name.trim(),
      variety: form.variety === 'Otra' ? form.customVariety.trim() : form.variety,
      date: form.date,
      quantity: parseInt(form.quantity),
      currentQuantity: toPlants(parseInt(form.quantity)),
      stage: 'almacigo',
      stageHistory: [{ stage: 'almacigo', date: form.date, quantity: toPlants(parseInt(form.quantity)) }],
      notes: form.notes.trim(),
    };
    onSave(lot);
    setSaved(true);
    setTimeout(() => {
      setSaved(false);
      setForm({ name:'', variety:'Milena', customVariety:'', date:todayISO(), quantity:'', notes:'' });
      setErrors({});
      goToLotes();
    }, 1200);
  };

  return (
    <div style={{flex:1, overflowY:'auto', padding:'16px 18px'}}>
      <p className="dm-nuevo-label" style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'#555550', textTransform:'uppercase', marginBottom:20}}>
        Registrar lote nuevo
      </p>

      <Field label="Nombre del lote" error={errors.name}>
        <input
          type="text"
          id="nuevo-nombre" name="nombre" placeholder="Ej: Milena norte, Lote 4..."
          value={form.name}
          onChange={e => { set('name', e.target.value); setErrors(er => ({...er, name:undefined})) }}
          style={inputStyle(errors.name)}
        />
      </Field>

      <Field label="Fecha de siembra">
        <input
          id="nuevo-fecha" name="fecha"
          type="date"
          value={form.date}
          onChange={e => set('date', e.target.value)}
          style={inputStyle()}
        />
      </Field>

      <Field label="Cantidad de almácigos sembrados" error={errors.quantity}>
        <input
          type="number"
          inputMode="numeric"
          id="nuevo-cantidad" name="cantidad" placeholder="Ej: 6"
          value={form.quantity}
          onChange={e => { set('quantity', e.target.value); setErrors(er => ({...er, quantity:undefined})) }}
          style={inputStyle(errors.quantity)}
        />
        {form.quantity && !isNaN(form.quantity) && parseInt(form.quantity) > 0 && (
          <div style={{
            marginTop:8, padding:'10px 14px', borderRadius:10,
            background:'#E2F3EC', display:'flex', alignItems:'center', gap:8
          }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#276F50" strokeWidth="2.2" strokeLinecap="round"><path d="M12 2a9 9 0 0 1 9 9c0 4.97-9 13-9 13S3 15.97 3 11a9 9 0 0 1 9-9z"/><circle cx="12" cy="11" r="2"/></svg>
            <span style={{fontSize:14, color:'#276F50', fontWeight:500}}>
              {parseInt(form.quantity)} almácigos = <strong>{toPlants(parseInt(form.quantity)).toLocaleString()} plantas</strong>
            </span>
          </div>
        )}
      </Field>

      <Field label="Variedad">
        <div style={{display:'flex', gap:8, marginBottom: form.variety === 'Otra' ? 8 : 0}}>
          {VARIETIES.map(v => (
            <button
              key={v}
              onClick={() => { set('variety', v); if (v !== 'Otra') set('customVariety', ''); }}
              style={{
                flex:1, padding:'12px 0', borderRadius:10, border:'0.5px solid',
                borderColor: form.variety === v ? '#276F50' : '#E0E0DA',
                background: form.variety === v ? '#E2F3EC' : '#fff',
                color: form.variety === v ? '#276F50' : '#555550',
                fontSize:14, fontWeight: form.variety === v ? 600 : 400,
                cursor:'pointer', transition:'all 0.15s'
              }}
            >{v}</button>
          ))}
        </div>
        {form.variety === 'Otra' && (
          <input
            type="text"
            id="nuevo-variedad" name="variedad" placeholder="Nombre de la variedad..."
            value={form.customVariety || ''}
            onChange={e => set('customVariety', e.target.value)}
            style={inputStyle(errors.customVariety)}
            autoFocus
          />
        )}
        {errors.customVariety && <p style={{fontSize:13, color:'#C0392B', marginTop:5}}>{errors.customVariety}</p>}
      </Field>

      <Field label="Notas (opcional)">
        <textarea
          id="nuevo-notas" name="nuevo-notas"
          placeholder="Condiciones, observaciones..."
          value={form.notes}
          onChange={e => set('notes', e.target.value)}
          rows={3}
          style={{...inputStyle(), resize:'none', lineHeight:1.7}}
        />
      </Field>

      {confirmSave ? (
        <ConfirmBar
          message={`Registrar lote "${form.name.trim()}" con ${form.quantity} almácigos (${toPlants(parseInt(form.quantity)).toLocaleString()} plantas).`}
          confirmLabel="Sí, registrar"
          onConfirm={handleSave}
          onCancel={() => setConfirmSave(false)}
        />
      ) : (
        <button
          onClick={() => {
            const e = validate();
            if (Object.keys(e).length) { setErrors(e); return; }
            setConfirmSave(true);
          }}
          style={{
            width:'100%', padding:'15px 0', borderRadius:12, border:'none',
            background: saved ? '#276F50' : '#1A1A18',
            color:'#fff', fontSize:15, fontWeight:600,
            cursor:'pointer', transition:'background 0.3s',
            marginTop:8, marginBottom:24,
            display:'flex', alignItems:'center', justifyContent:'center', gap:8
          }}
        >
          {saved ? '✓ Lote guardado' : 'Guardar lote'}
        </button>
      )}
    </div>
  );
}

function Field({ label, error, children }) {
  const dm = document.body.classList.contains('dark');
  return (
    <div style={{marginBottom:18}}>
      <p style={{fontSize:13, fontWeight:500, color: error ? '#C0392B' : dm ? '#AAAAAA' : '#333330', marginBottom:7}}>{label}</p>
      {children}
      {error && <p style={{fontSize:12, color:'#C0392B', marginTop:5}}>{error}</p>}
    </div>
  );
}

function inputStyle(error) {
  const dark = document.body.classList.contains('dark');
  return {
    width:'100%', padding:'12px 14px', borderRadius:10,
    border: `0.5px solid ${error ? '#E57373' : dark ? '#444440' : '#D8D8D2'}`,
    background: dark ? '#111210' : '#fff',
    fontSize:14, color: dark ? '#E8E8E4' : '#1A1A18',
    fontFamily:'DM Sans, sans-serif', outline:'none',
    WebkitAppearance:'none',
  };
}

// ── STAGE ORDER ───────────────────────────────────────
const STAGE_LABELS = {
  almacigo:    'Etapa 1 · Siembra de almácigos',
  transplante: 'Etapa 2 · Transplante',
  raleo:       'Etapa 3 · Raleo definitivo',
  cosecha:     'Etapa 4 · Cosecha',
};
const STAGE_ORDER = ['almacigo','transplante','raleo','cosecha'];
const NEXT_STAGE = { almacigo:'transplante', transplante:'raleo', raleo:'cosecha' };

// ── CONFIRM BAR — reutilizable ────────────────────────
function ConfirmBar({ message, onConfirm, onCancel, confirmLabel = 'Sí, guardar' }) {
  return (
    <div className="dm-confirm" style={{
      background:'#FEF0EC', border:'0.5px solid #F5C4B3',
      borderRadius:12, padding:'16px 18px', marginTop:8
    }}>
      <p style={{fontSize:15, fontWeight:600, color:'#1A1A18', marginBottom:6}}>¿Confirmar cambios?</p>
      <p style={{fontSize:13, color:'#888884', marginBottom:16}}>{message}</p>
      <div style={{display:'flex', gap:8}}>
        <button className="dm-confirm-cancel" onClick={onCancel} style={{
          flex:1, padding:'12px 0', borderRadius:10,
          border:'0.5px solid #E0E0DA', background:'#fff',
          color:'#555550', fontSize:14, fontWeight:500, cursor:'pointer'
        }}>Cancelar</button>
        <button onClick={onConfirm} style={{
          flex:1, padding:'12px 0', borderRadius:10, border:'none',
          background:'#1A1A18', color:'#fff', fontSize:14, fontWeight:600, cursor:'pointer'
        }}>{confirmLabel}</button>
      </div>
    </div>
  );
}

// ── MODAL AVANZAR ETAPA ────────────────────────────────
function AvanzarModal({ lot, onClose, onConfirm }) {
  const nextStage = NEXT_STAGE[lot.stage];
  const nextInfo = STAGES[nextStage];
  const currentQty = lot.currentQuantity ?? toPlants(lot.quantity);
  const [date, setDate] = useState(todayISO());
  const [qty, setQty] = useState(String(currentQty));
  const [notes, setNotes] = useState('');
  const [error, setError] = useState('');
  const [confirming, setConfirming] = useState(false);

  const arrived = parseInt(qty) || 0;
  const merma = currentQty - arrived;
  const mermaPercent = currentQty > 0 ? Math.round((merma / currentQty) * 100) : 0;
  const daysInNewStage = daysSince(date);
  const isHistorical = daysInNewStage > 0;

  const handleConfirm = () => {
    if (!qty || isNaN(qty) || arrived <= 0) { setError('Ingresá una cantidad válida'); return; }
    if (arrived > currentQty) { setError(`No puede superar las ${currentQty} plantas actuales`); return; }
    setConfirming(true);
  };

  const dm = document.body.classList.contains('dark');
  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.55)',
      display:'flex', alignItems:'flex-end', justifyContent:'center',
      zIndex:100
    }} onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal-in" style={{
        background: dm ? '#1E1E1C' : '#F7F7F4', borderRadius:'20px 20px 0 0',
        width:'100%', maxWidth:480, padding:'20px 20px 36px',
        maxHeight:'90vh', overflowY:'auto'
      }}>
        <div style={{width:36, height:4, background: dm ? '#444440' : '#D8D8D2', borderRadius:2, margin:'0 auto 20px'}} />

        <p style={{fontSize:17, fontWeight:600, color: dm ? '#E8E8E4' : '#1A1A18', marginBottom:4}}>Avanzar a siguiente etapa</p>
        <p style={{fontSize:13, color: dm ? '#888884' : '#888884', marginBottom:20}}>
          <span style={{fontWeight:500, color: STAGES[lot.stage].color}}>{STAGES[lot.stage].label}</span>
          {' → '}
          <span style={{fontWeight:500, color: nextInfo.color}}>{nextInfo.label}</span>
        </p>

        <Field label="¿Cuándo ocurrió este movimiento?">
          <input id="mov-fecha" name="mov-fecha" type="date" value={date} onChange={e => setDate(e.target.value)} style={inputStyle()} />
          <div style={{
            marginTop:8, padding:'10px 14px', borderRadius:10,
            background: isHistorical ? '#E8F3EC' : '#F5F5F0',
            display:'flex', alignItems:'center', gap:8
          }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={isHistorical ? '#276F50' : '#888884'} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span style={{fontSize:13, color: isHistorical ? '#276F50' : '#888884', fontWeight: isHistorical ? 500 : 400}}>
              {daysInNewStage === 0
                ? 'Movimiento de hoy — llevará 0 días en esta etapa'
                : `Llevará ${daysInNewStage} día${daysInNewStage !== 1 ? 's' : ''} en ${nextInfo.label} al ingresar`}
            </span>
          </div>
        </Field>

        <Field label={`Plantas que llegan a ${nextInfo.label}`} error={error}>
          <input
            id="avanzar-cantidad" name="avanzar-cantidad"
            type="number" inputMode="numeric"
            value={qty}
            onChange={e => { setQty(e.target.value); setError(''); }}
            style={inputStyle(error)}
            placeholder={`Máx. ${currentQty}`}
          />
        </Field>

        {qty && !isNaN(qty) && parseInt(qty) > 0 && parseInt(qty) <= currentQty && (
          <div style={{
            background: dm ? '#2A2A28' : '#fff', border:`0.5px solid ${dm ? '#444440' : '#E0E0DA'}`,
            borderRadius:12, padding:'12px 16px', marginBottom:16,
            display:'flex', gap:0
          }}>
            <MermaItem label="Entraban" value={currentQty} color="#1A1A18" />
            <MermaItem label="Llegan" value={arrived} color={nextInfo.color} />
            <MermaItem
              label="Merma"
              value={`${merma} (${mermaPercent}%)`}
              color={mermaPercent > 20 ? '#C0392B' : mermaPercent > 10 ? '#E07B2A' : '#276F50'}
            />
          </div>
        )}

        <Field label="Observaciones del movimiento (opcional)">
          <textarea id="avanzar-notas" name="avanzar-notas" value={notes} onChange={e => setNotes(e.target.value)}
            rows={2} placeholder="Ej: se descartaron plantas con raíz débil..."
            style={{...inputStyle(), resize:'none', lineHeight:1.6}} />
        </Field>

        {confirming ? (
          <ConfirmBar
            message={`Avanzar ${arrived.toLocaleString()} plantas a ${nextInfo.label}. Esta acción no se puede deshacer.`}
            confirmLabel="Sí, avanzar"
            onConfirm={() => onConfirm({ nextStage, date, quantity: arrived, notes: notes.trim() })}
            onCancel={() => setConfirming(false)}
          />
        ) : (
          <button onClick={handleConfirm} style={{
            width:'100%', padding:'14px 0', borderRadius:12, border:'none',
            background: nextInfo.color, color:'#fff',
            fontSize:15, fontWeight:600, cursor:'pointer', marginTop:4
          }}>
            Confirmar movimiento
          </button>
        )}
        <button onClick={onClose} style={{
          width:'100%', padding:'12px 0', borderRadius:12, border:'none',
          background:'none', color:'#888884', fontSize:14, cursor:'pointer', marginTop:6
        }}>
          Cancelar
        </button>
      </div>
    </div>
  );
}

function MermaItem({ label, value, color }) {
  return (
    <div style={{flex:1, textAlign:'center'}}>
      <p style={{fontSize:12, color:'#888884', marginBottom:4}}>{label}</p>
      <p style={{fontSize:14, fontWeight:600, color, fontFamily:'DM Mono, monospace'}}>{value}</p>
    </div>
  );
}

// ── MODAL COSECHA PARCIAL ─────────────────────────────
function CosechaModal({ lot, onClose, onConfirm, editData, editMode }) {
  const currentQty = lot.currentQuantity ?? toPlants(lot.quantity);
  const [date, setDate] = useState(editData?.date || todayISO());
  const [cosechadas, setCosechadas] = useState(editData ? String(editData.cosechadas) : '');
  const [descartadas, setDescartadas] = useState(editData ? String(editData.descartadas || '') : '');
  const [notes, setNotes] = useState(editData?.notes || '');
  const [errors, setErrors] = useState({});

  // En modo edición, el máximo disponible incluye lo que tenía esta cosecha
  const prevOut = editData ? (editData.cosechadas || 0) + (editData.descartadas || 0) : 0;
  const maxQty = currentQty + prevOut;

  const totalSale = parseInt(cosechadas) || 0;
  const totalDiscard = parseInt(descartadas) || 0;
  const totalOut = totalSale + totalDiscard;
  const remaining = maxQty - totalOut;

  const [confirmEdit, setConfirmEdit] = useState(false);
  const [confirmNew, setConfirmNew] = useState(false);

  const validate = () => {
    const e = {};
    if (!cosechadas || isNaN(cosechadas) || totalSale <= 0) e.cosechadas = 'Ingresá una cantidad válida';
    if (totalOut > maxQty) e.cosechadas = `No puede superar las ${maxQty.toLocaleString()} plantas disponibles`;
    return e;
  };

  const handleConfirm = () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    if (editMode) { setConfirmEdit(true); return; }
    setConfirmNew(true);
  };

  const dm = document.body.classList.contains('dark');
  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.55)',
      display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:100
    }} onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal-in" style={{
        background: dm ? '#1E1E1C' : '#F7F7F4', borderRadius:'20px 20px 0 0',
        width:'100%', maxWidth:480, padding:'20px 20px 36px',
        maxHeight:'90vh', overflowY:'auto'
      }}>
        <div style={{width:36, height:4, background: dm ? '#444440' : '#D8D8D2', borderRadius:2, margin:'0 auto 20px'}} />
        <p style={{fontSize:17, fontWeight:600, color: dm ? '#E8E8E4' : '#1A1A18', marginBottom:4}}>
          {editMode ? 'Editar cosecha' : 'Registrar cosecha parcial'}
        </p>
        <p style={{fontSize:13, color: dm ? '#888884' : '#888884', marginBottom:20}}>
          Disponibles: <strong style={{color: dm ? '#E8E8E4' : '#1A1A18'}}>{maxQty.toLocaleString()} plantas</strong>
        </p>

        <Field label="Fecha de cosecha">
          <input id="mov-fecha" name="mov-fecha" type="date" value={date} onChange={e => setDate(e.target.value)} style={inputStyle()} />
        </Field>

        <Field label="Lechugas cosechadas (para venta)" error={errors.cosechadas}>
          <input type="number" inputMode="numeric" id="cosecha-cosechadas" name="cosecha-cosechadas" placeholder="Ej: 210"
            value={cosechadas}
            onChange={e => { setCosechadas(e.target.value); setErrors({}); }}
            style={inputStyle(errors.cosechadas)} />
        </Field>

        <Field label="Lechugas descartadas (opcional)">
          <input type="number" inputMode="numeric" id="cosecha-descartadas" name="cosecha-descartadas" placeholder="Ej: 5"
            value={descartadas}
            onChange={e => setDescartadas(e.target.value)}
            style={inputStyle()} />
        </Field>

        {totalOut > 0 && totalOut <= currentQty && (
          <div style={{
            background: dm ? '#2A2A28' : '#fff', border:`0.5px solid ${dm ? '#444440' : '#E0E0DA'}`,
            borderRadius:12, padding:'14px 16px', marginBottom:16,
          }}>
            <div style={{display:'flex', gap:0, marginBottom: remaining > 0 ? 12 : 0}}>
              <MermaItem label="Cosechadas" value={totalSale.toLocaleString()} color="#276F50" />
              {totalDiscard > 0 && <MermaItem label="Descartadas" value={totalDiscard.toLocaleString()} color="#E07B2A" />}
              <MermaItem label="Quedan" value={remaining.toLocaleString()} color={remaining === 0 ? '#6B3FA0' : '#1A1A18'} />
            </div>
            {remaining === 0 && (
              <div style={{
                background:'#EEE8F7', borderRadius:8, padding:'8px 12px',
                display:'flex', alignItems:'center', gap:8
              }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6B3FA0" strokeWidth="2" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                <span style={{fontSize:13, color:'#6B3FA0', fontWeight:500}}>
                  Con esta cosecha el lote queda agotado
                </span>
              </div>
            )}
          </div>
        )}

        <Field label="Notas (opcional)">
          <textarea id="cosecha-notas" name="cosecha-notas" value={notes} onChange={e => setNotes(e.target.value)}
            rows={2} placeholder="Ej: tubos 1 al 10, piscina norte..."
            style={{...inputStyle(), resize:'none', lineHeight:1.6}} />
        </Field>

        {confirmEdit ? (
          <ConfirmBar
            message="Esto va a actualizar el registro de cosecha y recalcular los totales del lote."
            onConfirm={() => onConfirm({ date, cosechadas: totalSale, descartadas: totalDiscard, notes: notes.trim() })}
            onCancel={() => setConfirmEdit(false)}
          />
        ) : confirmNew ? (
          <ConfirmBar
            message={`Registrar ${totalSale.toLocaleString()} lechugas cosechadas${totalDiscard > 0 ? ` y ${totalDiscard.toLocaleString()} descartadas` : ''}.`}
            confirmLabel="Sí, registrar"
            onConfirm={() => onConfirm({ date, cosechadas: totalSale, descartadas: totalDiscard, notes: notes.trim() })}
            onCancel={() => setConfirmNew(false)}
          />
        ) : (
          <button onClick={handleConfirm} style={{
            width:'100%', padding:'14px 0', borderRadius:12, border:'none',
            background:'#276F50', color:'#fff', fontSize:15, fontWeight:600,
            cursor:'pointer', marginTop:4
          }}>
            {editMode ? 'Guardar cambios' : 'Confirmar cosecha'}
          </button>
        )}
        <button onClick={onClose} style={{
          width:'100%', padding:'12px 0', borderRadius:12, border:'none',
          background:'none', color:'#888884', fontSize:14, cursor:'pointer', marginTop:6
        }}>
          Cancelar
        </button>
      </div>
    </div>
  );
}

// ── DETALLE LOTE ───────────────────────────────────────
function DetalleLote({ lot, onBack, backLabel = 'Volver', onUpdate, onDelete }) {
  const [editing, setEditing] = useState(false);
  const [showAvanzar, setShowAvanzar] = useState(false);
  const [showCosecha, setShowCosecha] = useState(false);
  const [editCosechaIdx, setEditCosechaIdx] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(false);

  const handleAvanzar = ({ nextStage, date, quantity, notes: moveNotes }) => {
    const isCosecha = nextStage === 'cosecha';
    const cosechaFinal = isCosecha ? {
      date,
      cosechadas: quantity,
      descartadas: 0,
      notes: moveNotes || 'Cosecha final'
    } : null;

    const updated = {
      ...lot,
      stage: nextStage,
      currentQuantity: isCosecha ? 0 : quantity,
      cosechas: isCosecha
        ? [...(lot.cosechas || []), cosechaFinal]
        : lot.cosechas,
      stageHistory: [
        ...lot.stageHistory,
        { stage: nextStage, date, quantity, notes: moveNotes }
      ]
    };
    onUpdate(updated);
    setShowAvanzar(false);
  };

  const handleEditCosecha = (idx, { date, cosechadas, descartadas, notes: cosNotes }) => {
    const newCosechas = lot.cosechas.map((c, i) =>
      i === idx ? { date, cosechadas, descartadas, notes: cosNotes } : c
    );
    // Recalcular currentQuantity desde cero
    const totalOut = newCosechas.reduce((a, c) => a + (c.cosechadas || 0) + (c.descartadas || 0), 0);
    const newQty = Math.max(0, toPlants(lot.quantity) - totalOut);
    const updated = {
      ...lot,
      cosechas: newCosechas,
      currentQuantity: newQty,
      stage: newQty <= 0 ? 'cosecha' : lot.stage,
    };
    onUpdate(updated);
    setEditCosechaIdx(null);
  };

  const handleCosecha = ({ date, cosechadas, descartadas, notes: cosNotes }) => {
    const currentQty = lot.currentQuantity ?? toPlants(lot.quantity);
    const totalOut = cosechadas + descartadas;
    const newQty = currentQty - totalOut;
    const cosechaRecord = { date, cosechadas, descartadas, notes: cosNotes };
    const updated = {
      ...lot,
      currentQuantity: newQty,
      cosechas: [...(lot.cosechas || []), cosechaRecord],
      stage: newQty <= 0 ? 'cosecha' : lot.stage,
      stageHistory: newQty <= 0
        ? [...lot.stageHistory, { stage: 'cosecha', date, quantity: 0, notes: 'Lote agotado' }]
        : lot.stageHistory,
    };
    onUpdate(updated);
    setShowCosecha(false);
  };
  const [form, setForm] = useState({
    name: lot.name,
    variety: VARIETIES.includes(lot.variety) ? lot.variety : 'Otra',
    customVariety: VARIETIES.includes(lot.variety) ? '' : lot.variety,
    date: lot.date, quantity: String(lot.quantity), notes: lot.notes || ''
  });
  const [errors, setErrors] = useState({});
  const [saved, setSaved] = useState(false);
  const [confirmSave, setConfirmSave] = useState(false);

  const set = (key, val) => setForm(f => ({...f, [key]: val}));

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Ingresá un nombre';
    if (!form.quantity || isNaN(form.quantity) || parseInt(form.quantity) <= 0)
      e.quantity = 'Cantidad inválida';
    return e;
  };

  const handleUpdate = () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    const updated = {
      ...lot,
      name: form.name.trim(),
      variety: form.variety === 'Otra' ? (form.customVariety?.trim() || 'Otra') : form.variety,
      date: form.date,
      quantity: parseInt(form.quantity),
      notes: form.notes.trim(),
    };
    onUpdate(updated);
    setSaved(true);
    setTimeout(() => { setSaved(false); setEditing(false); }, 1000);
  };

  const dm = document.body.classList.contains('dark');
  const dmCard = dm ? '#1E1E1C' : '#fff';
  const dmBorder = dm ? '#333330' : '#E0E0DA';
  const dmBorder2 = dm ? '#2A2A28' : '#F0F0EA';
  const dmText = dm ? '#E8E8E4' : '#1A1A18';
  const dmText2 = dm ? '#888884' : '#555550';
  const dmBg2 = dm ? '#2A2A28' : '#F7F7F4';

  if (editing) {
    return (
      <div style={{flex:1, overflowY:'auto', padding:'16px 18px', background: dm ? '#111210' : undefined}}>
        <button onClick={() => setEditing(false)} style={{display:'flex', alignItems:'center', gap:6, background:'none', border:'none', color:'#276F50', fontSize:14, fontWeight:500, cursor:'pointer', marginBottom:20, padding:0}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Cancelar
        </button>
        <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color: dm ? '#888884' : '#555550', textTransform:'uppercase', marginBottom:20}}>Editar lote</p>

        <Field label="Nombre del lote" error={errors.name}>
          <input id="edit-nombre" name="edit-nombre" type="text" value={form.name}
            onChange={e => { set('name', e.target.value); setErrors(er => ({...er, name:undefined})); }}
            style={inputStyle(errors.name)} />
        </Field>
        <Field label="Fecha de siembra">
          <input id="edit-fecha" name="edit-fecha" type="date" value={form.date}
            onChange={e => set('date', e.target.value)}
            style={inputStyle()} />
        </Field>
        <Field label="Cantidad de almácigos sembrados" error={errors.quantity}>
          <input id="edit-cantidad" name="edit-cantidad" type="number" inputMode="numeric" value={form.quantity}
            onChange={e => { set('quantity', e.target.value); setErrors(er => ({...er, quantity:undefined})); }}
            style={inputStyle(errors.quantity)} />
        </Field>
        <Field label="Variedad">
          <div style={{display:'flex', gap:8, marginBottom: form.variety === 'Otra' ? 8 : 0}}>
            {VARIETIES.map(v => (
              <button key={v} onClick={() => { set('variety', v); if (v !== 'Otra') set('customVariety', ''); }} style={{
                flex:1, padding:'12px 0', borderRadius:10, border:'0.5px solid',
                borderColor: form.variety === v ? '#276F50' : '#E0E0DA',
                background: form.variety === v ? '#E2F3EC' : '#fff',
                color: form.variety === v ? '#276F50' : '#555550',
                fontSize:14, fontWeight: form.variety === v ? 600 : 400, cursor:'pointer'
              }}>{v}</button>
            ))}
          </div>
          {form.variety === 'Otra' && (
            <input id="edit-variedad" name="edit-variedad" type="text" placeholder="Nombre de la variedad..."
              value={form.customVariety || ''}
              onChange={e => set('customVariety', e.target.value)}
              style={inputStyle()} autoFocus />
          )}
        </Field>
        <Field label="Notas (opcional)">
          <textarea id="edit-notas" name="edit-notas" value={form.notes} onChange={e => set('notes', e.target.value)}
            rows={3} style={{...inputStyle(), resize:'none', lineHeight:1.7}} />
        </Field>

        {confirmSave ? (
          <ConfirmBar
            message="Los datos del lote se van a actualizar con los valores ingresados."
            onConfirm={() => { setConfirmSave(false); handleUpdate(); }}
            onCancel={() => setConfirmSave(false)}
          />
        ) : (
          <button onClick={() => {
            const e = validate();
            if (Object.keys(e).length) { setErrors(e); return; }
            setConfirmSave(true);
          }} style={{
            width:'100%', padding:'15px 0', borderRadius:12, border:'none',
            background: saved ? '#276F50' : '#1A1A18',
            color:'#fff', fontSize:15, fontWeight:600, cursor:'pointer',
            transition:'background 0.3s', marginTop:8, marginBottom:24
          }}>
            {saved ? '✓ Guardado' : 'Guardar cambios'}
          </button>
        )}
      </div>
    );
  }

  return (
    <>
    {showAvanzar && <AvanzarModal lot={lot} onClose={() => setShowAvanzar(false)} onConfirm={handleAvanzar} />}
    {showCosecha && <CosechaModal lot={lot} onClose={() => setShowCosecha(false)} onConfirm={handleCosecha} />}
    {editCosechaIdx !== null && lot.cosechas?.[editCosechaIdx] && (
      <CosechaModal
        lot={lot}
        editData={lot.cosechas[editCosechaIdx]}
        onClose={() => setEditCosechaIdx(null)}
        onConfirm={(data) => handleEditCosecha(editCosechaIdx, data)}
        editMode
      />
    )}
    <div style={{flex:1, overflowY:'auto', padding:16, background: dm ? '#111210' : undefined}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}}>
        <button onClick={onBack} style={{display:'flex', alignItems:'center', gap:6, background:'none', border:'none', color:'#276F50', fontSize:13, fontWeight:500, cursor:'pointer', padding:0}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          {backLabel}
        </button>
        <button onClick={() => setEditing(true)} style={{
          display:'flex', alignItems:'center', gap:5,
          background: dm ? '#2A2A28' : '#F2F2EC',
          border:`0.5px solid ${dm ? '#444440' : '#E0E0DA'}`,
          borderRadius:20, padding:'6px 14px',
          fontSize:12, fontWeight:500, color: dm ? '#AAAAAA' : '#555550', cursor:'pointer'
        }}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Editar
        </button>
      </div>

      <p style={{fontSize:18, fontWeight:600, color:dmText, marginBottom:4}}>{lot.name}</p>
      <p style={{fontSize:13, color:dmText2, marginBottom:16}}>Sembrado el {formatDate(lot.date)}</p>

      <StageBadge stage={lot.stage} days={daysSince(lot.stageHistory?.[lot.stageHistory.length-1]?.date || lot.date)} maxDays={getMaxDays(lot.stage, lot.stageHistory?.[lot.stageHistory.length-1]?.date || lot.date)} />

      <div style={{background: dmCard, border:`0.5px solid ${dmBorder}`, borderRadius:14, padding:'14px 16px', marginTop:16}}>

function AlertCard({ lot, alert, onSelect }) {
  const isOverdue = alert.status === 'overdue';
  const isWarning = alert.status === 'warning';
  const dm = document.body.classList.contains('dark');
  const accentColor = isOverdue ? '#E05C3A' : isWarning ? '#E07B2A' : '#276F50';
  const accentBg = isOverdue
    ? (dm ? '#2A1A16' : '#FEF6F4')
    : isWarning
    ? (dm ? '#2A1E14' : '#FEF8F2')
    : (dm ? '#1A2A1E' : '#fff');
  const progressPct = Math.min(100, Math.round((alert.days / alert.maxDays) * 100));
  const totalCycleDays = daysSince(lot.date);
  const borderColor = isOverdue||isWarning ? accentColor+'55' : dm ? '#333330' : '#E0E0DA';
  const sepColor = isOverdue||isWarning ? accentColor+'22' : dm ? '#2A2A28' : '#F0F0EA';
  const textColor = dm ? '#E8E8E4' : '#1A1A18';
  const text2Color = dm ? '#888884' : '#555550';

  return (
    <div onClick={() => onSelect(lot)} style={{
      background: accentBg,
      border: `0.5px solid ${borderColor}`,
      borderRadius:14, overflow:'hidden', marginBottom:10, cursor:'pointer',
      WebkitUserSelect:'none', transition:'transform 0.1s',
      display:'flex',
    }}
      onTouchStart={e => e.currentTarget.style.transform='scale(0.985)'}
      onTouchEnd={e => e.currentTarget.style.transform='scale(1)'}
    >
      {(isOverdue || isWarning) && (
        <div style={{width:4, background: accentColor, flexShrink:0}} />
      )}
      <div style={{flex:1, padding:'16px 18px'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10}}>
          <div style={{flex:1, minWidth:0, marginRight:8}}>
            <p style={{fontSize:12, fontWeight:600, color: STAGES[lot.stage].color, letterSpacing:'0.03em', textTransform:'uppercase', marginBottom:4}}>
              {STAGE_LABELS[lot.stage]}

            <p style={{fontSize:16, fontWeight:600, color:textColor, marginBottom:3}}>{lot.name}</p>
            <p style={{fontSize:13, color:text2Color}}>{SEASON_LABEL[alert.season]} · ciclo {totalCycleDays}d</p>
          </div>
          <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:5, flexShrink:0}}>
            <StageBadge stage={lot.stage} days={alert.days} maxDays={alert.maxDays} />
            <div style={{
              background: isOverdue ? '#FDDDD6' : isWarning ? '#FDE8CC' : '#E2F3EC',
              color: isOverdue ? '#C0392B' : isWarning ? '#A85A00' : '#276F50',
              fontSize:11, fontWeight:700, padding:'4px 10px', borderRadius:20
            }}>
              {isOverdue
                ? `${Math.abs(alert.remaining)}d atrasado`
                : isWarning
                ? `Vence en ${alert.remaining}d`

          <span style={{fontSize:13, color:text2Color, fontFamily:'DM Mono, monospace'}}>{(lot.currentQuantity ?? toPlants(lot.quantity)).toLocaleString()} plantas</span>
