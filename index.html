// ── FIRESTORE REST API ────────────────────────────────
const FS_PROJECT = 'nalhuitad-d6758';
const FS_KEY     = 'AIzaSyCHlsJDU0o7JsOvY4mgr5lVhiDOEok3C5w';
const FS_BASE    = `https://firestore.googleapis.com/v1/projects/${FS_PROJECT}/databases/(default)/documents`;

function toFSValue(v) {
  if (v === null || v === undefined) return { nullValue: null };
  if (typeof v === 'boolean') return { booleanValue: v };
  if (typeof v === 'number') return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
  if (typeof v === 'string') return { stringValue: v };
  if (Array.isArray(v)) return { arrayValue: { values: v.map(toFSValue) } };
  if (typeof v === 'object') return { mapValue: { fields: toFSFields(v) } };
}
function toFSFields(obj) {
  const f = {};
  for (const [k, v] of Object.entries(obj)) f[k] = toFSValue(v);
  return f;
}
function fromFSValue(v) {
  if (!v) return null;
  if ('stringValue'  in v) return v.stringValue;
  if ('integerValue' in v) return parseInt(v.integerValue);
  if ('doubleValue'  in v) return v.doubleValue;
  if ('booleanValue' in v) return v.booleanValue;
  if ('nullValue'    in v) return null;
  if ('arrayValue'   in v) return (v.arrayValue.values || []).map(fromFSValue);
  if ('mapValue'     in v) return fromFSDoc({ fields: v.mapValue.fields || {} });
  return null;
}
function fromFSDoc(doc) {
  const obj = {};
  for (const [k, v] of Object.entries(doc.fields || {})) obj[k] = fromFSValue(v);
  if (doc.name) obj.id = doc.name.split('/').pop();
  return obj;
}

const AUTH_EXPIRED_ERROR = 'AUTH_EXPIRED';

const fsDb = {
  getToken() {
    try {
      const s = JSON.parse(localStorage.getItem('hidro_auth_v1') || 'null');
      return s?.idToken || null;
    } catch { return null; }
  },
  // Retorna token vigente, refrescando si está por vencer
  async getFreshToken() {
    try {
      const s = JSON.parse(localStorage.getItem('hidro_auth_v1') || 'null');
      if (!s?.idToken) return null;
      // Refrescar si quedan menos de 5 minutos
      if (s.expiresAt && Date.now() > s.expiresAt - 5 * 60 * 1000) {
        const newToken = await fsAuth.refreshToken();
        return newToken || s.idToken;
      }
      return s.idToken;
    } catch { return null; }
  },
  async headers() {
    const token = await this.getFreshToken();
    const h = { 'Content-Type': 'application/json' };
    if (token) h['Authorization'] = 'Bearer ' + token;
    return h;
  },
  async ensureFreshToken(r) {
    if (r.status !== 401 && r.status !== 403) return true;
    const newToken = await fsAuth.refreshToken();
    if (!newToken) { fsAuth.clear(); throw new Error(AUTH_EXPIRED_ERROR); }
    return false; // necesita retry con nuevo token
  },
  async list(col) {
    let r = await fetch(FS_BASE + '/' + col + '?key=' + FS_KEY, { headers: await this.headers() });
    const ok = await this.ensureFreshToken(r);
    if (!ok) r = await fetch(FS_BASE + '/' + col + '?key=' + FS_KEY, { headers: await this.headers() });
    const j = await r.json();
    return (j.documents || []).map(fromFSDoc);
  },
  async set(col, id, data) {
    const { id: _id, ...rest } = data;
    const body = JSON.stringify({ fields: toFSFields(rest) });
    let r = await fetch(FS_BASE + '/' + col + '/' + id + '?key=' + FS_KEY, {
      method: 'PATCH', headers: await this.headers(), body
    });
    const ok = await this.ensureFreshToken(r);
    if (!ok) r = await fetch(FS_BASE + '/' + col + '/' + id + '?key=' + FS_KEY, {
      method: 'PATCH', headers: await this.headers(), body
    });
  },
  async del(col, id) {
    let r = await fetch(FS_BASE + '/' + col + '/' + id + '?key=' + FS_KEY, {
      method: 'DELETE', headers: await this.headers()
    });
    const ok = await this.ensureFreshToken(r);
    if (!ok) await fetch(FS_BASE + '/' + col + '/' + id + '?key=' + FS_KEY, {
      method: 'DELETE', headers: await this.headers()
    });
  }
};

// ── FIREBASE AUTH REST API ────────────────────────────
const AUTH_KEY = 'AIzaSyC246p0MSQkLZwXXDj8ibJox940k6HHG5o';
const AUTH_URL     = `https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${AUTH_KEY}`;
const REFRESH_URL  = `https://securetoken.googleapis.com/v1/token?key=${AUTH_KEY}`;
const AUTH_STORE_KEY = 'hidro_auth_v1';
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 15 * 60 * 1000;

const fsAuth = {
  async signIn(email, password) {
    const r = await fetch(AUTH_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, returnSecureToken: true })
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j?.error?.message || 'ERROR');
    return {
      idToken: j.idToken,
      refreshToken: j.refreshToken,
      email: j.email,
      expiresAt: Date.now() + (parseInt(j.expiresIn) * 1000),
    };
  },
  async refreshToken() {
    try {
      const s = this.load();
      if (!s?.refreshToken) return null;
      const r = await fetch(REFRESH_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `grant_type=refresh_token&refresh_token=${s.refreshToken}`
      });
      const j = await r.json();
      if (!r.ok) return null;
      const updated = {
        ...s,
        idToken: j.id_token,
        refreshToken: j.refresh_token,
        expiresAt: Date.now() + (parseInt(j.expires_in) * 1000),
      };
      this.save(updated);
      return updated.idToken;
    } catch { return null; }
  },
  save(session) {
    try { localStorage.setItem(AUTH_STORE_KEY, JSON.stringify({ ...session, ts: Date.now() })); } catch {}
  },
  load() {
    try {
      const s = JSON.parse(localStorage.getItem(AUTH_STORE_KEY) || 'null');
      if (!s) return null;
      if (Date.now() - s.ts > 30 * 24 * 60 * 60 * 1000) { this.clear(); return null; }
      return s;
    } catch { return null; }
  },
  clear() { try { localStorage.removeItem(AUTH_STORE_KEY); } catch {} },
  getAttempts() {
    try { return JSON.parse(localStorage.getItem('hidro_attempts') || '{"count":0,"ts":0}'); } catch { return {count:0,ts:0}; }
  },
  addAttempt() {
    const a = this.getAttempts();
    const newA = { count: a.count + 1, ts: Date.now() };
    try { localStorage.setItem('hidro_attempts', JSON.stringify(newA)); } catch {}
    return newA;
  },
  clearAttempts() { try { localStorage.removeItem('hidro_attempts'); } catch {} },
  isLocked() {
    const a = this.getAttempts();
    if (a.count < MAX_ATTEMPTS) return false;
    if (Date.now() - a.ts < LOCKOUT_MS) return true;
    this.clearAttempts();
    return false;
  },
  lockRemaining() {
    const a = this.getAttempts();
    return Math.ceil((LOCKOUT_MS - (Date.now() - a.ts)) / 60000);
  }
};


const { useState, useEffect, useCallback, useContext, createContext, useMemo } = React;

// ── DARK MODE CONTEXT ─────────────────────────────────
const DarkContext = createContext(false);
const useDarkMode = () => useContext(DarkContext);

// Helper para leer dark mode en cualquier componente
const useDark = () => document.body.classList.contains('dark');

// ── COLORS (Opus palette) ─────────────────────────────
const COLORS = {
  bg1:'#0F1219', bg2:'#1A1F2E', bgCard:'#1E2538', bgCardH:'#242D44', bgInput:'#1A2030',
  text1:'#F0F2F5', text2:'#8A9BBF', text3:'#556180',
  border:'#2A3350', sep:'#181E2E',
  stageA:'#C4873B', stageT:'#3B8DD4', stageR:'#B83D7A', stageC:'#7C4DDB',

function getColors() {

// ── HARVEST PROJECTION (Opus algorithm) ──────────────
const CAPACITY_PER_TRIP = 210;

const INV_A = {

const CAPACIDAD_DEFINITIVOS = INV_A.capacidadTotal + INV_B.capacidadTotal; // 3756

// ── PROGRESO DE RALEO ─────────────────────────────────
// Analiza el array raleos[] del lote padre y calcula:
// - Cuántas plantas se han raleado y cuántas quedan
// - Ritmo (plantas/día) basado en el historial real
// - Fecha proyectada para terminar el raleo
function getRaleoProgress(lot) {
  const raleos = lot.raleos || [];
  if (!raleos.length) return null;

  const total = (lot.currentQuantity || 0) + raleos.reduce(function(a, r) { return a + (r.cantidadRaleada || 0); }, 0);
  const raleadas = raleos.reduce(function(a, r) { return a + (r.cantidadRaleada || 0); }, 0);
  const restantes = lot.currentQuantity || 0;
  const porcentaje = total > 0 ? Math.round((raleadas / total) * 100) : 0;

  // Calcular ritmo real — ordenar raleos por fecha
  const sorted = raleos
    .filter(function(r) { return r.fecha; })
    .slice()
    .sort(function(a, b) { return new Date(a.fecha) - new Date(b.fecha); });

  var ritmo = null; // plantas/día
  var proyeccionFin = null;

  if (sorted.length >= 2) {
    const fechaInicio = new Date(sorted[0].fecha + 'T12:00:00');
    const fechaUltimo = new Date(sorted[sorted.length - 1].fecha + 'T12:00:00');
    const diasTranscurridos = Math.max(1, Math.round((fechaUltimo - fechaInicio) / 86400000));
    ritmo = Math.round(raleadas / diasTranscurridos);
    if (ritmo > 0 && restantes > 0) {
      const diasRestantes = Math.ceil(restantes / ritmo);
      proyeccionFin = new Date(fechaUltimo);
      proyeccionFin.setDate(proyeccionFin.getDate() + diasRestantes);
    }
  } else if (sorted.length === 1 && restantes > 0) {
    // Solo un raleo — no hay ritmo aún, mostrar fecha del raleo
    proyeccionFin = null;
    ritmo = null;
  }

  return {
    total, raleadas, restantes, porcentaje,
    ritmo, proyeccionFin,
    fechaInicio: sorted.length ? sorted[0].fecha : null,
    fechaUltimo: sorted.length ? sorted[sorted.length - 1].fecha : null,
    cantidadRaleos: raleos.length,
  };
}

function projectHarvests(lot) {
  const raleoEntry = (lot.stageHistory || []).find(function(h) { return h.stage === 'raleo'; });
  if (!raleoEntry) return [];
  const raleoDate = new Date(raleoEntry.date + 'T12:00:00');
  const season = getSeason();
  const daysToHarvest = STAGE_DAYS.raleo[season] || 35;
  const harvestStart = new Date(raleoDate);
  harvestStart.setDate(harvestStart.getDate() + daysToHarvest);
  const totalPlants = lot.currentQuantity ?? toPlantCount(lot.quantity);
  if (totalPlants <= 0) return [];
  const tripsNeeded = Math.ceil(totalPlants / CAPACITY_PER_TRIP);
  const events = [];
  let remaining = totalPlants;
  for (let i = 0; i < tripsNeeded; i++) {
    const eventDate = new Date(harvestStart);
    eventDate.setDate(eventDate.getDate() + (i * DAYS_BETWEEN_TRIPS));
    const batch = Math.min(remaining, CAPACITY_PER_TRIP);
    remaining -= batch;
    events.push({ date: eventDate, plants: batch, tripNumber: i + 1, totalTrips: tripsNeeded, lotName: lot.name, variety: lot.variety, lotId: lot.id, proyectado: true });
  }
  return events;
}

function getMonthProjection(lots, year, month) {
  const monthStart = new Date(year, month, 1);
  const monthEnd   = new Date(year, month + 1, 0, 23, 59, 59);
  const allEvents  = [];
  lots.filter(function(l) { return l.stage === 'raleo'; }).forEach(function(lot) {
    projectHarvests(lot).forEach(function(h) {
      if (h.date >= monthStart && h.date <= monthEnd) allEvents.push(h);
    });
  });
  // Add real cosechas as confirmed events
  lots.forEach(function(lot) {
    (lot.cosechas || []).forEach(function(c) {
      const d = new Date(c.date + 'T12:00:00');
      if (d >= monthStart && d <= monthEnd) {
        allEvents.push({ date: d, plants: c.cosechadas || 0, lotName: lot.name, variety: lot.variety, lotId: lot.id, proyectado: false });
      }
    });
  });
  allEvents.sort(function(a, b) { return a.date - b.date; });
  return allEvents;
}

function daysSince(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.floor((today - date) / 86400000);
}

function formatDate(dateStr) {
  const [y, m, d] = dateStr.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

}

};

function genLotId(variety, dateStr) {
  const d = dateStr ? new Date(dateStr) : new Date();
  const aa = String(d.getFullYear()).slice(2);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const varCode = VARIETY_CODES[variety] || 'OTR';
  return 'L' + aa + mm + dd + '-NA-' + varCode + '-00';
}

function genChildLotId(parentId) {
  // L260408-NA-MIL-00 -> L260408-NA-MIL-01, 02...
  const parts = parentId.split('-');
  const counter = parseInt(parts[parts.length-1]) + 1;
  parts[parts.length-1] = String(counter).padStart(2,'0');
  return parts.join('-');
}

function getNextChildId(parentId, existingChildrenIds) {
  if (!existingChildrenIds || existingChildrenIds.length === 0) return genChildLotId(parentId);
  // Find highest counter
  const counters = existingChildrenIds.map(id => {
    const parts = id.split('-');
    return parseInt(parts[parts.length-1]) || 0;
  });
  const max = Math.max(...counters);
  const parts = parentId.split('-');
  parts[parts.length-1] = String(max+1).padStart(2,'0');
  return parts.join('-');
}

// Estaciones hemisferio sur
function getSeason(dateStr) {
  const m = new Date(dateStr).getMonth() + 1;
  if ([12,1,2].includes(m)) return 'verano';
  if ([3,4,5].includes(m)) return 'otono';
  if ([6,7,8].includes(m)) return 'invierno';
  return 'primavera';
}

const STAGE_DAYS = {
  almacigo:    { verano:28, otono:32, invierno:35, primavera:30 },
  transplante: { verano:15, otono:15, invierno:15, primavera:15 },
  raleo:       { verano:22, otono:35, invierno:50, primavera:28 },
};

function getLotAlert(lot) {
  if (lot.stage === 'cosecha') return null;
  const expected = STAGE_DAYS[lot.stage];
  if (!expected) return null;
  const history = lot.stageHistory || [];
  if (!history.length) return null;
  const stageEntry = history[history.length - 1];
  if (!stageEntry || !stageEntry.date) return null;
  const season = getSeason(stageEntry.date);
  const maxDays = expected[season];
  if (!maxDays) return null;
  const days = daysSince(stageEntry.date);
  const remaining = maxDays - days;
  if (remaining < 0)  return { status:'overdue',  remaining, maxDays, days, season };
  if (remaining <= 3) return { status:'warning',  remaining, maxDays, days, season };
  return { status:'ok', remaining, maxDays, days, season };
}

function getScene(weathercode, hour) {
  const isRain = [51,53,55,61,63,65,71,73,75,80,81,82,95,96,99].includes(weathercode);
  const isNight = hour >= 21 || hour < 6;
  const isDawn  = hour >= 6  && hour < 9;
  const isDusk  = hour >= 18 && hour < 21;
  // isDay = 9-18
  if (isNight && isRain)  return 'night_rain';
  if (isNight)            return 'night_clear';
  if (isDawn  && isRain)  return 'day_rain';
  if (isDawn)             return 'dawn';
  if (isDusk  && isRain)  return 'day_rain';
  if (isDusk)             return 'dusk';
  if (isRain)             return 'day_rain';
  return 'day_clear';
}

function WeatherCard() {
  const { weather, wError } = useWeather();
  const dm = useDarkMode();
  const [expandedStat, setExpandedStat] = useState(null);

  if (wError) return null;
  if (!weather) return (
    <div style={{background:'var(--bg-card)', border:'0.5px solid var(--border)', borderRadius:18, overflow:'hidden', marginBottom:8}}>
      <div className="skeleton" style={{height:196, borderRadius:0}} />
      <div style={{padding:'12px 16px', display:'flex', gap:8}}>
        {[1,2,3,4,5,6].map(i => <div key={i} className="skeleton" style={{flex:1, height:52, borderRadius:10}} />)}
      </div>
    </div>
  );

  const c = weather.current;
  const d = weather.daily;
  const h = weather.hourly;
  const desc = WEATHER_CODES[c.weathercode] || 'Variable';
  const windDir = ['N','NE','E','SE','S','SO','O','NO'][Math.round(c.wind_direction_10m / 45) % 8];
  const alert = getWeatherAlert(weather);
  const hora = new Date().getHours();
  const scene = getScene(c.weathercode, hora);
  const nowIso = new Date().toISOString().slice(0,13);
  const hourlyStart = h ? h.time.findIndex(t => t >= nowIso) : -1;
  const nextHours = hourlyStart >= 0 ? h.time.slice(hourlyStart, hourlyStart + 7) : [];

  const bgColors = {
    night_clear: '#060E18',
    night_rain:  '#08101A',
    dawn:        '#1A1015',
    dusk:        '#1A0A10',
    day_clear:   '#0E2030',
    day_rain:    '#1A2535',
  };
  const bg = bgColors[scene] || '#0E1B2E';

  const toggleStat = (key) => setExpandedStat(prev => prev === key ? null : key);

  const SceneMap = {
    night_clear: SceneNightClear,
    night_rain:  SceneNightRain,
    dawn:        SceneDawn,
    dusk:        SceneDusk,
    day_clear:   SceneDayClear,
    day_rain:    SceneDayRain,
  };
  const SceneComponent = SceneMap[scene] || SceneNightClear;

  const statRows = [
    { key:'prec', icon:'🌂', label:'Precipitaciones', value: (d.precipitation_probability_max?.[0] ?? 0) + '%', detail: (d.precipitation_sum?.[0] ?? 0).toFixed(1) + ' mm esperados hoy' },
    { key:'wind', icon:'🌬️', label:'Viento',           value: windDir + ' ' + Math.round(c.wind_speed_10m) + ' km/h', detail: 'Dirección ' + windDir + ' · ráfagas posibles' },
    { key:'hum',  icon:'💧', label:'Humedad',          value: c.relative_humidity_2m + '%', detail: 'Sensación térmica ' + Math.round(c.apparent_temperature) + '°C' },
  ];

  return (
    <div style={{background:bg, border:'0.5px solid var(--border)', borderRadius:18, overflow:'hidden', marginBottom:8, transform:'translateZ(0)', WebkitTransform:'translateZ(0)'}}>
      {/* Escena ilustrada */}
      <div style={{position:'relative', height:196, overflow:'hidden', transform:'translateZ(0)', WebkitTransform:'translateZ(0)'}}>
        <SceneComponent />
        {/* Texto sobre escena — siempre legible */}
        <div style={{position:'absolute', top:0, left:0, right:0, padding:'18px 20px', display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
          <div>
            <p style={{fontSize:11, color:'rgba(255,255,255,0.65)', marginBottom:8, letterSpacing:'.02em'}}>Ahora · Nalhuitad</p>
            <p style={{fontSize:54, fontWeight:300, color:'#fff', lineHeight:1, fontFamily:'DM Mono, monospace'}}>{Math.round(c.temperature_2m)}°</p>
          </div>
          <div style={{textAlign:'right', paddingTop:2}}>
            <p style={{fontSize:15, fontWeight:600, color:'#fff', marginBottom:3}}>{desc}</p>
            <p style={{fontSize:12, color:'rgba(255,255,255,0.7)'}}>{'Sensación de ' + Math.round(c.apparent_temperature) + '°'}</p>
          </div>
        </div>
      </div>

      {/* Alerta contextual */}
      {alert && (
        <div style={{background:bg, padding:'0 14px 8px'}}>
          <div style={{
            borderLeft:'3px solid ' + (alert.nivel==='rojo'?'var(--red)':alert.nivel==='ambar'?'var(--amber)':'var(--stage-t)'),
            background:'rgba(255,255,255,0.05)', borderRadius:'0 8px 8px 0', padding:'7px 12px',
          }}>
            <p style={{fontSize:12, fontWeight:600, color: alert.nivel==='rojo'?'var(--red)':alert.nivel==='ambar'?'var(--amber)':'var(--stage-t)', marginBottom:2}}>
              {alert.nivel==='rojo'?'🌧 ':alert.nivel==='ambar'?'⚠ ':'ℹ '}{alert.msg}
            </p>
            <p style={{fontSize:11, color:'rgba(255,255,255,0.65)', lineHeight:1.5}}>{alert.accion}</p>
          </div>
        </div>
      )}

      {/* Franja horaria — Google style */}
      <div style={{background:bg, display:'flex', overflowX:'auto', scrollbarWidth:'none', borderBottom:'0.5px solid rgba(255,255,255,0.12)', padding:'4px 8px 2px'}}>
        {nextHours.map((t, i) => {
          const label = i === 0 ? 'Ahora' : t.slice(11,16);
          const wcode = h.weathercode[hourlyStart + i];
          const tmp = h ? Math.round(h.temperature_2m[hourlyStart + i]) : '--';
          return (
            <div key={t} style={{
              display:'flex', flexDirection:'column', alignItems:'center', gap:5,
              padding:'12px 14px', flexShrink:0, minWidth:64,
              background: i===0 ? 'rgba(255,255,255,0.15)' : 'none',
              borderRadius:40, margin:'6px 4px',
            }}>
              <p style={{fontSize:12, color: i===0?'#fff':'rgba(255,255,255,0.75)', fontWeight:i===0?700:400}}>{label}</p>
              <WeatherIcon code={wcode} size={26} />
              <p style={{fontSize:15, fontWeight:600, color:'#fff', fontFamily:'DM Mono, monospace'}}>{tmp}°</p>
            </div>
          );
        })}
      </div>

      {/* 5 dias — Google style */}
      <div style={{background:bg, padding:'10px 12px', borderBottom:'0.5px solid rgba(255,255,255,0.12)'}}>
        <div style={{display:'flex', gap:0}}>
          {d.time.slice(0,5).map((dateStr, i) => {
            const date = new Date(dateStr + 'T12:00:00');
            const dayName = i === 0 ? 'hoy' : DIAS_SEMANA_CORTO[date.getDay()];
            const isToday = i === 0;
            return (
              <div key={dateStr} style={{
                display:'flex', flexDirection:'column', alignItems:'center', gap:6,
                padding:'10px 8px', flex:1,
                background: isToday ? 'rgba(255,255,255,0.15)' : 'none',
                borderRadius:16,
              }}>
                <p style={{fontSize:13, fontWeight:isToday?700:500, color:isToday?'#fff':'rgba(255,255,255,0.75)'}}>{dayName}</p>
                <WeatherIcon code={d.weathercode[i]} size={28} />
                <p style={{fontSize:12, fontWeight:600, color:'#fff', fontFamily:'DM Mono, monospace', whiteSpace:'nowrap'}}>{Math.round(d.temperature_2m_max[i])}°/{Math.round(d.temperature_2m_min[i])}°</p>
              </div>
            );
          })}
        </div>
      </div>

      {/* Stats expandibles — Google style */}
      <div style={{background:bg, paddingBottom:4}}>
        {statRows.map(stat => (
          <div key={stat.key}>
            <button onClick={() => toggleStat(stat.key)} style={{
              width:'100%', display:'flex', alignItems:'center', gap:14,
              padding:'16px 18px', background:'none', border:'none', cursor:'pointer',
              borderTop:'0.5px solid rgba(255,255,255,0.1)',
            }}>
              <div style={{width:44, height:44, borderRadius:12, background:'rgba(255,255,255,0.12)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, flexShrink:0}}>{stat.icon}</div>
              <p style={{flex:1, fontSize:16, fontWeight:500, color:'#fff', textAlign:'left'}}>{stat.label}</p>
              <p style={{fontSize:15, color:'rgba(255,255,255,0.75)', fontFamily:'DM Mono, monospace'}}>{stat.value}</p>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.45)" strokeWidth="2.2" strokeLinecap="round" style={{flexShrink:0, transform: expandedStat===stat.key?'rotate(90deg)':'none', transition:'transform 0.2s'}}><polyline points="9 18 15 12 9 6"/></svg>
            </button>
            {expandedStat === stat.key && (
              <div style={{padding:'0 18px 14px 76px', background:'rgba(255,255,255,0.05)'}}>
                <p style={{fontSize:13, color:'rgba(255,255,255,0.65)', lineHeight:1.6}}>{stat.detail}</p>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}
function WeatherStat({ icon, label, value }) {
  return (
    <div style={{flex:1, textAlign:'center'}}>

function getMaxDays(stage, stageDate) {
  const expected = STAGE_DAYS[stage];
  if (!expected) return null;
  return expected[getSeason(stageDate)];
}

// Calcula la fecha estimada de cosecha sumando días restantes de cada etapa
function getEstimatedHarvestDate(lot) {
  if (lot.stage === 'cosecha') return null;
  const stageOrder = ['almacigo', 'transplante', 'raleo'];
  const currentIdx = stageOrder.indexOf(lot.stage);
  if (currentIdx === -1) return null;

  const stageEntry = lot.stageHistory[lot.stageHistory.length - 1];
  const daysInCurrent = daysSince(stageEntry.date);
  const maxCurrent = STAGE_DAYS[lot.stage][getSeason(stageEntry.date)] || 30;
  let daysLeft = Math.max(0, maxCurrent - daysInCurrent);

  // Sumar días de etapas siguientes (usando temporada de hoy)
  const today = todayISO();
  for (let i = currentIdx + 1; i < stageOrder.length; i++) {
    const s = stageOrder[i];
    daysLeft += STAGE_DAYS[s][getSeason(today)] || 30;
  }

  const result = new Date();
  result.setDate(result.getDate() + daysLeft);
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return { date: result, label: result.getDate() + ' ' + months[result.getMonth()], daysLeft };
}

const LotCard = React.memo(function LotCard({ lot, onSelect, muted }) {
  const currentStageEntry = lot.stageHistory[lot.stageHistory.length - 1];
  const days = daysSince(currentStageEntry.date);
  const maxDays = getMaxDays(lot.stage, currentStageEntry.date);
  const totalCycleDays = daysSince(lot.date);
  const alert = getLotAlert(lot);
  const harvest = lot.stage !== 'cosecha' ? getEstimatedHarvestDate(lot) : null;

  // ISL calculation
  const qty = lot.quantity || 1;
  const mort = lot.mortalidadAcumulada || 0;
  const pMort = Math.max(0, 1 - (mort / qty));
  const pTiempo = maxDays > 0 ? Math.max(0, 1 - (days / maxDays)) : 1;
  const isl = Math.round((pMort * 50) + (pTiempo * 50));
  const islColor = isl >= 75 ? 'var(--green)' : isl >= 50 ? 'var(--amber)' : 'var(--red)';

  const isOverdue = alert?.status === 'overdue';
  const isWarning = alert?.status === 'warning';
  const accentColor = isOverdue ? 'var(--red)' : isWarning ? 'var(--amber)' : null;
  const accentBg    = isOverdue ? 'var(--bg-card-h)' : isWarning ? 'var(--bg-card-h)' : 'var(--bg-card)';

  const handleClick = React.useCallback(() => onSelect(lot), [lot, onSelect]);

  return (
    <div
      className="lot-card"
      onClick={handleClick}
      style={{
        background: accentBg,
        border: `0.5px solid ${accentColor ? accentColor : 'var(--border)'}`,
        borderRadius:14, overflow:'hidden', transform:'translateZ(0)', WebkitTransform:'translateZ(0)',
        marginBottom:10, cursor:'pointer',
        opacity: muted ? 0.55 : 1,
        WebkitUserSelect:'none',
        display:'flex',
      }}
    >
      {accentColor && (
        <div style={{width:4, background: accentColor, flexShrink:0}} />
      )}
      <div style={{flex:1, padding:'16px 18px 80px'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10}}>
          <div style={{flex:1, minWidth:0, marginRight:8}}>
            <p style={{fontSize:12, fontWeight:600, color: STAGES[lot.stage].color, letterSpacing:'0.03em', textTransform:'uppercase', marginBottom:4}}>
              {STAGE_LABELS[lot.stage]}
            </p>
            <p className="dm-text" style={{fontSize:16, fontWeight:600, color:'var(--text-1)', marginBottom:3}}>{lot.name}</p>
            {/* Ubicación si existe */}
            {lot.location?.identificador && (
              <p style={{fontSize:11, color:'var(--text-3)', marginBottom:3}}>
                {'INV-' + lot.location.invernadero + ' · ' + (lot.location.tipo||'').charAt(0).toUpperCase() + (lot.location.tipo||'').slice(1) + ' ' + lot.location.identificador}
              </p>
            )}
            <p className="dm-text2" style={{fontSize:13, color:'var(--text-2)'}}>Sembrado {formatDate(lot.date)}</p>
            {harvest && (
              <div style={{display:'flex', alignItems:'center', gap:5, marginTop:5}}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--green)" strokeWidth="2.5" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span style={{fontSize:12, color:'var(--green)', fontWeight:600}}>
                  {'Lista ~' + harvest.label}
                </span>
                {harvest.daysLeft > 0 && (
                  <span style={{fontSize:11, color:'var(--text-3)'}}>
                    {'(' + harvest.daysLeft + 'd)'}
                  </span>
                )}
              </div>
            )}
          </div>
          <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:5, flexShrink:0}}>
            <StageBadge stage={lot.stage} days={days} maxDays={maxDays} />
            {/* ISL badge */}
            <span style={{fontSize:11, fontWeight:700, padding:'3px 9px', borderRadius:20, background:'var(--bg-card-h)', color:islColor}}>
              ISL {isl}%
            </span>
            {alert && alert.status !== 'ok' && (
              <span style={{
                fontSize:11, fontWeight:700, padding:'4px 10px', borderRadius:20,
                background: isOverdue ? 'var(--bg-card-h)' : 'var(--bg-card-h)',
                color: isOverdue ? '#C0392B' : '#A85A00',
              }}>
                {isOverdue
                  ? `${Math.abs(alert.remaining)} día${Math.abs(alert.remaining)!==1?'s':''} atrasado`
                  : `Vence en ${alert.remaining} día${alert.remaining!==1?'s':''}`}
              </span>
            )}
          </div>
        </div>
        <div style={{display:'flex', gap:20, marginTop:8, paddingTop:10, borderTop:`0.5px solid ${accentColor ? accentColor : 'var(--sep)'}`}}>
          <Stat label="Ciclo total" value={`${totalCycleDays}d`} />
          <Stat label="Plantas al sembrar" value={toPlants(lot.quantity).toLocaleString()} />
          <Stat label="En producción" value={(lot.currentQuantity ?? toPlants(lot.quantity)).toLocaleString()} />
        </div>
        {(() => {
          const rp = getRaleoProgress(lot);
          if (!rp || rp.cantidadRaleos === 0) return null;
          return (
            <div style={{marginTop:10, paddingTop:10, borderTop:'0.5px solid var(--sep)'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:5}}>
                <span style={{fontSize:11, color:'var(--text-3)', letterSpacing:'0.02em'}}>PROGRESO RALEO</span>
                <span style={{fontSize:11, fontWeight:700, fontFamily:'DM Mono, monospace', color:'var(--stage-r)'}}>
                  {rp.raleadas.toLocaleString()} / {rp.total.toLocaleString()} plantas · {rp.porcentaje}%
                </span>
              </div>
              <div style={{height:5, background:'var(--bg-card-h)', borderRadius:4, overflow:'hidden', marginBottom:5}}>
                <div style={{height:'100%', width:rp.porcentaje + '%', background:'var(--stage-r)', borderRadius:4, transition:'width 0.4s'}} />
              </div>
              <div style={{display:'flex', justifyContent:'space-between'}}>
                <span style={{fontSize:11, color:'var(--text-3)'}}>
                  {rp.ritmo ? (rp.ritmo.toLocaleString() + ' plantas/día') : (rp.cantidadRaleos + ' raleo' + (rp.cantidadRaleos > 1 ? 's' : '') + ' registrado' + (rp.cantidadRaleos > 1 ? 's' : ''))}
                </span>
                <span style={{fontSize:11, color: rp.proyeccionFin ? 'var(--text-3)' : 'var(--text-3)'}}>
                  {rp.proyeccionFin
                    ? ('Fin est. ' + rp.proyeccionFin.toLocaleDateString('es-CL', {day:'numeric', month:'short'}))
                    : (rp.restantes > 0 ? rp.restantes.toLocaleString() + ' restantes' : '✓ Completo')}
                </span>
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
});

function Stat({ label, value }) {
  return (
    <div>
      <p className="dm-text3" style={{fontSize:11, color:'var(--text-2)', marginBottom:3, letterSpacing:'0.02em'}}>{label}</p>
      <p className="dm-text" style={{fontSize:14, fontWeight:600, color:'var(--text-1)', fontFamily:'DM Mono, monospace'}}>{value}</p>
    </div>
  );
}

function CosechadoCard({ lot, onSelect }) {
  const totalCosechadas = (lot.cosechas || []).reduce((a, c) => a + (c.cosechadas || 0), 0);
  const totalDescartadas = (lot.cosechas || []).reduce((a, c) => a + (c.descartadas || 0), 0);
  const plantasIniciales = toPlants(lot.quantity);
  const rendimiento = plantasIniciales > 0 ? Math.round((totalCosechadas / plantasIniciales) * 100) : 0;
  const fechaInicio = lot.date;
  const fechaFin = lot.cosechas?.length > 0 ? lot.cosechas[lot.cosechas.length-1].date : null;
  const duracion = fechaFin ? daysSince(fechaInicio) - daysSince(fechaFin) : daysSince(fechaInicio);

  return (
    <div className="lot-card dm-card" onClick={() => onSelect(lot)} style={{
      background:'#fff', border:'0.5px solid var(--border)',
      borderRadius:14, padding:'16px 18px', marginBottom:10,
      cursor:'pointer', opacity:0.75, WebkitUserSelect:'none',
    }}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10}}>
        <div style={{flex:1, minWidth:0, marginRight:8}}>
          <p style={{fontSize:12, fontWeight:600, color: STAGES.cosecha.color, letterSpacing:'0.03em', textTransform:'uppercase', marginBottom:4}}>
            {STAGE_LABELS.cosecha}
          </p>
          <p className="dm-text" style={{fontSize:16, fontWeight:600, color:'var(--text-1)', marginBottom:3}}>{lot.name}</p>
          <p className="dm-text2" style={{fontSize:13, color:'var(--text-2)'}}>Sembrado {formatDate(fechaInicio)}</p>
        </div>
        <div style={{
          background:'var(--bg-card-h)', color:'var(--stage-c)',
          fontSize:13, fontWeight:600, padding:'5px 12px',
          borderRadius:20, flexShrink:0, textAlign:'center'
        }}>
          {rendimiento}% rendimiento
        </div>
      </div>
      <div className="dm-sep" style={{display:'flex', gap:20, paddingTop:10, borderTop:'0.5px solid var(--sep)'}}>
        <Stat label="Cosechadas" value={totalCosechadas.toLocaleString()} />
        <Stat label="Descartadas" value={totalDescartadas.toLocaleString()} />
        <Stat label="Ciclo" value={`${duracion}d`} />
      </div>
    </div>
  );
}

// ── NUEVO SCREEN ───────────────────────────────────────
function NuevoScreen({ onSave, goToLotes }) {
  const [form, setForm] = useState({
    name: '', variety: 'Milena', customVariety: '', date: todayISO(), quantity: '', notes: '',
    invOrigen: 'D', ubicTipo: 'bandeja', ubicId: 'B01',
  });
  const [saved, setSaved] = useState(false);
  const [errors, setErrors] = useState({});
  const [confirmSave, setConfirmSave] = useState(false);

  const set = (key, val) => setForm(f => ({ ...f, [key]: val }));

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Ingresá un nombre para el lote';
    if (!form.quantity || isNaN(form.quantity) || parseInt(form.quantity) <= 0)
      e.quantity = 'Ingresá una cantidad válida';
    if (form.variety === 'Otra' && !form.customVariety?.trim())
      e.customVariety = 'Ingresá el nombre de la variedad';
    return e;
  };

  const handleSave = () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    const variety = form.variety === 'Otra' ? form.customVariety.trim() : form.variety;
    const lot = {
      id: genLotId(variety, form.date),
      name: form.name.trim(),
      variety,
      varietyCode: VARIETY_CODES[variety] || 'OTR',
      date: form.date,
      quantity: parseInt(form.quantity),
      currentQuantity: toPlants(parseInt(form.quantity)),
      stage: 'almacigo',
      parentId: null,
      childrenIds: [],
      isRootLot: true,
      mortalidadAcumulada: 0,
      location: { invernadero: form.invOrigen, tipo: form.ubicTipo, identificador: form.ubicId },
      setpoints: { ecTarget: 1.8, ecTolerance: 0.3, phMin: 5.5, phMax: 6.5, tempMaxAgua: 24 },
      stageHistory: [{ stage: 'almacigo', date: form.date, quantity: toPlants(parseInt(form.quantity)), location: { invernadero: form.invOrigen, tipo: form.ubicTipo, identificador: form.ubicId } }],
      notes: form.notes.trim(),
    };
    onSave(lot);
    setSaved(true);
    setTimeout(() => {
      setSaved(false);
      setForm({ name:'', variety:'Milena', customVariety:'', date:todayISO(), quantity:'', notes:'', invOrigen:'D', ubicTipo:'bandeja', ubicId:'B01' });
      setErrors({});
      goToLotes();
    }, 1200);
  };

  return (
    <div style={{flex:1, overflowY:'auto', padding:'16px 18px 80px', background:'var(--bg-1)', WebkitOverflowScrolling:'touch', overscrollBehavior:'contain'}}>
      <p className="dm-nuevo-label" style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--text-2)', textTransform:'uppercase', marginBottom:20}}>
        Registrar lote nuevo
      </p>

      <Field label="Nombre del lote" error={errors.name}>
        <input
          type="text"
          id="nuevo-nombre" name="nombre" placeholder="Ej: Milena norte, Lote 4..."
          value={form.name}
          onChange={e => { set('name', e.target.value); setErrors(er => ({...er, name:undefined})) }}
          style={inputStyle(errors.name)}
        />
      </Field>

      <Field label="Fecha de siembra">
        <input
          id="nuevo-fecha" name="fecha"
          type="date"
          value={form.date}
          onChange={e => set('date', e.target.value)}
          style={inputStyle()}
        />
      </Field>

      <Field label="Cantidad de almácigos sembrados" error={errors.quantity}>
        <input
          type="number"
          inputMode="numeric"
          id="nuevo-cantidad" name="cantidad" placeholder="Ej: 6"
          value={form.quantity}
          onChange={e => { set('quantity', e.target.value); setErrors(er => ({...er, quantity:undefined})) }}
          style={inputStyle(errors.quantity)}
        />
        {form.quantity && !isNaN(form.quantity) && parseInt(form.quantity) > 0 && (
          <div style={{
            marginTop:8, padding:'10px 14px', borderRadius:10,
            background:'var(--bg-card-h)', display:'flex', alignItems:'center', gap:8
          }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#276F50" strokeWidth="2.2" strokeLinecap="round"><path d="M12 2a9 9 0 0 1 9 9c0 4.97-9 13-9 13S3 15.97 3 11a9 9 0 0 1 9-9z"/><circle cx="12" cy="11" r="2"/></svg>
            <span style={{fontSize:14, color:'var(--green)', fontWeight:500}}>
              {parseInt(form.quantity)} almácigos = <strong>{toPlants(parseInt(form.quantity)).toLocaleString()} plantas</strong>
            </span>
          </div>
        )}
      </Field>

      <Field label="Variedad">
        <div style={{display:'flex', flexWrap:'wrap', gap:7, marginBottom: form.variety === 'Otra' ? 8 : 0}}>
          {VARIETIES.map(function(v) {
            const sel = form.variety === v;
            return (
              <button
                key={v}
                onClick={() => { set('variety', v); if (v !== 'Otra') set('customVariety', ''); }}
                style={{
                  padding:'9px 13px', borderRadius:10, border:'0.5px solid',
                  borderColor: sel ? 'var(--green)' : 'var(--border)',
                  background: sel ? 'var(--bg-card-h)' : 'var(--bg-card)',
                  color: sel ? 'var(--green)' : 'var(--text-2)',
                  fontSize:13, fontWeight: sel ? 700 : 400,
                  cursor:'pointer', transition:'all 0.15s', whiteSpace:'nowrap'
                }}
              >{v}</button>
            );
          })}
        </div>
        {form.variety === 'Otra' && (
          <input
            type="text"
            id="nuevo-variedad" name="variedad" placeholder="Nombre de la variedad..."
            value={form.customVariety || ''}
            onChange={e => set('customVariety', e.target.value)}
            style={inputStyle(errors.customVariety)}
            autoFocus
          />
        )}
        {errors.customVariety && <p style={{fontSize:13, color:'var(--red)', marginTop:5}}>{errors.customVariety}</p>}
      </Field>

      <Field label="Notas (opcional)">
        <textarea
          id="nuevo-notas" name="nuevo-notas"
          placeholder="Condiciones, observaciones..."
          value={form.notes}
          onChange={e => set('notes', e.target.value)}
          rows={3}
          style={{...inputStyle(), resize:'none', lineHeight:1.7}}
        />
      </Field>

      <Field label="Ubicación de origen">
        <div style={{display:'flex', gap:8}}>
          <select value={form.invOrigen} onChange={e => set('invOrigen', e.target.value)}
            style={{...inputStyle(), flex:1}}>
            <option value="D">Inv D (Castro)</option>
            <option value="C">Inv C</option>
            <option value="A">Inv A</option>
            <option value="B">Inv B</option>
          </select>
          <select value={form.ubicTipo} onChange={e => { set('ubicTipo', e.target.value); set('ubicId', e.target.value==='bancada'?'B01':'P01'); }}
            style={{...inputStyle(), flex:1}}>
            <option value="bandeja">Bandeja</option>
            <option value="piscina">Piscina</option>
            <option value="bancada">Bancada</option>
          </select>
          <select value={form.ubicId} onChange={e => set('ubicId', e.target.value)}
            style={{...inputStyle(), flex:1}}>
            {(form.ubicTipo === 'bancada'
              ? ['B01','B02','B03','B04','B05','B06','B07','B08']
              : ['P01','P02','P03','P04','P05','P06','P07','P08']
            ).map(id => <option key={id} value={id}>{id}</option>)}
          </select>
        </div>
      </Field>

      {confirmSave ? (
        <ConfirmBar
          message={`Registrar lote "${form.name.trim()}" con ${form.quantity} almácigos (${toPlants(parseInt(form.quantity)).toLocaleString()} plantas).`}
          confirmLabel="Sí, registrar"
          onConfirm={handleSave}
          onCancel={() => setConfirmSave(false)}
        />
      ) : (
        <button
          onClick={() => {
            const e = validate();
            if (Object.keys(e).length) { setErrors(e); return; }
            setConfirmSave(true);
          }}
          style={{
            width:'100%', padding:'15px 0', borderRadius:12, border:'none',
            background: saved ? 'var(--green)' : '#1A1E2E',
            color:'#fff', fontSize:15, fontWeight:600,
            cursor:'pointer', transition:'background 0.3s',
            marginTop:8, marginBottom:24,
            display:'flex', alignItems:'center', justifyContent:'center', gap:8
          }}
        >
          {saved ? '✓ Lote guardado' : 'Guardar lote'}
        </button>
      )}
    </div>
  );
}

function Field({ label, error, children }) {
  return (
    <div style={{marginBottom:18}}>
      <p style={{fontSize:13, fontWeight:500, color: error ? '#C0392B' : 'var(--text-2)', marginBottom:7}}>{label}</p>
      {children}
      {error && <p style={{fontSize:12, color:'var(--red)', marginTop:5}}>{error}</p>}
    </div>
  );
}

function inputStyle(error) {
  return {
    width:'100%', padding:'12px 14px', borderRadius:10,
    border: '0.5px solid ' + (error ? 'var(--red)' : 'var(--border)'),
    background: 'var(--bg-input)',
    fontSize:14, color: 'var(--text-1)',
    fontFamily:'-apple-system,BlinkMacSystemFont,\'Segoe UI\',system-ui,sans-serif', outline:'none',
    WebkitAppearance:'none',
  };
}

// ── STAGE ORDER ───────────────────────────────────────
const STAGE_LABELS = {
  almacigo:    'Etapa 1 · Siembra de almácigos',
  transplante: 'Etapa 2 · Transplante',
  raleo:       'Etapa 3 · Raleo definitivo',
  cosecha:     'Etapa 4 · Cosecha',
};
const STAGE_ORDER = ['almacigo','transplante','raleo','cosecha'];
const NEXT_STAGE = { almacigo:'transplante', transplante:'raleo', raleo:'cosecha' };

// ── CONFIRM BAR — reutilizable ────────────────────────
function ConfirmBar({ message, onConfirm, onCancel, confirmLabel = 'Sí, guardar' }) {
  return (
    <div className="dm-confirm" style={{
      background:'var(--bg-card-h)', border:'0.5px solid var(--border)',
      borderRadius:12, padding:'16px 18px', marginTop:8
    }}>
      <p style={{fontSize:15, fontWeight:600, color:'var(--text-1)', marginBottom:6}}>¿Confirmar cambios?</p>
      <p style={{fontSize:13, color:'var(--text-2)', marginBottom:16}}>{message}</p>
      <div style={{display:'flex', gap:8}}>
        <button className="dm-confirm-cancel" onClick={onCancel} style={{
          flex:1, padding:'12px 0', borderRadius:10,
          border:'0.5px solid var(--border)', background:'#fff',
          color:'var(--text-2)', fontSize:14, fontWeight:500, cursor:'pointer'
        }}>Cancelar</button>
        <button onClick={onConfirm} style={{
          flex:1, padding:'12px 0', borderRadius:10, border:'none',
          background:'var(--text-1)', color:'var(--bg-1)', fontSize:14, fontWeight:600, cursor:'pointer'
        }}>{confirmLabel}</button>
      </div>
    </div>
  );
}

// ── MODAL AVANZAR ETAPA ────────────────────────────────
function AvanzarModal({ lot, onClose, onConfirm }) {
  const nextStage = NEXT_STAGE[lot.stage];
  const nextInfo = STAGES[nextStage];
  const currentQty = lot.currentQuantity ?? toPlants(lot.quantity);
  const [date, setDate] = useState(todayISO());
  const [qty, setQty] = useState(String(currentQty));
  const [notes, setNotes] = useState('');
  const [error, setError] = useState('');
  const [confirming, setConfirming] = useState(false);

  const arrived = parseInt(qty) || 0;
  const merma = currentQty - arrived;
  const mermaPercent = currentQty > 0 ? Math.round((merma / currentQty) * 100) : 0;
  const daysInNewStage = daysSince(date);
  const isHistorical = daysInNewStage > 0;

  const handleConfirm = () => {
    if (!qty || isNaN(qty) || arrived <= 0) { setError('Ingresá una cantidad válida'); return; }
    if (arrived > currentQty) { setError(`No puede superar las ${currentQty} plantas actuales`); return; }
    setConfirming(true);
  };

  const dm = useDarkMode();
  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.55)',
      display:'flex', alignItems:'flex-end', justifyContent:'center',
      zIndex:100
    }} onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal-in" style={{
        background:'var(--bg-card)', borderRadius:'20px 20px 0 0',
        width:'100%', maxWidth:480, padding:'20px 20px 36px',
        maxHeight:'90vh', overflowY:'auto'
      }}>
        <div style={{width:36, height:4, background: 'var(--border)', borderRadius:2, margin:'0 auto 20px'}} />

        <p style={{fontSize:17, fontWeight:600, color: 'var(--text-1)', marginBottom:4}}>Avanzar a siguiente etapa</p>
        <p style={{fontSize:13, color: 'var(--text-3)', marginBottom:20}}>
          <span style={{fontWeight:500, color: STAGES[lot.stage].color}}>{STAGES[lot.stage].label}</span>
          {' → '}
          <span style={{fontWeight:500, color: nextInfo.color}}>{nextInfo.label}</span>
        </p>

        <Field label="¿Cuándo ocurrió este movimiento?">
          <input id="mov-fecha" name="mov-fecha" type="date" value={date} onChange={e => setDate(e.target.value)} style={inputStyle()} />
          <div style={{
            marginTop:8, padding:'10px 14px', borderRadius:10,
            background: isHistorical ? 'var(--bg-card-h)' : 'var(--bg-card)',
            display:'flex', alignItems:'center', gap:8
          }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={isHistorical ? 'var(--green)' : 'var(--text-3)'} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span style={{fontSize:13, color: isHistorical ? 'var(--green)' : 'var(--text-3)', fontWeight: isHistorical ? 500 : 400}}>
              {daysInNewStage === 0
                ? 'Movimiento de hoy — llevará 0 días en esta etapa'
                : `Llevará ${daysInNewStage} día${daysInNewStage !== 1 ? 's' : ''} en ${nextInfo.label} al ingresar`}
            </span>
          </div>
        </Field>

        <Field label={`Plantas que llegan a ${nextInfo.label}`} error={error}>
          <input
            id="avanzar-cantidad" name="avanzar-cantidad"
            type="number" inputMode="numeric"
            value={qty}
            onChange={e => { setQty(e.target.value); setError(''); }}
            style={inputStyle(error)}
            placeholder={`Máx. ${currentQty}`}
          />
        </Field>

        {qty && !isNaN(qty) && parseInt(qty) > 0 && parseInt(qty) <= currentQty && (
          <div style={{
            background:'var(--bg-card-h)', border:'0.5px solid var(--border)',
            borderRadius:12, padding:'12px 16px', marginBottom:16,
            display:'flex', gap:0
          }}>
            <MermaItem label="Entraban" value={currentQty} color="var(--text-1)" />
            <MermaItem label="Llegan" value={arrived} color={nextInfo.color} />
            <MermaItem
              label="Merma"
              value={`${merma} (${mermaPercent}%)`}
              color={mermaPercent > 20 ? '#C0392B' : mermaPercent > 10 ? '#E07B2A' : '#276F50'}
            />
          </div>
        )}

        <Field label="Observaciones del movimiento (opcional)">
          <textarea id="avanzar-notas" name="avanzar-notas" value={notes} onChange={e => setNotes(e.target.value)}
            rows={2} placeholder="Ej: se descartaron plantas con raíz débil..."
            style={{...inputStyle(), resize:'none', lineHeight:1.6}} />
        </Field>

        {confirming ? (
          <ConfirmBar
            message={`Avanzar ${arrived.toLocaleString()} plantas a ${nextInfo.label}. Esta acción no se puede deshacer.`}
            confirmLabel="Sí, avanzar"
            onConfirm={() => onConfirm({ nextStage, date, quantity: arrived, notes: notes.trim() })}
            onCancel={() => setConfirming(false)}
          />
        ) : (
          <button onClick={handleConfirm} style={{
            width:'100%', padding:'14px 0', borderRadius:12, border:'none',
            background: nextInfo.color, color:'#fff',
            fontSize:15, fontWeight:600, cursor:'pointer', marginTop:4
          }}>
            Confirmar movimiento
          </button>
        )}
        <button onClick={onClose} style={{
          width:'100%', padding:'12px 0', borderRadius:12, border:'none',
          background:'none', color:'var(--text-2)', fontSize:14, cursor:'pointer', marginTop:6
        }}>
          Cancelar
        </button>
      </div>
    </div>
  );
}

function MermaItem({ label, value, color }) {
  return (
    <div style={{flex:1, textAlign:'center'}}>
      <p style={{fontSize:12, color:'var(--text-2)', marginBottom:4}}>{label}</p>
      <p style={{fontSize:14, fontWeight:600, color, fontFamily:'DM Mono, monospace'}}>{value}</p>
    </div>
  );
}


// ── MODAL TRANSPLANTE PARCIAL ─────────────────────────
function TransplanteModal({ lot, onClose, onConfirm, esTotal: esTotalProp }) {
  const currentQty = lot.currentQuantity ?? toPlants(lot.quantity);
  const yaTransplantadas = (lot.transplantes || []).reduce((a,t) => a+(t.transplantadas||0), 0);
  const esTotal = esTotalProp === true;
  const [date, setDate] = useState(todayISO());
  const [transplantadas, setTransplantadas] = useState(esTotal ? String(Math.max(0, currentQty - yaTransplantadas)) : '');
  const [desechadas, setDesechadas] = useState('');
  const [notas, setNotas] = useState('');
  const [errors, setErrors] = useState({});
  const [confirming, setConfirming] = useState(false);
  const dm = useDarkMode();
  const totalT = parseInt(transplantadas) || 0;
  const totalD = parseInt(desechadas) || 0;
  const disponibles = currentQty - yaTransplantadas;
  const quedan = disponibles - totalT - totalD;
  const completaTotal = esTotal || (totalT + totalD >= disponibles);

  const validate = () => {
    const e = {};
    if (!transplantadas || isNaN(transplantadas) || totalT <= 0) e.transplantadas = 'Ingresá una cantidad válida';
    if (totalT + totalD > disponibles) e.transplantadas = `No puede superar las ${disponibles.toLocaleString()} disponibles`;
    return e;
  };

  const handleConfirm = () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    setConfirming(true);
  };

  return (
    <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:100}}
      onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal-in" style={{background:'var(--bg-card)', borderRadius:'20px 20px 0 0', width:'100%', maxWidth:480, padding:'20px 20px 36px', maxHeight:'90vh', overflowY:'auto'}}>
        <div style={{width:36, height:4, background: 'var(--border)', borderRadius:2, margin:'0 auto 20px'}} />
        <p style={{fontSize:17, fontWeight:600, color: 'var(--text-1)', marginBottom:4}}>
          {esTotal ? 'Transplante total — pasar a Raleo' : 'Registrar transplante parcial'}
        </p>
        <p style={{fontSize:13, color:'var(--text-2)', marginBottom:20}}>
          Disponibles: <strong style={{color: 'var(--text-1)'}}>{disponibles.toLocaleString()} plantas</strong>
          {yaTransplantadas > 0 && <span style={{color:'var(--text-2)'}}> · {yaTransplantadas.toLocaleString()} ya transplantadas</span>}
        </p>
        <Field label="Fecha del transplante">
          <input id="tp-fecha" name="tp-fecha" type="date" value={date} onChange={e => setDate(e.target.value)} style={inputStyle()} />
        </Field>
        <Field label="Plantas transplantadas" error={errors.transplantadas}>
          <input id="tp-plantas" name="tp-plantas" type="number" inputMode="numeric" value={transplantadas}
            onChange={e => { setTransplantadas(e.target.value); setErrors({}); }}
            placeholder={`Máx. ${disponibles.toLocaleString()}`} style={inputStyle(errors.transplantadas)} />
        </Field>
        <Field label="Plantas desechadas (merma)">
          <input id="tp-desechadas" name="tp-desechadas" type="number" inputMode="numeric" value={desechadas}
            onChange={e => setDesechadas(e.target.value)} placeholder="0" style={inputStyle()} />
        </Field>
        {totalT > 0 && (
          <div style={{background:'var(--bg-card-h)', border:'0.5px solid var(--border)', borderRadius:12, padding:'12px 16px', marginBottom:16, display:'flex', gap:0}}>
            <MermaItem label="Transplantadas" value={totalT.toLocaleString()} color={STAGES.transplante.color} />
            {totalD > 0 && <MermaItem label="Desechadas" value={totalD.toLocaleString()} color="#E07B2A" />}
            <MermaItem label="Quedan" value={Math.max(0, quedan).toLocaleString()} color={quedan <= 0 ? 'var(--stage-c)' : 'var(--text-1)'} />
          </div>
        )}
        {completaTotal && totalT > 0 && (
          <div style={{background:'var(--bg-card-h)', borderRadius:8, padding:'8px 12px', marginBottom:16, display:'flex', alignItems:'center', gap:8}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6B3FA0" strokeWidth="2" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span style={{fontSize:13, color:'var(--stage-c)', fontWeight:500}}>Transplante completo → el lote pasa a Raleo</span>
          </div>
        )}
        <Field label="Notas (opcional)">
          <textarea id="tp-notas" name="tp-notas" value={notas} onChange={e => setNotas(e.target.value)}
            rows={2} placeholder="Ej: piscina norte, tubos 1 al 5..." style={{...inputStyle(), resize:'none', lineHeight:1.6}} />
        </Field>
        {confirming ? (
          <ConfirmBar
            message={'Registrar ' + totalT.toLocaleString() + ' plantas transplantadas' + (totalD > 0 ? ' y ' + totalD.toLocaleString() + ' desechadas' : '') + '.' + (completaTotal ? ' El lote avanzará a Raleo.' : '')}
            confirmLabel={completaTotal ? 'Sí, completar transplante' : 'Sí, registrar'}
            onConfirm={() => onConfirm({ date, transplantadas: totalT, desechadas: totalD, notas: notas.trim(), esTotal: completaTotal })}
            onCancel={() => setConfirming(false)}
          />
        ) : (
          <button onClick={handleConfirm} style={{width:'100%', padding:'14px 0', borderRadius:12, border:'none', background: STAGES.transplante.color, color:'#fff', fontSize:15, fontWeight:600, cursor:'pointer', marginTop:4}}>
            {esTotal ? 'Confirmar transplante total' : 'Registrar transplante'}
          </button>
        )}
        <button onClick={onClose} style={{width:'100%', padding:'12px 0', borderRadius:12, border:'none', background:'none', color:'var(--text-2)', fontSize:14, cursor:'pointer', marginTop:6}}>Cancelar</button>
      </div>
    </div>
  );
}
// ── MODAL COSECHA PARCIAL ─────────────────────────────
function CosechaModal({ lot, onClose, onConfirm, editData, editMode }) {
  const currentQty = lot.currentQuantity ?? toPlants(lot.quantity);
  const [date, setDate] = useState(editData?.date || todayISO());
  const [cosechadas, setCosechadas] = useState(editData ? String(editData.cosechadas) : '');
  const [descartadas, setDescartadas] = useState(editData ? String(editData.descartadas || '') : '');
  const [notes, setNotes] = useState(editData?.notes || '');
  const [errors, setErrors] = useState({});

  // En modo edición, el máximo disponible incluye lo que tenía esta cosecha
  const prevOut = editData ? (editData.cosechadas || 0) + (editData.descartadas || 0) : 0;
  const maxQty = currentQty + prevOut;

  const totalSale = parseInt(cosechadas) || 0;
  const totalDiscard = parseInt(descartadas) || 0;
  const totalOut = totalSale + totalDiscard;
  const remaining = maxQty - totalOut;

  const [confirmEdit, setConfirmEdit] = useState(false);
  const [confirmNew, setConfirmNew] = useState(false);

  const validate = () => {
    const e = {};
    if (!cosechadas || isNaN(cosechadas) || totalSale <= 0) e.cosechadas = 'Ingresá una cantidad válida';
    if (totalOut > maxQty) e.cosechadas = `No puede superar las ${maxQty.toLocaleString()} plantas disponibles`;
    return e;
  };

  const handleConfirm = () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    if (editMode) { setConfirmEdit(true); return; }
    setConfirmNew(true);
  };

  const dm = useDarkMode();
  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.55)',
      display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:100
    }} onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal-in" style={{
        background:'var(--bg-card)', borderRadius:'20px 20px 0 0',
        width:'100%', maxWidth:480, padding:'20px 20px 36px',
        maxHeight:'90vh', overflowY:'auto'
      }}>
        <div style={{width:36, height:4, background: 'var(--border)', borderRadius:2, margin:'0 auto 20px'}} />
        <p style={{fontSize:17, fontWeight:600, color: 'var(--text-1)', marginBottom:4}}>
          {editMode ? 'Editar cosecha' : 'Registrar cosecha parcial'}
        </p>
        <p style={{fontSize:13, color: 'var(--text-3)', marginBottom:20}}>
          Disponibles: <strong style={{color: 'var(--text-1)'}}>{maxQty.toLocaleString()} plantas</strong>
        </p>

        <Field label="Fecha de cosecha">
          <input id="mov-fecha" name="mov-fecha" type="date" value={date} onChange={e => setDate(e.target.value)} style={inputStyle()} />
        </Field>

        <Field label="Lechugas cosechadas (para venta)" error={errors.cosechadas}>
          <input type="number" inputMode="numeric" id="cosecha-cosechadas" name="cosecha-cosechadas" placeholder="Ej: 210"
            value={cosechadas}
            onChange={e => { setCosechadas(e.target.value); setErrors({}); }}
            style={inputStyle(errors.cosechadas)} />
        </Field>

        <Field label="Lechugas descartadas (opcional)">
          <input type="number" inputMode="numeric" id="cosecha-descartadas" name="cosecha-descartadas" placeholder="Ej: 5"
            value={descartadas}
            onChange={e => setDescartadas(e.target.value)}
            style={inputStyle()} />
        </Field>

        {totalOut > 0 && totalOut <= currentQty && (
          <div style={{
            background:'var(--bg-card-h)', border:'0.5px solid var(--border)',
            borderRadius:12, padding:'14px 16px', marginBottom:16,
          }}>
            <div style={{display:'flex', gap:0, marginBottom: remaining > 0 ? 12 : 0}}>
              <MermaItem label="Cosechadas" value={totalSale.toLocaleString()} color="#276F50" />
              {totalDiscard > 0 && <MermaItem label="Descartadas" value={totalDiscard.toLocaleString()} color="#E07B2A" />}
              <MermaItem label="Quedan" value={remaining.toLocaleString()} color={remaining === 0 ? 'var(--stage-c)' : 'var(--text-1)'} />
            </div>
            {remaining === 0 && (
              <div style={{
                background:'var(--bg-card-h)', borderRadius:8, padding:'8px 12px',
                display:'flex', alignItems:'center', gap:8
              }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6B3FA0" strokeWidth="2" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                <span style={{fontSize:13, color:'var(--stage-c)', fontWeight:500}}>
                  Con esta cosecha el lote queda agotado
                </span>
              </div>
            )}
          </div>
        )}

        <Field label="Notas (opcional)">
          <textarea id="cosecha-notas" name="cosecha-notas" value={notes} onChange={e => setNotes(e.target.value)}
            rows={2} placeholder="Ej: tubos 1 al 10, piscina norte..."
            style={{...inputStyle(), resize:'none', lineHeight:1.6}} />
        </Field>

        {confirmEdit ? (
          <ConfirmBar
            message="Esto va a actualizar el registro de cosecha y recalcular los totales del lote."
            onConfirm={() => onConfirm({ date, cosechadas: totalSale, descartadas: totalDiscard, notes: notes.trim() })}
            onCancel={() => setConfirmEdit(false)}
          />
        ) : confirmNew ? (
          <ConfirmBar
            message={'Registrar ' + totalSale.toLocaleString() + ' lechugas cosechadas' + (totalDiscard > 0 ? ' y ' + totalDiscard.toLocaleString() + ' descartadas' : '') + '.'}
            confirmLabel="Sí, registrar"
            onConfirm={() => onConfirm({ date, cosechadas: totalSale, descartadas: totalDiscard, notes: notes.trim() })}
            onCancel={() => setConfirmNew(false)}
          />
        ) : (
          <button onClick={handleConfirm} style={{
            width:'100%', padding:'14px 0', borderRadius:12, border:'none',
            background:'var(--green)', color:'#fff', fontSize:15, fontWeight:600,
            cursor:'pointer', marginTop:4
          }}>
            {editMode ? 'Guardar cambios' : 'Confirmar cosecha'}
          </button>
        )}
        <button onClick={onClose} style={{
          width:'100%', padding:'12px 0', borderRadius:12, border:'none',
          background:'none', color:'var(--text-2)', fontSize:14, cursor:'pointer', marginTop:6
        }}>
          Cancelar
        </button>
      </div>
    </div>
  );
}

// ── SENSOR HISTORY CHART ─────────────────────────────
function LotSensorHistory({ lot }) {
  const history = lot.sensorHistory || [];
  const sr = lot.sensorReadings;

  // Si no hay ni historial ni lectura actual, mostrar estado vacío
  const hasData = history.length > 0 || sr?.lastUpdate;
  if (!hasData) return null;

  // Combinar historial + lectura actual
  const points = [...history];
  if (sr?.lastUpdate && !points.find(p => p.ts === sr.lastUpdate)) {
    points.push({ ts: sr.lastUpdate, ph: sr.ph, ec: sr.ec, tempAgua: sr.tempAgua });
  }
  points.sort((a, b) => (a.ts||'').localeCompare(b.ts||''));
  const last48 = points.filter(p => Date.now() - new Date(p.ts).getTime() < 48*3600000);
  const display = last48.length > 0 ? last48 : points.slice(-20);

  const W = 320; const H = 90; const PAD = { t:8, r:8, b:24, l:36 };
  const chartW = W - PAD.l - PAD.r;
  const chartH = H - PAD.t - PAD.b;

  // Escalas
  const phVals  = display.map(p => p.ph).filter(v => v != null);
  const ecVals  = display.map(p => p.ec).filter(v => v != null);
  const hasph   = phVals.length > 1;
  const hasec   = ecVals.length > 1;

  const phMin = 4.5; const phMax = 8.0;
  const ecMin = Math.max(0, Math.min(...ecVals) - 200);
  const ecMax = Math.max(...ecVals) + 200;

  const scaleX  = (i) => PAD.l + (i / (display.length - 1)) * chartW;
  const scalePh = (v) => PAD.t + chartH - ((v - phMin) / (phMax - phMin)) * chartH;
  const scaleEc = (v) => PAD.t + chartH - ((v - ecMin) / (ecMax - ecMin)) * chartH;

  const phPath = hasph ? display
    .map((p, i) => p.ph != null ? (i === 0 ? 'M' : 'L') + scaleX(i).toFixed(1) + ',' + scalePh(p.ph).toFixed(1) : null)
    .filter(Boolean).join(' ') : null;

  const ecPath = hasec ? display
    .map((p, i) => p.ec != null ? (i === 0 ? 'M' : 'L') + scaleX(i).toFixed(1) + ',' + scaleEc(p.ec).toFixed(1) : null)
    .filter(Boolean).join(' ') : null;

  // Líneas de referencia pH
  const sp = lot.setpoints || { phMin:5.5, phMax:6.5 };
  const yPhMin = scalePh(sp.phMin);
  const yPhMax = scalePh(sp.phMax);

  // Labels eje X — solo primero, medio y último
  const xLabels = display.length > 1 ? [0, Math.floor(display.length/2), display.length-1] : [0];
  const fmtTs = (ts) => {
    try {
      const d = new Date(ts);
      return d.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });
    } catch { return ''; }
  };

  // Última lectura
  const last = display[display.length - 1];
  const lastPh = last?.ph != null ? last.ph.toFixed(2) : '—';
  const lastEc = last?.ec != null ? Math.round(last.ec) : '—';
  const lastT  = last?.tempAgua != null ? last.tempAgua.toFixed(1) + '°C' : '—';
  const o2     = last?.tempAgua != null ? (14.62 * Math.exp(-0.0393 * last.tempAgua)).toFixed(1) : '—';

  return (
    <div style={{ background:'var(--bg-card)', border:'0.5px solid var(--border)', borderRadius:14, padding:'12px 14px', marginBottom:12 }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
        <p style={{ fontSize:12, fontWeight:700, color:'var(--text-2)', textTransform:'uppercase', letterSpacing:'.05em' }}>
          Historial sensores
        </p>
        <p style={{ fontSize:10, color:'var(--text-3)' }}>
          {display.length} lecturas · últimas 48h
        </p>
      </div>

      {/* Valores actuales */}
      <div style={{ display:'flex', gap:8, marginBottom:10 }}>
        {[
          { label:'pH', value:lastPh, color: last?.ph && (last.ph < sp.phMin || last.ph > sp.phMax) ? 'var(--red)' : 'var(--green)' },
          { label:'EC', value: lastEc !== '—' ? lastEc + ' µS' : '—', color:'var(--stage-t)' },
          { label:'T°', value:lastT, color: last?.tempAgua >= 24 ? 'var(--red)' : 'var(--text-2)' },
          { label:'O₂', value: o2 !== '—' ? o2 + ' mg/L' : '—', color: parseFloat(o2) < 8 ? 'var(--amber)' : 'var(--stage-t)' },
        ].map(m => (
          <div key={m.label} style={{ flex:1, background:'var(--bg-card-h)', borderRadius:8, padding:'6px 8px', textAlign:'center' }}>
            <p style={{ fontSize:9, color:'var(--text-3)', marginBottom:2 }}>{m.label}</p>
            <p style={{ fontSize:12, fontWeight:700, color:m.color, fontFamily:'DM Mono, monospace' }}>{m.value}</p>
          </div>
        ))}
      </div>

      {/* Gráfico SVG */}
      {display.length > 1 && (
        <svg width="100%" viewBox={'0 0 ' + W + ' ' + H} style={{ display:'block' }}>
          {/* Zona segura pH */}
          <rect x={PAD.l} y={yPhMax} width={chartW} height={yPhMin - yPhMax}
            fill="#2ECC71" opacity="0.06" />
          {/* Líneas de referencia pH */}
          <line x1={PAD.l} y1={yPhMin} x2={PAD.l + chartW} y2={yPhMin}
            stroke="#2ECC71" strokeWidth="0.5" strokeDasharray="3,3" opacity="0.4" />
          <line x1={PAD.l} y1={yPhMax} x2={PAD.l + chartW} y2={yPhMax}
            stroke="#2ECC71" strokeWidth="0.5" strokeDasharray="3,3" opacity="0.4" />
          {/* Grid horizontal */}
          {[0.25, 0.5, 0.75].map(f => (
            <line key={f} x1={PAD.l} y1={PAD.t + chartH * (1-f)} x2={PAD.l + chartW} y2={PAD.t + chartH * (1-f)}
              stroke="var(--sep)" strokeWidth="0.5" />
          ))}
          {/* Eje Y label */}
          <text x={PAD.l - 4} y={PAD.t + 4} textAnchor="end" fontSize="8" fill="var(--text-3)" opacity="0.7">pH</text>
          {/* Línea EC */}
          {ecPath && <path d={ecPath} fill="none" stroke="var(--stage-t)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity="0.8" />}
          {/* Línea pH */}
          {phPath && <path d={phPath} fill="none" stroke="#A855F7" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />}
          {/* Punto último valor pH */}
          {hasph && last?.ph != null && (
            <circle cx={scaleX(display.length-1)} cy={scalePh(last.ph)} r="3" fill="#A855F7" />
          )}
          {/* Punto último valor EC */}
          {hasec && last?.ec != null && (
            <circle cx={scaleX(display.length-1)} cy={scaleEc(last.ec)} r="3" fill="var(--stage-t)" />
          )}
          {/* Eje X labels */}
          {xLabels.map(i => (
            <text key={i} x={scaleX(i)} y={H - 4} textAnchor="middle" fontSize="8" fill="var(--text-3)" opacity="0.7">
              {fmtTs(display[i]?.ts)}
            </text>
          ))}
        </svg>
      )}

      {/* Leyenda */}
      <div style={{ display:'flex', gap:12, marginTop:6 }}>
        <div style={{ display:'flex', alignItems:'center', gap:4 }}>
          <div style={{ width:16, height:2, background:'#A855F7', borderRadius:1 }} />
          <span style={{ fontSize:9, color:'var(--text-3)' }}>pH</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:4 }}>
          <div style={{ width:16, height:2, background:'var(--stage-t)', borderRadius:1 }} />
          <span style={{ fontSize:9, color:'var(--text-3)' }}>EC</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:4 }}>
          <div style={{ width:16, height:2, background:'#2ECC71', opacity:0.5, borderRadius:1, borderTop:'1px dashed #2ECC71' }} />
          <span style={{ fontSize:9, color:'var(--text-3)' }}>Rango pH óptimo</span>
        </div>
      </div>
    </div>
  );
}

function LotNotesSection({ lotId, lotName }) {
  const [notes, setNotes] = useState([]);
  const [showModal, setShowModal] = useState(false);

  useEffect(() => {
    try {
      const all = JSON.parse(localStorage.getItem(NOTES_CACHE_KEY) || '[]');
      setNotes(all.filter(n => n.lotId === lotId));
    } catch {}
    fsDb.list('notas').then(data => {
      const filtered = data
        .filter(n => n.lotId === lotId)
        .sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
      setNotes(filtered);
    }).catch(() => {});
  }, [lotId]);

  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const formatNoteDate = (ts) => {
    try {
      const d = new Date(ts);
      const now = new Date();
      const diff = Math.floor((now - d) / 60000);
      if (diff < 60) return 'hace ' + Math.max(1, diff) + ' min';
      if (diff < 1440) return 'hace ' + Math.floor(diff/60) + 'h';
      return d.getDate() + ' ' + months[d.getMonth()];
    } catch { return ''; }
  };

  const handleSaved = (note) => setNotes(prev => [note, ...prev]);

  if (notes.length === 0 && !showModal) {
    return (
      <div style={{marginBottom:16}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
          <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--text-2)', textTransform:'uppercase'}}>Notas del lote</p>
          <button onClick={() => setShowModal(true)} style={{background:'none', border:'none', cursor:'pointer', fontSize:12, color:'var(--green)', fontWeight:600, padding:0}}>+ Agregar</button>
        </div>
        <p style={{fontSize:13, color:'var(--text-3)'}}>Sin notas para este lote.</p>
        {showModal && <QuickNoteModal lots={[{id:lotId, name:lotName, stage:'raleo', stageHistory:[{date:todayISO()}]}]} onClose={() => setShowModal(false)} onSaved={handleSaved} defaultLotId={lotId} />}
      </div>
    );
  }

  return (
    <div style={{marginBottom:16}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
        <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--text-2)', textTransform:'uppercase'}}>
          {'Notas del lote · ' + notes.length}
        </p>
        <button onClick={() => setShowModal(true)} style={{background:'none', border:'none', cursor:'pointer', fontSize:12, color:'var(--green)', fontWeight:600, padding:0}}>+ Agregar</button>
      </div>
      <div style={{background:'var(--bg-card)', border:'0.5px solid var(--border)', borderRadius:12, overflow:'hidden'}}>
        {notes.slice(0, 3).map((note, i) => (
          <div key={note.id || i} style={{
            padding:'10px 14px',
            borderBottom: i < Math.min(notes.length, 3) - 1 ? '0.5px solid var(--sep)' : 'none',
          }}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:4}}>
              <span style={{fontSize:11, color:'var(--text-3)', fontFamily:'DM Mono, monospace'}}>{formatNoteDate(note.timestamp || note.date)}</span>
            </div>

// ── ZEBRA QR + PRINTING ───────────────────────────────
function buildQRString(lot) {
  // Ubicación: usar primera de locations[] o location legacy
  const locs = lot.locations && lot.locations.length > 0 ? lot.locations : (lot.location ? [{ invernadero: lot.location.invernadero, tipo: lot.location.tipo, identificador: lot.location.identificador }] : []);
  const firstLoc = locs[0] || {};
  const inv   = firstLoc.invernadero || 'NA';
  const tipo  = firstLoc.tipo === 'bancada' ? 'BAN' : firstLoc.tipo === 'piscina' ? 'PIS' : 'GEN';
  const ident = firstLoc.identificador || 'XX';
  const loc   = inv + '_' + tipo + '_' + ident + (locs.length > 1 ? '+' + (locs.length-1) : '');
  const stg   = (lot.stage || 'almacigo').toUpperCase().slice(0,8);
  const den   = lot.densidadSiembra || 0;
  const mor   = lot.mortalidadAcumulada || 0;
  const tech  = inv === 'B' ? 'NFT' : inv === 'A' ? 'FLOAT' : 'SEED';
  const varCode = lot.varietyCode || 'OTR';
  const qty   = lot.currentQuantity ?? toPlants(lot.quantity);
  const pid   = lot.parentId ? '|PID:' + lot.parentId : '';
  // O2 estimado basado en última temp del sensor
  const tAgua = lot.sensorReadings?.tempAgua;
  const o2str = tAgua != null ? '|O2:' + (14.62 * Math.exp(-0.0393 * tAgua)).toFixed(1) : '';
  // URL directa — los scanners Android/iOS abren automáticamente si empieza con https://
  const url = 'https://agricolanalhuitad.github.io/nalhuitad.github.io?lot=' + lot.id;
  return url + '|VAR:' + varCode + '|LOC:' + loc + '|QTY:' + qty + '|DATE:' + (lot.date || '') + '|STG:' + stg + '|DEN:' + den + '|MOR:' + mor + '|TECH:' + tech + pid + o2str;
}

function buildCPCL(lot) {
  const qr      = buildQRString(lot);
  const idLote  = lot.id || '—';
  const variety = lot.variety || '—';
  const stage   = (lot.stage || '').toUpperCase();
  const loc     = (lot.location?.invernadero || '?') + ' / ' + (lot.location?.tipo || '').toUpperCase() + ' ' + (lot.location?.identificador || '');
  const fecha   = lot.date || '—';
  return (
    '! 0 200 200 210 1\n' +
    'PAGE-WIDTH 400\n' +
    'ON-OUT-OF-PAPER PURGE\n' +
    'BARCODE QR 10 10 M 2 U 6\n' +
    qr + '\n' +
    'ENDQR\n' +
    'T 7 0 160 10 ID: ' + idLote + '\n' +
    'T 7 0 160 50 ' + variety + ' · ' + stage + '\n' +
    'T 7 0 160 90 LOC: ' + loc + '\n' +
    'T 7 0 160 130 ' + fecha + '\n' +
    'PRINT\n'
  );
}

async function printToZebra(cpcl) {
  const ZEBRA_SERVICE = '0000ff00-0000-1000-8000-00805f9b34fb';
  const ZEBRA_CHAR    = '0000ff02-0000-1000-8000-00805f9b34fb';
  if (!navigator.bluetooth) throw new Error('Web Bluetooth no disponible. Usá Chrome o Edge.');
  const device = await navigator.bluetooth.requestDevice({
    filters: [{ namePrefix: 'ZQ220' }, { namePrefix: 'Zebra' }],
    optionalServices: [ZEBRA_SERVICE],
  });
  const server  = await device.gatt.connect();
  const service = await server.getPrimaryService(ZEBRA_SERVICE);
  const char    = await service.getCharacteristic(ZEBRA_CHAR);
  const encoded = new TextEncoder().encode(cpcl);
  // Zebra ZQ220 max write ~512 bytes, split if needed
  const CHUNK = 512;
  for (let i = 0; i < encoded.length; i += CHUNK) {
    await char.writeValue(encoded.slice(i, i + CHUNK));
  }
  await server.disconnect();
}
