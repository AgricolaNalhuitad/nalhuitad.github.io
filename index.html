        )}
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(() => fsAuth.load());
  const [screen, setScreen] = useState('lotes');
  const [prevScreen, setPrevScreen] = useState(null);
  const [lots, setLots] = useState(() => {
    try { return JSON.parse(localStorage.getItem(LOTS_CACHE_KEY) || '[]'); } catch { return []; }
  });
  const [loading, setLoading] = useState(() => {
    try { return !localStorage.getItem(LOTS_CACHE_KEY); } catch { return true; }
  });
  const [error, setError] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [isFromCache, setIsFromCache] = useState(() => !!localStorage.getItem(LOTS_CACHE_KEY));
  const [lastSync, setLastSync] = useState(() => {
    try {
      const ts = localStorage.getItem(LAST_SYNC_KEY);
      return ts ? new Date(ts) : null;
    } catch { return null; }
  });
  const [toast, setToast] = useState(null);
  const [selectedLot, setSelectedLot] = useState(null);
  const [darkMode, setDarkMode] = useState(() => loadConfig().darkMode);
  const [online, setOnline] = useState(() => navigator.onLine);

  useEffect(() => {
    const goOnline  = () => { setOnline(true);  fetchLots(true); };
    const goOffline = () => setOnline(false);
    window.addEventListener('online',  goOnline);
    window.addEventListener('offline', goOffline);
    return () => {
      window.removeEventListener('online',  goOnline);
      window.removeEventListener('offline', goOffline);
    };
  }, [fetchLots]);

  useEffect(() => {
    document.body.classList.toggle('dark', darkMode);
    // Solo actualizamos darkMode — no tocamos plantsPer ni stageDays
    const cfg = loadConfig();
    if (cfg.darkMode !== darkMode) {
      cfg.darkMode = darkMode;
      saveConfig(cfg);
    }
    // Aplicar días estimados guardados al inicio
    Object.assign(STAGE_DAYS, cfg.stageDays);
  }, [darkMode]);

  const showToast = useCallback((msg, type = 'ok') => {
    setToast({ msg, type, key: Date.now() });
  }, []);

  const fetchLots = useCallback(async (silent = false) => {
    if (!silent) setSyncing(true);
    try {
      const data = await fsDb.list('lotes');
      data.sort((a, b) => {
        const stageA = STAGE_ORDER.indexOf(a.stage);
        const stageB = STAGE_ORDER.indexOf(b.stage);
        if (stageA !== stageB) return stageA - stageB;
        return (a.date || '').localeCompare(b.date || '');
      });
      setLots(data);
      try { localStorage.setItem(LOTS_CACHE_KEY, JSON.stringify(data)); } catch {}
      setError(false);
      const now = new Date();
      setLastSync(now);
      setIsFromCache(false);
      try { localStorage.setItem(LAST_SYNC_KEY, now.toISOString()); } catch {}
    } catch(e) {
      if (e.message === AUTH_EXPIRED_ERROR) { setSession(null); return; }
      if (!silent) setError(true);
    } finally {
      setLoading(false);
      setSyncing(false);
    }
  }, []);

  useEffect(() => {
    fetchLots();
    const interval = setInterval(() => fetchLots(true), 15000);
    return () => clearInterval(interval);
  }, [fetchLots]);

  const saveLot = useCallback(async (lot) => {
    setLots(ls => [lot, ...ls.filter(l => l.id !== lot.id)]);
    try {
      await fsDb.set('lotes', lot.id, lot);
      showToast('Lote guardado ✓');
    } catch(e) {
      if (e.message === AUTH_EXPIRED_ERROR) { setSession(null); return; }
      showToast('Error al guardar. Revisá la conexión.', 'error');
    }
  }, [showToast]);

  const updateLot = useCallback(async (updated) => {
    setLots(ls => ls.map(l => l.id === updated.id ? updated : l));
    try {
      await fsDb.set('lotes', updated.id, updated);
      showToast('Cambios guardados ✓');
    } catch(e) {
      if (e.message === AUTH_EXPIRED_ERROR) { setSession(null); return; }
      showToast('Error al guardar. Revisá la conexión.', 'error');
    }
  }, [showToast]);

  const deleteLot = useCallback(async (id) => {
    setLots(ls => ls.filter(l => l.id !== id));
    setSelectedLot(null);
    try {
      await fsDb.del('lotes', id);
      showToast('Lote eliminado');
    } catch(e) {
      if (e.message === AUTH_EXPIRED_ERROR) { setSession(null); return; }
      showToast('Error al eliminar. Revisá la conexión.', 'error');
    }
  }, [showToast]);

  const handleNav = (id) => {
    setSelectedLot(null);
    setPrevScreen(null);
    setScreen(id);
  };

  const alertCount = lots.filter(l => {
    const a = getLotAlert(l);
    return a && a.status !== 'ok';
  }).length;

  const renderMain = () => {
    if (screen === 'lotes') {
      if (selectedLot) {
        const lot = lots.find(l => l.id === selectedLot);
        if (!lot) { setSelectedLot(null); return null; }
        const backLabel = prevScreen === 'alertas' ? 'Volver a Alertas' : 'Volver';
        const handleBack = () => {
          setSelectedLot(null);
          if (prevScreen) { setScreen(prevScreen); setPrevScreen(null); }
        };
        return <DetalleLote key={lot.id} lot={lot} onBack={handleBack} backLabel={backLabel} onUpdate={updateLot} onDelete={deleteLot} />;
      }
      return <LotesScreen key="lotes" lots={lots} onSelect={lot => setSelectedLot(lot.id)} goToNuevo={() => handleNav('nuevo')} isFromCache={isFromCache} syncing={syncing} />;
    }
    if (screen === 'nuevo') return <NuevoScreen key="nuevo" onSave={saveLot} goToLotes={() => setScreen('lotes')} />;
    if (screen === 'alertas') return <AlertasScreen key="alertas" lots={lots} onSelect={lot => {
      setPrevScreen('alertas');
      setSelectedLot(lot.id);
      setScreen('lotes');
    }} />;
    if (screen === 'notas') return <NotasScreen key="notas" lots={lots} />;
    if (screen === 'historial') return <HistorialScreen key="historial" lots={lots} />;
    if (screen === 'dashboard') return <DashboardScreen key="dashboard" lots={lots} onNavigate={handleNav} />;
    if (screen === 'config') return <ConfigScreen key="config" session={session} darkMode={darkMode} onDarkMode={setDarkMode} onLogout={() => { fsAuth.clear(); try { localStorage.removeItem(LOTS_CACHE_KEY); } catch {} setSession(null); }} />;
    if (screen === 'sensores') return <SensoresScreen key="sensores" />;
  };

  const screenTitle = {
    lotes: selectedLot ? null : 'Mis lotes',
    nuevo: 'Nuevo lote',
    notas: 'Notas de campo',
    alertas: 'Alertas',
    historial: 'Historial',
    dashboard: null,
    config: 'Configuración',
    sensores: 'Sensores',
  };

  if (!session) return <LoginScreen onLogin={setSession} />;

  if (loading) {
    return (
      <div style={{
        height:'100%', display:'flex', flexDirection:'column',
        alignItems:'center', justifyContent:'center',
        background:'#0A1410', gap:0, maxWidth:480, margin:'0 auto',
        position:'relative', overflow:'hidden',
      }}>
        <style>{`
          @keyframes sway { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }
          @keyframes swayL { 0%,100%{transform:rotate(3deg)} 50%{transform:rotate(-5deg)} }
          @keyframes rise { 0%{opacity:0;transform:translateY(18px)} 100%{opacity:1;transform:translateY(0)} }
          @keyframes pulse { 0%,100%{opacity:.7} 50%{opacity:1} }
          @keyframes loadSlide { 0%{left:-45%;width:40%} 60%{left:35%;width:55%} 100%{left:105%;width:40%} }
        `}</style>

        {/* Fondo con círculos difusos */}
        <div style={{position:'absolute',width:260,height:260,borderRadius:'50%',background:'radial-gradient(circle,#0D3A2220 0%,transparent 70%)',top:'15%',left:'50%',transform:'translateX(-50%)'}} />
        <div style={{position:'absolute',width:180,height:180,borderRadius:'50%',background:'radial-gradient(circle,#0D2A4020 0%,transparent 70%)',bottom:'20%',right:'10%'}} />

        {/* Plantas animadas */}
        <div style={{position:'relative', width:120, height:130, marginBottom:8}}>
          {/* Planta izquierda */}
          <svg width="40" height="90" viewBox="0 0 40 90" style={{position:'absolute',bottom:0,left:8,transformOrigin:'50% 100%',animation:'swayL 2.8s ease-in-out infinite'}}>
            <line x1="20" y1="90" x2="20" y2="40" stroke="#276F50" strokeWidth="2.5" strokeLinecap="round"/>
            <ellipse cx="20" cy="38" rx="13" ry="18" fill="#1A5A3C" opacity="0.9" transform="rotate(-20 20 38)"/>
            <ellipse cx="14" cy="55" rx="10" ry="14" fill="#20724A" opacity="0.8" transform="rotate(15 14 55)"/>
          </svg>
          {/* Planta central — principal */}
          <svg width="50" height="110" viewBox="0 0 50 110" style={{position:'absolute',bottom:0,left:35,transformOrigin:'50% 100%',animation:'sway 2.2s ease-in-out infinite'}}>
            <line x1="25" y1="110" x2="25" y2="45" stroke="#4ADE80" strokeWidth="2.5" strokeLinecap="round"/>
            <ellipse cx="25" cy="38" rx="17" ry="24" fill="#2A9060" opacity="0.95"/>
            <ellipse cx="14" cy="62" rx="13" ry="17" fill="#3AAD70" opacity="0.8" transform="rotate(20 14 62)"/>
            <ellipse cx="36" cy="58" rx="12" ry="16" fill="#2A9060" opacity="0.75" transform="rotate(-15 36 58)"/>
            {/* Nervadura hoja */}
            <line x1="25" y1="20" x2="25" y2="52" stroke="#1A6040" strokeWidth="1" strokeLinecap="round" opacity="0.6"/>
          </svg>
          {/* Planta derecha */}
          <svg width="36" height="80" viewBox="0 0 36 80" style={{position:'absolute',bottom:0,right:4,transformOrigin:'50% 100%',animation:'swayL 3.1s ease-in-out infinite 0.4s'}}>
            <line x1="18" y1="80" x2="18" y2="36" stroke="#276F50" strokeWidth="2" strokeLinecap="round"/>
            <ellipse cx="18" cy="32" rx="12" ry="16" fill="#1E6844" opacity="0.85" transform="rotate(18 18 32)"/>
            <ellipse cx="24" cy="50" rx="9" ry="13" fill="#267A50" opacity="0.75" transform="rotate(-12 24 50)"/>
          </svg>
          {/* Gotitas de agua animadas */}
          <div style={{position:'absolute',top:10,left:55,animation:'pulse 1.8s ease-in-out infinite',fontSize:10,color:'#3B8DD4',fontWeight:700}}>💧</div>
          <div style={{position:'absolute',top:30,right:12,animation:'pulse 2.2s ease-in-out infinite 0.6s',fontSize:8,color:'#3B8DD4',fontWeight:700}}>💧</div>
        </div>

        {/* Logo texto */}
        <div style={{animation:'rise 0.7s ease-out both 0.3s', textAlign:'center', marginBottom:32}}>
          <p style={{fontSize:26, fontWeight:700, color:'#F0F2F5', letterSpacing:'-0.5px', marginBottom:4}}>Nalhuitad</p>
          <p style={{fontSize:12, color:'#4ADE80', letterSpacing:'0.12em', fontWeight:500}}>HIDROPONÍA · CHILOÉ</p>
        </div>

        {/* Barra de carga */}
        <div style={{width:80, height:3, borderRadius:2, background:'#1A2A20', overflow:'hidden', position:'relative'}}>
          <div style={{
            position:'absolute', top:0, height:'100%',
            background:'linear-gradient(90deg,#4ADE80,#3B8DD4)',
            borderRadius:2,
            animation:'loadSlide 1.6s ease-in-out infinite'
          }} />
        </div>
      </div>
    );
  }

  if (error) {
    return (
      <div style={{
        height:'100%', display:'flex', flexDirection:'column',
        alignItems:'center', justifyContent:'center',
        background:'#1F2937', gap:16, padding:32, textAlign:'center',
        maxWidth:480, margin:'0 auto'
      }}>
        <div style={{width:80, height:80, borderRadius:24, background:'var(--bg-card)', border:'0.5px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:4}}>
          <svg width="44" height="44" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 18 C50 18 30 36 30 52 C30 63.6 39.0 73 50 73 C61.0 73 70 63.6 70 52 C70 36 50 18 50 18Z" fill="none" stroke="#3B8DD4" strokeWidth="3.5"/>
            <path d="M50 38 C50 38 40 35 37 29 C42 24 50 28 50 38Z" fill="#4ADE80"/>
            <path d="M50 38 C50 38 60 33 63 27 C58 22 50 28 50 38Z" fill="#4ADE80" opacity="0.75"/>
            <line x1="50" y1="38" x2="50" y2="65" stroke="#3B8DD4" strokeWidth="3" strokeLinecap="round"/>
          </svg>
        </div>
        <div>
          <p style={{fontSize:17, fontWeight:600, color:'var(--text-1)', marginBottom:8}}>Sin conexión</p>
          <p style={{fontSize:14, color:'var(--text-2)', lineHeight:1.7}}>No se pudo conectar con la nube.<br/>Revisá tu conexión a internet.</p>
        </div>
        <button onClick={() => { setError(false); setLoading(true); fetchLots(); }} style={{
          marginTop:8, padding:'13px 32px', borderRadius:12, border:'none',
          background:'#95DD47', color:'#1F2918', fontSize:14, fontWeight:700, cursor:'pointer'
        }}>Reintentar</button>
      </div>
    );
  }

  const dm = darkMode;
  const appBg = 'var(--bg-1)';
  const headerBg = 'var(--bg-1)';
  const headerBorder = 'var(--sep)';
  const titleColor = 'var(--text-1)';
  const subtitleColor = 'var(--text-3)';

  return (
    <DarkContext.Provider value={darkMode}>
    <div style={{height:'100%', display:'flex', flexDirection:'column', background:appBg, maxWidth:480, margin:'0 auto', position:'relative'}}>

      {toast && <Toast key={toast.key} msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}

      {!online && (
        <div style={{
          background:'var(--amber)', color:'#0F1219',
          padding:'9px 16px', textAlign:'center',
          fontSize:13, fontWeight:500,
          display:'flex', alignItems:'center', justifyContent:'center', gap:8,
          zIndex:150, flexShrink:0,
        }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" style={{flexShrink:0}}>
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
            <line x1="12" y1="20" x2="12.01" y2="20"/>
          </svg>
          <span>
            {'Sin conexión · ' + (lastSync
              ? 'Última sync ' + lastSync.toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'})
              : 'Sin sincronizar')}
          </span>
        </div>
      )}

      {!selectedLot && (
        <div style={{
          padding:'max(48px, calc(env(safe-area-inset-top) + 16px)) 20px 16px',
          background:headerBg, borderBottom:`0.5px solid ${headerBorder}`
        }}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
            <div>
              <p style={{fontSize: screen === 'lotes' ? 26 : 22, fontWeight:600, color:titleColor, lineHeight:1.2}}>
                {screenTitle[screen]}
              </p>
              {screen === 'lotes' && lots.filter(l => l.stage !== 'cosecha').length > 0 && (
                <p style={{fontSize:13, color:subtitleColor, marginTop:4}}>
                  {lots.filter(l => l.stage !== 'cosecha').length} lote{lots.filter(l=>l.stage!=='cosecha').length!==1?'s':''} activo{lots.filter(l=>l.stage!=='cosecha').length!==1?'s':''}
                </p>
              )}
            </div>
            <div style={{display:'flex', alignItems:'center', gap:10, marginTop:4}}>
              {/* Campana de Alertas */}
              <button
                onClick={() => handleNav('alertas')}
                style={{position:'relative', background:'none', border:'none', cursor:'pointer', padding:6, borderRadius:10}}
              >
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={alertCount > 0 ? 'var(--red)' : 'var(--text-3)'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                  <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                {alertCount > 0 && (
                  <div style={{
                    position:'absolute', top:2, right:2,
                    width:16, height:16, borderRadius:8,
                    background:'var(--red)',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize:9, fontWeight:700, color:'#fff'
                  }}>{alertCount}</div>
                )}
              </button>
              {screen === 'lotes' && (
              <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:3}}>
                {lastSync && (
                  <span style={{fontSize:12, fontWeight:600, color: isFromCache ? 'var(--amber)' : titleColor, fontFamily:'DM Mono, monospace'}}>
                    {lastSync.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'})}
                  </span>
                )}
                {lastSync && (
                  <span style={{fontSize:11, color:subtitleColor}}>
                    {lastSync.toLocaleDateString('es-AR', {day:'2-digit', month:'short', year:'numeric'})}
                  </span>
                )}
                <div style={{display:'flex', alignItems:'center', gap:4, marginTop:2}}>
                  {syncing ? (
                    <div style={{width:7, height:7, border:'1.5px solid var(--border)', borderTopColor:'var(--green)', borderRadius:'50%', animation:'spin 0.8s linear infinite'}} />
                  ) : isFromCache ? (
                    <div style={{width:7, height:7, borderRadius:'50%', background:'var(--amber)'}} />
                  ) : (
                    <div style={{width:7, height:7, borderRadius:'50%', background:'var(--green)'}} />
                  )}
                  <span style={{fontSize:11, color: isFromCache && !syncing ? 'var(--amber)' : 'var(--text-2)', fontWeight:500}}>
                    {syncing ? 'Sincronizando...' : isFromCache ? 'Datos del cache' : 'Sincronizado'}
                  </span>
                </div>
              </div>
              )}
            </div>
          </div>
        </div>
      )}

      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0}}>
        <div key={screen + (selectedLot||'')} className="fade-in" style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0}}>
          {renderMain()}
        </div>
      </div>

      <NavBar active={screen} onChange={handleNav} alertCount={alertCount} />
    </div>
    </DarkContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
