          width:'100%', padding:'12px 0', borderRadius:12, border:'none',
          background:'none', color:'var(--text-2)', fontSize:14, cursor:'pointer', marginTop:6
        }}>
          Cancelar
        </button>
      </div>
    </div>
  );
}

// ── LOT NOTES SECTION (usado en DetalleLote) ──────────
function LotNotesSection({ lotId, lotName }) {
  const [notes, setNotes] = useState([]);
  const [showModal, setShowModal] = useState(false);

  useEffect(() => {
    try {
      const all = JSON.parse(localStorage.getItem(NOTES_CACHE_KEY) || '[]');
      setNotes(all.filter(n => n.lotId === lotId));
    } catch {}
    fsDb.list('notas').then(data => {
      const filtered = data
        .filter(n => n.lotId === lotId)
        .sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
      setNotes(filtered);
    }).catch(() => {});
  }, [lotId]);

  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const formatNoteDate = (ts) => {
    try {
      const d = new Date(ts);
      const now = new Date();
      const diff = Math.floor((now - d) / 60000);
      if (diff < 60) return 'hace ' + Math.max(1, diff) + ' min';
      if (diff < 1440) return 'hace ' + Math.floor(diff/60) + 'h';
      return d.getDate() + ' ' + months[d.getMonth()];
    } catch { return ''; }
  };

  const handleSaved = (note) => setNotes(prev => [note, ...prev]);

  if (notes.length === 0 && !showModal) {
    return (
      <div style={{marginBottom:16}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
          <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--text-2)', textTransform:'uppercase'}}>Notas del lote</p>
          <button onClick={() => setShowModal(true)} style={{background:'none', border:'none', cursor:'pointer', fontSize:12, color:'var(--green)', fontWeight:600, padding:0}}>+ Agregar</button>
        </div>
        <p style={{fontSize:13, color:'var(--text-3)'}}>Sin notas para este lote.</p>
        {showModal && <QuickNoteModal lots={[{id:lotId, name:lotName, stage:'raleo', stageHistory:[{date:todayISO()}]}]} onClose={() => setShowModal(false)} onSaved={handleSaved} defaultLotId={lotId} />}
      </div>
    );
  }

  return (
    <div style={{marginBottom:16}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
        <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--text-2)', textTransform:'uppercase'}}>
          {'Notas del lote · ' + notes.length}
        </p>
        <button onClick={() => setShowModal(true)} style={{background:'none', border:'none', cursor:'pointer', fontSize:12, color:'var(--green)', fontWeight:600, padding:0}}>+ Agregar</button>
      </div>
      <div style={{background:'var(--bg-card)', border:'0.5px solid var(--border)', borderRadius:12, overflow:'hidden'}}>
        {notes.slice(0, 3).map((note, i) => (
          <div key={note.id || i} style={{
            padding:'10px 14px',
            borderBottom: i < Math.min(notes.length, 3) - 1 ? '0.5px solid var(--sep)' : 'none',
          }}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:4}}>
              <span style={{fontSize:11, color:'var(--text-3)', fontFamily:'DM Mono, monospace'}}>{formatNoteDate(note.timestamp || note.date)}</span>
            </div>
            <p style={{fontSize:13, color:'var(--text-1)', lineHeight:1.5, margin:0}}>{note.text}</p>
          </div>
        ))}
        {notes.length > 3 && (
          <div style={{padding:'8px 14px', background:'var(--bg-card-h)'}}>
            <p style={{fontSize:12, color:'var(--text-3)', textAlign:'center'}}>{notes.length - 3} notas más — ver en pantalla Notas</p>
          </div>
        )}
      </div>
      {showModal && <QuickNoteModal lots={[{id:lotId, name:lotName, stage:'raleo', stageHistory:[{date:todayISO()}]}]} onClose={() => setShowModal(false)} onSaved={handleSaved} defaultLotId={lotId} />}
    </div>
  );
}

// ── DETALLE LOTE ───────────────────────────────────────
function DetalleLote({ lot, onBack, backLabel = 'Volver', onUpdate, onDelete }) {
  const [editing, setEditing] = useState(false);
  const [showAvanzar, setShowAvanzar] = useState(false);
  const [showCosecha, setShowCosecha] = useState(false);
  const [showTransplante, setShowTransplante] = useState(false);
  const [editCosechaIdx, setEditCosechaIdx] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(false);

  const handleAvanzar = ({ nextStage, date, quantity, notes: moveNotes }) => {
    const isCosecha = nextStage === 'cosecha';
    const cosechaFinal = isCosecha ? {
      date,
      cosechadas: quantity,
      descartadas: 0,
      notes: moveNotes || 'Cosecha final'
    } : null;

    const updated = {
      ...lot,
      stage: nextStage,
      currentQuantity: isCosecha ? 0 : quantity,
      cosechas: isCosecha
        ? [...(lot.cosechas || []), cosechaFinal]
        : lot.cosechas,
      stageHistory: [
        ...lot.stageHistory,
        { stage: nextStage, date, quantity, notes: moveNotes }
      ]
    };
    onUpdate(updated);
    setShowAvanzar(false);
  };

  const handleEditCosecha = (idx, { date, cosechadas, descartadas, notes: cosNotes }) => {
    const newCosechas = lot.cosechas.map((c, i) =>
      i === idx ? { date, cosechadas, descartadas, notes: cosNotes } : c
    );
    // Recalcular currentQuantity desde cero
    const totalOut = newCosechas.reduce((a, c) => a + (c.cosechadas || 0) + (c.descartadas || 0), 0);
    const newQty = Math.max(0, toPlants(lot.quantity) - totalOut);
    const updated = {
      ...lot,
      cosechas: newCosechas,
      currentQuantity: newQty,
      stage: newQty <= 0 ? 'cosecha' : lot.stage,
    };
    onUpdate(updated);
    setEditCosechaIdx(null);
  };

  const handleTransplante = ({ date, transplantadas, desechadas, notas, esTotal }) => {
    const registro = { date, transplantadas, desechadas, notas };
    const newTransplantes = [...(lot.transplantes || []), registro];
    const totalTransplantadas = newTransplantes.reduce((a, t) => a + (t.transplantadas || 0), 0);
    const totalDesechadas = newTransplantes.reduce((a, t) => a + (t.desechadas || 0), 0);
    const plantasOriginales = lot.currentQuantity ?? toPlants(lot.quantity);
    const newQty = Math.max(0, plantasOriginales - totalDesechadas);
    const agotado = esTotal || totalTransplantadas >= newQty;
    const updated = {
      ...lot,
      transplantes: newTransplantes,
      currentQuantity: newQty,
      stage: agotado ? 'raleo' : lot.stage,
      stageHistory: agotado
        ? [...lot.stageHistory, { stage:'raleo', date, quantity: newQty, notes: notas || 'Transplante completado' }]
        : lot.stageHistory,
    };
    onUpdate(updated);
    setShowTransplante(false);
  };

  const handleCosecha = ({ date, cosechadas, descartadas, notes: cosNotes }) => {
    const currentQty = lot.currentQuantity ?? toPlants(lot.quantity);
    const totalOut = cosechadas + descartadas;
    const newQty = currentQty - totalOut;
    const cosechaRecord = { date, cosechadas, descartadas, notes: cosNotes };
    const updated = {
      ...lot,
      currentQuantity: newQty,
      cosechas: [...(lot.cosechas || []), cosechaRecord],
      stage: newQty <= 0 ? 'cosecha' : lot.stage,
      stageHistory: newQty <= 0
        ? [...lot.stageHistory, { stage: 'cosecha', date, quantity: 0, notes: 'Lote agotado' }]
        : lot.stageHistory,
    };
    onUpdate(updated);
    setShowCosecha(false);
  };
  const [form, setForm] = useState({
    name: lot.name,
    variety: VARIETIES.includes(lot.variety) ? lot.variety : 'Otra',
    customVariety: VARIETIES.includes(lot.variety) ? '' : lot.variety,
    date: lot.date, quantity: String(lot.quantity), notes: lot.notes || ''
  });
  const [errors, setErrors] = useState({});
  const [saved, setSaved] = useState(false);
  const [confirmSave, setConfirmSave] = useState(false);

  const set = (key, val) => setForm(f => ({...f, [key]: val}));

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Ingresá un nombre';
    if (!form.quantity || isNaN(form.quantity) || parseInt(form.quantity) <= 0)
      e.quantity = 'Cantidad inválida';
    return e;
  };

  const handleUpdate = () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    const updated = {
      ...lot,
      name: form.name.trim(),
      variety: form.variety === 'Otra' ? (form.customVariety?.trim() || 'Otra') : form.variety,
      date: form.date,
      quantity: parseInt(form.quantity),
      notes: form.notes.trim(),
    };
    onUpdate(updated);
    setSaved(true);
    setTimeout(() => { setSaved(false); setEditing(false); }, 1000);
  };

  const dm = useDarkMode();
  const dmCard = 'var(--bg-card)';
  const dmBorder = 'var(--border)';
  const dmBorder2 = 'var(--sep)';
  const dmText = 'var(--text-1)';
  const dmText2 = 'var(--text-2)';
  const dmBg2 = 'var(--bg-card-h)';

  if (editing) {
    return (
      <div style={{flex:1, overflowY:'auto', padding:'16px 18px', background:'var(--bg-1)'}}>
        <button onClick={() => setEditing(false)} style={{display:'flex', alignItems:'center', gap:6, background:'none', border:'none', color:'var(--green)', fontSize:14, fontWeight:500, cursor:'pointer', marginBottom:20, padding:0}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Cancelar
        </button>
        <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color: 'var(--text-2)', textTransform:'uppercase', marginBottom:20}}>Editar lote</p>

        <Field label="Nombre del lote" error={errors.name}>
          <input id="edit-nombre" name="edit-nombre" type="text" value={form.name}
            onChange={e => { set('name', e.target.value); setErrors(er => ({...er, name:undefined})); }}
            style={inputStyle(errors.name)} />
        </Field>
        <Field label="Fecha de siembra">
          <input id="edit-fecha" name="edit-fecha" type="date" value={form.date}
            onChange={e => set('date', e.target.value)}
            style={inputStyle()} />
        </Field>
        <Field label="Cantidad de almácigos sembrados" error={errors.quantity}>
          <input id="edit-cantidad" name="edit-cantidad" type="number" inputMode="numeric" value={form.quantity}
            onChange={e => { set('quantity', e.target.value); setErrors(er => ({...er, quantity:undefined})); }}
            style={inputStyle(errors.quantity)} />
        </Field>
        <Field label="Variedad">
          <div style={{display:'flex', flexWrap:'wrap', gap:7, marginBottom: form.variety === 'Otra' ? 8 : 0}}>
            {VARIETIES.map(function(v) {
              const sel = form.variety === v;
              return (
                <button key={v} onClick={() => { set('variety', v); if (v !== 'Otra') set('customVariety', ''); }} style={{
                  padding:'9px 13px', borderRadius:10, border:'0.5px solid',
                  borderColor: sel ? 'var(--green)' : 'var(--border)',
                  background: sel ? 'var(--bg-card-h)' : 'var(--bg-card)',
                  color: sel ? 'var(--green)' : 'var(--text-2)',
                  fontSize:13, fontWeight: sel ? 700 : 400, cursor:'pointer', whiteSpace:'nowrap'
                }}>{v}</button>
              );
            })}
          </div>
          {form.variety === 'Otra' && (
            <input id="edit-variedad" name="edit-variedad" type="text" placeholder="Nombre de la variedad..."
              value={form.customVariety || ''}
              onChange={e => set('customVariety', e.target.value)}
              style={inputStyle()} autoFocus />
          )}
        </Field>
        <Field label="Notas (opcional)">
          <textarea id="edit-notas" name="edit-notas" value={form.notes} onChange={e => set('notes', e.target.value)}
            rows={3} style={{...inputStyle(), resize:'none', lineHeight:1.7}} />
        </Field>

        {confirmSave ? (
          <ConfirmBar
            message="Los datos del lote se van a actualizar con los valores ingresados."
            onConfirm={() => { setConfirmSave(false); handleUpdate(); }}
            onCancel={() => setConfirmSave(false)}
          />
        ) : (
          <button onClick={() => {
            const e = validate();
            if (Object.keys(e).length) { setErrors(e); return; }
            setConfirmSave(true);
          }} style={{
            width:'100%', padding:'15px 0', borderRadius:12, border:'none',
            background: saved ? 'var(--green)' : 'var(--text-1)',
            color:'#fff', fontSize:15, fontWeight:600, cursor:'pointer',
            transition:'background 0.3s', marginTop:8, marginBottom:24
          }}>
            {saved ? '✓ Guardado' : 'Guardar cambios'}
          </button>
        )}
      </div>
    );
  }

  return (
    <>
    {showAvanzar && <AvanzarModal lot={lot} onClose={() => setShowAvanzar(false)} onConfirm={handleAvanzar} />}
    {showCosecha && <CosechaModal lot={lot} onClose={() => setShowCosecha(false)} onConfirm={handleCosecha} />}
    {showTransplante && <TransplanteModal lot={lot} onClose={() => setShowTransplante(false)} onConfirm={handleTransplante} esTotal={showTransplante === 'total'} />}
    {editCosechaIdx !== null && lot.cosechas?.[editCosechaIdx] && (
      <CosechaModal
        lot={lot}
        editData={lot.cosechas[editCosechaIdx]}
        onClose={() => setEditCosechaIdx(null)}
        onConfirm={(data) => handleEditCosecha(editCosechaIdx, data)}
        editMode
      />
    )}
    <div style={{flex:1, overflowY:'auto', padding:16, background:'var(--bg-1)'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}}>
        <button onClick={onBack} style={{display:'flex', alignItems:'center', gap:6, background:'none', border:'none', color:'var(--green)', fontSize:13, fontWeight:500, cursor:'pointer', padding:0}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          {backLabel}
        </button>
        <button onClick={() => setEditing(true)} style={{
          display:'flex', alignItems:'center', gap:5,
          background: 'var(--bg-card-h)',
          border:'0.5px solid var(--border)',
          borderRadius:20, padding:'6px 14px',
          fontSize:12, fontWeight:500, color:'var(--text-3)', cursor:'pointer'
        }}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Editar
        </button>
      </div>

      <p style={{fontSize:18, fontWeight:600, color:dmText, marginBottom:4}}>{lot.name}</p>
      <p style={{fontSize:13, color:dmText2, marginBottom:16}}>Sembrado el {formatDate(lot.date)}</p>

      <StageBadge stage={lot.stage} days={daysSince(lot.stageHistory?.[lot.stageHistory.length-1]?.date || lot.date)} maxDays={getMaxDays(lot.stage, lot.stageHistory?.[lot.stageHistory.length-1]?.date || lot.date)} />

      <div style={{background: dmCard, border:`0.5px solid ${dmBorder}`, borderRadius:14, padding:'14px 16px', marginTop:16}}>
        <Row label="Variedad" value={lot.variety} />
        <Row label="Almácigos sembrados" value={''+lot.quantity+' (× '+getPlantsPer()+' plantas)'} />
        <Row label="Plantas al sembrar" value={toPlants(lot.quantity).toLocaleString()} />
        <Row label="Plantas en producción" value={(lot.currentQuantity ?? toPlants(lot.quantity)).toLocaleString()} />
        {lot.notes && <Row label="Notas" value={lot.notes} />}
      </div>

      <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:dmText2, textTransform:'uppercase', margin:'20px 0 10px'}}>Historial de etapas</p>
      <div style={{background: dmCard, border:`0.5px solid ${dmBorder}`, borderRadius:14, overflow:'hidden', marginBottom:24}}>
        {lot.stageHistory.map((h, i) => (
          <div key={i} style={{
            display:'flex', justifyContent:'space-between', alignItems:'center',
            padding:'14px 16px',
            borderBottom: i < lot.stageHistory.length-1 ? `0.5px solid ${dmBorder2}` : 'none'
          }}>
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <div style={{width:9, height:9, borderRadius:5, background: STAGES[h.stage].color, flexShrink:0}} />
              <div>
                <span style={{fontSize:14, fontWeight:500, display:'block', color:dmText}}>{STAGES[h.stage].label}</span>
                {h.notes && <span style={{fontSize:12, color:dmText2, marginTop:2, display:'block'}}>{h.notes}</span>}
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <p style={{fontSize:13, color:dmText, fontFamily:'DM Mono, monospace'}}>{formatDate(h.date)}</p>
              <p style={{fontSize:12, color:dmText2, marginTop:2}}>{h.quantity.toLocaleString()} plantas</p>
              {i > 0 && (() => {
                const prev = lot.stageHistory[i-1].quantity;
                const diff = prev - h.quantity;
                const pct = Math.round((diff / prev) * 100);
                return diff > 0
                  ? <p style={{fontSize:11, color: pct > 20 ? '#C0392B' : '#E07B2A', marginTop:2}}>↓ {diff.toLocaleString()} ({pct}%)</p>
                  : null;
              })()}
            </div>
          </div>
        ))}
      </div>

      {lot.cosechas && lot.cosechas.length > 0 && (
        <>
          <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:dmText2, textTransform:'uppercase', margin:'20px 0 10px'}}>
            Cosechas registradas · {lot.cosechas.length}
          </p>
          <div style={{background: dmCard, border:`0.5px solid ${dmBorder}`, borderRadius:14, overflow:'hidden', marginBottom:24}}>
            {lot.cosechas.map((c, i) => {
              const totalCosecha = (c.cosechadas || 0) + (c.descartadas || 0);
              return (
                <div key={i} style={{
                  display:'flex', justifyContent:'space-between', alignItems:'center',
                  padding:'14px 16px',
                  borderBottom: i < lot.cosechas.length-1 ? `0.5px solid ${dmBorder2}` : 'none'
                }}>
                  <div style={{display:'flex', alignItems:'center', gap:10, flex:1, minWidth:0}}>
                    <div style={{width:9, height:9, borderRadius:5, background:'var(--green)', flexShrink:0}} />
                    <div style={{flex:1, minWidth:0}}>
                      <span style={{fontSize:14, fontWeight:500, color:dmText, display:'block'}}>
                        {c.cosechadas.toLocaleString()} cosechadas
                      </span>
                      {c.descartadas > 0 && (
                        <span style={{fontSize:12, color:'var(--amber)', display:'block', marginTop:2}}>
                          {c.descartadas.toLocaleString()} descartadas
                        </span>
                      )}
                      {c.notes && <span style={{fontSize:12, color:dmText2, display:'block', marginTop:2}}>{c.notes}</span>}
                    </div>
                  </div>
                  <div style={{display:'flex', alignItems:'center', gap:10, flexShrink:0}}>
                    <div style={{textAlign:'right'}}>
                      <p style={{fontSize:13, color:dmText, fontFamily:'DM Mono, monospace'}}>{formatDate(c.date)}</p>
                      <p style={{fontSize:12, color:dmText2, marginTop:2}}>{totalCosecha.toLocaleString()} total</p>
                    </div>
                    <button onClick={() => setEditCosechaIdx(i)} style={{
                      background: 'var(--bg-card-h)', border:`0.5px solid ${dmBorder}`,
                      borderRadius:8, padding:'5px 10px',
                      fontSize:12, fontWeight:500, color:dmText2, cursor:'pointer',
                      flexShrink:0
                    }}>
                      Editar
                    </button>
                  </div>
                </div>
              );
            })}
            <div style={{
              padding:'12px 16px', background: dmBg2,
              display:'flex', justifyContent:'space-between', alignItems:'center',
              borderTop: '0.5px solid ' + dmBorder2
            }}>
              <span style={{fontSize:13, color:dmText2, fontWeight:500}}>Total cosechado</span>
              <span style={{fontSize:14, fontWeight:600, color:'var(--green)', fontFamily:'DM Mono, monospace'}}>
                {(lot.cosechas.reduce((a, c) => a + (c.cosechadas || 0), 0)).toLocaleString()} lechugas
              </span>
            </div>
            {(function() {
              const totalC = lot.cosechas.reduce((a, c) => a + (c.cosechadas || 0), 0);
              const totalD = lot.cosechas.reduce((a, c) => a + (c.descartadas || 0), 0);
              const totalT = totalC + totalD;
              if (totalT === 0 || totalD === 0) return null;
              const pct = Math.round((totalD / totalT) * 100);
              const mermaClr = pct > 20 ? 'var(--red)' : pct > 10 ? 'var(--amber)' : 'var(--green)';
              return (
                <div style={{
                  padding:'10px 16px', background: dmBg2,
                  display:'flex', justifyContent:'space-between', alignItems:'center',
                  borderTop: '0.5px solid ' + dmBorder2
                }}>
                  <span style={{fontSize:13, color:dmText2, fontWeight:500}}>Tasa de merma</span>
                  <div style={{display:'flex', alignItems:'center', gap:8}}>
                    <div style={{width:80, height:5, background:'var(--border)', borderRadius:3, overflow:'hidden'}}>
                      <div style={{height:'100%', width: Math.min(100,pct) + '%', background: mermaClr, borderRadius:3, transition:'width 0.4s'}} />
                    </div>
                    <span style={{fontSize:14, fontWeight:600, color: mermaClr, fontFamily:'DM Mono, monospace', minWidth:38, textAlign:'right'}}>
                      {pct}%
                    </span>
                  </div>
                </div>
              );
            })()}
          </div>
        </>
      )}

      {lot.transplantes && lot.transplantes.length > 0 && (
        <>
          <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:dmText2, textTransform:'uppercase', margin:'20px 0 10px'}}>
            Transplantes registrados · {lot.transplantes.length}
          </p>
          <div style={{background: dmCard, border:`0.5px solid ${dmBorder}`, borderRadius:14, overflow:'hidden', marginBottom:24}}>
            {lot.transplantes.map((t, i) => (
              <div key={i} style={{
                display:'flex', justifyContent:'space-between', alignItems:'center',
                padding:'14px 16px',
                borderBottom: i < lot.transplantes.length-1 ? `0.5px solid ${dmBorder2}` : 'none'
              }}>
                <div style={{display:'flex', alignItems:'center', gap:10, flex:1}}>
                  <div style={{width:9, height:9, borderRadius:5, background: STAGES.transplante.color, flexShrink:0}} />
                  <div>
                    <span style={{fontSize:14, fontWeight:500, color:dmText, display:'block'}}>{(t.transplantadas||0).toLocaleString()} transplantadas</span>
                    {t.desechadas > 0 && <span style={{fontSize:12, color:'var(--amber)', display:'block', marginTop:2}}>{t.desechadas.toLocaleString()} desechadas</span>}
                    {t.notas && <span style={{fontSize:12, color:dmText2, display:'block', marginTop:2}}>{t.notas}</span>}
                  </div>
                </div>
                <p style={{fontSize:13, color:dmText, fontFamily:'DM Mono, monospace'}}>{formatDate(t.date)}</p>
              </div>
            ))}
            <div style={{padding:'12px 16px', background:dmBg2, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <span style={{fontSize:13, color:dmText2, fontWeight:500}}>Total transplantado</span>
              <span style={{fontSize:14, fontWeight:600, color: STAGES.transplante.color, fontFamily:'DM Mono, monospace'}}>
                {(lot.transplantes.reduce((a,t) => a+(t.transplantadas||0), 0)).toLocaleString()} plantas
              </span>
            </div>
          </div>
        </>
      )}

      {lot.stage === 'raleo' && (
        <button onClick={() => setShowCosecha(true)} style={{
          width:'100%', padding:'14px 0', borderRadius:12, border:'none',
          background:'var(--green)', color:'#fff', fontSize:15, fontWeight:600,
          cursor:'pointer', display:'flex', alignItems:'center',
          justifyContent:'center', gap:8, marginBottom:12
        }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 2a9 9 0 0 1 9 9c0 4.97-9 13-9 13S3 15.97 3 11a9 9 0 0 1 9-9z"/><circle cx="12" cy="11" r="2.5"/></svg>
          Registrar cosecha parcial
        </button>
      )}

      {lot.stage === 'transplante' && (
        <>
          <button onClick={() => setShowTransplante(true)} style={{
            width:'100%', padding:'14px 0', borderRadius:12, border:'none',
            background: STAGES.transplante.color, color:'#fff', fontSize:15, fontWeight:600,
            cursor:'pointer', display:'flex', alignItems:'center',
            justifyContent:'center', gap:8, marginBottom:10
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
            Registrar transplante parcial
          </button>
          <button onClick={() => setShowTransplante('total')} style={{
            width:'100%', padding:'14px 0', borderRadius:12,
            border:`0.5px solid ${STAGES.transplante.color}`,
            background:'none', color: STAGES.transplante.color, fontSize:15, fontWeight:600,
            cursor:'pointer', display:'flex', alignItems:'center',
            justifyContent:'center', gap:8, marginBottom:12
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            Transplante total — pasar a Raleo
          </button>
        </>
      )}

      {lot.stage !== 'transplante' && NEXT_STAGE[lot.stage] && (
        <button onClick={() => setShowAvanzar(true)} style={{
          width:'100%', padding:'14px 0', borderRadius:12, border:'none',
          background: STAGES[NEXT_STAGE[lot.stage]].color,
          color:'#fff', fontSize:15, fontWeight:600, cursor:'pointer',
          display:'flex', alignItems:'center', justifyContent:'center', gap:8,
          marginBottom:12
        }}>
          Avanzar a {STAGES[NEXT_STAGE[lot.stage]].label}
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      )}

      <LotNotesSection lotId={lot.id} lotName={lot.name} />

      {!confirmDelete ? (
        <button onClick={() => setConfirmDelete(true)} style={{
          width:'100%', padding:'13px 0', borderRadius:12,
          border:'0.5px solid var(--border)',
          background:'none', color:'var(--red)', fontSize:14, fontWeight:500,
          cursor:'pointer', marginBottom:24
        }}>
          Eliminar lote
        </button>
      ) : (
        <div style={{
          background:'var(--bg-card-h)',
          border:'0.5px solid var(--border)',
          borderRadius:12, padding:'16px 18px', marginBottom:24
        }}>
          <p style={{fontSize:15, fontWeight:600, color: 'var(--text-1)', marginBottom:6}}>¿Eliminar este lote?</p>
          <p style={{fontSize:13, color: 'var(--text-3)', marginBottom:16}}>Esta acción no se puede deshacer.</p>
          <div style={{display:'flex', gap:8}}>
            <button onClick={() => setConfirmDelete(false)} style={{
              flex:1, padding:'12px 0', borderRadius:10,
              border:`0.5px solid ${dmBorder}`, background: dmCard,
              color:dmText2, fontSize:14, fontWeight:500, cursor:'pointer'
            }}>Cancelar</button>
            <button onClick={() => onDelete(lot.id)} style={{
              flex:1, padding:'12px 0', borderRadius:10,
              border:'none', background:'#C0392B',
              color:'#fff', fontSize:14, fontWeight:600, cursor:'pointer'
            }}>Sí, eliminar</button>
          </div>
        </div>
      )}
    </div>
    </>
  );
}

function Row({ label, value }) {
  return (
    <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', padding:'8px 0', borderBottom:'0.5px solid var(--sep)'}}>
      <span style={{fontSize:13, color: 'var(--text-3)'}}>{label}</span>
      <span style={{fontSize:14, fontWeight:500, color: 'var(--text-1)', fontFamily:'DM Mono, monospace', textAlign:'right', maxWidth:'60%'}}>{value}</span>
    </div>
  );
}

// ── ALERTAS SCREEN ────────────────────────────────────
function AlertasScreen({ lots, onSelect }) {
  const active = lots.filter(l => l.stage !== 'cosecha');
  const withAlerts = active
    .map(l => ({ lot: l, alert: getLotAlert(l) }))
    .filter(({ alert }) => alert && alert.status !== 'ok')
    .sort((a, b) => a.alert.remaining - b.alert.remaining);

  const okLots = active
    .map(l => ({ lot: l, alert: getLotAlert(l) }))
    .filter(({ alert }) => alert && alert.status === 'ok')
    .sort((a, b) => a.alert.remaining - b.alert.remaining);

  const handleSelect = useCallback((lot) => onSelect(lot), [onSelect]);

  if (active.length === 0) {
    return (
      <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32, textAlign:'center'}}>
        <div style={{width:60, height:60, borderRadius:16, background:'var(--bg-card-h)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:16}}>
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#276F50" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <p className="dm-text" style={{fontSize:15, fontWeight:500, color:'var(--text-1)', marginBottom:6}}>Sin lotes activos</p>
        <p className="dm-text2" style={{fontSize:13, color:'var(--text-2)'}}>Registrá un lote para ver alertas.</p>
      </div>
    );
  }

  if (withAlerts.length === 0) {
    return (
      <div style={{flex:1, overflowY:'auto', padding:16}}>
        <div className="dm-alert-ok" style={{
          background:'var(--bg-card-h)', borderRadius:14, padding:'16px 18px', marginBottom:20,
          display:'flex', alignItems:'center', gap:12
        }}>
          <div style={{width:36, height:36, borderRadius:10, background:'var(--border)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#276F50" strokeWidth="2.2" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div>
            <p className="dm-text" style={{fontSize:14, fontWeight:600, color:'var(--text-1)', marginBottom:2}}>Todo en orden</p>
            <p className="dm-text2" style={{fontSize:12, color:'var(--text-2)'}}>Ningún lote requiere atención inmediata.</p>
          </div>
        </div>
        <p className="dm-section-label" style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--text-2)', textTransform:'uppercase', marginBottom:12}}>Próximos vencimientos</p>
        {okLots.map(({ lot, alert }) => <AlertCard key={lot.id} lot={lot} alert={alert} onSelect={handleSelect} />)}
      </div>
    );
  }

  return (
    <div style={{flex:1, overflowY:'auto', padding:16}}>
      {withAlerts.length > 0 && (
        <>
          <p style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--red)', textTransform:'uppercase', marginBottom:12}}>
            Requieren atención · {withAlerts.length}
          </p>
          {withAlerts.map(({ lot, alert }) => <AlertCard key={lot.id} lot={lot} alert={alert} onSelect={handleSelect} />)}
        </>
      )}
      {okLots.length > 0 && (
        <>
          <p className="dm-section-label" style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--text-2)', textTransform:'uppercase', margin:'20px 0 12px'}}>
            En plazo · {okLots.length}
          </p>
          {okLots.map(({ lot, alert }) => <AlertCard key={lot.id} lot={lot} alert={alert} onSelect={handleSelect} />)}
        </>
      )}
    </div>
  );
}

const AlertCard = React.memo(function AlertCard({ lot, alert, onSelect }) {
  const isOverdue = alert.status === 'overdue';
  const isWarning = alert.status === 'warning';
  const handleClick = React.useCallback(() => onSelect(lot), [lot, onSelect]);
  const accentColor = isOverdue ? 'var(--red)' : isWarning ? 'var(--amber)' : 'var(--green)';
  const accentHex   = isOverdue ? '#F87171'    : isWarning ? '#FBBF24'      : '#4ADE80';
  const accentBg = isOverdue
    ? 'var(--bg-card-h)'
    : isWarning
    ? 'var(--bg-card-h)'
    : 'var(--bg-card)';
  const progressPct = Math.min(100, Math.round((alert.days / alert.maxDays) * 100));
  const totalCycleDays = daysSince(lot.date);
  const borderColor = isOverdue||isWarning ? accentHex+'55' : 'var(--border)';
  const sepColor = isOverdue||isWarning ? accentHex+'22' : 'var(--sep)';
  const textColor = 'var(--text-1)';
  const text2Color = 'var(--text-2)';

  return (
    <div onClick={handleClick} style={{
      background: accentBg,
      border: `0.5px solid ${borderColor}`,
      borderRadius:14, overflow:'hidden', marginBottom:10, cursor:'pointer',
      WebkitUserSelect:'none', transition:'transform 0.1s',
      display:'flex',
    }}
      onTouchStart={e => e.currentTarget.style.transform='scale(0.985)'}
      onTouchEnd={e => e.currentTarget.style.transform='scale(1)'}
    >
      {(isOverdue || isWarning) && (
        <div style={{width:4, background: accentColor, flexShrink:0}} />
      )}
      <div style={{flex:1, padding:'16px 18px'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10}}>
          <div style={{flex:1, minWidth:0, marginRight:8}}>
            <p style={{fontSize:12, fontWeight:600, color: STAGES[lot.stage].color, letterSpacing:'0.03em', textTransform:'uppercase', marginBottom:4}}>
              {STAGE_LABELS[lot.stage]}
            </p>
            <p style={{fontSize:16, fontWeight:600, color:textColor, marginBottom:3}}>{lot.name}</p>
            <p style={{fontSize:13, color:text2Color}}>{SEASON_LABEL[alert.season]} · ciclo {totalCycleDays}d</p>
          </div>
          <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:5, flexShrink:0}}>
            <StageBadge stage={lot.stage} days={alert.days} maxDays={alert.maxDays} />
            <div style={{
              background: isOverdue ? 'var(--bg-card-h)' : isWarning ? 'var(--bg-card-h)' : 'var(--bg-card)',
              color: isOverdue ? '#C0392B' : isWarning ? '#A85A00' : '#276F50',
              fontSize:11, fontWeight:700, padding:'4px 10px', borderRadius:20
            }}>
              {isOverdue
                ? `${Math.abs(alert.remaining)}d atrasado`
                : isWarning
                ? `Vence en ${alert.remaining}d`
                : `${alert.remaining}d restantes`}
            </div>
          </div>
        </div>

        <div style={{marginBottom:8}}>
          <div style={{height:5, background: isOverdue||isWarning ? accentHex+'22' : 'var(--sep)', borderRadius:3, overflow:'hidden'}}>
            <div style={{height:'100%', borderRadius:3, width:`${progressPct}%`, background: accentHex, transition:'width 0.3s'}} />
          </div>
        </div>

        <div style={{display:'flex', justifyContent:'space-between', paddingTop:8, borderTop:`0.5px solid ${sepColor}`}}>
          <span style={{fontSize:13, color:text2Color, fontFamily:'DM Mono, monospace'}}>Etapa: día {alert.days} de {alert.maxDays}</span>
          <span style={{fontSize:13, color:text2Color, fontFamily:'DM Mono, monospace'}}>{(lot.currentQuantity ?? toPlants(lot.quantity)).toLocaleString()} plantas</span>
        </div>
      </div>
    </div>
  );
});

function exportData(lots, format) {
  const fecha = new Date().toLocaleDateString('es-CL').replace(/\//g,'-');

  // ── Hoja 1: Lotes ──
  const lotesRows = lots.map(lot => ({
    'Nombre': lot.name,
    'Variedad': lot.variety,
    'Fecha siembra': lot.date,
    'Almácigos': lot.quantity,
    'Plantas al sembrar': toPlants(lot.quantity),
    'Plantas en producción': lot.currentQuantity ?? toPlants(lot.quantity),
    'Etapa actual': STAGES[lot.stage]?.label || lot.stage,
    'Días en etapa actual': daysSince(lot.stageHistory?.[lot.stageHistory.length-1]?.date || lot.date),
    'Días ciclo total': daysSince(lot.date),
    'Notas': lot.notes || '',
  }));

  // ── Hoja 2: Historial de etapas ──
  const etapasRows = [];
  lots.forEach(lot => {
    (lot.stageHistory || []).forEach((h, i) => {
      const prev = lot.stageHistory[i-1];
      etapasRows.push({
        'Lote': lot.name,
        'Etapa': STAGES[h.stage]?.label || h.stage,
        'Fecha entrada': h.date,
        'Plantas al entrar': h.quantity,
        'Merma desde etapa anterior': prev ? (prev.quantity - h.quantity) : 0,
        'Merma %': prev && prev.quantity > 0 ? Math.round(((prev.quantity - h.quantity) / prev.quantity) * 100) : 0,
        'Observaciones': h.notes || '',
      });
    });
  });

  // ── Hoja 3: Cosechas ──
  const cosechasRows = [];
  lots.forEach(lot => {
    (lot.cosechas || []).forEach((c, i) => {
      cosechasRows.push({
        'Lote': lot.name,
        'Variedad': lot.variety,
        'N° cosecha': i + 1,
        'Fecha': c.date,
        'Cosechadas': c.cosechadas || 0,
        'Descartadas': c.descartadas || 0,
        'Total': (c.cosechadas || 0) + (c.descartadas || 0),
        'Notas': c.notes || '',
      });
    });
  });

  if (format === 'csv') {
    // Exportar solo lotes como CSV
    const headers = Object.keys(lotesRows[0] || {});
    const csvContent = [
      headers.join(','),
      ...lotesRows.map(row => headers.map(h => `"${String(row[h]).replace(/"/g,'""')}"`).join(','))
    ].join('\n');
    const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `Nalhuitad_lotes_${fecha}.csv`;
    a.click(); URL.revokeObjectURL(url);
    return;
  }

  // Excel con 3 hojas
  const wb = XLSX.utils.book_new();
  const wsLotes = XLSX.utils.json_to_sheet(lotesRows.length ? lotesRows : [{}]);
  const wsEtapas = XLSX.utils.json_to_sheet(etapasRows.length ? etapasRows : [{}]);
  const wsCosechas = XLSX.utils.json_to_sheet(cosechasRows.length ? cosechasRows : [{}]);

  // Ancho de columnas
  [wsLotes, wsEtapas, wsCosechas].forEach(ws => {
    ws['!cols'] = Array(20).fill({ wch: 18 });
  });

  XLSX.utils.book_append_sheet(wb, wsLotes, 'Lotes');
  XLSX.utils.book_append_sheet(wb, wsEtapas, 'Historial de etapas');
  XLSX.utils.book_append_sheet(wb, wsCosechas, 'Cosechas');
  XLSX.writeFile(wb, `Nalhuitad_historial_${fecha}.xlsx`);
}

function HistorialScreen({ lots }) {
  // Incluye lotes cosechados completos Y lotes con cosechas parciales registradas
  const conCosechas = lots.filter(l => l.cosechas?.length > 0);
  const cosechados = lots.filter(l => l.stage === 'cosecha' && l.cosechas?.length > 0);
  const todos = lots;

  // ── KPIs globales — usa todos los lotes con cosechas ──
  const totalCosechadas = conCosechas.reduce((a, l) =>
    a + (l.cosechas || []).reduce((b, c) => b + (c.cosechadas || 0), 0), 0);
  const totalDescartadas = conCosechas.reduce((a, l) =>
    a + (l.cosechas || []).reduce((b, c) => b + (c.descartadas || 0), 0), 0);
  const totalSembradas = conCosechas.reduce((a, l) => a + toPlants(l.quantity), 0);
  const rendimientoGlobal = totalSembradas > 0 ? Math.round((totalCosechadas / totalSembradas) * 100) : 0;
  const totalSalida = totalCosechadas + totalDescartadas;
  const tasaMermaGlobal = totalSalida > 0 ? Math.round((totalDescartadas / totalSalida) * 100) : null;

  // ── Duración promedio real por etapa ──
  const stageDurations = { almacigo: [], transplante: [], raleo: [] };
  todos.forEach(lot => {
    lot.stageHistory.forEach((h, i) => {
      if (i === 0) return;
      const prev = lot.stageHistory[i - 1];
      const dur = daysSince(prev.date) - daysSince(h.date);
      if (dur > 0 && stageDurations[prev.stage]) {
        stageDurations[prev.stage].push(dur);
      }
    });
    if (lot.stage === 'cosecha' && lot.cosechas?.length > 0) {
      const lastStage = lot.stageHistory[lot.stageHistory.length - 1];
      if (lastStage.stage === 'raleo') {
        const dur = daysSince(lastStage.date) - daysSince(lot.cosechas[lot.cosechas.length-1]?.date || lastStage.date);
        if (dur > 0) stageDurations.raleo.push(dur);
      }
    }
  });

  const avg = arr => arr.length > 0 ? Math.round(arr.reduce((a,b) => a+b, 0) / arr.length) : null;
  const STAGE_EST = { almacigo: 30, transplante: 15, raleo: 35 };

  // ── Merma por etapa ──
  const stageTransitions = { almacigo: [], transplante: [], raleo: [] };
  todos.forEach(lot => {
    lot.stageHistory.forEach((h, i) => {
      if (i === 0) return;
      const prev = lot.stageHistory[i - 1];
      if (prev.quantity > 0 && stageTransitions[prev.stage]) {
        const merma = prev.quantity - h.quantity;
        const pct = Math.round((merma / prev.quantity) * 100);
        if (pct >= 0) stageTransitions[prev.stage].push(pct);
      }
    });
  });

  // ── Rendimiento por lote — incluye parciales en curso ──
  const lotRendimientos = conCosechas.map(lot => {
    const cosechadas = (lot.cosechas || []).reduce((a, c) => a + (c.cosechadas || 0), 0);
    const sembradas = toPlants(lot.quantity);
    const ultimaCosecha = (lot.cosechas?.[lot.cosechas.length-1]?.date) || lot.date;
    const duracion = daysSince(lot.date) - daysSince(ultimaCosecha);
    const enCurso = lot.stage !== 'cosecha';
    return {
      name: lot.name,
      cosechadas, sembradas,
      pct: sembradas > 0 ? Math.round((cosechadas/sembradas)*100) : 0,
      duracion: Math.max(0, duracion),
      enCurso
    };
  });

  const sinDatos = cosechados.length === 0 && todos.every(l => l.stageHistory.length <= 1);

  if (sinDatos) {
    return (
      <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32, textAlign:'center'}}>
        <div style={{width:64, height:64, borderRadius:18, background:'#EEEAF7', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:20}}>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#6B3FA0" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <p className="dm-text" style={{fontSize:17, fontWeight:600, color:'var(--text-1)', marginBottom:8}}>Sin datos aún</p>
        <p className="dm-text2" style={{fontSize:14, color:'var(--text-2)', lineHeight:1.7}}>Los análisis aparecen a medida que<br/>registrás movimientos y cosechas.</p>
      </div>
    );
  }

  return (
    <div style={{flex:1, overflowY:'auto', padding:'16px 18px 32px'}}>

      {conCosechas.length > 0 && (
        <>
          <p className="dm-section-label" style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--text-2)', textTransform:'uppercase', marginBottom:12}}>
            Producción acumulada
          </p>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:20}}>
            <KpiCard label="Total cosechadas" value={totalCosechadas.toLocaleString()} unit="lechugas" color="var(--green)" />
            <KpiCard label="Rendimiento global" value={rendimientoGlobal + '%'} unit="semilla→cosecha" color="var(--stage-c)" />
            <KpiCard label="Lotes completados" value={cosechados.length} unit={'de ' + conCosechas.length + ' con cosecha'} color="var(--stage-r)" />
            <KpiCard
              label="Tasa de merma"
              value={tasaMermaGlobal !== null ? tasaMermaGlobal + '%' : '—'}
              unit={totalDescartadas > 0 ? totalDescartadas.toLocaleString() + ' descartadas' : 'sin descartes'}
              color={tasaMermaGlobal === null ? 'var(--text-3)' : tasaMermaGlobal > 20 ? 'var(--red)' : tasaMermaGlobal > 10 ? 'var(--amber)' : 'var(--green)'}
            />
          </div>
        </>
      )}

      {Object.values(stageDurations).some(a => a.length > 0) && (
        <>
          <p className="dm-section-label" style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--text-2)', textTransform:'uppercase', marginBottom:12}}>
            Duración real vs. estimada
          </p>
          <div className="dm-card" style={{background:'#fff', border:'0.5px solid var(--border)', borderRadius:14, overflow:'hidden', marginBottom:20}}>
            {[
              { key:'almacigo', label:'Almácigo' },
              { key:'transplante', label:'Transplante' },
              { key:'raleo', label:'Raleo definitivo' },
            ].map(({ key, label }, i, arr) => {
              const realAvg = avg(stageDurations[key]);
              const est = STAGE_EST[key];
              const pct = realAvg ? Math.min(100, Math.round((realAvg / est) * 100)) : 0;
              const color = STAGES[key].color;
              return (
                <div key={key} style={{
                  padding:'14px 16px',
                  borderBottom: i < arr.length-1 ? '0.5px solid var(--sep)' : 'none'
                }}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
                    <span className="dm-text" style={{fontSize:13, fontWeight:500, color:'var(--text-1)'}}>{label}</span>
                    <div style={{display:'flex', alignItems:'center', gap:8}}>
                      {realAvg ? (
                        <>
                          <span style={{fontSize:13, fontWeight:600, color, fontFamily:'DM Mono, monospace'}}>{realAvg}d</span>
                          <span style={{fontSize:12, color:'var(--text-2)'}}>/ {est}d est.</span>
                        </>
                      ) : (
                        <span style={{fontSize:12, color:'var(--text-2)'}}>sin datos</span>
                      )}
                    </div>
                  </div>
                  {realAvg && (
                    <div className="dm-progress-bg" style={{height:5, background:'var(--border)', borderRadius:3, overflow:'hidden'}}>
                      <div style={{height:'100%', borderRadius:3, background: color, width:`${pct}%`, transition:'width 0.4s'}} />
                    </div>
                  )}
                  {realAvg && stageDurations[key].length > 1 && (
                    <p className="dm-text3" style={{fontSize:11, color:'var(--text-2)', marginTop:4}}>
                      Basado en {stageDurations[key].length} lotes · mín {Math.min(...stageDurations[key])}d · máx {Math.max(...stageDurations[key])}d
                    </p>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}

      {Object.values(stageTransitions).some(a => a.length > 0) && (
        <>
          <p className="dm-section-label" style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--text-2)', textTransform:'uppercase', marginBottom:12}}>
            Tasa de merma por etapa
          </p>
          <div className="dm-card" style={{background:'#fff', border:'0.5px solid var(--border)', borderRadius:14, overflow:'hidden', marginBottom:20}}>
            {[
              { key:'almacigo', label:'Almácigo → Transplante' },
              { key:'transplante', label:'Transplante → Raleo' },
              { key:'raleo', label:'Raleo → Cosecha' },
            ].map(({ key, label }, i, arr) => {
              const mermaAvg = avg(stageTransitions[key]);
              const mermaColor = !mermaAvg ? 'var(--text-3)' : mermaAvg > 20 ? 'var(--red)' : mermaAvg > 10 ? 'var(--amber)' : 'var(--green)';
              return (
                <div key={key} className="dm-sep" style={{
                  padding:'14px 16px',
                  borderBottom: i < arr.length-1 ? '0.5px solid var(--sep)' : 'none'
                }}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: mermaAvg ? 8 : 0}}>
                    <span className="dm-text" style={{fontSize:13, fontWeight:500, color:'var(--text-1)'}}>{label}</span>
                    {mermaAvg !== null ? (
                      <span style={{fontSize:14, fontWeight:600, color: mermaColor, fontFamily:'DM Mono, monospace'}}>{mermaAvg}%</span>
                    ) : (
                      <span className="dm-text3" style={{fontSize:12, color:'var(--text-2)'}}>sin datos</span>
                    )}
                  </div>
                  {mermaAvg !== null && (
                    <div className="dm-progress-bg" style={{height:5, background:'var(--border)', borderRadius:3, overflow:'hidden'}}>
                      <div style={{height:'100%', borderRadius:3, background: mermaColor, width:`${Math.min(100, mermaAvg)}%`, transition:'width 0.4s'}} />
                    </div>
                  )}
                  {mermaAvg !== null && stageTransitions[key].length > 1 && (
                    <p className="dm-text3" style={{fontSize:11, color:'var(--text-2)', marginTop:4}}>
                      {stageTransitions[key].length} lotes · mín {Math.min(...stageTransitions[key])}% · máx {Math.max(...stageTransitions[key])}%
                    </p>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}

      {lotRendimientos.length > 0 && (
        <>
          <p className="dm-section-label" style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--text-2)', textTransform:'uppercase', marginBottom:12}}>
            Rendimiento por lote
          </p>
          <div className="dm-card" style={{background:'#fff', border:'0.5px solid var(--border)', borderRadius:14, overflow:'hidden', marginBottom:20}}>
            {lotRendimientos.map((l, i) => (
              <div key={i} className="dm-sep" style={{
                padding:'14px 16px',
                borderBottom: i < lotRendimientos.length-1 ? '0.5px solid var(--sep)' : 'none'
              }}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8}}>
                  <div style={{flex:1, minWidth:0, marginRight:8}}>
                    <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:2}}>
                      <p className="dm-text" style={{fontSize:14, fontWeight:500, color:'var(--text-1)'}}>{l.name}</p>
                      {l.enCurso && (
                        <span style={{fontSize:10, fontWeight:600, background:'#E2F3EC', color:'var(--green)', padding:'2px 7px', borderRadius:10}}>en curso</span>
                      )}
                    </div>
                    <p className="dm-text3" style={{fontSize:12, color:'var(--text-2)'}}>
                      {l.cosechadas.toLocaleString()} de {l.sembradas.toLocaleString()} plantas
                      {l.duracion > 0 && ` · ${l.duracion}d ciclo`}
                    </p>
                  </div>
                  <span style={{
                    fontSize:14, fontWeight:700, fontFamily:'DM Mono, monospace',
                    color: l.pct >= 80 ? '#276F50' : l.pct >= 60 ? '#E07B2A' : '#C0392B',
                    flexShrink:0
                  }}>{l.pct}%</span>
                </div>
                <div className="dm-progress-bg" style={{height:5, background:'var(--border)', borderRadius:3, overflow:'hidden'}}>
                  <div style={{
                    height:'100%', borderRadius:3, transition:'width 0.4s',
                    background: l.pct >= 80 ? '#276F50' : l.pct >= 60 ? '#E07B2A' : '#C0392B',
                    width:`${l.pct}%`
                  }} />
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {todos.length > 0 && conCosechas.length === 0 && (
        <div style={{
          background:'var(--bg-card)', borderRadius:14, padding:'16px 18px',
          display:'flex', gap:12, alignItems:'flex-start'
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" strokeWidth="2" strokeLinecap="round" style={{flexShrink:0, marginTop:1}}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <p className="dm-text2" style={{fontSize:13, color:'var(--text-2)', lineHeight:1.6}}>
            Los análisis de rendimiento y merma se completan cuando los primeros lotes lleguen a cosecha.
          </p>

      {todos.length > 0 && (
        <>
          <p className="dm-section-label" style={{fontSize:12, fontWeight:600, letterSpacing:'0.06em', color:'var(--text-2)', textTransform:'uppercase', margin:'24px 0 12px'}}>
            Exportar datos
          </p>
          <div style={{display:'flex', gap:8}}>
            <button onClick={() => exportData(todos, 'xlsx')} style={{
              flex:1, padding:'13px 0', borderRadius:12, border:'none',
              background:'var(--green)', color:'#fff', fontSize:14, fontWeight:600,

const SEASON_MONTHS = { verano:'Dic · Ene · Feb', otono:'Mar · Abr · May', invierno:'Jun · Jul · Ago', primavera:'Sep · Oct · Nov' };

const SEASON_NAMES = { verano:'Verano', otono:'Otoño', invierno:'Invierno', primavera:'Primavera' };
const CONFIG_KEY = 'hidro_config_v1';

function loadConfig() {
  try {
    const c = JSON.parse(localStorage.getItem(CONFIG_KEY) || 'null');
    return c || {
      plantsPer: 135,
      darkMode: false,
      nombre: '',
      stageDays: {
        almacigo:    { verano:28, otono:32, invierno:35, primavera:30 },
        transplante: { verano:15, otono:15, invierno:15, primavera:15 },
        raleo:       { verano:22, otono:35, invierno:50, primavera:28 },
      }
    };
  } catch { return { plantsPer:135, darkMode:false, nombre:'', stageDays:{ almacigo:{verano:28,otono:32,invierno:35,primavera:30}, transplante:{verano:15,otono:15,invierno:15,primavera:15}, raleo:{verano:22,otono:35,invierno:50,primavera:28} } }; }
}

function saveConfig(cfg) {
  try { localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg)); } catch {}
}

    setCfg(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const parts = path.split('.');
      let obj = next;
      for (let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
      obj[parts[parts.length-1]] = val;
      return next;
    });
  };

  const handleSave = () => {
    saveConfig(cfg);
    // Actualizar STAGE_DAYS globalmente

// ── DASHBOARD ──────────────────────────────────────────
function DashboardScreen({ lots, onNavigate }) {
  const dm = useDarkMode();
  const CLR = dm ? COLORS : COLORS_LIGHT;
  const season = getSeason();

  const almacigos    = lots.filter(function(l) { return l.stage === 'almacigo'; });
  const transplantes = lots.filter(function(l) { return l.stage === 'transplante'; });
  const raleos       = lots.filter(function(l) { return l.stage === 'raleo'; });

  const ptasAlmacigo    = almacigos.reduce(function(a,l)    { return a + (l.currentQuantity ?? toPlantCount(l.quantity)); }, 0);
  const ptasTransplante = transplantes.reduce(function(a,l) { return a + (l.currentQuantity ?? toPlantCount(l.quantity)); }, 0);
  const ptasRaleo       = raleos.reduce(function(a,l)       { return a + (l.currentQuantity ?? toPlantCount(l.quantity)); }, 0);

  const lotsConCosecha  = lots.filter(function(l) { return (l.cosechas || []).length > 0; });
  const cosechadasTotal = lotsConCosecha.reduce(function(a,l) { return a + (l.cosechas||[]).reduce(function(b,h) { return b+(h.cosechadas||0); },0); }, 0);
  const sembTotal       = lotsConCosecha.reduce(function(a,l) { return a + toPlantCount(l.quantity); }, 0);
  const rendimiento     = sembTotal > 0 ? Math.round((cosechadasTotal / sembTotal) * 100) : null;

  const diasMaxRaleo  = STAGE_DAYS.raleo[season] || 35;
  const proximasRaleo = raleos.map(function(lot) {
    const rh  = (lot.stageHistory||[]).find(function(h) { return h.stage==='raleo'; });
    const diasTranscurridos = rh ? Math.max(0, daysSince(rh.date)) : 0;
    const diasRestantes     = Math.max(0, diasMaxRaleo - diasTranscurridos);
    return { lot, diasRestantes };
  }).sort(function(a,b) { return a.diasRestantes - b.diasRestantes; });

  // ── Proyección Opus ──────────────────────────────────
  const hoy = new Date();
  const nombresMes = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const nombreMes  = nombresMes[hoy.getMonth()];
  const allEvents  = getMonthProjection(lots, hoy.getFullYear(), hoy.getMonth());
  const todasBarras = allEvents.slice(0, 9);
  const maxBarVal   = todasBarras.length > 0 ? Math.max(...todasBarras.map(function(b) { return b.plants; })) : 210;
  const totalMes    = todasBarras.reduce(function(a,b) { return a+b.plants; }, 0);

  function badgeProps(dias) {
    if (dias === 0) return { label:'Lista',    bg:'var(--bg-card-h)', clr:CLR.green };
    if (dias <= 5)  return { label:'Pronto',   bg:'var(--bg-card-h)', clr:CLR.stageT };
    return              { label:'Pendiente', bg:CLR.bgCardH, clr:CLR.text3 };
  }

  const { weather } = useWeather();
  const weatherAlert = weather ? getWeatherAlert(weather) : null;

  // Saludo según hora
  const hora = new Date().getHours();
  const saludoBase = hora < 12 ? 'Buenos días' : hora < 20 ? 'Buenas tardes' : 'Buenas noches';
  const cfg = loadConfig();
  const nombre = cfg.nombre ? cfg.nombre.trim() : '';
  const totalActivas = ptasAlmacigo + ptasTransplante + ptasRaleo;

  return (
    <div style={{flex:1, overflowY:'auto', padding:'14px 16px 28px'}}>

      {/* Saludo + alertas contextuales Opción C */}
      <div style={{
        background: dm ? 'linear-gradient(135deg,#0A1F14 0%,#0D2236 100%)' : 'linear-gradient(135deg,#D6EFE3 0%,#D0E8F5 100%)',
        border: '0.5px solid ' + (dm ? '#1A3A28' : '#B0D8C4'),
        borderRadius:14, padding:'14px 16px', marginBottom:14,
        position:'relative', overflow:'hidden',
      }}>
        {/* Patrón decorativo fondo */}
        <svg width="120" height="90" viewBox="0 0 120 90" fill="none" style={{position:'absolute', right:-10, top:-10, opacity: dm ? 0.12 : 0.18}} aria-hidden="true">
          <ellipse cx="60" cy="20" rx="18" ry="28" stroke={dm ? '#4ADE80' : '#157A40'} strokeWidth="1.5" fill="none"/>
          <line x1="60" y1="20" x2="60" y2="55" stroke={dm ? '#4ADE80' : '#157A40'} strokeWidth="1.5" strokeLinecap="round"/>
          <ellipse cx="88" cy="40" rx="14" ry="20" stroke={dm ? '#3B8DD4' : '#1E6DB5'} strokeWidth="1.5" fill="none" transform="rotate(30 88 40)"/>
          <ellipse cx="32" cy="50" rx="12" ry="18" stroke={dm ? '#4ADE80' : '#157A40'} strokeWidth="1.5" fill="none" transform="rotate(-20 32 50)"/>
        </svg>
        <div style={{marginBottom: weatherAlert ? 10 : 0, position:'relative'}}>
          <p style={{fontSize:12, color: dm ? '#6BA88A' : '#4A7A60', marginBottom:2}}>{saludoBase}</p>

            {nombre || 'Nalhuitad'} 🌿

          <p style={{fontSize:12, color: dm ? '#8A9BBF' : '#4A6A5A'}}>

function SensorIcon({ type, color }) {
  const s = { width:'16', height:'16', viewBox:'0 0 24 24', fill:'none', stroke:color, strokeWidth:'2', strokeLinecap:'round', strokeLinejoin:'round' };
  if (type === 'tw') return (
    <svg {...s}><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
  );
  if (type === 'ha') return (
    <svg {...s}><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
  );
  if (type === 'ph') return (
    <svg {...s}><path d="M9 3h6l-1 9H10L9 3z"/><path d="M6 21h12"/><path d="M12 12v9"/></svg>
  );
  if (type === 'ec') return (
    <svg {...s}><polyline points="13 2 13 9 19 9 11 22 11 15 5 15 13 2"/></svg>
  );
  if (type === 'nv') return (
    <svg {...s}><path d="M2 12c.6.5 1.2 1 2.5 1C7 13 7 11 9.5 11c2.4 0 2.4 2 4.5 2 2 0 2-2 4.5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1C7 19 7 17 9.5 17c2.4 0 2.4 2 4.5 2 2 0 2-2 4.5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.4 0 2.4 2 4.5 2 2 0 2-2 4.5-2 1.3 0 1.9.5 2.5 1"/></svg>
  );
  if (type === 'co') return (
    <svg {...s}><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>

  return <svg {...s}><circle cx="12" cy="12" r="5"/></svg>;
}

// ── NOTAS SCREEN ──────────────────────────────────────
function NotasScreen({ lots }) {
  const [notes, setNotes] = useState(() => {
    try { return JSON.parse(localStorage.getItem(NOTES_CACHE_KEY) || '[]'); }
    catch { return []; }
  });
  const [loading, setLoading] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);

  useEffect(() => {
    fsDb.list('notas').then(data => {
      const sorted = data.sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
      setNotes(sorted);
      try { localStorage.setItem(NOTES_CACHE_KEY, JSON.stringify(sorted)); } catch {}
    }).catch(() => {}).finally(() => setLoading(false));
  }, []);

  const handleSaved = (note) => {
    setNotes(prev => [note, ...prev]);
  };

  const handleDelete = async (id) => {
    setNotes(prev => prev.filter(n => n.id !== id));
    try {
      const updated = JSON.parse(localStorage.getItem(NOTES_CACHE_KEY) || '[]').filter(n => n.id !== id);
      localStorage.setItem(NOTES_CACHE_KEY, JSON.stringify(updated));
    } catch {}
    try { await fsDb.del('notas', id); } catch {}
    setConfirmDeleteId(null);
  };

  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const formatNoteDate = (ts) => {
    try {
      const d = new Date(ts);
      const now = new Date();
      const diff = Math.floor((now - d) / 60000);
      if (diff < 1) return 'ahora';
      if (diff < 60) return 'hace ' + diff + ' min';
      if (diff < 1440) return 'hace ' + Math.floor(diff/60) + 'h';
      return d.getDate() + ' ' + months[d.getMonth()] + (d.getFullYear() !== now.getFullYear() ? ' ' + d.getFullYear() : '');
    } catch { return ''; }
  };

  return (
    <div style={{flex:1, overflowY:'auto', padding:'16px 16px 100px', position:'relative'}}>
      {loading && notes.length === 0 && (
        <div style={{display:'flex', flexDirection:'column', gap:10}}>
          {[1,2,3].map(i => <div key={i} className="skeleton" style={{height:72, borderRadius:12}} />)}
        </div>
      )}
      {!loading && notes.length === 0 && (
        <div style={{textAlign:'center', padding:'60px 20px'}}>
          <div style={{width:56, height:56, borderRadius:16, background:'var(--bg-card-h)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px'}}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </div>
          <p style={{fontSize:16, fontWeight:600, color:'var(--text-1)', marginBottom:6}}>Sin notas aún</p>
          <p style={{fontSize:13, color:'var(--text-2)', lineHeight:1.6}}>Usá el botón verde para registrar observaciones del invernadero.</p>
        </div>
      )}
      {notes.map((note, i) => {
        const lot = note.lotId ? lots.find(l => l.id === note.lotId) : null;
        const stageColor = lot ? STAGES[lot.stage]?.color : null;
        const isConfirming = confirmDeleteId === note.id;
        return (
          <div key={note.id || i} style={{
            background:'var(--bg-card)', border:'0.5px solid var(--border)',
            borderRadius:12, padding:'12px 14px', marginBottom:10,
            borderLeft: stageColor ? '3px solid ' + stageColor : '3px solid var(--border)',
          }}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>
              <span style={{
                fontSize:11, fontWeight:600, padding:'2px 8px', borderRadius:5,
                background: stageColor ? stageColor + '20' : 'var(--bg-card-h)',
                color: stageColor || 'var(--text-3)',
              }}>
                {note.lotName || 'General'}
              </span>
              <div style={{display:'flex', alignItems:'center', gap:8}}>
                <span style={{fontSize:11, color:'var(--text-3)', fontFamily:'DM Mono, monospace'}}>
                  {formatNoteDate(note.timestamp || note.date)}
                </span>
                {!isConfirming ? (
                  <button onClick={() => setConfirmDeleteId(note.id)} style={{
                    background:'none', border:'none', cursor:'pointer', padding:'2px 4px',
                    borderRadius:6, display:'flex', alignItems:'center',
                  }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                  </button>
                ) : (
                  <div style={{display:'flex', gap:6, alignItems:'center'}}>
                    <span style={{fontSize:11, color:'var(--text-3)'}}>¿Eliminar?</span>
                    <button onClick={() => handleDelete(note.id)} style={{
                      fontSize:11, fontWeight:600, color:'var(--red)',
                      background:'none', border:'0.5px solid var(--red)',
                      borderRadius:5, padding:'2px 8px', cursor:'pointer'
                    }}>Sí</button>
                    <button onClick={() => setConfirmDeleteId(null)} style={{
                      fontSize:11, color:'var(--text-2)',
                      background:'none', border:'0.5px solid var(--border)',
                      borderRadius:5, padding:'2px 8px', cursor:'pointer'
                    }}>No</button>
                  </div>
                )}
              </div>
            </div>
            <p style={{fontSize:14, color:'var(--text-1)', lineHeight:1.6, margin:0}}>{note.text}</p>
          </div>
        );
      })}

      {/* FAB nueva nota */}
      <button
        onClick={() => setShowModal(true)}
        style={{
          position:'fixed', bottom:80, right:16, zIndex:50,
          width:48, height:48, borderRadius:24,
          background:'var(--green)', border:'none',
          display:'flex', alignItems:'center', justifyContent:'center',
          cursor:'pointer', boxShadow:'0 4px 16px rgba(0,0,0,0.25)',
        }}
      >
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0F1219" strokeWidth="2.8" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>

      {showModal && (
        <QuickNoteModal lots={lots} onClose={() => setShowModal(false)} onSaved={handleSaved} />
      )}
    </div>
  );
}

              flex:1, display:'flex', flexDirection:'column', alignItems:'center',
              justifyContent:'center', padding:'10px 0 8px',
              background:'none', border:'none', cursor:'pointer',
              color: isActive ? COLORS.navActive : COLORS.navInactive,
              transition:'color 0.15s, transform 0.1s', position:'relative',
              WebkitUserSelect:'none',
            }}
            onTouchStart={e => e.currentTarget.style.transform='scale(0.9)'}
            onTouchEnd={e => e.currentTarget.style.transform='scale(1)'}
          >
            <Icon active={isActive} />
            {id === 'alertas' && alertCount > 0 && (
              <div style={{
                position:'absolute', top:8, left:'50%', transform:'translateX(6px)',
                width:18, height:18, borderRadius:9, background:'var(--red)',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:10, fontWeight:700, color:'#fff'
              }}>{alertCount}</div>
            )}
            <span style={{fontSize:11, fontWeight: isActive ? 600 : 400, marginTop:3}}>{label}</span>
            {isActive && (
              <div style={{
                position:'absolute', bottom:0, left:'50%', transform:'translateX(-50%)',
                width:20, height:2, background:COLORS.navActive, borderRadius:'1px 1px 0 0'
              }} />
            )}
          </button>
        );
      })}
    </div>
  );
}

// ── TOAST ──────────────────────────────────────────────
function Toast({ msg, type, onDone }) {
  const DURATION = 2800;
  const [progress, setProgress] = useState(100);

  useEffect(() => {
    const t = setTimeout(onDone, DURATION);
    const start = Date.now();
    const interval = setInterval(() => {
      const elapsed = Date.now() - start;
      const pct = Math.max(0, 100 - (elapsed / DURATION) * 100);
      setProgress(pct);
      if (pct === 0) clearInterval(interval);
    }, 30);
    return () => { clearTimeout(t); clearInterval(interval); };
  }, [onDone]);

  const isError = type === 'error';
  const isWarn  = type === 'warn';
  const bg      = isError ? '#2A1A1A' : isWarn ? '#2A1E14' : '#21252A';
  const accent  = isError ? '#E05C3A' : isWarn ? '#E07B2A' : '#95DD47';
  const border  = isError ? 'rgba(224,92,58,0.4)' : isWarn ? 'rgba(224,123,42,0.4)' : 'rgba(149,221,71,0.3)';

  const icon = isError
    ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={accent} strokeWidth="2.2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    : isWarn
    ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={accent} strokeWidth="2.2" strokeLinecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    : <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={accent} strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>;

  return (
    <div
      onClick={onDone}
      style={{
        position:'fixed', bottom:90, left:'50%', transform:'translateX(-50%)',
        zIndex:300, maxWidth:340, width:'calc(100% - 32px)',
        background: bg, borderRadius:14, overflow:'hidden',
        border:'0.5px solid var(--border)',
        animation:'toastIn 0.3s cubic-bezier(0.34,1.2,0.64,1) forwards',
        cursor:'pointer',
      }}
    >
      <div style={{display:'flex', alignItems:'center', gap:10, padding:'14px 16px'}}>
        <span style={{flexShrink:0}}>{icon}</span>
        <span style={{flex:1, fontSize:14, fontWeight:500, color:'var(--text-1)', lineHeight:1.4}}>{msg}</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" strokeWidth="2.2" strokeLinecap="round" style={{flexShrink:0}}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
      <div style={{height:3, background:'rgba(255,255,255,0.08)'}}>
        <div style={{
          height:'100%', background: accent,
          width:`${progress}%`, transition:'width 0.03s linear'
        }} />
      </div>
    </div>
  );
}

function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [showPass, setShowPass] = useState(false);

  const locked = fsAuth.isLocked();
  const attempts = fsAuth.getAttempts();
  const remaining = MAX_ATTEMPTS - attempts.count;

  const handleLogin = async () => {
    if (fsAuth.isLocked()) return;
    if (!email.trim() || !password) { setError('Completá todos los campos'); return; }
    setLoading(true);
    setError('');
    try {
      const session = await fsAuth.signIn(email.trim(), password);
      fsAuth.save(session);
      fsAuth.clearAttempts();
      onLogin(session);
    } catch(e) {
      const attempt = fsAuth.addAttempt();
      const rem = MAX_ATTEMPTS - attempt.count;
      if (attempt.count >= MAX_ATTEMPTS) {
        setError(`Cuenta bloqueada por ${fsAuth.lockRemaining()} minuto${fsAuth.lockRemaining()!==1?'s':''}. Intentá más tarde.`);
      } else if (e.message.includes('EMAIL_NOT_FOUND') || e.message.includes('INVALID_PASSWORD') || e.message.includes('INVALID_LOGIN_CREDENTIALS')) {
        setError('Email o contraseña incorrectos.' + (rem > 0 ? ' ' + rem + ' intento' + (rem!==1?'s':'') + ' restante' + (rem!==1?'s':'') + '.' : ''));
      } else if (e.message.includes('TOO_MANY_ATTEMPTS')) {
        setError('Demasiados intentos. Esperá unos minutos.');
      } else {
        setError('Error de conexión. Revisá tu internet.');
      }
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{
      height:'100%', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      background:'var(--bg-1)', padding:32, maxWidth:480, margin:'0 auto'
    }}>
      <div style={{width:76, height:76, borderRadius:22, background:'var(--bg-card)', border:'0.5px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:16}}>

          <path d="M50 38 C50 38 40 35 37 29 C42 24 50 28 50 38Z" fill="#4ADE80"/>
          <path d="M50 38 C50 38 60 33 63 27 C58 22 50 28 50 38Z" fill="#4ADE80" opacity="0.75"/>
          <line x1="50" y1="38" x2="50" y2="65" stroke="#3B8DD4" strokeWidth="3" strokeLinecap="round"/>
          <line x1="50" y1="52" x2="43" y2="59" stroke="#3B8DD4" strokeWidth="2" strokeLinecap="round" opacity="0.6"/>
          <line x1="50" y1="59" x2="58" y2="65" stroke="#3B8DD4" strokeWidth="2" strokeLinecap="round" opacity="0.6"/>
        </svg>
      </div>
      <p style={{fontSize:22, fontWeight:600, color:'var(--text-1)', marginBottom:4}}>Nalhuitad</p>
      <p style={{fontSize:14, color:'var(--text-2)', marginBottom:36}}>Hidroponía Chiloé</p>

      <div style={{width:'100%', maxWidth:360}}>
        <div style={{marginBottom:16}}>
          <p style={{fontSize:13, fontWeight:500, color:'var(--text-2)', marginBottom:7}}>Email</p>
          <input
            id="login-email"
            name="email"
            type="email" inputMode="email" autoCapitalize="none"
            autoComplete="email"
            placeholder="tu@email.com"
            value={email}
            onChange={e => { setEmail(e.target.value); setError(''); }}
            onKeyDown={e => e.key === 'Enter' && handleLogin()}
            disabled={locked || loading}
            style={{
              width:'100%', padding:'13px 14px', borderRadius:10,
              border:'0.5px solid ' + (error ? 'var(--red)' : 'var(--border)'),
              background:'var(--bg-input)',
              fontSize:15, color:'var(--text-1)', fontFamily:'DM Sans, sans-serif', outline:'none'

          />
        </div>

        <div style={{marginBottom:24}}>
          <p style={{fontSize:13, fontWeight:500, color:'var(--text-2)', marginBottom:7}}>Contraseña</p>
          <div style={{position:'relative'}}>
            <input
              id="login-password"
              name="password"
              type={showPass ? 'text' : 'password'}
              autoComplete="current-password"
              placeholder="••••••••"
              value={password}
              onChange={e => { setPassword(e.target.value); setError(''); }}
              onKeyDown={e => e.key === 'Enter' && handleLogin()}
              disabled={locked || loading}
              style={{
                width:'100%', padding:'13px 44px 13px 14px', borderRadius:10,
                border:'0.5px solid ' + (error ? '#F87171' : 'var(--border)'),
                background: locked ? 'var(--bg-card-h)' : 'var(--bg-input)',
                fontSize:15, color:'var(--text-1)', fontFamily:'DM Sans, sans-serif', outline:'none',
                WebkitAppearance:'none'
              }}
            />
            <button onClick={() => setShowPass(s => !s)} style={{

              background:'none', border:'none', cursor:'pointer', padding:4,

              {showPass

            borderRadius:10, padding:'10px 14px', marginBottom:16,

            <p style={{fontSize:13, color:'#FF8A7A', lineHeight:1.5}}>{error}</p>
          </div>
        )}

        {locked && (
          <div style={{
            background:'rgba(192,57,43,0.2)', border:'0.5px solid rgba(192,57,43,0.5)',
            borderRadius:10, padding:'10px 14px', marginBottom:16
          }}>
            <p style={{fontSize:13, color:'#FF8A7A', lineHeight:1.5}}>
              Acceso bloqueado por {fsAuth.lockRemaining()} minuto{fsAuth.lockRemaining()!==1?'s':''}. Demasiados intentos fallidos.
            </p>
          </div>
        )}

        <button
          onClick={handleLogin}
          disabled={locked || loading}
          style={{
            width:'100%', padding:'15px 0', borderRadius:12, border:'none',
            background: locked ? '#3A4A3A' : '#95DD47',
            color: locked ? '#888' : '#1F2918',
            fontSize:15, fontWeight:700,
            cursor: locked ? 'not-allowed' : 'pointer',
            display:'flex', alignItems:'center', justifyContent:'center', gap:8
          }}

          {loading
            ? <div style={{width:18, height:18, border:'2.5px solid rgba(31,41,24,0.3)', borderTopColor:'#1F2918', borderRadius:'50%', animation:'spin 0.8s linear infinite'}} />

            {remaining} intento{remaining!==1?'s':''} restante{remaining!==1?'s':''}
